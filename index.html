"int MPI_Win_call_errhandler(MPI_Win win, int errorcode)", "params": [{"name": "win", "desc": "janela (handle)"}, {"name": "errorcode", "desc": "c\u00f3digo de erro (inteiro)"}], "description": "ERROS\nMPI_SUCCESS\n- Nenhum erro.\nMPI_ERR_WIN\n- Objeto de janela MPI inv\u00e1lido.", "application": "", "example": "// Declara\u00e7\u00f5es\nMPI_Win win;\nint errorcode = MPI_ERR_OTHER;\n\nMPI_Win_create(NULL, 0, 1, MPI_INFO_NULL, MPI_COMM_WORLD, &win);\n\n// Chama explicitamente o manipulador de erros da janela\nint err = MPI_Win_call_errhandler(win, errorcode);\n\nif (err == MPI_SUCCESS) {\n    // Chamada executada\n}\nMPI_Win_free(&win);"}, {"name": "MPI_Win_complete", "short_desc": "Conclui opera\u00e7\u00f5es RMA iniciadas ap\u00f3s um MPI_Win_start", "synopsis": "int MPI_Win_complete(MPI_Win win)", "params": [{"name": "win", "desc": "janela (handle)"}], "description": "ERROS\nMPI_SUCCESS\n- Nenhum erro.\nMPI_ERR_WIN\n- Objeto de janela MPI inv\u00e1lido.", "application": "", "example": "// Declara\u00e7\u00f5es\nMPI_Win win;\n// Sup\u00f5e-se que uma janela foi criada e um acesso iniciado com MPI_Win_post\n\n// Finaliza a \u00e9poca de acesso iniciada por MPI_Win_start\nint err = MPI_Win_complete(win);\n\nif (err == MPI_SUCCESS) {\n    // Acesso conclu\u00eddo com sucesso\n}"}, {"name": "MPI_Win_create", "short_desc": "Cria um objeto de Janela MPI para comunica\u00e7\u00e3o de um lado s\u00f3", "synopsis": "int MPI_Win_create(void *base, MPI_Aint size, int disp_unit, MPI_Info info, MPI_Comm comm, MPI_Win *win)\n\nint MPI_Win_create_c(void *base, MPI_Aint size, MPI_Aint disp_unit, MPI_Info info, MPI_Comm comm, MPI_Win *win)", "params": [{"name": "base", "desc": "endere\u00e7o inicial da janela de mem\u00f3ria (escolha)"}, {"name": "size", "desc": "tamanho da janela em bytes (inteiro n\u00e3o negativo)"}, {"name": "disp_unit", "desc": "tamanho da unidade local para deslocamentos, em bytes (inteiro positivo)"}, {"name": "info", "desc": "argumento de info (handle)"}, {"name": "comm", "desc": "intra-comunicador (handle)"}], "description": "NOTAS\nO argumento disp_unit \u00e9 fornecido para facilitar a aritm\u00e9tica de endere\u00e7os em opera\u00e7\u00f5es RMA.\n\nERROS\nMPI_SUCCESS\n- Nenhum erro.\nMPI_ERR_ARG\n- Argumento inv\u00e1lido.\nMPI_ERR_COMM\n- Comunicador inv\u00e1lido.", "application": "", "example": "// Declara\u00e7\u00f5es\nint *base_data = (int *)malloc(100 * sizeof(int));\nMPI_Aint size = 100 * sizeof(int);\nint disp_unit = sizeof(int);\nMPI_Info info = MPI_INFO_NULL;\nMPI_Comm comm = MPI_COMM_WORLD;\nMPI_Win win;\n\n// Cria uma janela de mem\u00f3ria para opera\u00e7\u00f5es RMA\nint err = MPI_Win_create(base_data, size, disp_unit, info, comm, &win);\n\nif (err == MPI_SUCCESS) {\n    // Janela criada com sucesso, agora pode ser usada em comunica\u00e7\u00f5es\n    MPI_Win_free(&win);\n}\nfree(base_data);"}, {"name": "MPI_Win_create_dynamic", "short_desc": "Cria um objeto de Janela MPI din\u00e2mico para comunica\u00e7\u00e3o de um lado s\u00f3", "synopsis": "int MPI_Win_create_dynamic(MPI_Info info, MPI_Comm comm, MPI_Win *win)", "params": [{"name": "info", "desc": "argumento de info (handle)"}, {"name": "comm", "desc": "intra-comunicador (handle)"}], "description": "NOTAS\nA mem\u00f3ria nesta janela n\u00e3o pode ser usada como alvo de acessos de um lado s\u00f3 at\u00e9 que seja anexada usando MPI_Win_attach.\n\nERROS\nMPI_SUCCESS\n- Nenhum erro.\nMPI_ERR_ARG\n- Argumento inv\u00e1lido.\nMPI_ERR_COMM\n- Comunicador inv\u00e1lido.", "application": "", "example": "// Declara\u00e7\u00f5es\nMPI_Info info = MPI_INFO_NULL;\nMPI_Comm comm = MPI_COMM_WORLD;\nMPI_Win win;\n\n// Cria uma janela din\u00e2mica onde mem\u00f3ria pode ser anexada depois\nint err = MPI_Win_create_dynamic(info, comm, &win);\n\nif (err == MPI_SUCCESS) {\n    // Janela din\u00e2mica pronta para MPI_Win_attach\n    MPI_Win_free(&win);\n}"}, {"name": "MPI_Win_create_errhandler", "short_desc": "Cria um manipulador de erro para uso com janela MPI", "synopsis": "int MPI_Win_create_errhandler(MPI_Win_errhandler_function *win_errhandler_fn, MPI_Errhandler *errhandler)", "params": [{"name": "win_errhandler_fn", "desc": "fun\u00e7\u00e3o de manipulador de erro definida pelo usu\u00e1rio (fun\u00e7\u00e3o)"}, {"name": "errhandler", "desc": "novo manipulador de erro (handle)"}], "description": "ERROS\nMPI_SUCCESS\n- Nenhum erro.\nMPI_ERR_ARG\n- Argumento inv\u00e1lido.", "application": "", "example": "// Declara\u00e7\u00f5es\nMPI_Errhandler errhandler;\n\n// Cria um manipulador de erro customizado para objetos de janela\nint err = MPI_Win_create_errhandler(MPI_ERRORS_RETURN, &errhandler);\n\nif (err == MPI_SUCCESS) {\n    // Manipulador criado com sucesso\n    MPI_Errhandler_free(&errhandler);\n}"}, {"name": "MPI_Win_create_keyval", "short_desc": "Cria um valor de chave de atributo para objetos de janela MPI", "synopsis": "int MPI_Win_create_keyval(MPI_Win_copy_attr_function *win_copy_attr_fn, MPI_Win_delete_attr_function *win_delete_attr_fn, int *win_keyval, void *extra_state)", "params": [{"name": "win_copy_attr_fn", "desc": "fun\u00e7\u00e3o de callback de c\u00f3pia para win_keyval (fun\u00e7\u00e3o)"}, {"name": "win_delete_attr_fn", "desc": "fun\u00e7\u00e3o de callback de exclus\u00e3o para win_keyval (fun\u00e7\u00e3o)"}, {"name": "extra_state", "desc": "estado extra para a fun\u00e7\u00e3o de callback"}], "description": "NOTAS\nValores de chave s\u00e3o globais. Fun\u00e7\u00f5es de c\u00f3pia e exclus\u00e3o padr\u00e3o est\u00e3o dispon\u00edveis, como MPI_WIN_NULL_COPY_FN, MPI_WIN_NULL_DELETE_FN e MPI_WIN_DUP_FN.\n\nERROS\nMPI_SUCCESS\n- Nenhum erro.\nMPI_ERR_ARG\n- Argumento inv\u00e1lido.", "application": "", "example": "// Declara\u00e7\u00f5es\nint win_keyval;\nvoid *extra_state = NULL;\n\n// Cria uma chave de atributo para a janela\nint err = MPI_Win_create_keyval(MPI_WIN_NULL_COPY_FN, MPI_WIN_NULL_DELETE_FN, &win_keyval, extra_state);\n\nif (err == MPI_SUCCESS) {\n    // Chave criada, pode ser usada para cache de atributos\n    MPI_Win_free_keyval(&win_keyval);\n}"}, {"name": "MPI_Win_delete_attr", "short_desc": "Exclui um valor de atributo associado a uma chave em uma janela", "synopsis": "int MPI_Win_delete_attr(MPI_Win win, int win_keyval)", "params": [{"name": "win", "desc": "janela (handle)"}, {"name": "win_keyval", "desc": "valor da chave (inteiro)"}], "description": "ERROS\nMPI_SUCCESS\n- Nenhum erro.\nMPI_ERR_KEYVAL\n- Valor de chave inv\u00e1lido.\nMPI_ERR_WIN\n- Janela inv\u00e1lida.", "application": "", "example": "// Declara\u00e7\u00f5es\nMPI_Win win;\nint win_keyval;\n\n// Remove um atributo associado a uma janela\nint err = MPI_Win_delete_attr(win, win_keyval);\n\nif (err == MPI_SUCCESS) {\n    // Atributo deletado com sucesso\n}"}, {"name": "MPI_Win_detach", "short_desc": "Desvincula mem\u00f3ria de uma janela din\u00e2mica", "synopsis": "int MPI_Win_detach(MPI_Win win, const void *base)", "params": [{"name": "win", "desc": "janela (handle)"}, {"name": "base", "desc": "endere\u00e7o inicial da mem\u00f3ria a ser desvinculada (escolha)"}], "description": "NOTAS\nA mem\u00f3ria tamb\u00e9m \u00e9 desvinculada quando a janela de mem\u00f3ria din\u00e2mica associada \u00e9 liberada.\n\nERROS\nMPI_SUCCESS\n- Nenhum erro.\nMPI_ERR_ARG\n- Argumento inv\u00e1lido.\nMPI_ERR_WIN\n- Janela inv\u00e1lida.", "application": "", "example": "// Declara\u00e7\u00f5es\nMPI_Win win;\nint *base_addr = NULL; // Ponteiro previamente anexado\n\n// Desvincula a mem\u00f3ria da janela din\u00e2mica\nint err = MPI_Win_detach(win, base_addr);\n\nif (err == MPI_SUCCESS) {\n    // Mem\u00f3ria desvinculada com sucesso\n}"}, {"name": "MPI_Win_f2c", "short_desc": "Converte INTEGER Fortran para MPI_Win", "synopsis": "MPI_Win MPI_Win_f2c(MPI_Fint win)", "params": [{"name": "win", "desc": "janela Fortran (inteiro)"}], "description": "Converte um handle de janela do Fortran para C.", "application": "", "example": "// Declara\u00e7\u00f5es\nMPI_Fint f_win = 0;\nMPI_Win c_win;\n\n// Converte um handle Fortran para C\nc_win = MPI_Win_f2c(f_win);\n\n// A verifica\u00e7\u00e3o direta n\u00e3o \u00e9 aplic\u00e1vel via 'err' pois \u00e9 uma fun\u00e7\u00e3o de convers\u00e3o\nif (c_win != MPI_WIN_NULL) {\n    // Convers\u00e3o realizada\n}"}, {"name": "MPI_Win_fence", "short_desc": "Sincroniza opera\u00e7\u00f5es RMA em uma janela", "synopsis": "int MPI_Win_fence(int assert, MPI_Win win)", "params": [{"name": "assert", "desc": "assun\u00e7\u00e3o de programa (inteiro)"}, {"name": "win", "desc": "objeto de janela (handle)"}], "description": "NOTAS\nMPI_Win_fence \u00e9 usado para sincroniza\u00e7\u00e3o coletiva de acessos RMA.\n\nERROS\nMPI_SUCCESS\n- Nenhum erro.\nMPI_ERR_WIN\n- Janela inv\u00e1lida.", "application": "", "example": "// Declara\u00e7\u00f5es\nint assert = 0;\nMPI_Win win;\n\n// Sincroniza\u00e7\u00e3o coletiva RMA\nint err = MPI_Win_fence(assert, win);\n\nif (err == MPI_SUCCESS) {\n    // Barreira RMA sincronizada\n}"}, {"name": "MPI_Win_flush", "short_desc": "Conclui todas as opera\u00e7\u00f5es RMA pendentes em um alvo", "synopsis": "int MPI_Win_flush(int rank, MPI_Win win)", "params": [{"name": "rank", "desc": "rank do alvo (inteiro)"}, {"name": "win", "desc": "janela (handle)"}], "description": "Garante que todas as opera\u00e7\u00f5es RMA pendentes do processo de chamada para o processo alvo tenham sido conclu\u00eddas no alvo.", "application": "", "example": "// Declara\u00e7\u00f5es\nint target_rank = 1;\nMPI_Win win;\n\n// Garante conclus\u00e3o de opera\u00e7\u00f5es RMA no alvo\nint err = MPI_Win_flush(target_rank, win);\n\nif (err == MPI_SUCCESS) {\n    // Opera\u00e7\u00f5es pendentes completadas no alvo\n}"}, {"name": "MPI_Win_flush_all", "short_desc": "Conclui todas as opera\u00e7\u00f5es RMA pendentes em todos os alvos", "synopsis": "int MPI_Win_flush_all(MPI_Win win)", "params": [{"name": "win", "desc": "janela (handle)"}], "description": "Garante que todas as opera\u00e7\u00f5es RMA pendentes de um processo tenham sido conclu\u00eddas em todos os processos alvo.", "application": "", "example": "// Declara\u00e7\u00f5es\nint size = 100;\nint *data;\nMPI_Win win;\n\n// Cria\u00e7\u00e3o da janela e in\u00edcio da \u00e9poca de acesso\nMPI_Alloc_mem(size * sizeof(int), MPI_INFO_NULL, &data);\nMPI_Win_create(data, size * sizeof(int), sizeof(int), MPI_INFO_NULL, MPI_COMM_WORLD, &win);\nMPI_Win_lock_all(0, win);\n\n// Garante que todas as opera\u00e7\u00f5es RMA pendentes concluam em todos os alvos\nint err = MPI_Win_flush_all(win);\n\nif (err == MPI_SUCCESS) {\n    // Opera\u00e7\u00f5es de mem\u00f3ria conclu\u00eddas com sucesso\n}\n\nMPI_Win_unlock_all(win);\nMPI_Win_free(&win);\nMPI_Free_mem(data);"}, {"name": "MPI_Win_flush_local", "short_desc": "Conclui todas as opera\u00e7\u00f5es RMA pendentes localmente em um alvo", "synopsis": "int MPI_Win_flush_local(int rank, MPI_Win win)", "params": [{"name": "rank", "desc": "rank do alvo (inteiro)"}, {"name": "win", "desc": "janela (handle)"}], "description": "Garante que as opera\u00e7\u00f5es RMA pendentes tenham sido conclu\u00eddas localmente no processo de chamada.", "application": "", "example": "// Declara\u00e7\u00f5es\nint rank = 0;\nint size = 100;\nint *data;\nMPI_Win win;\n\n// Cria\u00e7\u00e3o da janela e in\u00edcio da \u00e9poca\nMPI_Alloc_mem(size * sizeof(int), MPI_INFO_NULL, &data);\nMPI_Win_create(data, size * sizeof(int), sizeof(int), MPI_INFO_NULL, MPI_COMM_WORLD, &win);\nMPI_Win_lock(MPI_LOCK_SHARED, rank, 0, win);\n\n// Garante que as opera\u00e7\u00f5es RMA para o rank espec\u00edfico conclu\u00edram localmente\nint err = MPI_Win_flush_local(rank, win);\n\nif (err == MPI_SUCCESS) {\n    // Conclu\u00eddo localmente\n}\n\nMPI_Win_unlock(rank, win);\nMPI_Win_free(&win);\nMPI_Free_mem(data);"}, {"name": "MPI_Win_flush_local_all", "short_desc": "Conclui todas as opera\u00e7\u00f5es RMA pendentes localmente em todos os alvos", "synopsis": "int MPI_Win_flush_local_all(MPI_Win win)", "params": [{"name": "win", "desc": "janela (handle)"}], "description": "Garante que todas as opera\u00e7\u00f5es RMA pendentes tenham sido conclu\u00eddas localmente em todos os alvos.", "application": "", "example": "// Declara\u00e7\u00f5es\nint size = 100;\nint *data;\nMPI_Win win;\n\nMPI_Alloc_mem(size * sizeof(int), MPI_INFO_NULL, &data);\nMPI_Win_create(data, size * sizeof(int), sizeof(int), MPI_INFO_NULL, MPI_COMM_WORLD, &win);\nMPI_Win_lock_all(0, win);\n\n// Garante que todas as opera\u00e7\u00f5es RMA pendentes conclu\u00edram localmente em todos os alvos\nint err = MPI_Win_flush_local_all(win);\n\nif (err == MPI_SUCCESS) {\n    // Opera\u00e7\u00f5es localmente completadas\n}\n\nMPI_Win_unlock_all(win);\nMPI_Win_free(&win);\nMPI_Free_mem(data);"}, {"name": "MPI_Win_free", "short_desc": "Libera o objeto de janela MPI", "synopsis": "int MPI_Win_free(MPI_Win *win)", "params": [{"name": "win", "desc": "objeto de janela a ser liberado (handle)"}], "description": "ERROS\nMPI_SUCCESS\n- Nenhum erro.\nMPI_ERR_WIN\n- Janela inv\u00e1lida.", "application": "", "example": "// Declara\u00e7\u00f5es\nint size = 10;\nint *data;\nMPI_Win win;\n\nMPI_Alloc_mem(size * sizeof(int), MPI_INFO_NULL, &data);\nMPI_Win_create(data, size * sizeof(int), sizeof(int), MPI_INFO_NULL, MPI_COMM_WORLD, &win);\n\n// Libera o objeto de janela ap\u00f3s o uso\nint err = MPI_Win_free(&win);\n\nif (err == MPI_SUCCESS) {\n    // Janela liberada com sucesso e ponteiro definido para MPI_WIN_NULL\n}\n\nMPI_Free_mem(data);"}, {"name": "MPI_Win_free_keyval", "short_desc": "Libera uma chave de atributo para janelas RMA do MPI.", "synopsis": "int MPI_Win_free_keyval(int *win_keyval)", "params": [{"name": "win_keyval", "desc": "valor da chave (inteiro)"}], "description": "Marca uma chave de atributo de janela para desaloca\u00e7\u00e3o. A chave real s\u00f3 ser\u00e1 liberada quando n\u00e3o houver mais refer\u00eancias a ela.", "application": "Limpeza de recursos de atributos de janela.", "example": "// Declara\u00e7\u00f5es\nint keyval;\n\n// Cria\u00e7\u00e3o de uma chave de atributo de janela\nMPI_Win_create_keyval(MPI_WIN_NULL_COPY_FN, MPI_WIN_NULL_DELETE_FN, &keyval, NULL);\n\n// Marca a chave para desaloca\u00e7\u00e3o\nint err = MPI_Win_free_keyval(&keyval);\n\nif (err == MPI_SUCCESS) {\n    // Chave liberada ou marcada para libera\u00e7\u00e3o\n}"}, {"name": "MPI_Win_get_attr", "short_desc": "Obt\u00e9m um atributo armazenado em um objeto de janela MPI.", "synopsis": "int MPI_Win_get_attr(MPI_Win win, int win_keyval, void *attribute_val, int *flag)", "params": [{"name": "win", "desc": "janela \u00e0 qual o atributo est\u00e1 anexado (handle)"}, {"name": "win_keyval", "desc": "valor da chave (inteiro)"}, {"name": "attribute_val", "desc": "valor do atributo, a menos que flag = false (Nenhum)"}, {"name": "flag", "desc": "falso se nenhum atributo estiver associado \u00e0 chave (l\u00f3gico)"}], "description": "Recupera o valor de um atributo associado a uma chave espec\u00edfica em uma janela MPI.", "application": "Consulta de metadados ou propriedades de janelas RMA (como tamanho ou endere\u00e7o base).", "example": "// Declara\u00e7\u00f5es\nint *base;\nint flag;\nMPI_Win win;\nint data[10];\n\nMPI_Win_create(data, 10 * sizeof(int), sizeof(int), MPI_INFO_NULL, MPI_COMM_WORLD, &win);\n\n// Recupera o atributo da base da janela\nint err = MPI_Win_get_attr(win, MPI_WIN_BASE, &base, &flag);\n\nif (err == MPI_SUCCESS && flag) {\n    // Atributo encontrado com sucesso\n}\n\nMPI_Win_free(&win);"}, {"name": "MPI_Win_get_errhandler", "short_desc": "Obt\u00e9m o manipulador de erros da janela RMA do MPI.", "synopsis": "int MPI_Win_get_errhandler(MPI_Win win, MPI_Errhandler *errhandler)", "params": [{"name": "win", "desc": "objeto de janela (handle)"}, {"name": "errhandler", "desc": "manipulador de erros atualmente associado \u00e0 janela (handle)"}], "description": "Retorna o manipulador de erros que est\u00e1 configurado para ser chamado quando ocorrem erros em opera\u00e7\u00f5es relacionadas \u00e0 janela especificada.", "application": "Verifica\u00e7\u00e3o ou depura\u00e7\u00e3o de configura\u00e7\u00f5es de tratamento de erros em RMA.", "example": "// Declara\u00e7\u00f5es\nMPI_Win win;\nMPI_Errhandler errhandler;\nint data[1];\n\nMPI_Win_create(data, sizeof(int), sizeof(int), MPI_INFO_NULL, MPI_COMM_WORLD, &win);\n\n// Obt\u00e9m o manipulador de erros atual da janela\nint err = MPI_Win_get_errhandler(win, &errhandler);\n\nif (err == MPI_SUCCESS) {\n    // Manipulador de erro recuperado\n}\n\nMPI_Win_free(&win);"}, {"name": "MPI_Win_get_group", "short_desc": "Obt\u00e9m o grupo MPI associado ao objeto de janela.", "synopsis": "int MPI_Win_get_group(MPI_Win win, MPI_Group *group)", "params": [{"name": "win", "desc": "objeto de janela (handle)"}, {"name": "group", "desc": "grupo de processos que compartilham acesso \u00e0 janela (handle)"}], "description": "Retorna uma duplicata do grupo de processos que foi usado para criar a janela MPI. O grupo deve ser liberado com MPI_Group_free.", "application": "Determina\u00e7\u00e3o dos processos participantes em uma janela RMA para sincroniza\u00e7\u00e3o.", "example": "// Declara\u00e7\u00f5es\nMPI_Win win;\nMPI_Group group;\nint data[1];\n\nMPI_Win_create(data, sizeof(int), sizeof(int), MPI_INFO_NULL, MPI_COMM_WORLD, &win);\n\n// Obt\u00e9m o grupo associado \u00e0 janela\nint err = MPI_Win_get_group(win, &group);\n\nif (err == MPI_SUCCESS) {\n    // Libera\u00e7\u00e3o do grupo obtido\n    MPI_Group_free(&group);\n}\n\nMPI_Win_free(&win);"}, {"name": "MPI_Win_get_info", "short_desc": "Retorna um novo objeto de informa\u00e7\u00f5es contendo as dicas (hints) da janela.", "synopsis": "int MPI_Win_get_info(MPI_Win win, MPI_Info *info_used)", "params": [{"name": "win", "desc": "objeto de janela (handle)"}, {"name": "info_used", "desc": "novo objeto de info (handle)"}], "description": "Recupera as dicas de otimiza\u00e7\u00e3o e configura\u00e7\u00e3o que est\u00e3o atualmente em vigor para a janela MPI especificada.", "application": "Inspe\u00e7\u00e3o de otimiza\u00e7\u00f5es aplicadas pelo sistema \u00e0 janela.", "example": "// Declara\u00e7\u00f5es\nMPI_Win win;\nMPI_Info info;\nint data[1];\n\nMPI_Win_create(data, sizeof(int), sizeof(int), MPI_INFO_NULL, MPI_COMM_WORLD, &win);\n\n// Recupera as dicas de otimiza\u00e7\u00e3o da janela\nint err = MPI_Win_get_info(win, &info);\n\nif (err == MPI_SUCCESS) {\n    // Libera\u00e7\u00e3o do objeto info\n    MPI_Info_free(&info);\n}\n\nMPI_Win_free(&win);"}, {"name": "MPI_Win_get_name", "short_desc": "Obt\u00e9m o nome associado \u00e0 janela de RMA MPI.", "synopsis": "int MPI_Win_get_name(MPI_Win win, char *win_name, int *resultlen)", "params": [{"name": "win", "desc": "janela cujo nome ser\u00e1 retornado (handle)"}, {"name": "win_name", "desc": "o nome previamente armazenado na janela (string)"}, {"name": "resultlen", "desc": "comprimento do nome retornado (inteiro)"}], "description": "Retorna o nome amig\u00e1vel associado a uma janela MPI, \u00fatil para fins de depura\u00e7\u00e3o e diagn\u00f3stico.", "application": "Identifica\u00e7\u00e3o de recursos de janela em grandes aplica\u00e7\u00f5es.", "example": "// Declara\u00e7\u00f5es\nMPI_Win win;\nchar win_name[MPI_MAX_OBJECT_NAME];\nint resultlen;\nint data[1];\n\nMPI_Win_create(data, sizeof(int), sizeof(int), MPI_INFO_NULL, MPI_COMM_WORLD, &win);\nMPI_Win_set_name(win, \"MinhaJanela\");\n\n// Recupera o nome da janela para fins de depura\u00e7\u00e3o\nint err = MPI_Win_get_name(win, win_name, &resultlen);\n\nif (err == MPI_SUCCESS) {\n    // Nome da janela recuperado\n}\n\nMPI_Win_free(&win);"}, {"name": "MPI_Win_lock", "short_desc": "Inicia uma \u00e9poca de acesso RMA no processo de destino.", "synopsis": "int MPI_Win_lock(int lock_type, int rank, int assert, MPI_Win win)", "params": [{"name": "lock_type", "desc": "MPI_LOCK_EXCLUSIVE ou MPI_LOCK_SHARED (estado)"}, {"name": "rank", "desc": "rank da janela bloqueada (inteiro n\u00e3o negativo)"}, {"name": "assert", "desc": "asser\u00e7\u00e3o do programa (inteiro)"}, {"name": "win", "desc": "objeto de janela (handle)"}], "description": "MPI_Win_lock inicia uma \u00e9poca de acesso unilateral (RMA) no processo de destino. Permite controle de acesso compartilhado ou exclusivo a janelas de mem\u00f3ria.", "application": "Sincroniza\u00e7\u00e3o de acesso \u00e0 mem\u00f3ria em opera\u00e7\u00f5es RMA de um \u00fanico lado.", "example": "// Declara\u00e7\u00f5es\nint lock_type = MPI_LOCK_EXCLUSIVE;\nint rank = 0;\nint assert = 0;\nint data = 0;\nMPI_Win win;\n\n// Cria a janela de mem\u00f3ria para uma \u00fanica vari\u00e1vel\nMPI_Win_create(&data, sizeof(int), sizeof(int), MPI_INFO_NULL, MPI_COMM_WORLD, &win);\n\n// Inicia o bloqueio exclusivo para acesso \u00e0 mem\u00f3ria do rank 0\nint err = MPI_Win_lock(lock_type, rank, assert, win);\n\nif (err == MPI_SUCCESS) {\n    // Realiza opera\u00e7\u00f5es RMA aqui (ex: MPI_Put, MPI_Get)\n    MPI_Win_unlock(rank, win);\n}\n\nMPI_Win_free(&win);"}, {"name": "MPI_Win_lock_all", "short_desc": "Inicia uma \u00e9poca de acesso RMA em todos os processos da janela fornecida.", "synopsis": "int MPI_Win_lock_all(int assert, MPI_Win win)", "params": [{"name": "assert", "desc": "asser\u00e7\u00e3o do programa (inteiro)"}, {"name": "win", "desc": "objeto de janela (handle)"}], "description": "MPI_Win_lock_all inicia uma \u00e9poca de acesso RMA para todos os processos no comunicador associado \u00e0 janela. \u00c9 uma opera\u00e7\u00e3o n\u00e3o coletiva.", "application": "Cria\u00e7\u00e3o de janelas de mem\u00f3ria globalmente acess\u00edveis de forma eficiente.", "example": "// Declara\u00e7\u00f5es\nint assert = 0;\nint data = 100;\nMPI_Win win;\n\nMPI_Win_create(&data, sizeof(int), sizeof(int), MPI_INFO_NULL, MPI_COMM_WORLD, &win);\n\n// Bloqueia a janela de todos os processos no comunicador para acesso RMA\nint err = MPI_Win_lock_all(assert, win);\n\nif (err == MPI_SUCCESS) {\n    // Acesso remoto permitido a todos os processos\n    MPI_Win_unlock_all(win);\n}\n\nMPI_Win_free(&win);"}, {"name": "MPI_Win_post", "short_desc": "Inicia uma \u00e9poca de exposi\u00e7\u00e3o RMA.", "synopsis": "int MPI_Win_post(MPI_Group group, int assert, MPI_Win win)", "params": [{"name": "group", "desc": "grupo de processos de origem (handle)"}, {"name": "assert", "desc": "asser\u00e7\u00e3o do programa (inteiro)"}, {"name": "win", "desc": "objeto de janela (handle)"}], "description": "MPI_Win_post abre uma janela local para acesso RMA por processos do grupo especificado. \u00c9 usada na sincroniza\u00e7\u00e3o de acesso a janelas via MPI_Win_start.", "application": "Sincroniza\u00e7\u00e3o passiva em opera\u00e7\u00f5es RMA.", "example": "// Declara\u00e7\u00f5es\nMPI_Group world_group, post_group;\nint ranks[] = {0};\nint assert = 0;\nint data = 0;\nMPI_Win win;\n\nMPI_Comm_group(MPI_COMM_WORLD, &world_group);\nMPI_Group_incl(world_group, 1, ranks, &post_group);\nMPI_Win_create(&data, sizeof(int), sizeof(int), MPI_INFO_NULL, MPI_COMM_WORLD, &win);\n\n// Abre a janela para exposi\u00e7\u00e3o aos processos do grupo definido\nint err = MPI_Win_post(post_group, assert, win);\n\nif (err == MPI_SUCCESS) {\n    MPI_Win_wait(win);\n}\n\nMPI_Group_free(&post_group);\nMPI_Group_free(&world_group);\nMPI_Win_free(&win);"}, {"name": "MPI_Win_set_attr", "short_desc": "Armazena um valor de atributo associado a uma chave em uma janela.", "synopsis": "int MPI_Win_set_attr(MPI_Win win, int win_keyval, void *attribute_val)", "params": [{"name": "win", "desc": "janela \u00e0 qual o atributo ser\u00e1 anexado (handle)"}, {"name": "win_keyval", "desc": "valor da chave (inteiro)"}, {"name": "attribute_val", "desc": "valor do atributo (None)"}], "description": "Associa metadados personalizados a uma janela MPI usando chaves de atributo previamente criadas.", "application": "Extens\u00e3o da funcionalidade de janelas com dados espec\u00edficos do usu\u00e1rio.", "example": "// Declara\u00e7\u00f5es\nMPI_Win win;\nint win_keyval;\nint *attr_val = malloc(sizeof(int));\n*attr_val = 42;\nint data = 0;\n\nMPI_Win_create(&data, sizeof(int), sizeof(int), MPI_INFO_NULL, MPI_COMM_WORLD, &win);\nMPI_Win_create_keyval(MPI_WIN_NULL_COPY_FN, MPI_WIN_NULL_DELETE_FN, &win_keyval, NULL);\n\n// Associa metadados \u00e0 janela\nint err = MPI_Win_set_attr(win, win_keyval, attr_val);\n\nif (err == MPI_SUCCESS) {\n    // Atributo definido com sucesso\n}\n\nMPI_Win_free_keyval(&win_keyval);\nMPI_Win_free(&win);\nfree(attr_val);"}, {"name": "MPI_Win_set_errhandler", "short_desc": "Define o manipulador de erro da janela.", "synopsis": "int MPI_Win_set_errhandler(MPI_Win win, MPI_Errhandler errhandler)", "params": [{"name": "win", "desc": "objeto de janela (handle)"}, {"name": "errhandler", "desc": "novo manipulador de erro para a janela (handle)"}], "description": "Associa um manipulador de erro espec\u00edfico a uma janela MPI. Se ocorrer um erro durante uma opera\u00e7\u00e3o RMA nesta janela, o manipulador fornecido ser\u00e1 chamado.", "application": "Personaliza\u00e7\u00e3o do tratamento de erros em opera\u00e7\u00f5es de mem\u00f3ria compartilhada ou RMA.", "example": "// Declara\u00e7\u00f5es\nMPI_Win win;\nMPI_Errhandler errh = MPI_ERRORS_RETURN;\nint data = 0;\n\nMPI_Win_create(&data, sizeof(int), sizeof(int), MPI_INFO_NULL, MPI_COMM_WORLD, &win);\n\n// Define o manipulador de erro para retornar erros em vez de abortar\nint err = MPI_Win_set_errhandler(win, errh);\n\nif (err == MPI_SUCCESS) {\n    // Manipulador configurado\n}\n\nMPI_Win_free(&win);"}, {"name": "MPI_Win_set_info", "short_desc": "Define novos valores para as dicas (hints) da janela associada.", "synopsis": "int MPI_Win_set_info(MPI_Win win, MPI_Info info)", "params": [{"name": "win", "desc": "objeto de janela (handle)"}, {"name": "info", "desc": "objeto de informa\u00e7\u00f5es contendo as dicas (handle)"}], "description": "Atualiza as dicas de performance e comportamento de uma janela MPI ap\u00f3s sua cria\u00e7\u00e3o. Algumas dicas podem ser ignoradas pela implementa\u00e7\u00e3o se n\u00e3o puderem ser alteradas dinamicamente.", "application": "Otimiza\u00e7\u00e3o de janelas RMA em tempo de execu\u00e7\u00e3o.", "example": "// Declara\u00e7\u00f5es\nMPI_Win win;\nMPI_Info info;\nint data = 0;\n\nMPI_Info_create(&info);\nMPI_Info_set(info, \"no_locks\", \"true\");\nMPI_Win_create(&data, sizeof(int), sizeof(int), MPI_INFO_NULL, MPI_COMM_WORLD, &win);\n\n// Atualiza as dicas da janela ap\u00f3s cria\u00e7\u00e3o\nint err = MPI_Win_set_info(win, info);\n\nif (err == MPI_SUCCESS) {\n    // Info atualizada\n}\n\nMPI_Info_free(&info);\nMPI_Win_free(&win);"}, {"name": "MPI_Win_set_name", "short_desc": "Define o nome de impress\u00e3o para uma janela de RMA MPI.", "synopsis": "int MPI_Win_set_name(MPI_Win win, const char *win_name)", "params": [{"name": "win", "desc": "janela cujo identificador ser\u00e1 definido (handle)"}, {"name": "win_name", "desc": "a string de caracteres que ser\u00e1 lembrada como o nome (string)"}], "description": "Atribui um nome a uma janela MPI, o que facilita a depura\u00e7\u00e3o e o rastreamento de erros em sistemas complexos.", "application": "Documenta\u00e7\u00e3o e depura\u00e7\u00e3o de objetos MPI.", "example": "// Declara\u00e7\u00f5es\nMPI_Win win;\nconst char *win_name = \"JANELA_DE_TESTE\";\nint data = 0;\n\nMPI_Win_create(&data, sizeof(int), sizeof(int), MPI_INFO_NULL, MPI_COMM_WORLD, &win);\n\n// Nomeia a janela para debug\nint err = MPI_Win_set_name(win, win_name);\n\nif (err == MPI_SUCCESS) {\n    // Nome atribu\u00eddo\n}\n\nMPI_Win_free(&win);"}, {"name": "MPI_Win_shared_query", "short_desc": "Consulta o tamanho e o ponteiro base de um fragmento de uma janela de mem\u00f3ria compartilhada.", "synopsis": "int MPI_Win_shared_query(MPI_Win win, int rank, MPI_Aint *size, int *disp_unit, void *baseptr)", "params": [{"name": "win", "desc": "objeto de janela de mem\u00f3ria compartilhada (handle)"}, {"name": "rank", "desc": "rank no grupo da janela win ou MPI_PROC_NULL (inteiro n\u00e3o negativo)"}, {"name": "size", "desc": "tamanho do segmento da janela (inteiro n\u00e3o negativo)"}, {"name": "disp_unit", "desc": "tamanho da unidade local para deslocamentos, em bytes (inteiro positivo)"}, {"name": "baseptr", "desc": "endere\u00e7o para acesso de carga/armazenamento ao segmento da janela (escolha)"}], "description": "Retorna o endere\u00e7o de mem\u00f3ria e o tamanho de um segmento de mem\u00f3ria compartilhada pertencente a um determinado rank em uma janela criada com MPI_Win_allocate_shared.", "application": "Implementa\u00e7\u00e3o de algoritmos de mem\u00f3ria compartilhada verdadeira entre processos no mesmo n\u00f3.", "example": "// Declara\u00e7\u00f5es\nMPI_Win win;\nint rank = 0;\nMPI_Aint size;\nint disp_unit;\nvoid *baseptr;\n\nMPI_Win_allocate_shared(1024, sizeof(int), MPI_INFO_NULL, MPI_COMM_WORLD, &baseptr, &win);\n\n// Consulta propriedades da mem\u00f3ria compartilhada\nint err = MPI_Win_shared_query(win, rank, &size, &disp_unit, &baseptr);\n\nif (err == MPI_SUCCESS) {\n    // Mem\u00f3ria acess\u00edvel via baseptr\n}\n\nMPI_Win_free(&win);"}, {"name": "MPI_Win_start", "short_desc": "Inicia uma \u00e9poca de acesso RMA para MPI.", "synopsis": "int MPI_Win_start(MPI_Group group, int assert, MPI_Win win)", "params": [{"name": "group", "desc": "grupo de processos de destino (handle)"}, {"name": "assert", "desc": "asser\u00e7\u00e3o do programa (inteiro)"}, {"name": "win", "desc": "objeto de janela (handle)"}], "description": "Inicia uma \u00e9poca de acesso RMA (\u00e9poca de origem) para um conjunto de processos de destino. Deve ser combinada com MPI_Win_post no lado do destino.", "application": "Sincroniza\u00e7\u00e3o passiva baseada em grupo para opera\u00e7\u00f5es RMA.", "example": "// Declara\u00e7\u00f5es\nMPI_Group world_group, start_group;\nint ranks[] = {0};\nint assert = 0;\nint data = 0;\nMPI_Win win;\n\nMPI_Comm_group(MPI_COMM_WORLD, &world_group);\nMPI_Group_incl(world_group, 1, ranks, &start_group);\nMPI_Win_create(&data, sizeof(int), sizeof(int), MPI_INFO_NULL, MPI_COMM_WORLD, &win);\n\n// Inicia \u00e9poca RMA com os processos do grupo\nint err = MPI_Win_start(start_group, assert, win);\n\nif (err == MPI_SUCCESS) {\n    MPI_Win_complete(win);\n}\n\nMPI_Group_free(&start_group);\nMPI_Group_free(&world_group);\nMPI_Win_free(&win);"}, {"name": "MPI_Win_sync", "short_desc": "Sincroniza as c\u00f3pias p\u00fablica e privada da janela fornecida.", "synopsis": "int MPI_Win_sync(MPI_Win win)", "params": [{"name": "win", "desc": "objeto de janela (handle)"}], "description": "Garante que as opera\u00e7\u00f5es de escrita na janela sejam vis\u00edveis e que os valores lidos sejam atuais, sincronizando os buffers de mem\u00f3ria privada e p\u00fablica.", "application": "Garantia de consist\u00eancia de mem\u00f3ria em modelos de mem\u00f3ria relaxada.", "example": "// Declara\u00e7\u00f5es\nint data = 0;\nMPI_Win win;\n\nMPI_Win_create(&data, sizeof(int), sizeof(int), MPI_INFO_NULL, MPI_COMM_WORLD, &win);\n\n// Sincroniza a mem\u00f3ria privada com a p\u00fablica antes de acesso RMA\nint err = MPI_Win_sync(win);\n\nif (err == MPI_SUCCESS) {\n    // Estado da mem\u00f3ria sincronizado\n}\n\nMPI_Win_free(&win);"}, {"name": "MPI_Win_test", "short_desc": "Testa se uma \u00e9poca de exposi\u00e7\u00e3o RMA foi conclu\u00edda.", "synopsis": "int MPI_Win_test(MPI_Win win, int *flag)", "params": [{"name": "win", "desc": "objeto de janela (handle)"}, {"name": "flag", "desc": "sinalizador de sucesso (l\u00f3gico)"}], "description": "Verifica de forma n\u00e3o bloqueante se uma \u00e9poca de exposi\u00e7\u00e3o (iniciada por MPI_Win_post) foi conclu\u00edda por todos os processos de origem correspondentes.", "application": "Verifica\u00e7\u00e3o ass\u00edncrona da conclus\u00e3o de opera\u00e7\u00f5es RMA no lado do destino.", "example": "// Declara\u00e7\u00f5es\nint size = 100;\ndouble *baseptr;\nMPI_Win win;\nint flag = 0;\n\n// Aloca\u00e7\u00e3o da mem\u00f3ria para a janela RMA\nMPI_Alloc_mem(size * sizeof(double), MPI_INFO_NULL, &baseptr);\nMPI_Win_create(baseptr, size * sizeof(double), sizeof(double), MPI_INFO_NULL, MPI_COMM_WORLD, &win);\n\n// Verifica se a \u00e9poca de exposi\u00e7\u00e3o foi conclu\u00edda de forma n\u00e3o bloqueante\nint err = MPI_Win_test(win, &flag);\n\nif (err == MPI_SUCCESS && flag) {\n    // A \u00e9poca foi conclu\u00edda com sucesso\n}\n\nMPI_Win_free(&win);\nMPI_Free_mem(baseptr);"}, {"name": "MPI_Win_unlock", "short_desc": "Conclui uma \u00e9poca de acesso RMA no processo de destino.", "synopsis": "int MPI_Win_unlock(int rank, MPI_Win win)", "params": [{"name": "rank", "desc": "rank da janela (inteiro n\u00e3o negativo)"}, {"name": "win", "desc": "objeto de janela (handle)"}], "description": "Conclui uma \u00e9poca de acesso RMA iniciada por MPI_Win_lock. Garante que todas as opera\u00e7\u00f5es RMA pendentes para o rank especificado tenham sido conclu\u00eddas.", "application": "Finaliza\u00e7\u00e3o de acesso exclusivo ou compartilhado a um rank espec\u00edfico em RMA.", "example": "// Declara\u00e7\u00f5es\nint target_rank = 0;\ndouble *baseptr;\nMPI_Win win;\n\nMPI_Alloc_mem(1024, MPI_INFO_NULL, &baseptr);\nMPI_Win_create(baseptr, 1024, 1, MPI_INFO_NULL, MPI_COMM_WORLD, &win);\n\n// Inicia \u00e9poca de acesso e finaliza logo em seguida\nMPI_Win_lock(MPI_LOCK_SHARED, target_rank, 0, win);\nint err = MPI_Win_unlock(target_rank, win);\n\nif (err == MPI_SUCCESS) {\n    // Acesso ao rank conclu\u00eddo e opera\u00e7\u00f5es finalizadas\n}\n\nMPI_Win_free(&win);\nMPI_Free_mem(baseptr);"}, {"name": "MPI_Win_unlock_all", "short_desc": "Conclui uma \u00e9poca de acesso RMA em todos os processos da janela fornecida.", "synopsis": "int MPI_Win_unlock_all(MPI_Win win)", "params": [{"name": "win", "desc": "objeto de janela (handle)"}], "description": "Finaliza a \u00e9poca de acesso RMA iniciada por MPI_Win_lock_all para todos os processos no comunicador da janela.", "application": "Libera\u00e7\u00e3o global de acesso RMA em janelas compartilhadas.", "example": "// Declara\u00e7\u00f5es\ndouble *baseptr;\nMPI_Win win;\n\nMPI_Alloc_mem(1024, MPI_INFO_NULL, &baseptr);\nMPI_Win_create(baseptr, 1024, 1, MPI_INFO_NULL, MPI_COMM_WORLD, &win);\n\n// Inicia \u00e9poca de acesso para todos os processos e encerra\nMPI_Win_lock_all(0, win);\nint err = MPI_Win_unlock_all(win);\n\nif (err == MPI_SUCCESS) {\n    // Todas as janelas desbloqueadas com sucesso\n}\n\nMPI_Win_free(&win);\nMPI_Free_mem(baseptr);"}, {"name": "MPI_Win_wait", "short_desc": "Conclui uma \u00e9poca de exposi\u00e7\u00e3o RMA iniciada com MPI_Win_post.", "synopsis": "int MPI_Win_wait(MPI_Win win)", "params": [{"name": "win", "desc": "objeto de janela (handle)"}], "description": "Bloqueia at\u00e9 que todos os processos de origem que iniciaram o acesso a esta janela local (via MPI_Win_start) tenham conclu\u00eddo seus acessos (via MPI_Win_complete).", "application": "Sincroniza\u00e7\u00e3o no lado do destino em opera\u00e7\u00f5es RMA passivas.", "example": "// Declara\u00e7\u00f5es\ndouble *baseptr;\nMPI_Win win;\n\nMPI_Alloc_mem(1024, MPI_INFO_NULL, &baseptr);\nMPI_Win_create(baseptr, 1024, 1, MPI_INFO_NULL, MPI_COMM_WORLD, &win);\n\n// Sincroniza\u00e7\u00e3o p\u00f3s-exposi\u00e7\u00e3o\nint err = MPI_Win_wait(win);\n\nif (err == MPI_SUCCESS) {\n    // Bloqueia at\u00e9 que as origens terminem seus acessos\n}\n\nMPI_Win_free(&win);\nMPI_Free_mem(baseptr);"}, {"name": "MPI_Wtick", "short_desc": "Retorna a resolu\u00e7\u00e3o de MPI_Wtime.", "synopsis": "double MPI_Wtick(void)", "params": [], "description": "Retorna a resolu\u00e7\u00e3o do rel\u00f3gio MPI_Wtime em segundos. Por exemplo, se o rel\u00f3gio \u00e9 atualizado a cada microsegundo, o valor retornado ser\u00e1 10^-6.", "application": "Determina\u00e7\u00e3o da precis\u00e3o das medi\u00e7\u00f5es de tempo.", "example": "// Declara\u00e7\u00f5es\ndouble tick;\n\n// Obt\u00e9m a resolu\u00e7\u00e3o do rel\u00f3gio MPI\ntick = MPI_Wtick();\n\n// MPI_Wtick sempre retorna sucesso pois n\u00e3o possui erro de retorno\nif (tick > 0.0) {\n    // Resolu\u00e7\u00e3o do rel\u00f3gio obtida com sucesso\n}"}, {"name": "MPI_Wtime", "short_desc": "Retorna o tempo decorrido no processador chamador.", "synopsis": "double MPI_Wtime(void)", "params": [], "description": "Retorna o tempo em segundos desde um ponto arbitr\u00e1rio no passado. \u00c9 garantido que este ponto n\u00e3o mudar\u00e1 durante a execu\u00e7\u00e3o do programa.", "application": "Medi\u00e7\u00e3o de performance e tempo de execu\u00e7\u00e3o de trechos de c\u00f3digo.", "example": "// Declara\u00e7\u00f5es\ndouble start_time, end_time;\n\n// Marca o tempo de in\u00edcio\nstart_time = MPI_Wtime();\n\n// Executa alguma l\u00f3gica...\n\n// Marca o tempo de fim\nend_time = MPI_Wtime();\n\nif (end_time >= start_time) {\n    // Medi\u00e7\u00e3o de tempo realizada\n}"}];
    const types = [{"category": "Handles Opacos B\u00e1sicos", "types": [{"name": "MPI_Comm", "desc": "Representa um comunicador, que define um dom\u00ednio de comunica\u00e7\u00e3o e um grupo de processos. Ex: MPI_COMM_WORLD, MPI_COMM_SELF."}, {"name": "MPI_Datatype", "desc": "Representa o layout de mem\u00f3ria dos dados. Pode ser um tipo b\u00e1sico (MPI_INT) ou um tipo derivado complexo contendo gaps/padding."}, {"name": "MPI_Request", "desc": "Identifica uma opera\u00e7\u00e3o de comunica\u00e7\u00e3o n\u00e3o bloqueante em andamento (ex: MPI_Isend). \u00c9 usado com MPI_Wait ou MPI_Test para verificar conclus\u00e3o."}, {"name": "MPI_Op", "desc": "Representa uma opera\u00e7\u00e3o de redu\u00e7\u00e3o. Pode ser uma pr\u00e9-definida pelo MPI (ex: MPI_SUM) ou customizada pelo usu\u00e1rio via MPI_Op_create."}, {"name": "MPI_Group", "desc": "Representa um conjunto ordenado de identificadores de processos (ranks). Usado primariamente para manipula\u00e7\u00f5es locais de conjuntos antes de construir novos comunicadores."}, {"name": "MPI_Info", "desc": "Objeto de chave-valor usado para fornecer dicas (hints) de otimiza\u00e7\u00e3o \u00e0 implementa\u00e7\u00e3o do MPI, amplamente utilizado em rotinas de I/O paralelo e RMA."}]}, {"category": "Handles Avan\u00e7ados (I/O e RMA)", "types": [{"name": "MPI_File", "desc": "Descritor de arquivo distribu\u00eddo para opera\u00e7\u00f5es de I/O paralelo (MPI-IO). Retornado por MPI_File_open."}, {"name": "MPI_Win", "desc": "Representa uma 'janela' (window) de mem\u00f3ria remota exposta para opera\u00e7\u00f5es One-Sided (RMA - Remote Memory Access) como MPI_Put, MPI_Get e MPI_Accumulate."}, {"name": "MPI_Message", "desc": "Usado para o recebimento seguro e thread-safe de mensagens cujo tamanho e metadados foram casados via MPI_Mprobe. Introduzido no MPI-3."}, {"name": "MPI_Errhandler", "desc": "Manipulador de erros que dita qual rotina ser\u00e1 invocada quando uma falha cr\u00edtica ocorre em um objeto do tipo Comm, Win ou File."}]}, {"category": "Inteiros Especiais (Tamanhos e Endere\u00e7os)", "types": [{"name": "MPI_Aint", "desc": "Address Integer. Inteiro grande o suficiente para armazenar de forma segura um endere\u00e7o de mem\u00f3ria (ponteiro) na arquitetura alvo (32 ou 64 bits). Essencial para a constru\u00e7\u00e3o de Tipos Derivados como MPI_Type_create_struct."}, {"name": "MPI_Offset", "desc": "Inteiro usado para representar deslocamentos (offsets) absolutos em arquivos de disco, suportando com folga arquivos maiores que 2GB."}, {"name": "MPI_Count", "desc": "Inteiro de 64-bits introduzido no MPI-3 para suportar a contagem de arrays massivos com mais de 2 bilh\u00f5es de elementos na mem\u00f3ria de um \u00fanico processo."}, {"name": "MPI_Fint", "desc": "Tipo inteiro correspondente aos handles MPI quando utilizados via a interface de interoperabilidade C/Fortran."}]}, {"category": "Estruturas de Dados P\u00fablicas", "types": [{"name": "MPI_Status", "desc": "Struct da linguagem C contendo informa\u00e7\u00f5es de metadados sobre a conclus\u00e3o de uma recep\u00e7\u00e3o. Possui no m\u00ednimo 3 campos p\u00fablicos: MPI_SOURCE (rank de origem), MPI_TAG (tag da mensagem recebida) e MPI_ERROR (c\u00f3digo de erro)."}]}, {"category": "Tipos de Dados B\u00e1sicos (C/C++)", "types": [{"name": "MPI_CHAR", "desc": "Equivalente ao char padr\u00e3o da linguagem C (geralmente 1 byte)."}, {"name": "MPI_INT", "desc": "Equivalente ao tipo int padr\u00e3o em C."}, {"name": "MPI_LONG", "desc": "Equivalente ao tipo long padr\u00e3o em C."}, {"name": "MPI_FLOAT", "desc": "Equivalente ao tipo float de ponto flutuante em C."}, {"name": "MPI_DOUBLE", "desc": "Equivalente ao tipo double (dupla precis\u00e3o) em C."}, {"name": "MPI_BYTE", "desc": "8 bits bin\u00e1rios brutos. Diferente dos outros, o MPI nunca realiza convers\u00f5es autom\u00e1ticas de representa\u00e7\u00e3o de dados (endianness) neste tipo ao cruzar a rede."}]}, {"category": "Opera\u00e7\u00f5es de Redu\u00e7\u00e3o Pr\     // KMP (Knuth-Morris-Pratt)
    function computeLPS(p) { let m=p.length,lps=Array(m).fill(0),len=0,i=1; while(i<m) { if(p[i]===p[len]) { len++; lps[i]=len; i++; } else if(len!==0) len=lps[len-1]; else { lps[i]=0; i++; } } return lps; }
    function KMPSearch(t, p) { if(!p) return true; if(!t) return false; let n=t.length,m=p.length,lps=computeLPS(p),i=0,j=0; while(i<n) { if(t[i].toLowerCase()===p[j].toLowerCase()) { i++; j++; } if(j===m) return true; else if(i<n&&t[i].toLowerCase()!==p[j].toLowerCase()) { if(j!==0) j=lps[j-1]; else i++; } } return false; }

    let searchIndex = [];
    function buildSearchIndex() {
        searchIndex = [];
        funcs.forEach(f => {
            let parts = [f.name, f.short_desc, f.description, f.synopsis, f.example||''];
            if(f.params) f.params.forEach(p=>parts.push(p.name,p.desc));
            searchIndex.push({type:'func',func:f,st:parts.join(' ')});
        });
        types.forEach(c => c.types.forEach(t => searchIndex.push({type:'type',category:c.category, type:t, st:t.name+' '+t.desc+' '+c.category})));
    }
    function searchAll(q) {
        if(!q) return funcs.map(f=>({type:'func',func:f}));
        let r=[];
        searchIndex.forEach(i => { if(KMPSearch(i.st,q)) r.push(i); });
        return r;
    }
    buildSearchIndex();

    function findFunc(name) { return funcs.find(f=>f.name===name); }

    function escapeHTML(s) { return (s||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

    function highlightSyntax(code) {
        if(!code) return '';
        let html = escapeHTML(code);
        html = html.replace(/\b(int|void|char|double|float|long|short|unsigned|struct|MPI_Comm|MPI_Datatype|MPI_Op|MPI_Aint|MPI_Count|MPI_Win|MPI_Info|MPI_Request|MPI_Status)\b/g, '<span class="code-type">$1</span>');
        html = html.replace(/\b(if|else|return|for|while|do|break|continue|#include)\b/g, '<span class="code-keyword">$1</span>');
        html = html.replace(/\b(MPIX?_\w+)\b/g, '<span class="code-function">$1</span>');
        html = html.replace(/(&quot;.*?&quot;)/g, '<span class="code-string">$1</span>');
        html = html.replace(/(\/\*.*?\*\/|\/\/.*)/g, '<span class="code-comment">$1</span>');
        return html;
    }

            `).join('');
        } else {
            paramsHtml = `<li class="text-outline text-sm italic">Parâmetros vazios ou não especificados.</li>`;
        }

        document.getElementById('main-content').innerHTML = `
            <div class="mb-xl flex items-center justify-between border-b border-outline-variant pb-md">
                <div>
                    <div class="flex items-center gap-sm mb-sm">
                        <span class="bg-primary-container/10 text-primary-container border border-primary-container/30 px-sm py-xs font-label-caps text-label-caps rounded-none">API.REF</span>
                        <span class="text-outline font-code-sm text-code-sm">SYSTEM.READY</span>
                    </div>
                    <h1 class="font-headline-xl text-[48px] leading-[1.1] tracking-[-0.02em] font-bold text-on-background break-words">${escapeHTML(func.name)}</h1>
                    <p class="mt-sm text-on-surface-variant font-body-md text-body-md">${escapeHTML(func.short_desc)}</p>
                </div>
            </div>

            <!-- Parâmetros -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-lg mb-xl">
                <section class="hud-border bg-surface-container rounded-none flex flex-col">
                    <div class="stripe-bg border-b border-outline-variant p-md">
                        <h2 class="font-label-caps text-label-caps text-primary-container flex items-center gap-sm">
                            <span class="material-symbols-outlined text-[16px]">data_object</span> Parâmetros
                        </h2>
                    </div>
                    <div class="p-lg flex-1">
                        <ul class="space-y-sm">
                            ${paramsHtml}
                        </ul>
                    </div>
                </section>

                <div class="flex flex-col gap-lg">
                    <!-- Contexto -->
                    <section class="hud-border bg-surface-container rounded-none">
                        <div class="border-b border-outline-variant p-md bg-[#1a2027]/50">
                            <h2 class="font-label-caps text-label-caps text-primary-container flex items-center gap-sm">
                                <span class="material-symbols-outlined text-[16px]">info</span> Aplicação Prática
                            </h2>
                        </div>
                        <div class="p-lg space-y-md">
                            <p class="text-on-surface-variant text-sm whitespace-pre-wrap">${escapeHTML(func.application || 'Aplicação geral MPI.')}</p>
                        </div>
                    </section>
                </div>
            </div>

            <!-- Sinopse -->
            <section class="mb-xl">
                <h2 class="font-headline-lg-mobile md:font-headline-lg text-on-background mb-md">Sinopse (C)</h2>
                <div class="hud-border bg-[#020408] rounded-none">
                    <div class="flex items-center px-md py-sm border-b border-[#1e293b] bg-[#0a1420]">
                        <div class="flex gap-2 mr-md">
                            <div class="w-3 h-3 rounded-full bg-[#3a494b]"></div>
                            <div class="w-3 h-3 rounded-full bg-[#3a494b]"></div>
                            <div class="w-3 h-3 rounded-full bg-[#3a494b]"></div>
                        </div>
                        <span class="font-code-sm text-code-sm text-outline text-[12px]">header.h</span>
                    </div>
                    <div class="p-lg overflow-x-auto">
                        <pre class="font-code-sm text-code-sm leading-relaxed"><code class="code-syntax">${highlightSyntax(func.synopsis)}</code></pre>
                    </div>
                </div>
            </section>

            <!-- Descrição Completa -->
            <section class="mb-xl">
                <h2 class="font-headline-lg-mobile md:font-headline-lg text-on-background mb-md">Descrição Detalhada</h2>
                <div class="hud-border bg-surface-container p-lg text-on-surface-variant font-body-md text-sm leading-relaxed whitespace-pre-wrap">${escapeHTML(func.description)}</div>
            </section>

            ${func.example ? `
            <section class="mb-xl">
                <h2 class="font-headline-lg-mobile md:font-headline-lg text-on-background mb-md flex items-center gap-sm">Exemplo em C</h2>
                <div class="hud-border bg-[#020408] rounded-none">
                    <div class="flex items-center px-md py-sm border-b border-[#1e293b] bg-[#0a1420]">
                        <div class="flex gap-2 mr-md">
                            <div class="w-3 h-3 rounded-full bg-[#3a494b]"></div>
                            <div class="w-3 h-3 rounded-full bg-[#3a494b]"></div>
                            <div class="w-3 h-3 rounded-full bg-[#3a494b]"></div>
                        </div>
                        <span class="font-code-sm text-code-sm text-outline text-[12px]">example.c</span>
                    </div>
                    <div class="p-lg overflow-x-auto">
                        <pre class="font-code-sm text-code-sm leading-relaxed"><code class="code-syntax">${highlightSyntax(func.example)}</code></pre>
                    </div>
                </div>
            </section>` : ''}
        `;
        document.getElementById('main-content').scrollTo(0,0);
    }

    function toggleSidebar(isOpen) {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        if (!sidebar || !overlay) return;
        if (isOpen) {
            sidebar.classList.remove('-translate-x-full');
            sidebar.classList.add('translate-x-0');
            overlay.classList.remove('hidden');
        } else {
            sidebar.classList.remove('translate-x-0');
            sidebar.classList.add('-translate-x-full');
            overlay.classList.add('hidden');
        }
    }

    const searchHandler = (e) => {
        const q = e.target.value;
        const otherSearch = e.target.id === 'search-input' ? document.getElementById('search-input-mobile') : document.getElementById('search-input');
        if (otherSearch) otherSearch.value = q;
        renderSearchList(q ? searchAll(q) : allFuncItems);
    };

    document.getElementById('search-input').oninput = searchHandler;
    const mobileSearch = document.getElementById('search-input-mobile');
    if (mobileSearch) mobileSearch.oninput = searchHandler;

    renderSearchList(allFuncItems);
    showWelcome();
</script>
<footer class="fixed bottom-0 left-0 right-0 z-40 bg-surface-container-low/95 backdrop-blur-md border-t border-outline-variant/30 py-1.5 text-center select-none pointer-events-auto font-code-sm text-[11px] text-on-surface-variant flex items-center justify-center gap-xs">
    <span class="w-1.5 h-1.5 rounded-full bg-[#00f2ff] animate-pulse"></span>
    <span>Made with 💜 by <a href="https://github.com/grejc" target="_blank" rel="noopener noreferrer" class="text-primary-container hover:text-secondary-container hover:underline font-bold transition-colors">@grejc</a></span>
</footer>
</body>
</html>
