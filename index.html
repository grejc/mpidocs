 = 1;\nMPI_Datatype datatype = MPI_INT;\nint root = 0;\nMPI_Comm comm = MPI_COMM_WORLD;\nMPI_Request request;\n\n// Inicia o broadcast ass\u00edncrono\nint err = MPI_Ibcast(&buffer, count, datatype, root, comm, &request);\n\nif (err == MPI_SUCCESS) {\n    // Garante que o broadcast foi conclu\u00eddo antes de usar o buffer\n    MPI_Wait(&request, MPI_STATUS_IGNORE);\n}"}, {"name": "MPI_Ibsend", "short_desc": "Inicia um envio com buffer n\u00e3o bloqueante.", "synopsis": "int MPI_Ibsend(const void *buf, int count, MPI_Datatype datatype, int dest, int tag, MPI_Comm comm, MPI_Request *request)", "params": [{"name": "buf", "desc": "endere\u00e7o inicial do buffer (escolha)"}, {"name": "count", "desc": "n\u00famero de elementos (inteiro)"}, {"name": "datatype", "desc": "tipo de dado (handle)"}, {"name": "dest", "desc": "rank do destino (inteiro)"}, {"name": "tag", "desc": "tag da mensagem (inteiro)"}, {"name": "comm", "desc": "comunicador (handle)"}, {"name": "request", "desc": "requisi\u00e7\u00e3o de comunica\u00e7\u00e3o (handle)"}], "description": "Envio n\u00e3o bloqueante que utiliza um buffer de usu\u00e1rio anexado.", "application": "Evita deadlocks garantindo que o envio n\u00e3o bloqueie.", "example": "// Declara\u00e7\u00f5es\nint buffer = 100;\nint count = 1;\nMPI_Datatype datatype = MPI_INT;\nint dest = 1;\nint tag = 10;\nMPI_Comm comm = MPI_COMM_WORLD;\nMPI_Request request;\nint buf_size = 1024;\nvoid *bsend_buf = malloc(buf_size + MPI_BSEND_OVERHEAD);\n\n// Prepara buffer para envio com buffer pr\u00f3prio\nMPI_Buffer_attach(bsend_buf, buf_size + MPI_BSEND_OVERHEAD);\n\nint err = MPI_Ibsend(&buffer, count, datatype, dest, tag, comm, &request);\n\nif (err == MPI_SUCCESS) {\n    MPI_Wait(&request, MPI_STATUS_IGNORE);\n}\n\n// Limpeza\nMPI_Buffer_detach(&bsend_buf, &buf_size);\nfree(bsend_buf);"}, {"name": "MPI_Iexscan", "short_desc": "Computa o scan exclusivo (redu\u00e7\u00f5es parciais) de forma n\u00e3o bloqueante.", "synopsis": "int MPI_Iexscan(const void *sendbuf, void *recvbuf, int count, MPI_Datatype datatype, MPI_Op op, MPI_Comm comm, MPI_Request *request)", "params": [{"name": "sendbuf", "desc": "endere\u00e7o inicial do buffer de envio (escolha)"}, {"name": "recvbuf", "desc": "endere\u00e7o inicial do buffer de recebimento (escolha)"}, {"name": "count", "desc": "n\u00famero de elementos (inteiro)"}, {"name": "datatype", "desc": "tipo de dado (handle)"}, {"name": "op", "desc": "opera\u00e7\u00e3o de redu\u00e7\u00e3o (handle)"}, {"name": "comm", "desc": "intracomunicador (handle)"}, {"name": "request", "desc": "requisi\u00e7\u00e3o de comunica\u00e7\u00e3o (handle)"}], "description": "Realiza um scan exclusivo ass\u00edncrono entre processos.", "application": "C\u00e1lculo de offsets globais de forma ass\u00edncrona.", "example": "// Declara\u00e7\u00f5es\nint sendbuf = 1;\nint recvbuf = 0;\nint count = 1;\nMPI_Datatype datatype = MPI_INT;\nMPI_Op op = MPI_SUM;\nMPI_Comm comm = MPI_COMM_WORLD;\nMPI_Request request;\n\n// Inicia scan exclusivo ass\u00edncrono\nint err = MPI_Iexscan(&sendbuf, &recvbuf, count, datatype, op, comm, &request);\n\nif (err == MPI_SUCCESS) {\n    MPI_Wait(&request, MPI_STATUS_IGNORE);\n}"}, {"name": "MPI_Igather", "short_desc": "Re\u00fane valores de um grupo de processos de forma n\u00e3o bloqueante.", "synopsis": "int MPI_Igather(const void *sendbuf, int sendcount, MPI_Datatype sendtype, void *recvbuf, int recvcount, MPI_Datatype recvtype, int root, MPI_Comm comm, MPI_Request *request)", "params": [{"name": "sendbuf", "desc": "buffer de envio (escolha)"}, {"name": "sendcount", "desc": "elementos no envio (inteiro)"}, {"name": "sendtype", "desc": "tipo de dado de envio (handle)"}, {"name": "recvcount", "desc": "elementos por recebimento (inteiro)"}, {"name": "recvtype", "desc": "tipo de dado de recebimento (handle)"}, {"name": "root", "desc": "rank receptor (inteiro)"}, {"name": "comm", "desc": "comunicador (handle)"}, {"name": "request", "desc": "requisi\u00e7\u00e3o de comunica\u00e7\u00e3o (handle)"}], "description": "Inicia a coleta de dados para uma raiz de forma ass\u00edncrona.", "application": "Permite enviar resultados parciais para o mestre sem bloquear.", "example": "// Declara\u00e7\u00f5es\nint sendbuf = 5;\nint sendcount = 1;\nMPI_Datatype sendtype = MPI_INT;\nint recvbuf[4] = {0};\nint recvcount = 1;\nMPI_Datatype recvtype = MPI_INT;\nint root = 0;\nMPI_Comm comm = MPI_COMM_WORLD;\nMPI_Request request;\n\n// Inicia coleta ass\u00edncrona\nint err = MPI_Igather(&sendbuf, sendcount, sendtype, recvbuf, recvcount, recvtype, root, comm, &request);\n\nif (err == MPI_SUCCESS) {\n    MPI_Wait(&request, MPI_STATUS_IGNORE);\n}"}, {"name": "MPI_Igatherv", "short_desc": "Re\u00fane dados de forma n\u00e3o bloqueante com tamanhos variados.", "synopsis": "int MPI_Igatherv(const void *sendbuf, int sendcount, MPI_Datatype sendtype, void *recvbuf, const int recvcounts[], const int displs[], MPI_Datatype recvtype, int root, MPI_Comm comm, MPI_Request *request)", "params": [{"name": "sendbuf", "desc": "buffer de envio (escolha)"}, {"name": "sendcount", "desc": "elementos no envio (inteiro)"}, {"name": "sendtype", "desc": "tipo de dado de envio (handle)"}, {"name": "recvcounts", "desc": "array de contagens de recebimento (inteiro)"}, {"name": "displs", "desc": "array de deslocamentos (inteiro)"}, {"name": "recvtype", "desc": "tipo de dado de recebimento (handle)"}, {"name": "root", "desc": "rank receptor (inteiro)"}, {"name": "comm", "desc": "comunicador (handle)"}, {"name": "request", "desc": "requisi\u00e7\u00e3o de comunica\u00e7\u00e3o (handle)"}], "description": "Vers\u00e3o ass\u00edncrona e flex\u00edvel da opera\u00e7\u00e3o Gather.", "application": "Coleta resultados desequilibrados sem bloquear a execu\u00e7\u00e3o.", "example": "// Declara\u00e7\u00f5es\nint sendbuf = 1;\nint sendcount = 1;\nMPI_Datatype sendtype = MPI_INT;\nint recvbuf[10];\nint recvcounts[2] = {1, 1};\nint displs[2] = {0, 1};\nMPI_Datatype recvtype = MPI_INT;\nint root = 0;\nMPI_Comm comm = MPI_COMM_WORLD;\nMPI_Request request;\n\n// Inicia coleta flex\u00edvel ass\u00edncrona\nint err = MPI_Igatherv(&sendbuf, sendcount, sendtype, recvbuf, recvcounts, displs, recvtype, root, comm, &request);\n\nif (err == MPI_SUCCESS) {\n    MPI_Wait(&request, MPI_STATUS_IGNORE);\n}"}, {"name": "MPI_Improbe", "short_desc": "Sondagem de mensagem casada n\u00e3o bloqueante.", "synopsis": "int MPI_Improbe(int source, int tag, MPI_Comm comm, int *flag,\n       MPI_Message *message, MPI_Status *status)", "params": [{"name": "source", "desc": "Rank da fonte ou MPI_ANY_SOURCE."}, {"name": "tag", "desc": "Tag da mensagem ou MPI_ANY_TAG."}, {"name": "comm", "desc": "Comunicador."}, {"name": "flag", "desc": "Verdadeiro se uma mensagem foi casada."}, {"name": "message", "desc": "Objeto de mensagem retornado."}, {"name": "status", "desc": "Objeto de status."}], "description": "Verifica a chegada de uma mensagem correspondente aos crit\u00e9rios sem bloquear. Se casada, retorna um objeto de mensagem para uso posterior com MPI_Imrecv.", "application": "Implementa\u00e7\u00e3o de protocolos de comunica\u00e7\u00e3o din\u00e2micos e ass\u00edncronos.", "example": "// Declara\u00e7\u00f5es\nMPI_Message msg;\nint flag = 0;\nMPI_Status status;\n\n// Verifica chegada de mensagem sem bloquear\nint err = MPI_Improbe(MPI_ANY_SOURCE, MPI_ANY_TAG, MPI_COMM_WORLD, &flag, &msg, &status);\n\nif (err == MPI_SUCCESS && flag) {\n    // Mensagem encontrada, pronta para ser recebida\n}"}, {"name": "MPI_Imrecv", "short_desc": "Recebimento n\u00e3o bloqueante de mensagem casada.", "synopsis": "int MPI_Imrecv(void *buf, int count, MPI_Datatype datatype,\n       MPI_Message *message, MPI_Request *request)\n\n       int MPI_Imrecv_c(void *buf, MPI_Count count, MPI_Datatype datatype,\n       MPI_Message *message, MPI_Request *request)", "params": [{"name": "buf", "desc": "Endere\u00e7o inicial do buffer de recebimento."}, {"name": "count", "desc": "N\u00famero de elementos no buffer."}, {"name": "datatype", "desc": "Tipo de dados dos elementos."}, {"name": "message", "desc": "Objeto de mensagem a ser recebido."}, {"name": "request", "desc": "Requisi\u00e7\u00e3o de comunica\u00e7\u00e3o."}], "description": "Inicia um recebimento n\u00e3o bloqueante de uma mensagem que foi previamente 'casada' por uma opera\u00e7\u00e3o de probe (como MPI_Improbe).", "application": "Recebimento eficiente de mensagens sondadas assincronamente.", "example": "// Declara\u00e7\u00f5es\nint buf;\nint count = 1;\nMPI_Message msg;\nMPI_Request req;\n\n// Assume que a mensagem foi obtida via MPI_Improbe\nint err = MPI_Imrecv(&buf, count, MPI_INT, &msg, &req);\n\nif (err == MPI_SUCCESS) {\n    MPI_Wait(&req, MPI_STATUS_IGNORE);\n}"}, {"name": "MPI_Ineighbor_allgather", "short_desc": "Vers\u00e3o n\u00e3o bloqueante de MPI_Neighbor_allgather.", "synopsis": "int MPI_Ineighbor_allgather(const void *sendbuf, int sendcount,\n       MPI_Datatype sendtype, void *recvbuf, int recvcount,\n       MPI_Datatype recvtype, MPI_Comm comm,\n       MPI_Request *request)\n\n       int MPI_Ineighbor_allgather_c(const void *sendbuf, MPI_Count sendcount,\n       MPI_Datatype sendtype, void *recvbuf,\n       MPI_Count recvcount, MPI_Datatype recvtype,\n       MPI_Comm comm, MPI_Request *request)", "params": [{"name": "sendbuf", "desc": "Endere\u00e7o do buffer de envio."}, {"name": "sendcount", "desc": "Elementos enviados a cada vizinho."}, {"name": "sendtype", "desc": "Tipo de dados de envio."}, {"name": "recvbuf", "desc": "Endere\u00e7o do buffer de recebimento."}, {"name": "recvcount", "desc": "Elementos recebidos de cada vizinho."}, {"name": "recvtype", "desc": "Tipo de dados de recebimento."}, {"name": "comm", "desc": "Comunicador com topologia."}, {"name": "request", "desc": "Requisi\u00e7\u00e3o de comunica\u00e7\u00e3o."}], "description": "Inicia uma coleta de dados de todos os vizinhos e distribui\u00e7\u00e3o para todos os vizinhos em uma topologia virtual, sem bloquear.", "application": "Comunica\u00e7\u00e3o coletiva em topologias de grafo ou grade de forma ass\u00edncrona.", "example": "// Declara\u00e7\u00f5es\nint sbuf = 10;\nint rbuf[2];\nMPI_Comm comm;\nMPI_Request req;\nint dims[1] = {4}, periods[1] = {1};\n\n// Cria topologia de grafo/cartesiada\nMPI_Cart_create(MPI_COMM_WORLD, 1, dims, periods, 0, &comm);\n\n// Inicia troca com vizinhos\nint err = MPI_Ineighbor_allgather(&sbuf, 1, MPI_INT, rbuf, 1, MPI_INT, comm, &req);\n\nif (err == MPI_SUCCESS) {\n    MPI_Wait(&req, MPI_STATUS_IGNORE);\n}\nMPI_Comm_free(&comm);"}, {"name": "MPI_Ineighbor_allgatherv", "short_desc": "Vers\u00e3o n\u00e3o bloqueante de MPI_Neighbor_allgatherv.", "synopsis": "int MPI_Ineighbor_allgatherv(const void *sendbuf, int sendcount,\n       MPI_Datatype sendtype, void *recvbuf,\n       const int recvcounts[], const int displs[],\n       MPI_Datatype recvtype, MPI_Comm comm,\n       MPI_Request *request)\n\n       int MPI_Ineighbor_allgatherv_c(const void *sendbuf, MPI_Count sendcount,\n       MPI_Datatype sendtype, void *recvbuf,\n       const MPI_Count recvcounts[],\n       const MPI_Aint displs[], MPI_Datatype recvtype,\n       MPI_Comm comm, MPI_Request *request)", "params": [{"name": "sendbuf", "desc": "Endere\u00e7o inicial do buffer de envio."}, {"name": "sendcount", "desc": "N\u00famero de elementos enviados."}, {"name": "sendtype", "desc": "Tipo de dados de envio."}, {"name": "recvbuf", "desc": "Endere\u00e7o inicial do buffer de recebimento."}, {"name": "recvcounts", "desc": "Array com n\u00famero de elementos de cada vizinho."}, {"name": "displs", "desc": "Deslocamentos no buffer de recebimento."}, {"name": "recvtype", "desc": "Tipo de dados de recebimento."}, {"name": "comm", "desc": "Comunicador com topologia."}, {"name": "request", "desc": "Requisi\u00e7\u00e3o de comunica\u00e7\u00e3o."}], "description": "Vers\u00e3o flex\u00edvel e ass\u00edncrona de neighbor allgather que permite tamanhos de dados variados entre vizinhos.", "application": "Comunica\u00e7\u00e3o ass\u00edncrona complexa em vizinhan\u00e7as de topologias virtuais.", "example": "// Declara\u00e7\u00f5es\nint sbuf = 5;\nint rbuf[10];\nint rcounts[2] = {1, 1};\nint displs[2] = {0, 1};\nMPI_Comm comm;\nMPI_Request req;\nint dims[1] = {4}, periods[1] = {1};\n\nMPI_Cart_create(MPI_COMM_WORLD, 1, dims, periods, 0, &comm);\n\n// Inicia troca flex\u00edvel com vizinhos\nint err = MPI_Ineighbor_allgatherv(&sbuf, 1, MPI_INT, rbuf, rcounts, displs, MPI_INT, comm, &req);\n\nif (err == MPI_SUCCESS) {\n    MPI_Wait(&req, MPI_STATUS_IGNORE);\n}\nMPI_Comm_free(&comm);"}, {"name": "MPI_Ineighbor_alltoall", "short_desc": "Vers\u00e3o n\u00e3o bloqueante de MPI_Neighbor_alltoall.", "synopsis": "int MPI_Ineighbor_alltoall(const void *sendbuf, int sendcount, MPI_Datatype sendtype, void *recvbuf, int recvcount, MPI_Datatype recvtype, MPI_Comm comm, MPI_Request *request)", "params": [{"name": "sendbuf", "desc": "endere\u00e7o inicial do buffer de envio (escolha)"}, {"name": "sendcount", "desc": "n\u00famero de elementos enviados para cada vizinho (inteiro n\u00e3o negativo)"}, {"name": "sendtype", "desc": "tipo de dados dos elementos do buffer de envio (handle)"}, {"name": "recvcount", "desc": "n\u00famero de elementos recebidos de cada vizinho (inteiro n\u00e3o negativo)"}, {"name": "recvtype", "desc": "tipo de dados dos elementos do buffer de recebimento (handle)"}, {"name": "comm", "desc": "comunicador com estrutura de topologia (handle)"}, {"name": "recvbuf", "desc": "endere\u00e7o inicial do buffer de recebimento (escolha)"}, {"name": "request", "desc": "requisi\u00e7\u00e3o de comunica\u00e7\u00e3o (handle)"}], "description": "MPI_Ineighbor_alltoall inicia uma opera\u00e7\u00e3o de troca de dados n\u00e3o bloqueante entre vizinhos em um comunicador com estrutura de topologia. Cada processo envia 'sendcount' elementos do tipo 'sendtype' para cada um de seus vizinhos e recebe 'recvcount' elementos do tipo 'recvtype' de cada um deles.", "application": "Utilizado em computa\u00e7\u00f5es paralelas onde cada processo precisa trocar dados com seus vizinhos imediatos em uma topologia l\u00f3gica (como uma grade ou grafo) sem bloquear a execu\u00e7\u00e3o.", "example": "// Declara\u00e7\u00f5es\nint send_buffer[4] = {1, 2, 3, 4};\nint recv_buffer[4] = {0, 0, 0, 0};\nMPI_Comm graph_comm;\nMPI_Request request;\nMPI_Status status;\n\n// Assumindo que graph_comm j\u00e1 foi criado com uma topologia\nint err = MPI_Ineighbor_alltoall(send_buffer, 1, MPI_INT, recv_buffer, 1, MPI_INT, graph_comm, &request);\n\nif (err == MPI_SUCCESS) {\n    // Aguarda a conclus\u00e3o da comunica\u00e7\u00e3o n\u00e3o bloqueante\n    MPI_Wait(&request, &status);\n}"}, {"name": "MPI_Ineighbor_alltoallv", "short_desc": "Vers\u00e3o n\u00e3o bloqueante de MPI_Neighbor_alltoallv.", "synopsis": "int MPI_Ineighbor_alltoallv(const void *sendbuf, const int sendcounts[], const int sdispls[], MPI_Datatype sendtype, void *recvbuf, const int recvcounts[], const int rdispls[], MPI_Datatype recvtype, MPI_Comm comm, MPI_Request *request)", "params": [{"name": "sendbuf", "desc": "endere\u00e7o inicial do buffer de envio (escolha)"}, {"name": "sendcounts", "desc": "array de inteiros especificando o n\u00famero de elementos a enviar para cada vizinho"}, {"name": "sdispls", "desc": "array de inteiros especificando o deslocamento (em rela\u00e7\u00e3o ao sendbuf) dos dados para cada vizinho"}, {"name": "sendtype", "desc": "tipo de dados dos elementos do buffer de envio (handle)"}, {"name": "recvcounts", "desc": "array de inteiros especificando o n\u00famero de elementos recebidos de cada vizinho"}, {"name": "rdispls", "desc": "array de inteiros especificando o deslocamento (em rela\u00e7\u00e3o ao recvbuf) onde colocar os dados recebidos"}, {"name": "recvtype", "desc": "tipo de dados dos elementos do buffer de recebimento (handle)"}, {"name": "comm", "desc": "comunicador com estrutura de topologia (handle)"}, {"name": "recvbuf", "desc": "endere\u00e7o inicial do buffer de recebimento (escolha)"}, {"name": "request", "desc": "requisi\u00e7\u00e3o de comunica\u00e7\u00e3o (handle)"}], "description": "MPI_Ineighbor_alltoallv \u00e9 a vers\u00e3o n\u00e3o bloqueante de MPI_Neighbor_alltoallv. Ela permite que a quantidade de dados enviada e recebida de cada vizinho varie, conforme especificado pelos arrays de contagem e deslocamento.", "application": "\u00datil para comunica\u00e7\u00f5es entre vizinhos onde o volume de dados trocado n\u00e3o \u00e9 uniforme entre todos os pares de vizinhos.", "example": "// Declara\u00e7\u00f5es\nint sendbuf[2] = {10, 20};\nint recvbuf[2] = {0, 0};\nint sendcounts[2] = {1, 1};\nint sdispls[2] = {0, 1};\nint recvcounts[2] = {1, 1};\nint rdispls[2] = {0, 1};\nMPI_Comm comm;\nMPI_Request request;\n\n// MPI_Ineighbor_alltoallv permite tamanhos vari\u00e1veis por vizinho\nint err = MPI_Ineighbor_alltoallv(sendbuf, sendcounts, sdispls, MPI_INT, recvbuf, recvcounts, rdispls, MPI_INT, comm, &request);\n\nif (err == MPI_SUCCESS) {\n    MPI_Wait(&request, MPI_STATUS_IGNORE);\n}"}, {"name": "MPI_Ineighbor_alltoallw", "short_desc": "Vers\u00e3o n\u00e3o bloqueante de MPI_Neighbor_alltoallw.", "synopsis": "int MPI_Ineighbor_alltoallw(const void *sendbuf, const int sendcounts[], const MPI_Aint sdispls[], const MPI_Datatype sendtypes[], void *recvbuf, const int recvcounts[], const MPI_Aint rdispls[], const MPI_Datatype recvtypes[], MPI_Comm comm, MPI_Request *request)", "params": [{"name": "sendbuf", "desc": "endere\u00e7o inicial do buffer de envio (escolha)"}, {"name": "sendcounts", "desc": "n\u00famero de elementos a enviar para cada vizinho"}, {"name": "sdispls", "desc": "deslocamentos em bytes para o buffer de envio"}, {"name": "sendtypes", "desc": "tipos de dados para cada vizinho no envio"}, {"name": "recvcounts", "desc": "n\u00famero de elementos a receber de cada vizinho"}, {"name": "rdispls", "desc": "deslocamentos em bytes para o buffer de recebimento"}, {"name": "recvtypes", "desc": "tipos de dados para cada vizinho no recebimento"}, {"name": "comm", "desc": "comunicador com estrutura de topologia (handle)"}, {"name": "recvbuf", "desc": "endere\u00e7o inicial do buffer de recebimento (escolha)"}, {"name": "request", "desc": "requisi\u00e7\u00e3o de comunica\u00e7\u00e3o (handle)"}], "description": "MPI_Ineighbor_alltoallw \u00e9 a forma mais geral de troca de dados n\u00e3o bloqueante entre vizinhos, permitindo diferentes tipos de dados e deslocamentos em bytes para cada vizinho.", "application": "Casos complexos de comunica\u00e7\u00e3o local onde dados de tipos mistos ou estruturas n\u00e3o cont\u00edguas precisam ser trocados eficientemente.", "example": "// Declara\u00e7\u00f5es\nchar sendbuf[100];\nchar recvbuf[100];\nint sendcounts[2] = {1, 1};\nint recvcounts[2] = {1, 1};\nMPI_Aint sdispls[2] = {0, 50};\nMPI_Aint rdispls[2] = {0, 50};\nMPI_Datatype sendtypes[2] = {MPI_INT, MPI_INT};\nMPI_Datatype recvtypes[2] = {MPI_INT, MPI_INT};\nMPI_Comm comm;\nMPI_Request request;\n\n// Troca flex\u00edvel usando deslocamentos em bytes\nint err = MPI_Ineighbor_alltoallw(sendbuf, sendcounts, sdispls, sendtypes, recvbuf, recvcounts, rdispls, recvtypes, comm, &request);\n\nif (err == MPI_SUCCESS) {\n    MPI_Wait(&request, MPI_STATUS_IGNORE);\n}"}, {"name": "MPI_Info_c2f", "short_desc": "Converte um objeto MPI_Info de C para um INTEGER do Fortran.", "synopsis": "MPI_Fint MPI_Info_c2f(MPI_Info info)", "params": [{"name": "info", "desc": "objeto info em C (handle)"}], "description": "Esta fun\u00e7\u00e3o converte um handle de objeto info do tipo MPI_Info utilizado em C para um inteiro compat\u00edvel com Fortran (MPI_Fint).", "application": "Interoperabilidade entre c\u00f3digos escritos em C e Fortran que compartilham objetos MPI_Info.", "example": "// Declara\u00e7\u00f5es\nMPI_Info info;\nMPI_Fint info_f;\n\nMPI_Info_create(&info);\n// Converte handle C para Fortran para interoperabilidade\ninfo_f = MPI_Info_c2f(info);\n\nMPI_Info_free(&info);"}, {"name": "MPI_Info_create", "short_desc": "Cria um novo objeto de informa\u00e7\u00f5es (info).", "synopsis": "int MPI_Info_create(MPI_Info *info)", "params": [{"name": "info", "desc": "objeto info criado (handle)"}], "description": "MPI_Info_create cria um novo objeto info sem chaves ou valores definidos. Este objeto pode ser usado para passar dicas ou par\u00e2metros adicionais para outras fun\u00e7\u00f5es MPI (como MPI_File_open ou MPI_Comm_spawn).", "application": "Utilizado sempre que for necess\u00e1rio configurar par\u00e2metros extras para opera\u00e7\u00f5es de I/O, cria\u00e7\u00e3o de processos ou janelas de mem\u00f3ria.", "example": "// Declara\u00e7\u00f5es\nMPI_Info info;\n\n// Cria um objeto info vazio para configurar par\u00e2metros de arquivo ou processos\nint err = MPI_Info_create(&info);\n\nif (err == MPI_SUCCESS) {\n    MPI_Info_free(&info);\n}"}, {"name": "MPI_Info_delete", "short_desc": "Remove um par (chave, valor) de um objeto info.", "synopsis": "int MPI_Info_delete(MPI_Info info, const char *key)", "params": [{"name": "info", "desc": "objeto info (handle)"}, {"name": "key", "desc": "chave a ser removida (string)"}], "description": "Remove a chave especificada e seu valor associado do objeto info. Se a chave n\u00e3o existir, a fun\u00e7\u00e3o retorna um erro.", "application": "Gerenciamento din\u00e2mico de configura\u00e7\u00f5es de informa\u00e7\u00e3o.", "example": "// Declara\u00e7\u00f5es\nMPI_Info info;\nMPI_Info_create(&info);\nMPI_Info_set(info, \"key_temp\", \"value_temp\");\n\n// Remove uma chave espec\u00edfica do objeto info\nint err = MPI_Info_delete(info, \"key_temp\");\n\nif (err == MPI_SUCCESS) {\n    MPI_Info_free(&info);\n}"}, {"name": "MPI_Info_dup", "short_desc": "Retorna uma duplicata de um objeto info.", "synopsis": "int MPI_Info_dup(MPI_Info info, MPI_Info *newinfo)", "params": [{"name": "info", "desc": "objeto info original (handle)"}, {"name": "newinfo", "desc": "novo objeto info duplicado (handle)"}], "description": "Cria um novo objeto info que cont\u00e9m os mesmos pares de chave/valor do objeto original.", "application": "Preserva\u00e7\u00e3o de configura\u00e7\u00f5es de informa\u00e7\u00e3o ao passar objetos para bibliotecas ou sub-rotinas.", "example": "// Declara\u00e7\u00f5es\nMPI_Info info_orig, info_dup;\nMPI_Info_create(&info_orig);\nMPI_Info_set(info_orig, \"dica\", \"valor\");\n\n// Cria uma c\u00f3pia profunda do objeto info\nint err = MPI_Info_dup(info_orig, &info_dup);\n\nif (err == MPI_SUCCESS) {\n    MPI_Info_free(&info_orig);\n    MPI_Info_free(&info_dup);\n}"}, {"name": "MPI_Info_env", "short_desc": "Objeto info que cont\u00e9m informa\u00e7\u00f5es sobre o ambiente de execu\u00e7\u00e3o.", "synopsis": "Externo/Constante: MPI_INFO_ENV", "params": [], "description": "MPI_INFO_ENV \u00e9 um objeto info pr\u00e9-definido pelo MPI que cont\u00e9m informa\u00e7\u00f5es sobre o ambiente no qual o processo MPI foi iniciado (como host, comando de execu\u00e7\u00e3o, etc.).", "application": "Consulta de detalhes do ambiente de execu\u00e7\u00e3o do job MPI.", "example": "// Declara\u00e7\u00f5es\nint flag;\nchar value[MPI_MAX_INFO_VAL];\n\n// Consulta o ambiente de execu\u00e7\u00e3o via handle pr\u00e9-definido\nint err = MPI_Info_get(MPI_INFO_ENV, \"command\", MPI_MAX_INFO_VAL, value, &flag);\n\nif (err == MPI_SUCCESS && flag) {\n    // O valor do comando est\u00e1 armazenado em 'value'\n}"}, {"name": "MPI_Info_f2c", "short_desc": "Converte um INTEGER de Fortran para um objeto MPI_Info de C.", "synopsis": "MPI_Info MPI_Info_f2c(MPI_Fint info)", "params": [{"name": "info", "desc": "inteiro do Fortran representando o objeto info (MPI_Fint)"}], "description": "Converte um handle de objeto info do Fortran para o tipo MPI_Info utilizado em C.", "application": "Interoperabilidade entre C e Fortran.", "example": "// Declara\u00e7\u00f5es\nMPI_Fint info_f;\nMPI_Info info_c;\n\n// Converte um handle vindo do Fortran para ser usado no C\ninfo_c = MPI_Info_f2c(info_f);\n\n// Ap\u00f3s uso, se for um handle v\u00e1lido criado pelo sistema, deve-se verificar o ciclo de vida\nMPI_Info_free(&info_c);"}, {"name": "MPI_Info_free", "short_desc": "Libera um objeto info.", "synopsis": "int MPI_Info_free(MPI_Info *info)", "params": [{"name": "info", "desc": "objeto info a ser liberado (handle)"}], "description": "Libera a mem\u00f3ria e os recursos associados a um objeto info. O handle \u00e9 definido como MPI_INFO_NULL ap\u00f3s a chamada.", "application": "Limpeza de recursos ap\u00f3s o uso de objetos info.", "example": "// Declara\u00e7\u00f5es\nMPI_Info info;\nMPI_Info_create(&info);\n\n// Libera recursos e define o handle como MPI_INFO_NULL\nint err = MPI_Info_free(&info);\n\nif (err == MPI_SUCCESS) {\n    // info agora \u00e9 MPI_INFO_NULL\n}"}, {"name": "MPI_Info_get", "short_desc": "Recupera o valor associado a uma chave em um objeto info.", "synopsis": "int MPI_Info_get(MPI_Info info, const char *key, int valuelen, char *value, int *flag)", "params": [{"name": "info", "desc": "objeto info (handle)"}, {"name": "key", "desc": "chave a ser consultada (string)"}, {"name": "valuelen", "desc": "comprimento do buffer de valor fornecido (inteiro)"}, {"name": "value", "desc": "buffer onde o valor ser\u00e1 armazenado (string)"}, {"name": "flag", "desc": "verdadeiro se a chave estiver definida, falso caso contr\u00e1rio (booleano)"}], "description": "Busca o valor associado \u00e0 chave fornecida. Se a chave existir, o valor \u00e9 copiado para o buffer 'value' e 'flag' \u00e9 definido como verdadeiro. Nota: Esta fun\u00e7\u00e3o est\u00e1 obsoleta em favor de MPI_Info_get_string.", "application": "Leitura de configura\u00e7\u00f5es e dicas passadas via objetos info.", "example": "// Declara\u00e7\u00f5es\nMPI_Info info;\nchar val[128];\nint flag = 0;\n\nMPI_Info_create(&info);\nMPI_Info_set(info, \"arch\", \"x86_64\");\n\n// Busca o valor da chave \"arch\"\nint err = MPI_Info_get(info, \"arch\", 128, val, &flag);\n\nif (err == MPI_SUCCESS && flag) {\n    // Valor recuperado com sucesso\n}\n\nMPI_Info_free(&info);"}, {"name": "MPI_Info_get_nkeys", "short_desc": "Retorna o n\u00famero de chaves atualmente definidas em um objeto info.", "synopsis": "int MPI_Info_get_nkeys(MPI_Info info, int *nkeys)", "params": [{"name": "info", "desc": "objeto info (handle)"}, {"name": "nkeys", "desc": "n\u00famero de chaves definidas (inteiro)"}], "description": "Retorna a contagem total de pares chave/valor armazenados no objeto info especificado.", "application": "Itera\u00e7\u00e3o sobre todas as chaves de um objeto info.", "example": "// Declara\u00e7\u00f5es\nMPI_Info info;\nint nkeys = 0;\n\nMPI_Info_create(&info);\nMPI_Info_set(info, \"key1\", \"val1\");\nMPI_Info_set(info, \"key2\", \"val2\");\n\n// Obt\u00e9m o n\u00famero de chaves no objeto info\nint err = MPI_Info_get_nkeys(info, &nkeys);\n\nif (err == MPI_SUCCESS) {\n    // nkeys agora cont\u00e9m 2\n}\n\nMPI_Info_free(&info);"}, {"name": "MPI_Info_get_nthkey", "short_desc": "Retorna a n-\u00e9sima chave definida em um objeto info.", "synopsis": "int MPI_Info_get_nthkey(MPI_Info info, int n, char *key)", "params": [{"name": "info", "desc": "objeto info (handle)"}, {"name": "n", "desc": "\u00edndice da chave a ser recuperada (inteiro)"}, {"name": "key", "desc": "buffer para armazenar a chave recuperada (string)"}], "description": "Permite percorrer as chaves de um objeto info fornecendo um \u00edndice de 0 a (nkeys-1).", "application": "Utilizado em conjunto com MPI_Info_get_nkeys para listar todas as chaves e valores.", "example": "// Declara\u00e7\u00f5es\nMPI_Info info;\nchar key[MPI_MAX_INFO_KEY];\n\nMPI_Info_create(&info);\nMPI_Info_set(info, \"dataset\", \"file.dat\");\n\n// Recupera a chave no \u00edndice 0\nint err = MPI_Info_get_nthkey(info, 0, key);\n\nif (err == MPI_SUCCESS) {\n    // Chave recuperada\n}\n\nMPI_Info_free(&info);"}, {"name": "MPI_Info_get_valuelen", "short_desc": "Recupera o comprimento do valor associado a uma chave.", "synopsis": "int MPI_Info_get_valuelen(MPI_Info info, const char *key, int *valuelen, int *flag)", "params": [{"name": "info", "desc": "Objeto de informa\u00e7\u00e3o (handle)."}, {"name": "key", "desc": "Chave (string)."}, {"name": "valuelen", "desc": "Comprimento do argumento de valor (inteiro)."}, {"name": "flag", "desc": "Verdadeiro se a chave estiver definida, falso caso contr\u00e1rio (booleano)."}], "description": "Retorna o comprimento do valor associado \u00e0 chave fornecida no objeto de informa\u00e7\u00e3o. Esta fun\u00e7\u00e3o foi depreciada e deve ser substitu\u00edda por MPI_Info_get_string em novos c\u00f3digos.", "application": "Utilizada para descobrir o tamanho do buffer necess\u00e1rio para armazenar o valor de uma chave espec\u00edfica antes de recuper\u00e1-lo.", "example": "// Declara\u00e7\u00f5es\nMPI_Info info;\nint valuelen = 0;\nint flag = 0;\n\nMPI_Info_create(&info);\nMPI_Info_set(info, \"size\", \"1024\");\n\n// Verifica o comprimento do valor associado \u00e0 chave \"size\"\nint err = MPI_Info_get_valuelen(info, \"size\", &valuelen, &flag);\n\nif (err == MPI_SUCCESS && flag) {\n    // valuelen cont\u00e9m o tamanho da string\n}\n\nMPI_Info_free(&info);"}, {"name": "MPI_Info_set", "short_desc": "Adiciona um par (chave, valor) a um objeto de informa\u00e7\u00e3o.", "synopsis": "int MPI_Info_set(MPI_Info info, const char *key, const char *value)", "params": [{"name": "info", "desc": "Objeto de informa\u00e7\u00e3o (handle)."}, {"name": "key", "desc": "Chave (string)."}, {"name": "value", "desc": "Valor (string)."}], "description": "Adiciona ou atualiza um par chave-valor em um objeto MPI_Info. O objeto de informa\u00e7\u00e3o pode ser usado para passar dicas ou par\u00e2metros adicionais para diversas rotinas MPI.", "application": "Configura\u00e7\u00e3o de par\u00e2metros de entrada/sa\u00edda de arquivos ou dicas de performance para comunicadores.", "example": "// Declara\u00e7\u00f5es\nMPI_Info info;\n\nMPI_Info_create(&info);\n\n// Define um par chave-valor para configurar uma dica de arquivo\nint err = MPI_Info_set(info, \"access_style\", \"read_once\");\n\nif (err == MPI_SUCCESS) {\n    // Dica configurada\n}\n\nMPI_Info_free(&info);"}, {"name": "MPI_Init", "short_desc": "Inicializa o ambiente de execu\u00e7\u00e3o MPI.", "synopsis": "int MPI_Init(int *argc, char ***argv)", "params": [{"name": "argc", "desc": "Ponteiro para o n\u00famero de argumentos da linha de comando (ou NULL)."}, {"name": "argv", "desc": "Ponteiro para o vetor de argumentos da linha de comando (ou NULL)."}], "description": "Deve ser a primeira rotina MPI chamada em um programa (exceto por algumas rotinas de verifica\u00e7\u00e3o como MPI_Initialized). Ela estabelece o ambiente necess\u00e1rio para a comunica\u00e7\u00e3o paralela.", "application": "Obrigat\u00f3ria no in\u00edcio de qualquer aplica\u00e7\u00e3o MPI para configurar o ambiente.", "example": "// Declara\u00e7\u00f5es\nint argc = 0;\nchar **argv = NULL;\n\n// Inicializa o ambiente MPI\nint err = MPI_Init(&argc, &argv);\n\nif (err == MPI_SUCCESS) {\n    // Ambiente pronto\n    MPI_Finalize();\n}"}, {"name": "MPI_Init_thread", "short_desc": "Inicializa o ambiente de execu\u00e7\u00e3o MPI com suporte a threads.", "synopsis": "int MPI_Init_thread(int *argc, char ***argv, int required, int *provided)", "params": [{"name": "argc", "desc": "Ponteiro para o n\u00famero de argumentos (ou NULL)."}, {"name": "argv", "desc": "Ponteiro para o vetor de argumentos (ou NULL)."}, {"name": "required", "desc": "N\u00edvel desejado de suporte a threads (ex: MPI_THREAD_MULTIPLE)."}, {"name": "provided", "desc": "N\u00edvel de suporte a threads efetivamente fornecido pelo sistema."}], "description": "Semelhante ao MPI_Init, mas permite especificar o n\u00edvel de suporte a threads necess\u00e1rio para a aplica\u00e7\u00e3o h\u00edbrida (MPI + threads).", "application": "Utilizada em aplica\u00e7\u00f5es que utilizam OpenMP ou Pthreads junto com MPI.", "example": "// Declara\u00e7\u00f5es\nint argc = 0;\nchar **argv = NULL;\nint required = MPI_THREAD_FUNNELED;\nint provided = 0;\n\n// Inicializa com suporte a threads\nint err = MPI_Init_thread(&argc, &argv, required, &provided);\n\nif (err == MPI_SUCCESS) {\n    // Verifique se o n\u00edvel fornecido atende ao requisito\n    MPI_Finalize();\n}"}, {"name": "MPI_Initialized", "short_desc": "Indica se o MPI_Init j\u00e1 foi chamado.", "synopsis": "int MPI_Initialized(int *flag)", "params": [{"name": "flag", "desc": "Retorna verdadeiro se MPI_Init foi chamado, falso caso contr\u00e1rio."}], "description": "Verifica se o ambiente MPI j\u00e1 foi inicializado. \u00c9 uma das poucas fun\u00e7\u00f5es que podem ser chamadas antes do MPI_Init.", "application": "\u00datil em bibliotecas que precisam garantir que o MPI esteja ativo antes de realizar chamadas de comunica\u00e7\u00e3o.", "example": "// Declara\u00e7\u00f5es\nint flag = 0;\n\n// Verifica se o MPI j\u00e1 foi inicializado anteriormente\nint err = MPI_Initialized(&flag);\n\nif (err == MPI_SUCCESS && flag == 0) {\n    // MPI ainda n\u00e3o foi inicializado\n}"}, {"name": "MPI_Intercomm_create", "short_desc": "Cria um intercomunicador a partir de dois intracomunicadores.", "synopsis": "int MPI_Intercomm_create(MPI_Comm local_comm, int local_leader, MPI_Comm peer_comm, int remote_leader, int tag, MPI_Comm *newintercomm)", "params": [{"name": "local_comm", "desc": "Intracomunicador local (handle)."}, {"name": "local_leader", "desc": "Rank do l\u00edder do grupo local no local_comm (inteiro)."}, {"name": "peer_comm", "desc": "Comunicador de par; significativo apenas no l\u00edder local (handle)."}, {"name": "remote_leader", "desc": "Rank do l\u00edder do grupo remoto no peer_comm; significativo apenas no l\u00edder local (inteiro)."}, {"name": "tag", "desc": "Tag de mensagem (inteiro)."}, {"name": "newintercomm", "desc": "Novo intercomunicador (handle de sa\u00edda)."}], "description": "Cria um intercomunicador que permite a comunica\u00e7\u00e3o entre dois grupos disjuntos de processos. Cada grupo identifica um l\u00edder que se comunica atrav\u00e9s de um comunicador de par.", "application": "Comunica\u00e7\u00e3o entre diferentes aplica\u00e7\u00f5es ou m\u00f3dulos que foram inicializados separadamente.", "example": "// Declara\u00e7\u00f5es\nMPI_Comm local_comm = MPI_COMM_WORLD;\nMPI_Comm peer_comm = MPI_COMM_WORLD;\nMPI_Comm newintercomm;\nint local_leader = 0;\nint remote_leader = 0;\nint tag = 100;\n\n// Cria intercomunicador entre dois grupos\nint err = MPI_Intercomm_create(local_comm, local_leader, peer_comm, remote_leader, tag, &newintercomm);\n\nif (err == MPI_SUCCESS) {\n    // Intercomunicador pronto para uso\n    MPI_Comm_free(&newintercomm);\n}"}, {"name": "MPI_Intercomm_merge", "short_desc": "Cria um intracounicador a partir de um intercomunicador.", "synopsis": "int MPI_Intercomm_merge(MPI_Comm intercomm, int high, MPI_Comm *newintracomm)", "params": [{"name": "intercomm", "desc": "Intercomunicador (handle)."}, {"name": "high", "desc": "Ordem relativa dos grupos local e remoto (booleano)."}, {"name": "newintracomm", "desc": "Novo intracounicador criado (handle, sa\u00edda)."}], "description": "Une os dois grupos de um intercomunicador em um \u00fanico intracounicador comum.", "application": "Convers\u00e3o de grupos divididos em uma estrutura de comunica\u00e7\u00e3o unificada.", "example": "// Declara\u00e7\u00f5es\nMPI_Comm intercomm; // Sup\u00f5e-se um intercomunicador existente\nMPI_Comm newintracomm;\nint high = 0;\n\n// Transforma um intercomunicador em um intracounicador\nint err = MPI_Intercomm_merge(intercomm, high, &newintracomm);\n\nif (err == MPI_SUCCESS) {\n    // Agora os grupos formam um \u00fanico comunicador\n    MPI_Comm_free(&newintracomm);\n}"}, {"name": "MPI_Iprobe", "short_desc": "Teste n\u00e3o bloqueante por uma mensagem.", "synopsis": "int MPI_Iprobe(int source, int tag, MPI_Comm comm, int *flag, MPI_Status *status)", "params": [{"name": "source", "desc": "Rank da origem ou MPI_ANY_SOURCE (inteiro)."}, {"name": "tag", "desc": "Tag da mensagem ou MPI_ANY_TAG (inteiro)."}, {"name": "comm", "desc": "Comunicador (handle)."}, {"name": "flag", "desc": "Verdadeiro se uma mensagem est\u00e1 dispon\u00edvel (inteiro, sa\u00edda)."}, {"name": "status", "desc": "Objeto de status da mensagem (Status)."}], "description": "Verifica se existe uma mensagem pendente sem bloquear a execu\u00e7\u00e3o.", "application": "L\u00f3gica de polling para lidar com mensagens ass\u00edncronas.", "example": "// Declara\u00e7\u00f5es\nint source = 0;\nint tag = 100;\nMPI_Comm comm = MPI_COMM_WORLD;\nint flag = 0;\nMPI_Status status;\n\n// Verifica se h\u00e1 uma mensagem dispon\u00edvel sem bloquear\nint err = MPI_Iprobe(source, tag, comm, &flag, &status);\n\nif (err == MPI_SUCCESS && flag) {\n    // Mensagem encontrada, processa status\n}"}, {"name": "MPI_Irecv", "short_desc": "Inicia um recebimento n\u00e3o bloqueante.", "synopsis": "int MPI_Irecv(void *buf, int count, MPI_Datatype datatype, int source, int tag, MPI_Comm comm, MPI_Request *request)", "params": [{"name": "buf", "desc": "Endere\u00e7o inicial do buffer de recebimento (escolha)."}, {"name": "count", "desc": "N\u00famero de elementos a receber (inteiro)."}, {"name": "datatype", "desc": "Tipo de dado (handle)."}, {"name": "source", "desc": "Rank da origem (inteiro)."}, {"name": "tag", "desc": "Tag da mensagem (inteiro)."}, {"name": "comm", "desc": "Comunicador (handle)."}, {"name": "request", "desc": "Requisi\u00e7\u00e3o de comunica\u00e7\u00e3o (handle, sa\u00edda)."}], "description": "Solicita o in\u00edcio de um recebimento de mensagem e retorna imediatamente um objeto de requisi\u00e7\u00e3o.", "application": "Sobreposi\u00e7\u00e3o de comunica\u00e7\u00e3o e computa\u00e7\u00e3o para melhorar o desempenho.", "example": "// Declara\u00e7\u00f5es\nint buf[10];\nint count = 10;\nMPI_Datatype datatype = MPI_INT;\nint source = 0;\nint tag = 100;\nMPI_Comm comm = MPI_COMM_WORLD;\nMPI_Request request;\nMPI_Status status;\n\n// Inicia a recep\u00e7\u00e3o n\u00e3o-bloqueante\nint err = MPI_Irecv(buf, count, datatype, source, tag, comm, &request);\n\nif (err == MPI_SUCCESS) {\n    // Aguarda a conclus\u00e3o da opera\u00e7\u00e3o\n    MPI_Wait(&request, &status);\n}"}, {"name": "MPI_Ireduce", "short_desc": "Reduz valores de todos os processos a um \u00fanico valor de forma n\u00e3o bloqueante.", "synopsis": "int MPI_Ireduce(const void *sendbuf, void *recvbuf, int count, MPI_Datatype datatype, MPI_Op op, int root, MPI_Comm comm, MPI_Request *request)", "params": [{"name": "sendbuf", "desc": "Buffer de envio (ponteiro)."}, {"name": "recvbuf", "desc": "Buffer de recebimento (ponteiro, apenas no root)."}, {"name": "count", "desc": "N\u00famero de elementos (inteiro)."}, {"name": "datatype", "desc": "Tipo de dado dos elementos (handle)."}, {"name": "op", "desc": "Opera\u00e7\u00e3o de redu\u00e7\u00e3o (handle)."}, {"name": "root", "desc": "Rank do processo raiz (inteiro)."}, {"name": "comm", "desc": "Comunicador (handle)."}, {"name": "request", "desc": "Requisi\u00e7\u00e3o de comunica\u00e7\u00e3o (handle, sa\u00edda)."}], "description": "Inicia uma opera\u00e7\u00e3o de redu\u00e7\u00e3o coletiva que ocorre em segundo plano.", "application": "C\u00e1lculos coletivos que n\u00e3o precisam bloquear o progresso local imediatamente.", "example": "// Declara\u00e7\u00f5es\nint send_val = 5;\nint recv_val = 0;\nint count = 1;\nMPI_Datatype datatype = MPI_INT;\nMPI_Op op = MPI_SUM;\nint root = 0;\nMPI_Comm comm = MPI_COMM_WORLD;\nMPI_Request request;\nMPI_Status status;\n\n// Inicia redu\u00e7\u00e3o n\u00e3o-bloqueante\nint err = MPI_Ireduce(&send_val, &recv_val, count, datatype, op, root, comm, &request);\n\nif (err == MPI_SUCCESS) {\n    MPI_Wait(&request, &status);\n}"}, {"name": "MPI_Ireduce_scatter", "short_desc": "Combina valores e espalha os resultados de forma n\u00e3o bloqueante.", "synopsis": "int MPI_Ireduce_scatter(const void *sendbuf, void *recvbuf, const int recvcounts[], MPI_Datatype datatype, MPI_Op op, MPI_Comm comm, MPI_Request *request)", "params": [{"name": "sendbuf", "desc": "endere\u00e7o inicial do buffer de envio (escolha)"}, {"name": "recvcounts", "desc": "array de inteiros n\u00e3o negativos especificando o n\u00famero de elementos no resultado distribu\u00eddo para cada processo. Este array deve ser id\u00eantico em todos os processos chamadores."}, {"name": "op", "desc": "opera\u00e7\u00e3o (handle)"}, {"name": "comm", "desc": "comunicador (handle)"}, {"name": "recvbuf", "desc": "endere\u00e7o inicial do buffer de recebimento (escolha)"}, {"name": "request", "desc": "requisi\u00e7\u00e3o de comunica\u00e7\u00e3o (handle)"}], "description": "MPI_Ireduce_scatter combina valores e espalha os resultados em um comunicador de forma n\u00e3o bloqueante. \u00c9 a vers\u00e3o n\u00e3o bloqueante de MPI_Reduce_scatter. Todos os processos devem fornecer o mesmo array recvcounts, datatype e opera\u00e7\u00e3o op.", "application": "Utilizado em algoritmos paralelos que requerem uma redu\u00e7\u00e3o global seguida pela distribui\u00e7\u00e3o dos resultados parciais, onde a sobreposi\u00e7\u00e3o de comunica\u00e7\u00e3o e computa\u00e7\u00e3o \u00e9 desejada.", "example": "// Declara\u00e7\u00f5es\nint sendbuf[4] = {1, 1, 1, 1};\nint recvbuf = 0;\nint recvcounts[1] = {1};\nMPI_Datatype datatype = MPI_INT;\nMPI_Op op = MPI_SUM;\nMPI_Comm comm = MPI_COMM_WORLD;\nMPI_Request request;\nMPI_Status status;\n\n// Reduz e espalha os resultados\nint err = MPI_Ireduce_scatter(sendbuf, &recvbuf, recvcounts, datatype, op, comm, &request);\n\nif (err == MPI_SUCCESS) {\n    MPI_Wait(&request, &status);\n}"}, {"name": "MPI_Ireduce_scatter_block", "short_desc": "Combina valores e espalha os resultados em blocos de tamanho fixo de forma n\u00e3o bloqueante.", "synopsis": "int MPI_Ireduce_scatter_block(const void *sendbuf, void *recvbuf, int recvcount, MPI_Datatype datatype, MPI_Op op, MPI_Comm comm, MPI_Request *request)", "params": [{"name": "sendbuf", "desc": "endere\u00e7o inicial do buffer de envio (escolha)"}, {"name": "recvcount", "desc": "contagem de elementos por bloco (inteiro n\u00e3o negativo)"}, {"name": "datatype", "desc": "tipo de dado dos elementos dos buffers de envio e recebimento (handle)"}, {"name": "op", "desc": "opera\u00e7\u00e3o (handle)"}, {"name": "comm", "desc": "comunicador (handle)"}, {"name": "recvbuf", "desc": "endere\u00e7o inicial do buffer de recebimento (escolha)"}, {"name": "request", "desc": "requisi\u00e7\u00e3o de comunica\u00e7\u00e3o (handle)"}], "description": "MPI_Ireduce_scatter_block \u00e9 a variante n\u00e3o bloqueante de MPI_Reduce_scatter_block. Ela combina valores de todos os processos e distribui blocos de tamanho igual para cada processo.", "application": "\u00datil quando o resultado da redu\u00e7\u00e3o deve ser distribu\u00eddo uniformemente entre os processos de forma ass\u00edncrona.", "example": "// Declara\u00e7\u00f5es\nint sendbuf[4] = {2, 2, 2, 2};\nint recvbuf = 0;\nint recvcount = 1;\nMPI_Datatype datatype = MPI_INT;\nMPI_Op op = MPI_SUM;\nMPI_Comm comm = MPI_COMM_WORLD;\nMPI_Request request;\nMPI_Status status;\n\n// Reduz e espalha blocos iguais\nint err = MPI_Ireduce_scatter_block(sendbuf, &recvbuf, recvcount, datatype, op, comm, &request);\n\nif (err == MPI_SUCCESS) {\n    MPI_Wait(&request, &status);\n}"}, {"name": "MPI_Irsend", "short_desc": "Inicia um envio pronto (ready send) n\u00e3o bloqueante.", "synopsis": "int MPI_Irsend(const void *buf, int count, MPI_Datatype datatype, int dest, int tag, MPI_Comm comm, MPI_Request *request)", "params": [{"name": "buf", "desc": "endere\u00e7o inicial do buffer de envio (escolha)"}, {"name": "count", "desc": "n\u00famero de elementos no buffer de envio (inteiro n\u00e3o negativo)"}, {"name": "datatype", "desc": "tipo de dado de cada elemento do buffer de envio (handle)"}, {"name": "dest", "desc": "rank do destino (inteiro)"}, {"name": "tag", "desc": "tag da mensagem (inteiro)"}, {"name": "comm", "desc": "comunicador (handle)"}, {"name": "request", "desc": "requisi\u00e7\u00e3o de comunica\u00e7\u00e3o (handle)"}], "description": "MPI_Irsend inicia uma opera\u00e7\u00e3o de envio pronto n\u00e3o bloqueante. Um envio pronto s\u00f3 pode ser iniciado se o recebimento correspondente j\u00e1 tiver sido postado no destino.", "application": "Otimiza\u00e7\u00e3o de performance em sistemas onde o programador garante que o receptor j\u00e1 est\u00e1 pronto para receber a mensagem.", "example": "// Declara\u00e7\u00f5es\nint buf[5] = {1, 2, 3, 4, 5};\nint count = 5;\nMPI_Datatype datatype = MPI_INT;\nint dest = 1;\nint tag = 0;\nMPI_Comm comm = MPI_COMM_WORLD;\nMPI_Request request;\nMPI_Status status;\n\n// Envio pronto: deve ser chamado apenas se o destino j\u00e1 iniciou o recv\nint err = MPI_Irsend(buf, count, datatype, dest, tag, comm, &request);\n\nif (err == MPI_SUCCESS) {\n    MPI_Wait(&request, &status);\n}"}, {"name": "MPI_Is_thread_main", "short_desc": "Retorna um sinalizador indicando se esta thread chamou MPI_Init ou MPI_Init_thread.", "synopsis": "int MPI_Is_thread_main(int *flag)", "params": [{"name": "flag", "desc": "verdadeiro se a thread chamadora for a thread principal, falso caso contr\u00e1rio (l\u00f3gico)"}], "description": "Esta rotina pode ser usada para determinar se a thread atual \u00e9 a que inicializou o ambiente MPI. \u00c9 \u00fatil em ambientes multi-threaded onde certas opera\u00e7\u00f5es MPI s\u00f3 devem ser executadas pela thread principal.", "application": "Controle de fluxo em aplica\u00e7\u00f5es MPI multi-threaded.", "example": "// Declara\u00e7\u00f5es\nint flag = 0;\n\n// Verifica se a thread atual \u00e9 a principal\nint err = MPI_Is_thread_main(&flag);\n\nif (err == MPI_SUCCESS && flag) {\n    // Thread principal detectada\n}"}, {"name": "MPI_Iscan", "short_desc": "Computa o scan (redu\u00e7\u00f5es parciais) de dados de forma n\u00e3o bloqueante.", "synopsis": "int MPI_Iscan(const void *sendbuf, void *recvbuf, int count, MPI_Datatype datatype, MPI_Op op, MPI_Comm comm, MPI_Request *request)", "params": [{"name": "sendbuf", "desc": "endere\u00e7o inicial do buffer de envio (escolha)"}, {"name": "op", "desc": "opera\u00e7\u00e3o (handle)"}, {"name": "comm", "desc": "comunicador (handle)"}, {"name": "recvbuf", "desc": "endere\u00e7o inicial do buffer de recebimento (escolha)"}, {"name": "request", "desc": "requisi\u00e7\u00e3o de comunica\u00e7\u00e3o (handle)"}], "description": "MPI_Iscan realiza uma opera\u00e7\u00e3o de redu\u00e7\u00e3o de prefixo (scan) de forma n\u00e3o bloqueante em um grupo de processos.", "application": "C\u00e1lculo de somas ou redu\u00e7\u00f5es parciais distribu\u00eddas sem bloquear a execu\u00e7\u00e3o.", "example": "// Declara\u00e7\u00f5es\nint send_val = 1;\nint recv_val = 0;\nint count = 1;\nMPI_Datatype datatype = MPI_INT;\nMPI_Op op = MPI_SUM;\nMPI_Comm comm = MPI_COMM_WORLD;\nMPI_Request request;\nMPI_Status status;\n\n// Scan n\u00e3o-bloqueante\nint err = MPI_Iscan(&send_val, &recv_val, count, datatype, op, comm, &request);\n\nif (err == MPI_SUCCESS) {\n    MPI_Wait(&request, &status);\n}"}, {"name": "MPI_Iscatter", "short_desc": "Envia dados de um processo para todos os outros processos de forma n\u00e3o bloqueante.", "synopsis": "int MPI_Iscatter(const void *sendbuf, int sendcount, MPI_Datatype sendtype, void *recvbuf, int recvcount, MPI_Datatype recvtype, int root, MPI_Comm comm, MPI_Request *request)", "params": [{"name": "sendbuf", "desc": "endere\u00e7o do buffer de envio (escolha)"}, {"name": "sendcount", "desc": "n\u00famero de elementos enviados para cada processo (inteiro n\u00e3o negativo)"}, {"name": "sendtype", "desc": "tipo de dado dos elementos do buffer de envio (handle)"}, {"name": "recvcount", "desc": "n\u00famero de elementos no buffer de recebimento (inteiro n\u00e3o negativo)"}, {"name": "recvtype", "desc": "tipo de dado dos elementos do buffer de recebimento (handle)"}, {"name": "root", "desc": "rank do processo emissor (inteiro)"}, {"name": "comm", "desc": "comunicador (handle)"}, {"name": "recvbuf", "desc": "endere\u00e7o do buffer de recebimento (escolha)"}, {"name": "request", "desc": "requisi\u00e7\u00e3o de comunica\u00e7\u00e3o (handle)"}], "description": "MPI_Iscatter distribui fatias de um buffer do processo raiz para todos os processos no comunicador sem bloquear.", "application": "Distribui\u00e7\u00e3o de tarefas ou dados entre processos de forma ass\u00edncrona.", "example": "// Declara\u00e7\u00f5es\nint sendbuf[4] = {1, 2, 3, 4};\nint recvbuf = 0;\nint count = 1;\nMPI_Datatype type = MPI_INT;\nint root = 0;\nMPI_Comm comm = MPI_COMM_WORLD;\nMPI_Request request;\nMPI_Status status;\n\n// Distribui dados n\u00e3o-bloqueantemente\nint err = MPI_Iscatter(sendbuf, count, type, &recvbuf, count, type, root, comm, &request);\n\nif (err == MPI_SUCCESS) {\n    MPI_Wait(&request, &status);\n}"}, {"name": "MPI_Iscatterv", "short_desc": "Espalha um buffer em partes variadas para todos os processos de forma n\u00e3o bloqueante.", "synopsis": "int MPI_Iscatterv(const void *sendbuf, const int sendcounts[], const int displs[], MPI_Datatype sendtype, void *recvbuf, int recvcount, MPI_Datatype recvtype, int root, MPI_Comm comm, MPI_Request *request)", "params": [{"name": "sendbuf", "desc": "endere\u00e7o do buffer de envio (escolha)"}, {"name": "sendcounts", "desc": "array de inteiros especificando o n\u00famero de elementos a enviar para cada rank."}, {"name": "displs", "desc": "array de inteiros especificando o deslocamento relativo ao sendbuf para os dados de cada rank."}, {"name": "sendtype", "desc": "tipo de dado dos elementos do buffer de envio (handle)"}, {"name": "recvcount", "desc": "n\u00famero de elementos no buffer de recebimento (inteiro n\u00e3o negativo)"}, {"name": "recvtype", "desc": "tipo de dado dos elementos do buffer de recebimento (handle)"}, {"name": "root", "desc": "rank do processo emissor (inteiro)"}, {"name": "comm", "desc": "comunicador (handle)"}, {"name": "recvbuf", "desc": "endere\u00e7o do buffer de recebimento (escolha)"}, {"name": "request", "desc": "requisi\u00e7\u00e3o de comunica\u00e7\u00e3o (handle)"}], "description": "MPI_Iscatterv permite distribuir fatias de tamanhos vari\u00e1veis de um buffer para diferentes processos de forma n\u00e3o bloqueante.", "application": "Distribui\u00e7\u00e3o de dados irregulares entre processos.", "example": "// Declara\u00e7\u00f5es\nint sendbuf[4] = {1, 2, 3, 4};\nint sendcounts[2] = {1, 3};\nint displs[2] = {0, 1};\nint recvbuf[3] = {0, 0, 0};\nint recvcount = 3;\nMPI_Datatype type = MPI_INT;\nint root = 0;\nMPI_Comm comm = MPI_COMM_WORLD;\nMPI_Request request;\nMPI_Status status;\n\n// Distribui\u00e7\u00e3o vari\u00e1vel\nint err = MPI_Iscatterv(sendbuf, sendcounts, displs, type, recvbuf, recvcount, type, root, comm, &request);\n\nif (err == MPI_SUCCESS) {\n    MPI_Wait(&request, &status);\n}"}, {"name": "MPI_Isend", "short_desc": "Inicia um envio n\u00e3o bloqueante.", "synopsis": "int MPI_Isend(const void *buf, int count, MPI_Datatype datatype, int dest, int tag, MPI_Comm comm, MPI_Request *request)", "params": [{"name": "buf", "desc": "endere\u00e7o inicial do buffer de envio (escolha)"}, {"name": "count", "desc": "n\u00famero de elementos no buffer de envio (inteiro n\u00e3o negativo)"}, {"name": "datatype", "desc": "tipo de dado de cada elemento do buffer de envio (handle)"}, {"name": "dest", "desc": "rank do destino (inteiro)"}, {"name": "tag", "desc": "tag da mensagem (inteiro)"}, {"name": "comm", "desc": "comunicador (handle)"}, {"name": "request", "desc": "requisi\u00e7\u00e3o de comunica\u00e7\u00e3o (handle)"}], "description": "MPI_Isend inicia uma opera\u00e7\u00e3o de envio n\u00e3o bloqueante e retorna uma requisi\u00e7\u00e3o que pode ser usada para testar ou esperar pela conclus\u00e3o da opera\u00e7\u00e3o. O buffer de envio n\u00e3o deve ser modificado at\u00e9 que a opera\u00e7\u00e3o seja conclu\u00edda.", "application": "Comunica\u00e7\u00e3o ponto-a-ponto onde a sobreposi\u00e7\u00e3o de comunica\u00e7\u00e3o e computa\u00e7\u00e3o \u00e9 necess\u00e1ria.", "example": "// Declara\u00e7\u00f5es\nint data = 100;\nint dest = 1;\nint tag = 0;\nMPI_Comm comm = MPI_COMM_WORLD;\nMPI_Request request;\n\n// Inicia o envio n\u00e3o bloqueante\nint err = MPI_Isend(&data, 1, MPI_INT, dest, tag, comm, &request);\n\nif (err == MPI_SUCCESS) {\n    // Aguarda a conclus\u00e3o da opera\u00e7\u00e3o para garantir que o buffer pode ser reutilizado\n    MPI_Wait(&request, MPI_STATUS_IGNORE);\n}"}, {"name": "MPI_Issend", "short_desc": "Inicia um envio s\u00edncrono n\u00e3o bloqueante.", "synopsis": "int MPI_Issend(const void *buf, int count, MPI_Datatype datatype, int dest, int tag, MPI_Comm comm, MPI_Request *request)", "params": [{"name": "buf", "desc": "endere\u00e7o inicial do buffer de envio (escolha)"}, {"name": "count", "desc": "n\u00famero de elementos no buffer de envio (inteiro n\u00e3o negativo)"}, {"name": "datatype", "desc": "tipo de dado de cada elemento do buffer de envio (handle)"}, {"name": "dest", "desc": "rank do destino (inteiro)"}, {"name": "tag", "desc": "tag da mensagem (inteiro)"}, {"name": "comm", "desc": "comunicador (handle)"}, {"name": "request", "desc": "requisi\u00e7\u00e3o de comunica\u00e7\u00e3o (handle)"}], "description": "MPI_Issend inicia uma opera\u00e7\u00e3o de envio s\u00edncrono n\u00e3o bloqueante. A opera\u00e7\u00e3o s\u00f3 \u00e9 conclu\u00edda quando o receptor come\u00e7a a receber a mensagem.", "application": "Garantia de que a comunica\u00e7\u00e3o foi iniciada no receptor sem bloquear o emissor imediatamente.", "example": "// Declara\u00e7\u00f5es\nint data = 200;\nint dest = 1;\nint tag = 1;\nMPI_Comm comm = MPI_COMM_WORLD;\nMPI_Request request;\n\n// Inicia o envio s\u00edncrono n\u00e3o bloqueante\nint err = MPI_Issend(&data, 1, MPI_INT, dest, tag, comm, &request);\n\nif (err == MPI_SUCCESS) {\n    // Espera at\u00e9 que o receptor tenha come\u00e7ado a receber a mensagem\n    MPI_Wait(&request, MPI_STATUS_IGNORE);\n}"}, {"name": "MPI_Keyval_create", "short_desc": "Cria uma nova chave de atributo.", "synopsis": "int MPI_Keyval_create(MPI_Copy_function *copy_fn, MPI_Delete_function *delete_fn, int *keyval, void *extra_state)", "params": [{"name": "copy_fn", "desc": "fun\u00e7\u00e3o de callback de c\u00f3pia para keyval (fun\u00e7\u00e3o)"}, {"name": "delete_fn", "desc": "fun\u00e7\u00e3o de callback de exclus\u00e3o para keyval (fun\u00e7\u00e3o)"}, {"name": "extra_state", "desc": "estado extra para as fun\u00e7\u00f5es de callback"}, {"name": "keyval", "desc": "valor da chave para acesso futuro (inteiro)"}], "description": "MPI_Keyval_create gera uma nova chave de atributo que pode ser usada para associar dados a comunicadores. Esta fun\u00e7\u00e3o est\u00e1 obsoleta em favor de MPI_Comm_create_keyval.", "application": "Gerenciamento de atributos e caching em comunicadores.", "example": "// Declara\u00e7\u00f5es\nint keyval;\nint extra_state = 0;\n\n// Cria uma chave de atributo (usando NULL para fun\u00e7\u00f5es de c\u00f3pia/dele\u00e7\u00e3o para simplificar)\nint err = MPI_Keyval_create(MPI_NULL_COPY_FN, MPI_NULL_DELETE_FN, &keyval, &extra_state);\n\nif (err == MPI_SUCCESS) {\n    // Libera a chave quando n\u00e3o for mais necess\u00e1ria\n    MPI_Keyval_free(&keyval);\n}"}, {"name": "MPI_Keyval_free", "short_desc": "Libera uma chave de atributo para comunicadores.", "synopsis": "int MPI_Keyval_free(int *keyval)", "params": [{"name": "keyval", "desc": "valor da chave de atributo a ser liberada (inteiro)"}], "description": "MPI_Keyval_free marca uma chave de atributo para desaloca\u00e7\u00e3o. A chave s\u00f3 ser\u00e1 efetivamente liberada quando todos os atributos associados forem removidos.", "application": "Limpeza de recursos ap\u00f3s o uso de atributos em comunicadores.", "example": "// Declara\u00e7\u00f5es\nint keyval;\nint extra_state = 0;\n\nMPI_Keyval_create(MPI_NULL_COPY_FN, MPI_NULL_DELETE_FN, &keyval, &extra_state);\n\n// Libera o recurso da chave de atributo\nint err = MPI_Keyval_free(&keyval);\n\nif (err == MPI_SUCCESS) {\n    // Chave liberada com sucesso\n}"}, {"name": "MPI_Lookup_name", "short_desc": "Procura uma porta dado um nome de servi\u00e7o.", "synopsis": "int MPI_Lookup_name(const char *service_name, MPI_Info info, char *port_name)", "params": [{"name": "service_name", "desc": "nome do servi\u00e7o (string)"}, {"name": "info", "desc": "informa\u00e7\u00f5es espec\u00edficas da implementa\u00e7\u00e3o (handle)"}, {"name": "port_name", "desc": "nome da porta encontrada (string)"}], "description": "MPI_Lookup_name recupera o nome da porta associada a um servi\u00e7o publicado anteriormente com MPI_Publish_name.", "application": "Estabelecimento de conex\u00f5es din\u00e2micas entre aplica\u00e7\u00f5es MPI independentes.", "example": "// Declara\u00e7\u00f5es\nchar service_name[] = \"meu_servico\";\nchar port_name[MPI_MAX_PORT_NAME];\n\n// Recupera o nome da porta de um servi\u00e7o publicado\nint err = MPI_Lookup_name(service_name, MPI_INFO_NULL, port_name);\n\nif (err == MPI_SUCCESS) {\n    // port_name agora cont\u00e9m o endere\u00e7o para conex\u00e3o\n}"}, {"name": "MPI_Message_c2f", "short_desc": "Converte MPI_Message para um INTEGER do Fortran.", "synopsis": "MPI_Fint MPI_Message_c2f(MPI_Message message)", "params": [{"name": "message", "desc": "mensagem MPI (handle)"}], "description": "Converte um handle de mensagem MPI da linguagem C para a representa\u00e7\u00e3o inteira usada no Fortran.", "application": "Interoperabilidade entre C e Fortran em aplica\u00e7\u00f5es MPI.", "example": "// Declara\u00e7\u00f5es\nMPI_Message message = MPI_MESSAGE_NULL;\nMPI_Fint f_message;\n\n// Converte handle C para Fortran\nf_message = MPI_Message_c2f(message);\nint err = (f_message >= 0) ? MPI_SUCCESS : MPI_ERR_OTHER;\n\nif (err == MPI_SUCCESS) {\n    // Manipula\u00e7\u00e3o do handle Fortran conclu\u00edda\n}"}, {"name": "MPI_Message_f2c", "short_desc": "Converte um INTEGER do Fortran para MPI_Message.", "synopsis": "MPI_Message MPI_Message_f2c(MPI_Fint message)", "params": [{"name": "message", "desc": "mensagem em formato inteiro do Fortran (MPI_Fint)"}], "description": "Converte uma representa\u00e7\u00e3o inteira de mensagem do Fortran para um handle MPI_Message em C.", "application": "Interoperabilidade entre C e Fortran.", "example": "// Declara\u00e7\u00f5es\nMPI_Fint f_message = 0;\nMPI_Message message;\n\n// Converte handle Fortran para C\nmessage = MPI_Message_f2c(f_message);\nint err = MPI_SUCCESS;\n\nif (err == MPI_SUCCESS) {\n    // Agora pode usar a vari\u00e1vel message\n}"}, {"name": "MPI_Mprobe", "short_desc": "Sondagem combinada bloqueante.", "synopsis": "int MPI_Mprobe(int source, int tag, MPI_Comm comm, MPI_Message *message, MPI_Status *status)", "params": [{"name": "source", "desc": "rank da origem ou MPI_ANY_SOURCE (inteiro)"}, {"name": "tag", "desc": "tag da mensagem ou MPI_ANY_TAG (inteiro)"}, {"name": "comm", "desc": "comunicador (handle)"}, {"name": "message", "desc": "mensagem retornada (handle)"}, {"name": "status", "desc": "objeto de status (Status)"}], "description": "MPI_Mprobe bloqueia at\u00e9 que uma mensagem que corresponda aos crit\u00e9rios de origem e tag seja encontrada. Diferente de MPI_Probe, esta fun\u00e7\u00e3o retorna um handle de mensagem que garante que a mensagem sondada ser\u00e1 a mesma recebida em uma chamada subsequente a MPI_Mrecv.", "application": "Recebimento seguro de mensagens onde o tamanho do buffer deve ser verificado antes da recep\u00e7\u00e3o real.", "example": "// Declara\u00e7\u00f5es\nint source = MPI_ANY_SOURCE;\nint tag = 0;\nMPI_Comm comm = MPI_COMM_WORLD;\nMPI_Message message;\nMPI_Status status;\n\n// Sondagem bloqueante que retorna um handle de mensagem\nint err = MPI_Mprobe(source, tag, comm, &message, &status);\n\nif (err == MPI_SUCCESS) {\n    // A mensagem foi sondada e est\u00e1 pronta para ser recebida via MPI_Mrecv\n}"}, {"name": "MPI_Mrecv", "short_desc": "Recebimento bloqueante de mensagem combinada por MPI_Mprobe ou MPI_Improbe.", "synopsis": "int MPI_Mrecv(void *buf, int count, MPI_Datatype datatype, MPI_Message *message, MPI_Status *status)", "params": [{"name": "count", "desc": "n\u00famero de elementos no buffer de recebimento (inteiro n\u00e3o negativo)"}, {"name": "datatype", "desc": "tipo de dado de cada elemento do buffer de recebimento (handle)"}, {"name": "buf", "desc": "endere\u00e7o inicial do buffer de recebimento (escolha)"}, {"name": "status", "desc": "objeto de status (Status)"}, {"name": "message", "desc": "mensagem (handle)"}], "description": "MPI_Mrecv recebe uma mensagem que foi previamente identificada por uma opera\u00e7\u00e3o de sondagem combinada (MPI_Mprobe ou MPI_Improbe). O handle da mensagem \u00e9 liberado ap\u00f3s a conclus\u00e3o.", "application": "Complemento de MPI_Mprobe para recep\u00e7\u00e3o garantida de mensagens.", "example": "// Declara\u00e7\u00f5es\nint buf[10];\nMPI_Message message;\nMPI_Status status;\n\n// ... assume-se que uma mensagem foi sondada previamente em 'message' ...\n// Recebe a mensagem sondada\nint err = MPI_Mrecv(buf, 10, MPI_INT, &message, &status);\n\nif (err == MPI_SUCCESS) {\n    // Dados recebidos com sucesso\n}"}, {"name": "MPI_Neighbor_allgather", "short_desc": "Coleta dados de todos os processos vizinhos e distribui os dados combinados para todos os vizinhos.", "synopsis": "int MPI_Neighbor_allgather(const void *sendbuf, int sendcount, MPI_Datatype sendtype, void *recvbuf, int recvcount, MPI_Datatype recvtype, MPI_Comm comm)", "params": [{"name": "sendbuf", "desc": "Endere\u00e7o inicial do buffer de envio (escolha)."}, {"name": "sendcount", "desc": "N\u00famero de elementos enviados para cada vizinho (inteiro n\u00e3o negativo)."}, {"name": "sendtype", "desc": "Tipo de dado dos elementos do buffer de envio (handle)."}, {"name": "recvcount", "desc": "N\u00famero de elementos recebidos de cada vizinho (inteiro n\u00e3o negativo)."}, {"name": "recvtype", "desc": "Tipo de dado dos elementos do buffer de recebimento (handle)."}, {"name": "comm", "desc": "Comunicador com estrutura de topologia (handle)."}, {"name": "recvbuf", "desc": "Endere\u00e7o inicial do buffer de recebimento (escolha)."}], "description": "MPI_Neighbor_allgather realiza uma opera\u00e7\u00e3o de coleta coletiva em uma vizinhan\u00e7a definida por uma topologia (grafo ou cartesiana). Cada processo envia os mesmos dados para todos os seus vizinhos de sa\u00edda e recebe dados de todos os seus vizinhos de entrada. O i-\u00e9simo bloco no buffer de recebimento corresponde aos dados recebidos do i-\u00e9simo vizinho.", "application": "Essencial em algoritmos de stencil ou m\u00e9todos num\u00e9ricos onde os processos s\u00f3 precisam trocar informa\u00e7\u00f5es com seus vizinhos diretos na malha.", "example": "// Declara\u00e7\u00f5es\nint send_data = 1;\nint recv_data[4]; // Supondo topologia simples\nMPI_Comm comm = MPI_COMM_WORLD;\n\n// Coleta dados de todos os vizinhos em uma topologia virtual\nint err = MPI_Neighbor_allgather(&send_data, 1, MPI_INT, recv_data, 1, MPI_INT, comm);\n\nif (err == MPI_SUCCESS) {\n    // Buffer recv_data preenchido pelos vizinhos\n}"}, {"name": "MPI_Neighbor_allgatherv", "short_desc": "Variante vetorial de MPI_Neighbor_allgather.", "synopsis": "int MPI_Neighbor_allgatherv(const void *sendbuf, int sendcount, MPI_Datatype sendtype, void *recvbuf, const int recvcounts[], const int displs[], MPI_Datatype recvtype, MPI_Comm comm)", "params": [{"name": "sendbuf", "desc": "Endere\u00e7o inicial do buffer de envio (escolha)."}, {"name": "sendcount", "desc": "N\u00famero de elementos enviados para cada vizinho (inteiro n\u00e3o negativo)."}, {"name": "sendtype", "desc": "Tipo de dado dos elementos do buffer de envio (handle)."}, {"name": "recvcounts", "desc": "Array de inteiros n\u00e3o negativos contendo o n\u00famero de elementos recebidos de cada vizinho."}, {"name": "displs", "desc": "Array de inteiros. A entrada i especifica o deslocamento (relativo a recvbuf) onde colocar os dados do vizinho i."}, {"name": "recvtype", "desc": "Tipo de dado dos elementos do buffer de recebimento (handle)."}, {"name": "comm", "desc": "Comunicador com estrutura de topologia (handle)."}, {"name": "recvbuf", "desc": "Endere\u00e7o inicial do buffer de recebimento (escolha)."}], "description": "MPI_Neighbor_allgatherv \u00e9 a extens\u00e3o de MPI_Neighbor_allgather que permite receber quantidades variadas de dados de cada vizinho. Assim como em outras fun\u00e7\u00f5es 'v' do MPI, o usu\u00e1rio fornece arrays para as contagens de recebimento e deslocamentos, permitindo uma flexibilidade total na organiza\u00e7\u00e3o do buffer de recebimento.", "application": "Usado em topologias de vizinhan\u00e7a onde a quantidade de dados de borda varia entre diferentes vizinhos.", "example": "// Declara\u00e7\u00f5es\nint send_val = 1;\nint recvbuf[10];\nint recvcounts[2] = {1, 1};\nint displs[2] = {0, 5};\nMPI_Comm cart_comm;\nint dims[1] = {2}, periods[1] = {1}, reorder = 0;\n\n// Cria um comunicador de topologia (cartesiana) para usar vizinhan\u00e7a\nMPI_Cart_create(MPI_COMM_WORLD, 1, dims, periods, reorder, &cart_comm);\n\n// Coleta vetorialmente dados de vizinhos\nint err = MPI_Neighbor_allgatherv(&send_val, 1, MPI_INT, recvbuf, recvcounts, displs, MPI_INT, cart_comm);\n\nif (err == MPI_SUCCESS) {\n    // Opera\u00e7\u00e3o realizada com sucesso\n}\n\nMPI_Comm_free(&cart_comm);"}, {"name": "MPI_Neighbor_alltoall", "short_desc": "Envia e recebe dados de todos os processos vizinhos.", "synopsis": "int MPI_Neighbor_alltoall(const void *sendbuf, int sendcount, MPI_Datatype sendtype, void *recvbuf, int recvcount, MPI_Datatype recvtype, MPI_Comm comm)", "params": [{"name": "sendbuf", "desc": "Endere\u00e7o inicial do buffer de envio (escolha)."}, {"name": "sendcount", "desc": "N\u00famero de elementos enviados para cada vizinho (inteiro n\u00e3o negativo)."}, {"name": "sendtype", "desc": "Tipo de dado dos elementos do buffer de envio (handle)."}, {"name": "recvcount", "desc": "N\u00famero de elementos recebidos de cada vizinho (inteiro n\u00e3o negativo)."}, {"name": "recvtype", "desc": "Tipo de dado dos elementos do buffer de recebimento (handle)."}, {"name": "comm", "desc": "Comunicador com estrutura de topologia (handle)."}, {"name": "recvbuf", "desc": "Endere\u00e7o inicial do buffer de recebimento (escolha)."}], "description": "MPI_Neighbor_alltoall \u00e9 uma opera\u00e7\u00e3o coletiva onde cada processo i troca dados com seus vizinhos em uma topologia. Diferente de MPI_Neighbor_allgather, esta fun\u00e7\u00e3o permite enviar itens de dados diferentes para cada vizinho. O k-\u00e9simo bloco no buffer de envio \u00e9 enviado para o k-\u00e9simo vizinho e o l-\u00e9simo bloco no buffer de recebimento \u00e9 recebido do l-\u00e9simo vizinho.", "application": "Usado para trocas personalizadas de dados entre vizinhos em topologias de grade ou grafos.", "example": "// Declara\u00e7\u00f5es\nint sendbuf[2] = {10, 20};\nint recvbuf[2];\nint sendcount = 1;\nint recvcount = 1;\nMPI_Comm cart_comm;\nint dims[1] = {2}, periods[1] = {1}, reorder = 0;\n\nMPI_Cart_create(MPI_COMM_WORLD, 1, dims, periods, reorder, &cart_comm);\n\n// Troca de dados entre vizinhos\nint err = MPI_Neighbor_alltoall(sendbuf, sendcount, MPI_INT, recvbuf, recvcount, MPI_INT, cart_comm);\n\nif (err == MPI_SUCCESS) {\n    // Troca conclu\u00edda\n}\n\nMPI_Comm_free(&cart_comm);"}, {"name": "MPI_Neighbor_alltoallv", "short_desc": "Variante vetorial de MPI_Neighbor_alltoall que permite enviar/receber diferentes n\u00fameros de elementos para cada vizinho.", "synopsis": "int MPI_Neighbor_alltoallv(const void *sendbuf, const int sendcounts[], const int sdispls[], MPI_Datatype sendtype, void *recvbuf, const int recvcounts[], const int rdispls[], MPI_Datatype recvtype, MPI_Comm comm)", "params": [{"name": "sendbuf", "desc": "Endere\u00e7o inicial do buffer de envio (escolha)."}, {"name": "sendcounts", "desc": "Array de inteiros n\u00e3o negativos especificando o n\u00famero de elementos a enviar para cada vizinho."}, {"name": "sdispls", "desc": "Array de inteiros. A entrada j especifica o deslocamento (relativo a sendbuf) de onde enviar os dados para o vizinho j."}, {"name": "sendtype", "desc": "Tipo de dado dos elementos do buffer de envio (handle)."}, {"name": "recvcounts", "desc": "Array de inteiros n\u00e3o negativos especificando o n\u00famero de elementos recebidos de cada vizinho."}, {"name": "rdispls", "desc": "Array de inteiros. A entrada i especifica o deslocamento (relativo a recvbuf) onde colocar os dados do vizinho i."}, {"name": "recvtype", "desc": "Tipo de dado dos elementos do buffer de recebimento (handle)."}, {"name": "comm", "desc": "Comunicador com estrutura de topologia (handle)."}, {"name": "recvbuf", "desc": "Endere\u00e7o inicial do buffer de recebimento (escolha)."}], "description": "MPI_Neighbor_alltoallv adiciona flexibilidade a MPI_Neighbor_alltoall ao permitir que a quantidade de dados trocada com cada vizinho seja vari\u00e1vel. O usu\u00e1rio especifica arrays de contagens e deslocamentos para os dados enviados e recebidos, permitindo gerenciar buffers n\u00e3o cont\u00edguos ou comunica\u00e7\u00f5es desbalanceadas na vizinhan\u00e7a.", "application": "Utilizado quando a fronteira de dados entre processos vizinhos tem tamanho vari\u00e1vel.", "example": "// Declara\u00e7\u00f5es\nint sendbuf[4] = {1, 2, 3, 4};\nint recvbuf[4];\nint sendcounts[2] = {2, 2};\nint sdispls[2] = {0, 2};\nint recvcounts[2] = {2, 2};\nint rdispls[2] = {0, 2};\nMPI_Comm cart_comm;\nint dims[1] = {2}, periods[1] = {1}, reorder = 0;\n\nMPI_Cart_create(MPI_COMM_WORLD, 1, dims, periods, reorder, &cart_comm);\n\n// Troca vari\u00e1vel entre vizinhos\nint err = MPI_Neighbor_alltoallv(sendbuf, sendcounts, sdispls, MPI_INT, recvbuf, recvcounts, rdispls, MPI_INT, cart_comm);\n\nif (err == MPI_SUCCESS) {\n    // Sucesso na troca vetorial\n}\n\nMPI_Comm_free(&cart_comm);"}, {"name": "MPI_Neighbor_alltoallw", "short_desc": "Similar a MPI_Neighbor_alltoallv, mas permite enviar e receber com diferentes tipos de dados para cada vizinho.", "synopsis": "int MPI_Neighbor_alltoallw(const void *sendbuf, const int sendcounts[], const MPI_Aint sdispls[], const MPI_Datatype sendtypes[], void *recvbuf, const int recvcounts[], const MPI_Aint rdispls[], const MPI_Datatype recvtypes[], MPI_Comm comm)", "params": [{"name": "sendbuf", "desc": "Endere\u00e7o inicial do buffer de envio (escolha)."}, {"name": "sendcounts", "desc": "Array de inteiros n\u00e3o negativos especificando o n\u00famero de elementos a enviar para cada vizinho."}, {"name": "sdispls", "desc": "Array de inteiros. A entrada j especifica o deslocamento em bytes de onde retirar os dados para o vizinho j."}, {"name": "sendtypes", "desc": "Array de tipos de dados para cada vizinho de envio."}, {"name": "recvcounts", "desc": "Array de inteiros n\u00e3o negativos para o n\u00famero de elementos recebidos de cada vizinho."}, {"name": "rdispls", "desc": "Array de inteiros. A entrada i especifica o deslocamento em bytes onde colocar os dados do vizinho i."}, {"name": "recvtypes", "desc": "Array de tipos de dados para cada vizinho de recebimento."}, {"name": "comm", "desc": "Comunicador com estrutura de topologia (handle)."}, {"name": "recvbuf", "desc": "Endere\u00e7o inicial do buffer de recebimento (escolha)."}], "description": "MPI_Neighbor_alltoallw \u00e9 a vers\u00e3o mais generalizada da comunica\u00e7\u00e3o todos-para-todos entre vizinhos. Ela permite que cada par de comunica\u00e7\u00e3o (processo e seu vizinho) utilize tipos de dados diferentes e especifica os deslocamentos em bytes (MPI_Aint), oferecendo controle total sobre o layout da mem\u00f3ria em comunica\u00e7\u00f5es de vizinhan\u00e7a.", "application": "Casos complexos onde buffers de vizinhan\u00e7a possuem estruturas de dados heterog\u00eaneas.", "example": "// Declara\u00e7\u00f5es\nint sendbuf[4] = {1, 2, 3, 4};\nint recvbuf[4];\nint sendcounts[2] = {1, 1};\nint recvcounts[2] = {1, 1};\nMPI_Aint sdispls[2] = {0, 8};\nMPI_Aint rdispls[2] = {0, 8};\nMPI_Datatype sendtypes[2] = {MPI_INT, MPI_INT};\nMPI_Datatype recvtypes[2] = {MPI_INT, MPI_INT};\nMPI_Comm cart_comm;\nint dims[1] = {2}, periods[1] = {1}, reorder = 0;\n\nMPI_Cart_create(MPI_COMM_WORLD, 1, dims, periods, reorder, &cart_comm);\n\n// Troca generalizada (w) entre vizinhos\nint err = MPI_Neighbor_alltoallw(sendbuf, sendcounts, sdispls, sendtypes, recvbuf, recvcounts, rdispls, recvtypes, cart_comm);\n\nif (err == MPI_SUCCESS) {\n    // Sucesso na troca generalizada\n}\n\nMPI_Comm_free(&cart_comm);"}, {"name": "MPI_Op_c2f", "short_desc": "Converte um MPI_Op para um INTEGER do Fortran.", "synopsis": "MPI_Fint MPI_Op_c2f(MPI_Op op)", "params": [{"name": "op", "desc": "Opera\u00e7\u00e3o MPI (handle)."}], "description": "MPI_Op_c2f traduz um handle de opera\u00e7\u00e3o MPI usado em C para um inteiro compat\u00edvel com o Fortran. Isso \u00e9 \u00fatil em aplica\u00e7\u00f5es multil\u00edngues que misturam C e Fortran.", "application": "Interoperabilidade entre C e Fortran para objetos de opera\u00e7\u00e3o.", "example": "// Declara\u00e7\u00f5es\nMPI_Op op = MPI_SUM;\nMPI_Fint op_fortran;\n\n// Converte handle C para Fortran\nop_fortran = MPI_Op_c2f(op);\n\n// MPI_Op_c2f retorna o valor diretamente, verifica\u00e7\u00e3o de erro n\u00e3o se aplica como nas outras\nif (op_fortran != 0) {\n    // Converteu com sucesso\n}"}, {"name": "MPI_Op_commutative", "short_desc": "Consulta se uma opera\u00e7\u00e3o de redu\u00e7\u00e3o MPI \u00e9 comutativa.", "synopsis": "int MPI_Op_commutative(MPI_Op op, int *commute)", "params": [{"name": "op", "desc": "Opera\u00e7\u00e3o (handle)."}, {"name": "commute", "desc": "Retorna verdadeiro se a opera\u00e7\u00e3o for comutativa, falso caso contr\u00e1rio (l\u00f3gico)."}], "description": "MPI_Op_commutative verifica se uma determinada opera\u00e7\u00e3o MPI (predefinida ou criada pelo usu\u00e1rio) possui a propriedade de comutatividade. Opera\u00e7\u00f5es comutativas permitem que o MPI otimize a execu\u00e7\u00e3o de rotinas de redu\u00e7\u00e3o.", "application": "Verifica\u00e7\u00e3o de propriedades de opera\u00e7\u00f5es para otimiza\u00e7\u00e3o ou depura\u00e7\u00e3o.", "example": "// Declara\u00e7\u00f5es\nMPI_Op op = MPI_SUM;\nint commute;\n\n// Verifica se a opera\u00e7\u00e3o MPI_SUM \u00e9 comutativa\nint err = MPI_Op_commutative(op, &commute);\n\nif (err == MPI_SUCCESS && commute) {\n    // A opera\u00e7\u00e3o \u00e9 comutativa\n}"}, {"name": "MPI_Op_create", "short_desc": "Cria um handle para uma fun\u00e7\u00e3o de combina\u00e7\u00e3o definida pelo usu\u00e1rio.", "synopsis": "int MPI_Op_create(MPI_User_function *user_fn, int commute, MPI_Op *op)", "params": [{"name": "user_fn", "desc": "Fun\u00e7\u00e3o definida pelo usu\u00e1rio (fun\u00e7\u00e3o)."}, {"name": "commute", "desc": "Verdadeiro se for comutativa; falso caso contr\u00e1rio (l\u00f3gico)."}, {"name": "op", "desc": "Opera\u00e7\u00e3o resultante (handle)."}], "description": "O MPI_Op_create cria um novo operador de redu\u00e7\u00e3o definido pelo usu\u00e1rio para ser utilizado com fun\u00e7\u00f5es coletivas como MPI_Reduce, MPI_Allreduce, MPI_Reduce_scatter_block, MPI_Reduce_scatter e MPI_Scan. A fun\u00e7\u00e3o fornecida pelo usu\u00e1rio deve ter a assinatura correspondente a MPI_User_function. O par\u00e2metro commute indica se a opera\u00e7\u00e3o \u00e9 comutativa (a ordem de processamento dos operandos n\u00e3o altera o resultado). Opera\u00e7\u00f5es comutativas permitem otimiza\u00e7\u00f5es internas significativas pelo MPI.", "application": "Essencial para aplicar redu\u00e7\u00f5es em estruturas de dados personalizadas (como n\u00fameros complexos customizados, matrizes de rota\u00e7\u00e3o ou estat\u00edsticas acumuladas de forma n\u00e3o trivial) ou para executar opera\u00e7\u00f5es matem\u00e1ticas n\u00e3o suportadas nativamente pelo MPI.", "example": "// Declara\u00e7\u00f5es\n// Fun\u00e7\u00e3o de usu\u00e1rio que soma o quadrado dos elementos: inoutvec[i] += invec[i] * invec[i]\nvoid soma_quadrados(void *invec, void *inoutvec, int *len, MPI_Datatype *datatype) {\n    int *in = (int *)invec;\n    int *inout = (int *)inoutvec;\n    int n = *len;\n    for (int i = 0; i < n; i++) {\n        inout[i] += in[i] * in[i];\n    }\n}\nMPI_Op op;\nint commute = 1; // Soma \u00e9 comutativa\nint send_data[3] = {1, 2, 3};\nint recv_data[3] = {0, 0, 0};\nint err;\n\n// Cria a opera\u00e7\u00e3o de redu\u00e7\u00e3o personalizada\nerr = MPI_Op_create(soma_quadrados, commute, &op);\n\nif (err == MPI_SUCCESS) {\n    // Executa a redu\u00e7\u00e3o utilizando a opera\u00e7\u00e3o customizada\n    err = MPI_Allreduce(send_data, recv_data, 3, MPI_INT, op, MPI_COMM_WORLD);\n    \n    if (err == MPI_SUCCESS) {\n        // recv_data[i] agora cont\u00e9m a soma cumulativa dos quadrados dos elementos de todos os processos\n    }\n    \n    // Libera a opera\u00e7\u00e3o personalizada ap\u00f3s o uso\n    MPI_Op_free(&op);\n}"}, {"name": "MPI_Op_f2c", "short_desc": "Converte um INTEGER do Fortran para um MPI_Op.", "synopsis": "MPI_Op MPI_Op_f2c(MPI_Fint op)", "params": [{"name": "op", "desc": "Opera\u00e7\u00e3o no formato Fortran (inteiro)."}], "description": "MPI_Op_f2c converte um identificador de opera\u00e7\u00e3o do Fortran de volta para o tipo handle MPI_Op usado em C.", "application": "Interoperabilidade entre C e Fortran.", "example": "// Declara\u00e7\u00f5es\nMPI_Fint op_fortran = 1; // Exemplo de handle vindo do Fortran\nMPI_Op op;\n\n// Converte handle Fortran para C\nop = MPI_Op_f2c(op_fortran);\n\nif (op != MPI_OP_NULL) {\n    // Handle convertido\n}"}, {"name": "MPI_Op_free", "short_desc": "Libera um handle de fun\u00e7\u00e3o de combina\u00e7\u00e3o definida pelo usu\u00e1rio.", "synopsis": "int MPI_Op_free(MPI_Op *op)", "params": [{"name": "op", "desc": "Opera\u00e7\u00e3o a ser liberada (handle)."}], "description": "MPI_Op_free marca uma opera\u00e7\u00e3o MPI definida pelo usu\u00e1rio para ser desalocada. O handle \u00e9 definido como MPI_OP_NULL ap\u00f3s a chamada.", "application": "Gerenciamento de recursos para liberar opera\u00e7\u00f5es personalizadas ap\u00f3s o uso.", "example": "// Declara\u00e7\u00f5es\nMPI_Op op;\n// Assumindo que a opera\u00e7\u00e3o foi criada anteriormente\nMPI_Op_create((MPI_User_function*)some_func, 1, &op);\n\n// Libera o recurso\nint err = MPI_Op_free(&op);\n\nif (err == MPI_SUCCESS) {\n    // Opera\u00e7\u00e3o liberada e op agora \u00e9 MPI_OP_NULL\n}"}, {"name": "MPI_Open_port", "short_desc": "Estabelece um endere\u00e7o que pode ser usado para conex\u00f5es entre grupos de processos MPI.", "synopsis": "int MPI_Open_port(MPI_Info info, char *port_name)", "params": [{"name": "info", "desc": "Informa\u00e7\u00f5es espec\u00edficas da implementa\u00e7\u00e3o sobre como estabelecer um endere\u00e7o (handle)."}, {"name": "port_name", "desc": "Nome da porta rec\u00e9m-estabelecida (string)."}], "description": "MPI_Open_port abre uma porta de comunica\u00e7\u00e3o e retorna um nome de porta gerado pelo sistema. Este nome de porta pode ser usado por clientes (via MPI_Comm_connect) para estabelecer uma conex\u00e3o com o servidor. O tamanho m\u00e1ximo da string \u00e9 definido por MPI_MAX_PORT_NAME.", "application": "Modelos cliente-servidor em MPI onde processos dinamicamente estabelecem conex\u00f5es.", "example": "// Declara\u00e7\u00f5es\nMPI_Info info = MPI_INFO_NULL;\nchar port_name[MPI_MAX_PORT_NAME];\n\n// Abre porta para comunica\u00e7\u00e3o client-server\nint err = MPI_Open_port(info, port_name);\n\nif (err == MPI_SUCCESS) {\n    // Porta aberta, agora deve ser fechada futuramente\n    MPI_Close_port(port_name);\n}"}, {"name": "MPI_Pack", "short_desc": "Empacota dados de um tipo de dado em mem\u00f3ria cont\u00edgua.", "synopsis": "int MPI_Pack(const void *inbuf, int incount, MPI_Datatype datatype, void *outbuf, int outsize, int *position, MPI_Comm comm)", "params":
