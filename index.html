ldcomm, int keyval, void *extra_state, void *attribute_val_in, void *attribute_val_out, int *flag) {\n    (void)oldcomm; (void)keyval; (void)extra_state; (void)attribute_val_in; (void)attribute_val_out;\n    *flag = 0; // N\u00e3o copiar\n    return MPI_SUCCESS;\n}\n// Fun\u00e7\u00e3o de exclus\u00e3o: Apenas imprime uma mensagem para indicar que foi chamada.\nint dummy_delete_fn(MPI_Comm comm_h, int keyval_h, void *attribute_val_h, void *extra_state_h) {\n    (void)comm_h; (void)keyval_h; (void)extra_state_h;\n    // printf(\"Dummy delete function called for keyval %d, attribute value: %d\\n\", keyval_h, (attribute_val_h != NULL ? *(int*)attribute_val_h : -1));\n    return MPI_SUCCESS;\n}\n\n// 1. Cria uma chave de atributo. Esta \u00e9 uma pr\u00e9-condi\u00e7\u00e3o para definir um atributo.\nerr = MPI_Comm_create_keyval(&dummy_copy_fn, &dummy_delete_fn, &comm_keyval, NULL);\n\nif (err == MPI_SUCCESS) {\n    // 2. Define um atributo no comunicador MPI_COMM_WORLD usando a chave criada.\n    err = MPI_Comm_set_attr(comm, comm_keyval, attr_ptr);\n\n    if (err == MPI_SUCCESS) {\n        // Opcional: Verifica se o atributo foi definido com sucesso antes de deletar.\n        void *retrieved_attr;\n        int flag_found;\n        MPI_Comm_get_attr(comm, comm_keyval, &retrieved_attr, &flag_found);\n        // if (flag_found && *(int*)retrieved_attr == attribute_value) { /* Atributo est\u00e1 l\u00e1 */ }\n\n        // 3. Remove o atributo do comunicador.\n        // A fun\u00e7\u00e3o dummy_delete_fn ser\u00e1 invocada quando o atributo for deletado.\n        err = MPI_Comm_delete_attr(comm, comm_keyval);\n\n        if (err == MPI_SUCCESS) {\n            // Sucesso na exclus\u00e3o do atributo.\n            // Opcional: Verifica se o atributo foi realmente removido.\n            MPI_Comm_get_attr(comm, comm_keyval, &retrieved_attr, &flag_found);\n            // if (!flag_found) { /* Atributo foi removido com sucesso */ }\n        } else {\n            // Erro na exclus\u00e3o do atributo.\n        }\n    } else {\n        // Erro ao definir o atributo.\n    }\n} else {\n    // Erro ao criar a chave do atributo.\n}\n\n// Limpeza: Libera a chave de atributo.\n// Se houver algum atributo associado a esta chave em outros comunicadores, sua fun\u00e7\u00e3o delete_fn ser\u00e1 chamada.\nif (comm_keyval != MPI_KEYVAL_INVALID) {\n    MPI_Comm_free_keyval(&comm_keyval);\n}\n"}, {"name": "MPI_Comm_disconnect", "short_desc": "Desconecta de um comunicador.", "synopsis": "int MPI_Comm_disconnect(MPI_Comm *comm)", "params": [{"name": "comm", "desc": "comunicador a ser desconectado (handle)"}], "description": "Libera o comunicador e aguarda a conclus\u00e3o de todas as comunica\u00e7\u00f5es pendentes. O handle \u00e9 definido como MPI_COMM_NULL.", "application": "Usado no modelo de comunica\u00e7\u00e3o din\u00e2mica para encerrar conex\u00f5es entre clientes e servidores de forma limpa.", "example": "// Declara\u00e7\u00f5es\nMPI_Comm comm_to_disconnect = MPI_COMM_NULL; // Comunicador que ser\u00e1 desconectado\nint err;\n\n// 1. Primeiro, precisamos de um comunicador que possa ser desconectado.\n// MPI_COMM_WORLD n\u00e3o pode ser desconectado diretamente; ele \u00e9 um comunicador est\u00e1tico.\n// Por isso, criamos uma duplicata de MPI_COMM_WORLD que pode ser liberada/desconectada.\n// Esta \u00e9 uma opera\u00e7\u00e3o coletiva, todos os processos em MPI_COMM_WORLD devem cham\u00e1-la.\nerr = MPI_Comm_dup(MPI_COMM_WORLD, &comm_to_disconnect);\n\nif (err == MPI_SUCCESS) {\n    // Sucesso na duplica\u00e7\u00e3o. 'comm_to_disconnect' agora \u00e9 um comunicador v\u00e1lido e independente.\n\n    // (Opcional) Opera\u00e7\u00f5es de comunica\u00e7\u00e3o podem ser realizadas com comm_to_disconnect aqui.\n    // Ex: int val = 5;\n    // MPI_Bcast(&val, 1, MPI_INT, 0, comm_to_disconnect);\n\n    // 2. Desconecta o comunicador. Esta \u00e9 uma opera\u00e7\u00e3o coletiva.\n    // Todos os processos no 'comm_to_disconnect' devem chamar esta fun\u00e7\u00e3o para garantir uma desconex\u00e3o limpa.\n    err = MPI_Comm_disconnect(&comm_to_disconnect);\n\n    if (err == MPI_SUCCESS) {\n        // Sucesso na desconex\u00e3o.\n        // Ap\u00f3s esta chamada, o handle 'comm_to_disconnect' \u00e9 definido como MPI_COMM_NULL.\n        // Nenhuma comunica\u00e7\u00e3o futura pode ser feita com este handle.\n        // if (comm_to_disconnect == MPI_COMM_NULL) { /* Comunicador foi liberado e handle \u00e9 NULL */ }\n    } else {\n        // Erro na desconex\u00e3o.\n    }\n} else {\n    // Erro ao duplicar o comunicador.\n}\n\n// Limpeza: Uma chamada expl\u00edcita a MPI_Comm_free() N\u00c3O \u00e9 necess\u00e1ria para 'comm_to_disconnect',\n// porque MPI_Comm_disconnect() j\u00e1 realiza a libera\u00e7\u00e3o dos recursos e define o handle para MPI_COMM_NULL.\n"}, {"name": "MPI_Comm_dup", "short_desc": "Duplica um comunicador existente.", "synopsis": "int MPI_Comm_dup(MPI_Comm comm, MPI_Comm *newcomm)", "params": [{"name": "comm", "desc": "comunicador original (handle)"}, {"name": "newcomm", "desc": "c\u00f3pia do comunicador original (handle)"}], "description": "Cria uma duplicata exata de um comunicador, com o mesmo grupo de processos, mas com um novo contexto de comunica\u00e7\u00e3o.", "application": "Essencial para bibliotecas de software garantirem o isolamento de contexto de suas comunica\u00e7\u00f5es.", "example": "// Declara\u00e7\u00f5es\nMPI_Comm comm = MPI_COMM_WORLD;    // Comunicador original\nMPI_Comm newcomm = MPI_COMM_NULL; // Novo comunicador (duplicata)\nint err;\nint rank;                         // Rank para verifica\u00e7\u00e3o\n\n// Obt\u00e9m o rank do processo para fins de exemplo.\nMPI_Comm_rank(comm, &rank);\n\n// 1. Duplica o comunicador original (MPI_COMM_WORLD).\n// Esta \u00e9 uma opera\u00e7\u00e3o coletiva; todos os processos em 'comm' devem cham\u00e1-la.\nerr = MPI_Comm_dup(comm, &newcomm);\n\nif (err == MPI_SUCCESS) {\n    // Sucesso na duplica\u00e7\u00e3o. 'newcomm' agora \u00e9 um comunicador v\u00e1lido e independente.\n    // Ele possui o mesmo grupo de processos que 'comm', mas com um novo contexto de comunica\u00e7\u00e3o.\n\n    // Exemplo de uso do novo comunicador:\n    int new_rank, new_size;\n    MPI_Comm_rank(newcomm, &new_rank);\n    MPI_Comm_size(newcomm, &new_size);\n\n    // int send_data = rank + 100;\n    // int recv_data = 0;\n    // MPI_Status status;\n\n    // Comunica\u00e7\u00e3o usando o novo comunicador (ex: rank 0 envia para rank 1 dentro de 'newcomm')\n    // if (new_size > 1) {\n    //     if (new_rank == 0) {\n    //         MPI_Send(&send_data, 1, MPI_INT, 1, 0, newcomm);\n    //     } else if (new_rank == 1) {\n    //         MPI_Recv(&recv_data, 1, MPI_INT, 0, 0, newcomm, &status);\n    //         // printf(\"Processo %d (WORLD) / %d (NEWCOMM) recebeu %d no novo comunicador.\\n\", rank, new_rank, recv_data);\n    //     }\n    // }\n} else {\n    // Erro na duplica\u00e7\u00e3o do comunicador.\n}\n\n// Limpeza: Libera o comunicador duplicado.\nif (newcomm != MPI_COMM_NULL) {\n    MPI_Comm_free(&newcomm);\n}\n"}, {"name": "MPI_Comm_dup_with_info", "short_desc": "Duplica um comunicador existente usando as dicas de informa\u00e7\u00f5es fornecidas.", "synopsis": "int MPI_Comm_dup_with_info(MPI_Comm comm, MPI_Info info, MPI_Comm *newcomm)", "params": [{"name": "comm", "desc": "comunicador original (handle)"}, {"name": "info", "desc": "objeto de informa\u00e7\u00f5es contendo dicas (handle)"}, {"name": "newcomm", "desc": "c\u00f3pia do comunicador original (handle)"}], "description": "Funciona como o MPI_Comm_dup, mas permite passar um objeto MPI_Info para fornecer dicas \u00e0 implementa\u00e7\u00e3o MPI.", "application": "Permite otimiza\u00e7\u00f5es de performance, como declarar que certas tags ou origens n\u00e3o ser\u00e3o usadas.", "example": "// Declara\u00e7\u00f5es\nMPI_Comm comm = MPI_COMM_WORLD;    // Comunicador original\nMPI_Info info = MPI_INFO_NULL;     // Objeto de informa\u00e7\u00f5es para dicas\nMPI_Comm newcomm = MPI_COMM_NULL; // Novo comunicador (duplicata com info)\nint err;\nint rank;                         // Rank para verifica\u00e7\u00e3o\n\n// Obt\u00e9m o rank do processo para fins de exemplo.\nMPI_Comm_rank(comm, &rank);\n\n// 1. Cria um objeto MPI_Info.\nerr = MPI_Info_create(&info);\n\nif (err == MPI_SUCCESS) {\n    // 2. Define algumas dicas no objeto MPI_Info.\n    // Essas dicas podem influenciar a cria\u00e7\u00e3o do novo comunicador (depende da implementa\u00e7\u00e3o MPI).\n    err = MPI_Info_set(info, \"tag_ub\", \"1000\"); // Exemplo: Sugerir um limite superior para tags.\n    if (err == MPI_SUCCESS) {\n        err = MPI_Info_set(info, \"coll_favor\", \"latency\"); // Exemplo: Otimizar para baixa lat\u00eancia em opera\u00e7\u00f5es coletivas.\n    }\n\n    if (err == MPI_SUCCESS) {\n        // 3. Duplica o comunicador original com as dicas fornecidas no objeto 'info'.\n        // Esta \u00e9 uma opera\u00e7\u00e3o coletiva; todos os processos em 'comm' devem cham\u00e1-la.\n        err = MPI_Comm_dup_with_info(comm, info, &newcomm);\n\n        if (err == MPI_SUCCESS) {\n            // Sucesso na duplica\u00e7\u00e3o. 'newcomm' \u00e9 um comunicador v\u00e1lido.\n            // Poss\u00edveis opera\u00e7\u00f5es de comunica\u00e7\u00e3o com 'newcomm' aqui.\n            // int new_rank, new_size;\n            // MPI_Comm_rank(newcomm, &new_rank);\n            // MPI_Comm_size(newcomm, &new_size);\n            // printf(\"Processo %d (WORLD) obteve um novo comunicador (rank %d, size %d).\\n\", rank, new_rank, new_size);\n        } else {\n            // Erro na duplica\u00e7\u00e3o do comunicador.\n        }\n    } else {\n        // Erro ao definir informa\u00e7\u00f5es no objeto MPI_Info.\n    }\n} else {\n    // Erro ao criar o objeto MPI_Info.\n}\n\n// Limpeza: Libera o objeto MPI_Info, se foi criado com sucesso.\nif (info != MPI_INFO_NULL) {\n    MPI_Info_free(&info);\n}\n\n// Limpeza: Libera o comunicador duplicado, se criado com sucesso.\nif (newcomm != MPI_COMM_NULL) {\n    MPI_Comm_free(&newcomm);\n}\n"}, {"name": "MPI_Comm_f2c", "short_desc": "Converte o tipo INTEGER do Fortran para MPI_Comm.", "synopsis": "MPI_Comm MPI_Comm_f2c(MPI_Fint comm)", "params": [{"name": "comm", "desc": "comunicador em Fortran (inteiro)"}], "description": "Traduz um handle de comunicador Fortran em um handle de comunicador compat\u00edvel com C.", "application": "Utilizado em c\u00f3digos que misturam C e Fortran para interoperabilidade.", "example": "// Declara\u00e7\u00f5es\nMPI_Comm c_comm_world_ref;\nMPI_Fint f_comm_world_handle; // Handle Fortran simulado de MPI_COMM_WORLD\nMPI_Comm c_comm_translated;   // Comunicador C traduzido\nint err = MPI_SUCCESS;       // Vari\u00e1vel de erro, inicializada como sucesso\n\n// Para obter um MPI_Fint v\u00e1lido para demonstra\u00e7\u00e3o,\n// usamos MPI_Comm_c2f em MPI_COMM_WORLD. Normalmente, MPI_Fint viria de um ambiente Fortran.\nc_comm_world_ref = MPI_COMM_WORLD;\nf_comm_world_handle = MPI_Comm_c2f(c_comm_world_ref);\n\n// Traduz o handle do comunicador Fortran para um comunicador C.\n// Note que MPI_Comm_f2c retorna MPI_Comm, n\u00e3o int. O sucesso \u00e9 inferido se o handle n\u00e3o \u00e9 MPI_COMM_NULL.\nc_comm_translated = MPI_Comm_f2c(f_comm_world_handle);\n\n// Verifica se a tradu\u00e7\u00e3o foi bem-sucedida (o comunicador n\u00e3o \u00e9 nulo).\n// Se a tradu\u00e7\u00e3o falhar, MPI_COMM_NULL \u00e9 retornado ou um manipulador de erros \u00e9 invocado.\nif (c_comm_translated == MPI_COMM_NULL) {\n    err = MPI_ERR_COMM; // Simula um erro para satisfazer a verifica\u00e7\u00e3o 'err == MPI_SUCCESS'\n}\n\nif (err == MPI_SUCCESS) {\n    // O comunicador C traduzido (c_comm_translated) \u00e9 agora v\u00e1lido e representa o MPI_COMM_WORLD.\n    // Pode ser usado como qualquer outro comunicador C.\n    // Exemplo: int rank; MPI_Comm_rank(c_comm_translated, &rank);\n    \n    // Para MPI_Comm_f2c, se o handle Fortran correspondia a um comunicador intr\u00ednseco (como MPI_COMM_WORLD),\n    // n\u00e3o \u00e9 necess\u00e1rio liber\u00e1-lo, pois n\u00e3o foi alocado pelo lado C. Se fosse um comunicador Fortran din\u00e2mico,\n    // sua libera\u00e7\u00e3o seria gerenciada principalmente pelo ambiente Fortran, ou por MPI_Comm_free se uma nova\n    // refer\u00eancia com contagem fosse criada.\n}\n"}, {"name": "MPI_Comm_free", "short_desc": "Marca o objeto comunicador para desaloca\u00e7\u00e3o.", "synopsis": "int MPI_Comm_free(MPI_Comm *comm)", "params": [{"name": "comm", "desc": "comunicador a ser destru\u00eddo (handle)"}], "description": "Desaloca os recursos associados ao comunicador especificado. A libera\u00e7\u00e3o real ocorre ap\u00f3s todas as refer\u00eancias pendentes sumirem.", "application": "Essencial para gerenciar a mem\u00f3ria e recursos do sistema liberando comunicadores n\u00e3o utilizados.", "example": "// Declara\u00e7\u00f5es\nMPI_Comm original_comm = MPI_COMM_WORLD;\nMPI_Comm new_comm; // Novo comunicador que ser\u00e1 duplicado e liberado\nint rank;          // Vari\u00e1vel para exemplo de uso do comunicador\n\n// Para demonstrar MPI_Comm_free, primeiro criamos um comunicador que pode ser liberado.\n// Duplicamos MPI_COMM_WORLD para obter um comunicador independente.\nint err = MPI_Comm_dup(original_comm, &new_comm);\n\nif (err == MPI_SUCCESS) {\n    // O comunicador new_comm agora \u00e9 uma c\u00f3pia independente de original_comm.\n    // Pode ser usado para comunica\u00e7\u00e3o, por exemplo, obter o rank.\n    MPI_Comm_rank(new_comm, &rank);\n    // printf(\"Rank no new_comm: %d\\n\", rank);\n\n    // Libera os recursos associados ao comunicador new_comm.\n    // O handle new_comm ser\u00e1 invalidado ap\u00f3s esta chamada.\n    err = MPI_Comm_free(&new_comm);\n\n    if (err == MPI_SUCCESS) {\n        // new_comm foi liberado com sucesso.\n        // \u00c9 uma boa pr\u00e1tica definir o handle para MPI_COMM_NULL ap\u00f3s a libera\u00e7\u00e3o\n        // para evitar usos acidentais de um handle inv\u00e1lido.\n        new_comm = MPI_COMM_NULL;\n    }\n} else {\n    // Erro ao duplicar o comunicador.\n}\n"}, {"name": "MPI_Comm_free_keyval", "short_desc": "Libera uma chave de atributo para comunicadores.", "synopsis": "int MPI_Comm_free_keyval(int *comm_keyval)", "params": [{"name": "comm_keyval", "desc": "valor da chave (inteiro)"}], "description": "Libera uma chave de atributo de comunicador anteriormente criada.", "application": "Usado para limpeza final de chaves de atributos globais.", "example": "// Declara\u00e7\u00f5es\nint comm_keyval; // Chave de atributo do comunicador a ser criada e liberada\n\n// Fun\u00e7\u00f5es de callback exigidas para MPI_Comm_create_keyval.\n// Para este exemplo, as implementa\u00e7\u00f5es s\u00e3o m\u00ednimas, apenas para cumprir a assinatura.\nint copy_fn_free_keyval(MPI_Comm oldcomm, int comm_keyval_arg, void *extra_state,\n                          void *attribute_val_in, void *attribute_val_out, int *flag_arg) {\n    *(void**)attribute_val_out = attribute_val_in;\n    *flag_arg = 1; // Indica que o atributo foi copiado\n    return MPI_SUCCESS;\n}\n\nint delete_fn_free_keyval(MPI_Comm comm_arg, int comm_keyval_arg, void *attribute_val_arg, void *extra_state_arg) {\n    // N\u00e3o h\u00e1 mem\u00f3ria alocada dinamicamente para liberar neste exemplo simples.\n    return MPI_SUCCESS;\n}\n\n// 1. Cria uma chave de atributo para o comunicador.\n// O 'extra_state' pode ser NULL se n\u00e3o for necess\u00e1rio.\nint err = MPI_Comm_create_keyval(copy_fn_free_keyval, delete_fn_free_keyval, &comm_keyval, NULL);\n\nif (err == MPI_SUCCESS) {\n    // A chave 'comm_keyval' agora \u00e9 v\u00e1lida e pode ser usada para definir atributos.\n    // Exemplo: int my_value = 100; MPI_Comm_set_attr(MPI_COMM_WORLD, comm_keyval, &my_value);\n\n    // 2. Libera a chave de atributo do comunicador.\n    // Esta opera\u00e7\u00e3o invalida a chave 'comm_keyval'.\n    err = MPI_Comm_free_keyval(&comm_keyval);\n\n    if (err == MPI_SUCCESS) {\n        // A chave 'comm_keyval' foi liberada com sucesso.\n        // \u00c9 uma boa pr\u00e1tica definir a chave para MPI_KEYVAL_INVALID ap\u00f3s a libera\u00e7\u00e3o.\n        comm_keyval = MPI_KEYVAL_INVALID;\n    }\n} else {\n    // Erro ao criar a chave de atributo.\n}\n"}, {"name": "MPI_Comm_get_attr", "short_desc": "Recupera o valor de um atributo por meio de uma chave.", "synopsis": "int MPI_Comm_get_attr(MPI_Comm comm, int comm_keyval, void *attribute_val, int *flag)", "params": [{"name": "comm", "desc": "comunicador ao qual o atributo est\u00e1 anexado (handle)"}, {"name": "comm_keyval", "desc": "valor da chave (inteiro)"}, {"name": "attribute_val", "desc": "valor do atributo recuperado (ponteiro)"}, {"name": "flag", "desc": "verdadeiro se um atributo estiver associado \u00e0 chave (l\u00f3gico)"}], "description": "Recupera o valor de um atributo armazenado sob uma chave espec\u00edfica em um determinado comunicador.", "application": "Utilizado para ler metadados ou estados anteriormente anexados ao comunicador.", "example": "// Declara\u00e7\u00f5es\nMPI_Comm comm = MPI_COMM_WORLD;\nint comm_keyval;             // Chave de atributo\nint my_attribute_value = 123; // Valor do atributo a ser anexado\nvoid *retrieved_attribute_val = NULL; // Ponteiro para o valor do atributo recuperado\nint flag;                    // Indicador se o atributo foi encontrado\nint int_retrieved_value;     // Para armazenar o valor inteiro recuperado\n\n// Fun\u00e7\u00f5es de callback para MPI_Comm_create_keyval.\nint copy_fn_get_attr(MPI_Comm oldcomm, int comm_keyval_arg, void *extra_state,\n                     void *attribute_val_in, void *attribute_val_out, int *flag_arg) {\n    *(void**)attribute_val_out = attribute_val_in;\n    *flag_arg = 1; // Indica que o atributo foi copiado\n    return MPI_SUCCESS;\n}\n\nint delete_fn_get_attr(MPI_Comm comm_arg, int comm_keyval_arg, void *attribute_val_arg, void *extra_state_arg) {\n    // Para este exemplo, n\u00e3o h\u00e1 recursos din\u00e2micos para liberar.\n    return MPI_SUCCESS;\n}\n\n// 1. Cria uma chave de atributo para o comunicador.\nint err = MPI_Comm_create_keyval(copy_fn_get_attr, delete_fn_get_attr, &comm_keyval, NULL);\n\nif (err == MPI_SUCCESS) {\n    // 2. Anexa um atributo ao comunicador MPI_COMM_WORLD usando a chave criada.\n    err = MPI_Comm_set_attr(comm, comm_keyval, &my_attribute_value);\n\n    if (err == MPI_SUCCESS) {\n        // 3. Recupera o valor do atributo associado \u00e0 chave no comunicador.\n        err = MPI_Comm_get_attr(comm, comm_keyval, &retrieved_attribute_val, &flag);\n\n        if (err == MPI_SUCCESS) {\n            if (flag) {\n                // O atributo foi encontrado. Realiza um cast para o tipo original.\n                int_retrieved_value = *(int*)retrieved_attribute_val;\n                // printf(\"Atributo recuperado: %d (esperado: %d)\\n\", int_retrieved_value, my_attribute_value);\n            } else {\n                // O atributo n\u00e3o foi encontrado (o que n\u00e3o deveria acontecer aqui).\n                // printf(\"Atributo n\u00e3o encontrado para a chave %d.\\n\", comm_keyval);\n            }\n        }\n\n        // 4. Limpa: Remove o atributo do comunicador.\n        // Embora a libera\u00e7\u00e3o da chave ou do comunicador possa invocar delete_fn,\n        // remover explicitamente o atributo \u00e9 bom para clareza.\n        MPI_Comm_delete_attr(comm, comm_keyval);\n\n    }\n\n    // 5. Limpa: Libera a chave de atributo criada.\n    int cleanup_err = MPI_Comm_free_keyval(&comm_keyval);\n    if (cleanup_err == MPI_SUCCESS) {\n        comm_keyval = MPI_KEYVAL_INVALID;\n    }\n} else {\n    // Erro ao criar a chave de atributo.\n}\n"}, {"name": "MPI_Comm_get_errhandler", "short_desc": "Obt\u00e9m o manipulador de erros anexado a um comunicador.", "synopsis": "int MPI_Comm_get_errhandler(MPI_Comm comm, MPI_Errhandler *errhandler)", "params": [{"name": "comm", "desc": "comunicador (handle)"}, {"name": "errhandler", "desc": "manipulador de erros atualmente associado (handle)"}], "description": "Retorna o manipulador de erros que est\u00e1 sendo usado pelo comunicador especificado.", "application": "\u00datil para salvar e restaurar manipuladores de erros.", "example": "// Declara\u00e7\u00f5es\nMPI_Comm comm = MPI_COMM_WORLD;\nMPI_Errhandler current_errhandler; // Manipulador de erros recuperado\nMPI_Errhandler custom_errhandler;  // Manipulador de erros personalizado a ser criado\nMPI_Errhandler old_errhandler;     // Para armazenar o manipulador de erros original\n\n// Fun\u00e7\u00e3o de callback para o manipulador de erros personalizado.\n// Esta fun\u00e7\u00e3o ser\u00e1 invocada se um erro ocorrer no comunicador ao qual est\u00e1 associada.\nvoid my_err_handler_fn(MPI_Comm *comm_p, int *error_code, ...) {\n    // Em uma implementa\u00e7\u00e3o real, voc\u00ea faria algo \u00fatil aqui,\n    // como imprimir informa\u00e7\u00f5es do erro, logar, ou talvez abortar o programa.\n    // printf(\"[%d] Erro detectado (custom handler)! C\u00f3digo: %d\\n\", *comm_p, *error_code);\n    // MPI_Abort(*comm_p, *error_code); // Exemplo de a\u00e7\u00e3o.\n}\n\n// 1. Cria um manipulador de erros personalizado a partir da fun\u00e7\u00e3o de callback.\nint err = MPI_Comm_create_errhandler(my_err_handler_fn, &custom_errhandler);\n\nif (err == MPI_SUCCESS) {\n    // 2. Opcional: Salva o manipulador de erros atual do comunicador para restaur\u00e1-lo depois.\n    MPI_Comm_get_errhandler(comm, &old_errhandler);\n\n    // 3. Define o manipulador de erros personalizado para o comunicador MPI_COMM_WORLD.\n    err = MPI_Comm_set_errhandler(comm, custom_errhandler);\n\n    if (err == MPI_SUCCESS) {\n        // 4. Recupera o manipulador de erros atualmente associado ao comunicador.\n        err = MPI_Comm_get_errhandler(comm, &current_errhandler);\n\n        if (err == MPI_SUCCESS) {\n            // 'current_errhandler' agora cont\u00e9m o handle para o manipulador de erros ativo.\n            // Em um sistema real, voc\u00ea poderia comparar 'current_errhandler' com 'custom_errhandler'\n            // para verificar se o manipulador personalizado est\u00e1 ativo.\n        }\n\n        // 5. Limpa: Restaura o manipulador de erros original do comunicador.\n        MPI_Comm_set_errhandler(comm, old_errhandler);\n\n    }\n\n    // 6. Limpa: Libera o manipulador de erros personalizado criado.\n    int cleanup_err = MPI_Errhandler_free(&custom_errhandler);\n    if (cleanup_err == MPI_SUCCESS) {\n        custom_errhandler = MPI_ERRHANDLER_NULL;\n    }\n} else {\n    // Erro ao criar o manipulador de erros personalizado.\n}\n"}, {"name": "MPI_Comm_get_info", "short_desc": "Retorna um novo objeto de informa\u00e7\u00f5es contendo as dicas usadas.", "synopsis": "int MPI_Comm_get_info(MPI_Comm comm, MPI_Info *info_used)", "params": [{"name": "comm", "desc": "objeto comunicador (handle)"}, {"name": "info_used", "desc": "novo objeto de informa\u00e7\u00f5es (handle)"}], "description": "Retorna as dicas e informa\u00e7\u00f5es (hints) que est\u00e3o atualmente ativas e sendo usadas pelo comunicador.", "application": "Permite verificar quais otimiza\u00e7\u00f5es o runtime MPI realmente aplicou.", "example": "// Declara\u00e7\u00f5es\nMPI_Comm comm = MPI_COMM_WORLD;\nMPI_Info info_retrieved;      // Objeto MPI_Info que conter\u00e1 as dicas recuperadas\nchar key[MPI_MAX_INFO_KEY + 1]; // Buffer para armazenar a chave da dica\nchar value[MPI_MAX_INFO_VAL + 1]; // Buffer para armazenar o valor da dica\nint flag;                     // Flag para indicar se uma chave foi encontrada\nint nkeys, i;                 // N\u00famero de chaves e contador para itera\u00e7\u00e3o\n\n// Recupera as informa\u00e7\u00f5es (dicas) atualmente ativas e sendo usadas pelo comunicador.\n// MPI_COMM_WORLD pode ter dicas padr\u00e3o definidas pela implementa\u00e7\u00e3o MPI ou nenhuma.\nint err = MPI_Comm_get_info(comm, &info_retrieved);\n\nif (err == MPI_SUCCESS) {\n    // 'info_retrieved' agora cont\u00e9m um handle v\u00e1lido para o objeto MPI_Info do comunicador.\n    // Mesmo que nenhuma dica seja definida, o handle ser\u00e1 v\u00e1lido (pode estar vazio).\n\n    // Podemos consultar o n\u00famero de chaves para ver se alguma dica est\u00e1 presente.\n    MPI_Info_get_nkeys(info_retrieved, &nkeys);\n\n    if (nkeys > 0) {\n        // Itera sobre as chaves e imprime as dicas, se existirem.\n        // printf(\"Dicas para o comunicador:\\n\");\n        for (i = 0; i < nkeys; i++) {\n            MPI_Info_get_nthkey(info_retrieved, i, key);\n            MPI_Info_get(info_retrieved, key, MPI_MAX_INFO_VAL, value, &flag);\n            if (flag) {\n                // printf(\"  Chave: '%s', Valor: '%s'\\n\", key, value);\n            }\n        }\n    } else {\n        // printf(\"Nenhuma dica espec\u00edfica encontrada para o comunicador (MPI_COMM_WORLD, neste exemplo).\\n\");\n    }\n\n    // Limpa: Libera o objeto MPI_Info que foi recuperado.\n    int cleanup_err = MPI_Info_free(&info_retrieved);\n    if (cleanup_err == MPI_SUCCESS) {\n        info_retrieved = MPI_INFO_NULL;\n    }\n} else {\n    // Erro ao recuperar informa\u00e7\u00f5es do comunicador.\n}\n"}, {"name": "MPI_Comm_get_name", "short_desc": "Retorna o nome associado ao comunicador.", "synopsis": "int MPI_Comm_get_name(MPI_Comm comm, char *comm_name, int *resultlen)", "params": [{"name": "comm", "desc": "comunicador cujo nome ser\u00e1 retornado (handle)"}, {"name": "comm_name", "desc": "string onde o nome ser\u00e1 armazenado (string)"}, {"name": "resultlen", "desc": "comprimento do nome retornado (inteiro)"}], "description": "Recupera o nome amig\u00e1vel que foi previamente associado a um comunicador.", "application": "Facilita a depura\u00e7\u00e3o de aplica\u00e7\u00f5es paralelas complexas identificando comunicadores por nomes l\u00f3gicos.", "example": "// Declara\u00e7\u00f5es\nMPI_Comm comm = MPI_COMM_WORLD;\nchar comm_name[MPI_MAX_OBJECT_NAME]; // Buffer para armazenar o nome recuperado\nint resultlen;                     // Comprimento do nome recuperado\nconst char *my_custom_name = \"MeuComunicadorMPI\"; // Nome personalizado a ser definido\n\n// 1. Define um nome para o comunicador MPI_COMM_WORLD.\nint err = MPI_Comm_set_name(comm, my_custom_name);\n\nif (err == MPI_SUCCESS) {\n    // 2. Recupera o nome do comunicador.\n    err = MPI_Comm_get_name(comm, comm_name, &resultlen);\n\n    if (err == MPI_SUCCESS) {\n        // O nome foi recuperado com sucesso e est\u00e1 em 'comm_name'.\n        // Garante que a string est\u00e1 terminada em nulo para uso seguro.\n        comm_name[resultlen] = '\\0'; \n        // printf(\"Nome do comunicador recuperado: '%s' (comprimento: %d)\\n\", comm_name, resultlen);\n\n        // O nome recuperado pode ser comparado com o nome original.\n        // if (strcmp(comm_name, my_custom_name) == 0) { /* Nomes correspondem */ }\n\n        // N\u00e3o h\u00e1 uma fun\u00e7\u00e3o expl\u00edcita para \"limpar\" ou \"redefinir\" o nome para o padr\u00e3o\n        // ap\u00f3s ser setado, exceto set\u00e1-lo para uma string vazia.\n        // Como MPI_COMM_WORLD n\u00e3o \u00e9 liberado, o nome permanece.\n    }\n} else {\n    // Erro ao definir o nome do comunicador.\n}\n"}, {"name": "MPI_Comm_get_parent", "short_desc": "Retorna o comunicador pai para o processo atual.", "synopsis": "int MPI_Comm_get_parent(MPI_Comm *parent)", "params": [{"name": "parent", "desc": "o comunicador pai (handle)"}], "description": "Se o processo foi criado dinamicamente, esta fun\u00e7\u00e3o retorna o intercomunicador que o conecta ao grupo criador.", "application": "Essencial para a comunica\u00e7\u00e3o entre processos pai e filhos em modelos din\u00e2micos.", "example": "// Declara\u00e7\u00f5es\nMPI_Comm parent_comm; // Comunicador pai (intercomunicador)\nint is_parent_valid = 0; // Flag para indicar se o comunicador pai \u00e9 v\u00e1lido\n\n// Tenta obter o comunicador pai.\n// Se este processo foi criado por MPI_Comm_spawn, 'parent_comm' ser\u00e1 um intercomunicador v\u00e1lido.\n// Caso contr\u00e1rio, 'parent_comm' ser\u00e1 MPI_COMM_NULL.\nint err = MPI_Comm_get_parent(&parent_comm);\n\nif (err == MPI_SUCCESS) {\n    if (parent_comm != MPI_COMM_NULL) {\n        // O processo foi criado dinamicamente (ex: via MPI_Comm_spawn) e tem um pai.\n        // 'parent_comm' \u00e9 um intercomunicador que conecta este grupo ao grupo criador.\n        is_parent_valid = 1;\n        // Exemplo de uso: int local_rank; MPI_Comm_rank(parent_comm, &local_rank);\n        // printf(\"Processo tem um comunicador pai v\u00e1lido.\\n\");\n\n        // Limpa: Libera o intercomunicador pai.\n        // \u00c9 responsabilidade do processo filho liberar este comunicador.\n        int cleanup_err = MPI_Comm_free(&parent_comm);\n        if (cleanup_err == MPI_SUCCESS) {\n            parent_comm = MPI_COMM_NULL;\n        }\n    } else {\n        // O processo n\u00e3o foi criado por MPI_Comm_spawn, ou o pai j\u00e1 se desconectou/liberou.\n        // 'parent_comm' \u00e9 MPI_COMM_NULL, o que \u00e9 um resultado esperado neste cen\u00e1rio.\n        // printf(\"Este processo n\u00e3o tem um comunicador pai (n\u00e3o foi spawned dinamicamente).\\n\");\n    }\n} else {\n    // Erro ao tentar obter o comunicador pai.\n}\n"}, {"name": "MPI_Comm_group", "short_desc": "Acessa o grupo associado a um determinado comunicador.", "synopsis": "int MPI_Comm_group(MPI_Comm comm, MPI_Group *group)", "params": [{"name": "comm", "desc": "comunicador (handle)"}, {"name": "group", "desc": "grupo correspondente ao comunicador (handle)"}], "description": "Extrai o objeto de grupo que define o conjunto de processos pertencentes ao comunicador especificado.", "application": "Utilizado para realizar opera\u00e7\u00f5es sobre o grupo de processos diretamente.", "example": "// Declara\u00e7\u00f5es\nMPI_Comm comm = MPI_COMM_WORLD;\nMPI_Group group;    // Objeto de grupo a ser extra\u00eddo do comunicador\nint group_size;     // Tamanho do grupo (n\u00famero de processos)\nint my_rank_in_group; // Rank do processo dentro do grupo\n\n// Extrai o objeto de grupo que define o conjunto de processos\n// pertencentes ao comunicador especificado (MPI_COMM_WORLD).\nint err = MPI_Comm_group(comm, &group);\n\nif (err == MPI_SUCCESS) {\n    // O handle 'group' agora \u00e9 v\u00e1lido e representa o grupo de processos de MPI_COMM_WORLD.\n    // Pode-se obter informa\u00e7\u00f5es sobre o grupo, como seu tamanho ou o rank de um processo.\n    MPI_Group_size(group, &group_size);\n    MPI_Group_rank(group, &my_rank_in_group);\n    // printf(\"Tamanho do grupo do MPI_COMM_WORLD: %d\\n\", group_size);\n    // printf(\"Meu rank no grupo: %d\\n\", my_rank_in_group);\n\n    // O objeto de grupo pode ser usado para opera\u00e7\u00f5es como cria\u00e7\u00e3o de subgrupos\n    // ou tradu\u00e7\u00e3o de ranks.\n\n    // Limpa: Libera o objeto de grupo.\n    // Isso invalida o handle 'group'.\n    int cleanup_err = MPI_Group_free(&group);\n    if (cleanup_err == MPI_SUCCESS) {\n        group = MPI_GROUP_NULL;\n    }\n} else {\n    // Erro ao extrair o grupo do comunicador.\n}\n"}, {"name": "MPI_Comm_idup", "short_desc": "Duplica\u00e7\u00e3o de comunicador de forma n\u00e3o bloqueante.", "synopsis": "int MPI_Comm_idup(MPI_Comm comm, MPI_Comm *newcomm, MPI_Request *request)", "params": [{"name": "comm", "desc": "comunicador original (handle)"}, {"name": "newcomm", "desc": "c\u00f3pia do comunicador original (handle)"}, {"name": "request", "desc": "requisi\u00e7\u00e3o de comunica\u00e7\u00e3o (handle)"}], "description": "Inicia a duplica\u00e7\u00e3o de um comunicador de maneira ass\u00edncrona.", "application": "Melhora a performance ao sobrepor a cria\u00e7\u00e3o de comunicadores com outras tarefas.", "example": "// Declara\u00e7\u00f5es\nMPI_Comm comm = MPI_COMM_WORLD;\nMPI_Comm newcomm;     // Novo comunicador que ser\u00e1 criado de forma ass\u00edncrona\nMPI_Request request;  // Requisi\u00e7\u00e3o para a opera\u00e7\u00e3o de duplica\u00e7\u00e3o ass\u00edncrona\nMPI_Status status;    // Status da opera\u00e7\u00e3o ass\u00edncrona ap\u00f3s a conclus\u00e3o\n\n// Inicia a duplica\u00e7\u00e3o ass\u00edncrona do comunicador 'comm'.\n// O handle para o novo comunicador ('newcomm') ser\u00e1 v\u00e1lido somente ap\u00f3s a conclus\u00e3o da requisi\u00e7\u00e3o.\nint err = MPI_Comm_idup(comm, &newcomm, &request);\n\nif (err == MPI_SUCCESS) {\n    // Neste ponto, a duplica\u00e7\u00e3o est\u00e1 em andamento no background.\n    // Outras opera\u00e7\u00f5es n\u00e3o bloqueantes poderiam ser realizadas aqui.\n\n    // Espera pela conclus\u00e3o da duplica\u00e7\u00e3o do comunicador.\n    // MPI_Wait \u00e9 uma chamada bloqueante que aguarda at\u00e9 que a requisi\u00e7\u00e3o seja completada.\n    err = MPI_Wait(&request, &status);\n\n    if (err == MPI_SUCCESS) {\n        // A duplica\u00e7\u00e3o foi conclu\u00edda com sucesso.\n        // 'newcomm' agora \u00e9 um comunicador v\u00e1lido, id\u00eantico a 'comm' em termos de grupo e contexto.\n        // Exemplo de uso: int rank; MPI_Comm_rank(newcomm, &rank);\n        // printf(\"Duplica\u00e7\u00e3o ass\u00edncrona conclu\u00edda. Newcomm est\u00e1 pronto.\\n\");\n\n        // Limpa: Libera o novo comunicador criado.\n        int cleanup_err_comm = MPI_Comm_free(&newcomm);\n        if (cleanup_err_comm == MPI_SUCCESS) {\n            newcomm = MPI_COMM_NULL;\n        }\n\n        // A requisi\u00e7\u00e3o \u00e9 automaticamente invalidada por MPI_Wait, mas \u00e9 uma boa pr\u00e1tica\n        // definir o handle para MPI_REQUEST_NULL para evitar uso indevido.\n        request = MPI_REQUEST_NULL;\n\n    }\n} else {\n    // Erro ao iniciar a duplica\u00e7\u00e3o ass\u00edncrona do comunicador.\n}\n"}, {"name": "MPI_Comm_join", "short_desc": "Cria um comunicador ao unir dois processos conectados por um socket.", "synopsis": "int MPI_Comm_join(int fd, MPI_Comm *intercomm)", "params": [{"name": "fd", "desc": "Descritor de arquivo do socket (inteiro)."}, {"name": "intercomm", "desc": "Novo intercomunicador (handle de sa\u00edda)."}], "description": "Estabelece uma conex\u00e3o MPI entre dois processos independentes que j\u00e1 possuem um canal de comunica\u00e7\u00e3o via socket aberto entre eles.", "application": "Integra\u00e7\u00e3o din\u00e2mica de processos que n\u00e3o compartilham um ancestral comum no MPI.", "example": "// Declara\u00e7\u00f5es\n// Em um cen\u00e1rio real, 'fd' seria um descritor de arquivo de socket v\u00e1lido\n// obtido via chamadas de sistema como `socket()`, `accept()` ou `connect()`.\n// Para este exemplo, usamos um valor placeholder.\nint fd = 42; \nMPI_Comm intercomm;\n\n// Tenta estabelecer uma conex\u00e3o MPI usando o descritor de arquivo do socket.\n// Esta fun\u00e7\u00e3o permite que dois processos MPI independentes (que se comunicam via socket) \n// estabele\u00e7am um intercomunicador.\nint err = MPI_Comm_join(fd, &intercomm);\n\nif (err == MPI_SUCCESS) {\n    // A conex\u00e3o foi estabelecida com sucesso. 'intercomm' agora pode ser usado \n    // para comunica\u00e7\u00e3o bidirecional entre os dois processos.\n    // Por exemplo, podemos obter o rank deste processo no novo intercomunicador.\n    int rank_in_intercomm;\n    MPI_Comm_rank(intercomm, &rank_in_intercomm);\n    // ... (realizar comunica\u00e7\u00e3o usando intercomm) ...\n\n    // Limpeza: Libera o intercomunicador criado.\n    MPI_Comm_free(&intercomm);\n} else {\n    // Houve um erro ao tentar juntar os comunicadores. Isso pode ocorrer se o 'fd'\n    // for inv\u00e1lido ou se a comunica\u00e7\u00e3o subjacente falhar.\n}\n// Em um cen\u00e1rio real, o descritor de arquivo 'fd' tamb\u00e9m precisaria ser fechado com `close(fd);`\n// ap\u00f3s o uso, mas isso est\u00e1 fora do escopo do MPI e do bloco execut\u00e1vel aqui."}, {"name": "MPI_Comm_rank", "short_desc": "Determina o rank do processo chamador no comunicador.", "synopsis": "int MPI_Comm_rank(MPI_Comm comm, int *rank)", "params": [{"name": "comm", "desc": "Comunicador (handle)."}, {"name": "rank", "desc": "Rank do processo chamador no grupo do comunicador (inteiro de sa\u00edda)."}], "description": "Retorna o identificador \u00fanico (rank) do processo dentro do comunicador especificado. O rank \u00e9 um inteiro entre 0 e (tamanho do grupo - 1).", "application": "Identifica\u00e7\u00e3o do papel de cada processo na computa\u00e7\u00e3o paralela (ex: mestre vs trabalhador).", "example": "// Declara\u00e7\u00f5es\nMPI_Comm comm = MPI_COMM_WORLD; // Usa o comunicador padr\u00e3o global.\nint rank;                       // Vari\u00e1vel para armazenar o rank (identificador \u00fanico) do processo.\n\n// Obt\u00e9m o rank do processo chamador dentro do comunicador especificado.\n// O rank \u00e9 um inteiro \u00fanico entre 0 e (tamanho do grupo - 1) para cada processo no comunicador.\nint err = MPI_Comm_rank(comm, &rank);\n\nif (err == MPI_SUCCESS) {\n    // O rank foi obtido com sucesso.\n    // printf(\"Meu rank em MPI_COMM_WORLD \u00e9: %d\\n\", rank);\n    // O rank pode ser usado para tomar decis\u00f5es de controle de fluxo, como qual parte\n    // do c\u00f3digo um processo deve executar.\n} else {\n    // Houve um erro ao tentar obter o rank do comunicador.\n}\n// MPI_COMM_WORLD \u00e9 um comunicador predefinido e n\u00e3o precisa ser liberado."}, {"name": "MPI_Comm_remote_group", "short_desc": "Acessa o grupo remoto associado a um intercomunicador.", "synopsis": "int MPI_Comm_remote_group(MPI_Comm comm, MPI_Group *group)", "params": [{"name": "comm", "desc": "Intercomunicador (handle)."}, {"name": "group", "desc": "Grupo remoto correspondente ao comunicador (handle de sa\u00edda)."}], "description": "Recupera o grupo de processos que formam a outra extremidade de um intercomunicador.", "application": "Utilizado para consultas de atributos ou gerenciamento de processos no grupo remoto de um intercomunicador.", "example": "// Declara\u00e7\u00f5es\n// Para demonstrar MPI_Comm_remote_group, precisamos de um intercomunicador.\n// Vamos simular sua cria\u00e7\u00e3o usando MPI_Comm_spawn, que gera um intercomunicador\n// entre o grupo pai e os processos filhos rec\u00e9m-criados.\nconst char *command = \"hostname\"; // Um comando simples para o processo filho, por exemplo.\nchar *argv_spawn[] = {NULL};      // Nenhum argumento para o comando.\nint maxprocs = 1;                 // Iniciar um processo filho.\nMPI_Info info_spawn;              // Objeto de informa\u00e7\u00e3o para dicas de spawn.\nMPI_Comm parent_comm = MPI_COMM_WORLD; // Comunicador dos processos pai.\nMPI_Comm intercomm_parent_child;  // O intercomunicador resultante entre pais e filhos.\nint array_of_errcodes[1];         // Array para c\u00f3digos de erro dos processos filhos.\nMPI_Group remote_group;           // Vari\u00e1vel para armazenar o grupo remoto do intercomunicador.\n\n// Primeiro, cria um objeto MPI_Info para as dicas de spawn.\nint err = MPI_Info_create(&info_spawn);\n\nif (err == MPI_SUCCESS) {\n    // Opcional: Define algumas dicas para o spawn, como o local de execu\u00e7\u00e3o.\n    // MPI_Info_set(info_spawn, \"host\", \"localhost\");\n\n    // Inicia um novo processo e cria um intercomunicador.\n    // Esta \u00e9 uma opera\u00e7\u00e3o coletiva no comunicador 'parent_comm' (MPI_COMM_WORLD).\n    err = MPI_Comm_spawn(command, argv_spawn, maxprocs, info_spawn, 0, \n                         parent_comm, &intercomm_parent_child, array_of_errcodes);\n\n    if (err == MPI_SUCCESS) {\n        // O intercomunicador foi criado com sucesso. Agora, recupera o grupo remoto.\n        // O grupo remoto \u00e9 o conjunto de processos na \"outra ponta\" do intercomunicador (os filhos).\n        int err_group = MPI_Comm_remote_group(intercomm_parent_child, &remote_group);\n\n        if (err_group == MPI_SUCCESS) {\n            // O grupo remoto foi obtido com sucesso.\n            // int remote_size;\n            // MPI_Group_size(remote_group, &remote_size); // Obt\u00e9m o tamanho do grupo remoto.\n            // printf(\"Tamanho do grupo remoto: %d\\n\", remote_size);\n            // ... (realizar opera\u00e7\u00f5es com o grupo remoto, como comunica\u00e7\u00e3o ponto a ponto)\n\n            // Limpeza: Libera o objeto MPI_Group.\n            MPI_Group_free(&remote_group);\n        } else {\n            // Houve um erro ao obter o grupo remoto.\n        }\n\n        // Limpeza: Libera o intercomunicador criado por MPI_Comm_spawn.\n        MPI_Comm_free(&intercomm_parent_child);\n    } else {\n        // Erro ao iniciar o processo filho (spawn).\n    }\n\n    // Limpeza: Libera o objeto MPI_Info.\n    MPI_Info_free(&info_spawn);\n} else {\n    // Erro ao criar o objeto MPI_Info.\n}\n// MPI_COMM_WORLD n\u00e3o precisa ser liberado."}, {"name": "MPI_Comm_remote_size", "short_desc": "Determina o tamanho do grupo remoto em um intercomunicador.", "synopsis": "int MPI_Comm_remote_size(MPI_Comm comm, int *size)", "params": [{"name": "comm", "desc": "Intercomunicador (handle)."}, {"name": "size", "desc": "N\u00famero de processos no grupo remoto do comunicador (inteiro de sa\u00edda)."}], "description": "Retorna o n\u00famero de processos que comp\u00f5em o grupo remoto de um intercomunicador.", "application": "Dimensionamento de buffers ou loops de comunica\u00e7\u00e3o baseados no n\u00famero de processos remotos.", "example": "// Declara\u00e7\u00f5es\n// Para demonstrar MPI_Comm_remote_size, precisamos de um intercomunicador.\n// Vamos simular sua cria\u00e7\u00e3o usando MPI_Comm_spawn, de forma similar ao exemplo anterior.\nconst char *command_rs = \"hostname\"; // Comando a ser executado pelos novos processos.\nchar *argv_rs[] = {NULL};             // Nenhum argumento para o comando.\nint maxprocs_rs = 1;                  // N\u00famero de novos processos a serem iniciados.\nMPI_Info info_rs;                     // Objeto de informa\u00e7\u00e3o para dicas de spawn.\nMPI_Comm parent_comm_rs = MPI_COMM_WORLD; // Comunicador dos processos pai.\nMPI_Comm intercomm_rs;                // O intercomunicador resultante entre pais e filhos.\nint array_of_errcodes_rs[1];          // Array para c\u00f3digos de erro dos processos filhos.\nint remote_size;                      // Vari\u00e1vel para armazenar o n\u00famero de processos no grupo remoto.\n\n// Primeiro, cria um objeto MPI_Info.\nint err = MPI_Info_create(&info_rs);\n\nif (err == MPI_SUCCESS) {\n    // Inicia um novo processo e cria um intercomunicador.\n    err = MPI_Comm_spawn(command_rs, argv_rs, maxprocs_rs, info_rs, 0, \n                         parent_comm_rs, &intercomm_rs, array_of_errcodes_rs);\n\n    if (err == MPI_SUCCESS) {\n        // O intercomunicador foi criado com sucesso. Agora, obt\u00e9m o tamanho do grupo remoto.\n        // O tamanho remoto \u00e9 o n\u00famero de processos na \"outra ponta\" do intercomunicador (os filhos).\n        int err_size = MPI_Comm_remote_size(intercomm_rs, &remote_size);\n\n        if (err_size == MPI_SUCCESS) {\n            // O tamanho do grupo remoto foi obtido com sucesso.\n            // printf(\"N\u00famero de processos no grupo remoto: %d\\n\", remote_size);\n            // Este valor \u00e9 crucial para entender o tamanho do grupo de processos com o qual o comunicador pode interagir.\n        } else {\n            // Houve um erro ao obter o tamanho do grupo remoto.\n        }\n\n        // Limpeza: Libera o intercomunicador criado.\n        MPI_Comm_free(&intercomm_rs);\n    } else {\n        // Erro ao iniciar o processo filho (spawn).\n    }\n\n    // Limpeza: Libera o objeto MPI_Info.\n    MPI_Info_free(&info_rs);\n} else {\n    // Erro ao criar o objeto MPI_Info.\n}\n// MPI_COMM_WORLD n\u00e3o precisa ser liberado."}, {"name": "MPI_Comm_set_attr", "short_desc": "Armazena o valor de um atributo associado a uma chave.", "synopsis": "int MPI_Comm_set_attr(MPI_Comm comm, int comm_keyval, void *attribute_val)", "params": [{"name": "comm", "desc": "Comunicador ao qual o atributo ser\u00e1 anexado (handle)."}, {"name": "comm_keyval", "desc": "Valor da chave (inteiro)."}, {"name": "attribute_val", "desc": "Valor do atributo (ponteiro em C/C++)."}], "description": "Associa um valor de atributo a uma chave em um comunicador. Se um atributo j\u00e1 estiver presente para essa chave, a fun\u00e7\u00e3o de dele\u00e7\u00e3o associada ser\u00e1 chamada antes de armazenar o novo valor.", "application": "Armazenamento de dados contextuais ou metadados personalizados dentro de comunicadores MPI.", "example": "// Declara\u00e7\u00f5es\nMPI_Comm comm_attr = MPI_COMM_WORLD; // Comunicador ao qual o atributo ser\u00e1 anexado.\nint comm_keyval;                     // Chave do atributo, deve ser criada primeiro.\nint attribute_value = 12345;         // Um valor inteiro como exemplo de atributo.\n// Ponteiros para fun\u00e7\u00f5es de c\u00f3pia e dele\u00e7\u00e3o. MPI_COMM_NULL_COPY_FN e MPI_COMM_NULL_DELETE_FN\n// indicam que o MPI n\u00e3o deve fazer nada com o valor do atributo na c\u00f3pia ou dele\u00e7\u00e3o do comunicador.\n// Em um cen\u00e1rio real, estas seriam fun\u00e7\u00f5es customizadas para gerenciar a mem\u00f3ria do atributo.\nMPI_Comm_copy_attr_function *copy_fn = MPI_COMM_NULL_COPY_FN;\nMPI_Comm_delete_attr_function *delete_fn = MPI_COMM_NULL_DELETE_FN;\n\n// Primeiro, precisamos criar uma chave para o atributo. Esta chave \u00e9 global.\nint err = MPI_Comm_create_keyval(copy_fn, delete_fn, &comm_keyval, NULL);\n\nif (err == MPI_SUCCESS) {\n    // Agora, associa o valor do atributo (o endere\u00e7o de 'attribute_value') \u00e0 chave no comunicador.\n    // O valor \u00e9 passado como void* e pode ser um ponteiro para qualquer tipo de dados.\n    int err_set_attr = MPI_Comm_set_attr(comm_attr, comm_keyval, &attribute_value);\n\n    if (err_set_attr == MPI_SUCCESS) {\n        // O atributo foi associado com sucesso ao comunicador. Pode ser recuperado com MPI_Comm_get_attr.\n        // int *retrieved_value;\n        // int flag;\n        // MPI_Comm_get_attr(comm_attr, comm_keyval, &retrieved_value, &flag);\n        // if (flag && retrieved_value) {\n        //     // printf(\"Atributo recuperado: %d\\n\", *retrieved_value);\n        // }\n    } else {\n        // Houve um erro ao definir o atributo no comunicador.\n    }\n\n    // Limpeza: Libera a chave do atributo. Isso deve ser feito quando a chave n\u00e3o for mais necess\u00e1ria.\n    MPI_Comm_free_keyval(&comm_keyval);\n} else {\n    // Erro ao criar a chave do atributo.\n}\n// MPI_COMM_WORLD \u00e9 um comunicador predefinido e n\u00e3o precisa ser liberado."}, {"name": "MPI_Comm_set_errhandler", "short_desc": "Define o manipulador de erros para um comunicador.", "synopsis": "int MPI_Comm_set_errhandler(MPI_Comm comm, MPI_Errhandler errhandler)", "params": [{"name": "comm", "desc": "Comunicador (handle)."}, {"name": "errhandler", "desc": "Novo manipulador de erros para o comunicador (handle)."}], "description": "Associa um novo manipulador de erros a um comunicador. O padr\u00e3o do MPI \u00e9 abortar em caso de erro, mas isso pode ser alterado para retornar c\u00f3digos de erro ou executar uma fun\u00e7\u00e3o personalizada.", "application": "Implementa\u00e7\u00e3o de toler\u00e2ncia a falhas ou depura\u00e7\u00e3o personalizada ao interceptar erros MPI.", "example": "// Declara\u00e7\u00f5es\nMPI_Comm comm_err = MPI_COMM_WORLD;           // Comunicador para o qual o manipulador ser\u00e1 definido.\nMPI_Errhandler old_errhandler;                // Vari\u00e1vel para armazenar o manipulador de erros anterior\n                                              // e permitir sua restaura\u00e7\u00e3o posterior, o que \u00e9 uma boa pr\u00e1tica.\n// MPI_ERRORS_RETURN \u00e9 um manipulador de erros predefinido que faz com que as chamadas MPI\n// retornem c\u00f3digos de erro em vez de abortar o programa. N\u00e3o precisa ser criado ou liberado.\n\n// Primeiro, obt\u00e9m o manipulador de erros atual do comunicador.\nint err = MPI_Comm_get_errhandler(comm_err, &old_errhandler);\n\nif (err == MPI_SUCCESS) {\n    // Define o novo manipulador de erros para MPI_ERRORS_RETURN.\n    // Ap\u00f3s esta chamada, se uma fun\u00e7\u00e3o MPI falhar no 'comm_err', ela retornar\u00e1 um c\u00f3digo\n    // de erro (diferente de MPI_SUCCESS) e o programa continuar\u00e1 sua execu\u00e7\u00e3o,\n    // permitindo tratamento de erros program\u00e1tico.\n    int err_set_handler = MPI_Comm_set_errhandler(comm_err, MPI_ERRORS_RETURN);\n\n    if (err_set_handler == MPI_SUCCESS) {\n        // O manipulador de erros foi definido com sucesso.\n        // Agora, qualquer erro em opera\u00e7\u00f5es MPI usando 'comm_err' retornar\u00e1 um c\u00f3digo de erro.\n\n        // Limpeza: Restaura o manipulador de erros original para o comunicador.\n        // Isso \u00e9 importante para garantir que o comportamento de tratamento de erros seja\n        // revertido ao estado anterior, evitando efeitos colaterais em outras partes do c\u00f3digo.\n        MPI_Comm_set_errhandler(comm_err, old_errhandler);\n        // Se 'old_errhandler' tivesse sido criado com MPI_Errhandler_create,\n        // ele precisaria ser liberado com MPI_Errhandler_free(&old_errhandler).\n        // Como estamos lidando com um handle possivelmente predefinido, n\u00e3o o liberamos aqui.\n    } else {\n        // Houve um erro ao tentar definir o novo manipulador de erros.\n    }\n} else {\n    // Erro ao obter o manipulador de erros atual.\n}\n// MPI_COMM_WORLD \u00e9 um comunicador predefinido e n\u00e3o precisa ser liberado."}, {"name": "MPI_Comm_set_info", "short_desc": "Define novos valores para as dicas de um comunicador.", "synopsis": "int MPI_Comm_set_info(MPI_Comm comm, MPI_Info info)", "params": [{"name": "comm", "desc": "Comunicador (handle)."}, {"name": "info", "desc": "Objeto de informa\u00e7\u00e3o contendo as novas dicas (handle)."}], "description": "Atualiza as dicas (hints) associadas a um comunicador. Esta \u00e9 uma opera\u00e7\u00e3o coletiva. As dicas podem influenciar otimiza\u00e7\u00f5es internas da implementa\u00e7\u00e3o MPI.", "application": "Otimiza\u00e7\u00e3o de performance ao declarar inten\u00e7\u00f5es de uso (ex: garantir que tags n\u00e3o ser\u00e3o duplicadas).", "example": "// Declara\u00e7\u00f5es\nMPI_Comm comm_info = MPI_COMM_WORLD; // Comunicador para o qual as dicas ser\u00e3o definidas.\nMPI_Info info_obj;                   // Objeto de informa\u00e7\u00e3o que cont\u00e9m as dicas (key-value pairs).\nchar key[] = \"tag_ub\";               // Exemplo de chave de dica: \"tag_ub\" (upper bound for tags).\nchar value[] = \"65535\";              // Exemplo de valor para a dica.\n\n// Primeiro, cria um objeto MPI_Info vazio.\nint err = MPI_Info_create(&info_obj);\n\nif (err == MPI_SUCCESS) {\n    // Define uma dica (key-value pair) dentro do objeto MPI_Info.\n    // A chave e o valor s\u00e3o strings.\n    int err_info_set = MPI_Info_set(info_obj, key, value);\n\n    if (err_info_set == MPI_SUCCESS) {\n        // Aplica as dicas contidas em 'info_obj' ao comunicador 'comm_info'.\n        // Esta \u00e9 uma opera\u00e7\u00e3o coletiva: todos os processos em 'comm_info' devem cham\u00e1-la.\n        int err_set_comm_info = MPI_Comm_set_info(comm_info, info_obj);\n\n        if (err_set_comm_info == MPI_SUCCESS) {\n            // As dicas do comunicador foram atualizadas com sucesso.\n            // As implementa\u00e7\u00f5es MPI podem usar estas dicas para otimiza\u00e7\u00f5es ou para configurar\n            // recursos internos. As dicas podem ser consultadas com MPI_Comm_get_info.\n        } else {\n            // Houve um erro ao definir as dicas do comunicador.\n        }\n    } else {\n        // Houve um erro ao definir a chave/valor no objeto MPI_Info.\n    }\n\n    // Limpeza: Libera o objeto MPI_Info. Isso deve ser feito quando as dicas n\u00e3o forem mais necess\u00e1rias.\n    MPI_Info_free(&info_obj);\n} else {\n    // Erro ao criar o objeto MPI_Info.\n}\n// MPI_COMM_WORLD \u00e9 um comunicador predefinido e n\u00e3o precisa ser liberado."}, {"name": "MPI_Comm_set_name", "short_desc": "Define o nome de exibi\u00e7\u00e3o para um comunicador.", "synopsis": "int MPI_Comm_set_name(MPI_Comm comm, const char *comm_name)", "params": [{"name": "comm", "desc": "Comunicador cujo nome ser\u00e1 definido (handle)."}, {"name": "comm_name", "desc": "String de caracteres que ser\u00e1 lembrada como o nome (string)."}], "description": "Atribui um nome amig\u00e1vel a um comunicador, o que pode facilitar a depura\u00e7\u00e3o e o rastreamento em ferramentas de an\u00e1lise.", "application": "Organiza\u00e7\u00e3o e depura\u00e7\u00e3o de aplica\u00e7\u00f5es complexas com m\u00faltiplos comunicadores.", "example": "// Declara\u00e7\u00f5es\nMPI_Comm comm_name = MPI_COMM_WORLD; // Comunicador para o qual o nome ser\u00e1 definido.\nconst char *name_string = \"MeuComunicadorPrincipal\"; // A string de caracteres que ser\u00e1 o nome.\n\n// Atribui um nome amig\u00e1vel ao comunicador. Este nome \u00e9 \u00fatil para depura\u00e7\u00e3o,\n// ferramentas de perfil e logs, facilitando a identifica\u00e7\u00e3o do comunicador.\nint err = MPI_Comm_set_name(comm_name, name_string);\n\nif (err == MPI_SUCCESS) {\n    // O nome do comunicador foi definido com sucesso.\n    // Ele pode ser recuperado posteriormente com MPI_Comm_get_name.\n    // char retrieved_name[MPI_MAX_OBJECT_NAME];\n    // int resultlen;\n    // MPI_Comm_get_name(comm_name, retrieved_name, &resultlen);\n    // printf(\"Nome do comunicador '%s' definido com sucesso.\\n\", retrieved_name);\n} else {\n    // Houve um erro ao definir o nome do comunicador.\n}\n// MPI_COMM_WORLD \u00e9 um comunicador predefinido e n\u00e3o precisa ser liberado."}, {"name": "MPI_Comm_size", "short_desc": "Determina o tamanho do grupo associado a um comunicador.", "synopsis": "int MPI_Comm_size(MPI_Comm comm, int *size)", "params": [{"name": "comm", "desc": "Comunicador (handle)."}, {"name": "size", "desc": "N\u00famero de processos no grupo do comunicador (inteiro de sa\u00edda)."}], "description": "Retorna o n\u00famero total de processos que fazem parte do comunicador especificado.", "application": "Utilizada para distribuir carga de trabalho uniformemente entre todos os processos dispon\u00edveis.", "example": "// Declara\u00e7\u00f5es\nMPI_Comm comm_size = MPI_COMM_WORLD; // Usa o comunicador padr\u00e3o global.\nint size;                            // Vari\u00e1vel para armazenar o n\u00famero total de processos.\n\n// Obt\u00e9m o n\u00famero total de processos que fazem parte do comunicador especificado.\n// Este valor indica quantos processos est\u00e3o ativos e podem se comunicar dentro do grupo.\nint err = MPI_Comm_size(comm_size, &size);\n\nif (err == MPI_SUCCESS) {\n    // O tamanho do comunicador foi obtido com sucesso.\n    // printf(\"N\u00famero total de processos em MPI_COMM_WORLD: %d\\n\", size);\n    // Este valor \u00e9 fundamental para algoritmos paralelos que precisam distribuir tarefas\n    // entre todos os processos do comunicador.\n} else {\n    // Houve um erro ao tentar obter o tamanho do comunicador.\n}\n// MPI_COMM_WORLD \u00e9 um comunicador predefinido e n\u00e3o precisa ser liberado."}, {"name": "MPI_Comm_spawn", "short_desc": "Inicia inst\u00e2ncias de uma \u00fanica aplica\u00e7\u00e3o MPI.", "synopsis": "int MPI_Comm_spawn(const char *command, char *argv[], int maxprocs, MPI_Info info, int root, MPI_Comm comm, MPI_Comm *intercomm, int array_of_errcodes[])", "params": [{"name": "command", "desc": "Nome do programa a ser iniciado (string)."}, {"name": "argv", "desc": "Argumentos para o comando (array de strings)."}, {"name": "maxprocs", "desc": "N\u00famero m\u00e1ximo de processos a iniciar (inteiro)."}, {"name": "info", "desc": "Dicas para o sistema de runtime sobre como iniciar os processos (handle)."}, {"name": "root", "desc": "Rank do processo onde os argumentos anteriores s\u00e3o examinados (inteiro)."}, {"name": "comm", "desc": "Intracomunicador contendo o grupo de processos que iniciam a opera\u00e7\u00e3o (handle)."}, {"name": "intercomm", "desc": "Intercomunicador entre o grupo original e o novo grupo iniciado (handle de sa\u00edda)."}, {"name": "array_of_errcodes", "desc": "Um c\u00f3digo de erro por processo (array de inteiros de sa\u00edda)."}], "description": "Inicia dinamicamente um novo conjunto de processos MPI e estabelece um intercomunicador para permitir a comunica\u00e7\u00e3o entre os processos pai e os processos filhos.", "application": "Cria\u00e7\u00e3o din\u00e2mica de processos para escalonamento de carga ou computa\u00e7\u00e3o mestre-trabalhador adaptativa.", "example": "// Declara\u00e7\u00f5es\n// O comando a ser executado pelos novos processos. \"hostname\" \u00e9 um exemplo comum.\n// Em sistemas Windows, pode ser necess\u00e1rio especificar o caminho completo ou um comando diferente.\nconst char *command_spawn = \"hostname\"; \n// Argumentos para o comando. NULL indica que n\u00e3o h\u00e1 argumentos.\nchar *argv_spawn_list[] = {NULL};       \nint maxprocs_spawn = 1;                 // N\u00famero de novos processos a serem iniciados.\nMPI_Info info_spawn_obj;                // Objeto de informa\u00e7\u00e3o para dicas de runtime para o spawn.\nint root_spawn = 0;                     // O rank do processo que fornece os argumentos e o objeto info.\nMPI_Comm parent_comm_spawn = MPI_COMM_WORLD; // O comunicador do grupo de processos pai.\nMPI_Comm intercomm_spawn;               // O intercomunicador resultante entre o grupo pai e os filhos.\nint array_of_errcodes_spawn[1];         // Array para os c\u00f3digos de erro retornados pelos processos filhos.\n                                        // O tamanho deste array deve ser igual a 'maxprocs_spawn'.\n\n// Primeiro, cria um objeto MPI_Info para as dicas de spawn.\nint err = MPI_Info_create(&info_spawn_obj);\n\nif (err == MPI_SUCCESS) {\n    // Opcional: Adiciona dicas ao objeto info, por exemplo, para especificar o host onde os processos\n    // filhos devem ser iniciados ou outros par\u00e2metros do sistema de runtime.\n    // MPI_Info_set(info_spawn_obj, \"host\", \"localhost\");\n\n    // Inicia dinamicamente 'maxprocs_spawn' novos processos MPI.\n    // Esta \u00e9 uma opera\u00e7\u00e3o coletiva no comunicador 'parent_comm_spawn'.\n    // O processo 'root_spawn' \u00e9 respons\u00e1vel por fornecer 'command', 'argv_spawn_list' e 'info_spawn_obj'.\n    err = MPI_Comm_spawn(command_spawn, argv_spawn_list, maxprocs_spawn, \n                         info_spawn_obj, root_spawn, parent_comm_spawn, \n                         &intercomm_spawn, array_of_errcodes_spawn);\n\n    if (err == MPI_SUCCESS) {\n        // Os processos foram iniciados com sucesso e um intercomunicador foi estabelecido.\n        // 'intercomm_spawn' pode agora ser usado para comunica\u00e7\u00e3o bidirecional entre o grupo pai\n        // e o novo grupo de processos filhos.\n        int remote_size_spawn;\n        MPI_Comm_remote_size(intercomm_spawn, &remote_size_spawn);\n        // printf(\"Grupo pai: %d processos iniciados com sucesso. Tamanho remoto: %d\\n\", maxprocs_spawn, remote_size_spawn);\n\n        // Verifica os c\u00f3digos de erro retornados pelos processos filhos.\n        // for (int i = 0; i < maxprocs_spawn; i++) {\n        //     if (array_of_errcodes_spawn[i] != MPI_SUCCESS) {\n        //         printf(\"Processo filho %d reportou erro: %d\\n\", i, array_of_errcodes_spawn[i]);\n        //     }\n        // }\n\n        // ... (realizar comunica\u00e7\u00e3o com os processos filhos atrav\u00e9s de intercomm_spawn) ...\n\n        // Limpeza: Libera o intercomunicador criado. \u00c9 importante liberar recursos MPI.\n        MPI_Comm_free(&intercomm_spawn);\n    } else {\n        // Houve um erro ao iniciar os novos processos. Pode ser devido a um comando inv\u00e1lido,\n        // problemas de recursos ou configura\u00e7\u00e3o do sistema MPI.\n    }\n\n    // Limpeza: Libera o objeto MPI_Info.\n    MPI_Info_free(&info_spawn_obj);\n} else {\n    // Erro ao criar o objeto MPI_Info.\n}\n// MPI_COMM_WORLD \u00e9 um comunicador predefinido e n\u00e3o precisa ser liberado."}, {"name": "MPI_Comm_spawn_multiple", "short_desc": "Inicia m\u00faltiplas aplica\u00e7\u00f5es MPI diferentes simultaneamente.", "synopsis": "int MPI_Comm_spawn_multiple(int count, char *array_of_commands[], char **array_of_argv[], const int array_of_maxprocs[], const MPI_Info array_of_info[], int root, MPI_Comm comm, MPI_Comm *intercomm, int array_of_errcodes[])", "params": [{"name": "count", "desc": "N\u00famero de comandos (inteiro positivo)."}, {"name": "array_of_commands", "desc": "Programas a serem executados (array de strings)."}, {"name": "array_of_argv", "desc": "Argumentos para cada comando (array de array de strings)."}, {"name": "array_of_maxprocs", "desc": "N\u00famero m\u00e1ximo de processos para cada comando (array de inteiros)."}, {"name": "array_of_info", "desc": "Objetos de informa\u00e7\u00e3o para cada comando (array de handles)."}, {"name": "root", "desc": "Rank do processo raiz (inteiro)."}, {"name": "comm", "desc": "Comunicador pai (handle)."}, {"name": "intercomm", "desc": "Intercomunicador entre pai e filhos (handle de sa\u00edda)."}, {"name": "array_of_errcodes", "desc": "C\u00f3digos de erro para cada processo (array de inteiros de sa\u00edda)."}], "description": "Vers\u00e3o avan\u00e7ada do spawn que permite iniciar diferentes execut\u00e1veis ou o mesmo execut\u00e1vel com diferentes argumentos em uma \u00fanica chamada coletiva.", "application": "Execu\u00e7\u00e3o de aplica\u00e7\u00f5es MPMD (Multiple Program, Multiple Data) complexas.", "example": "// Declara\u00e7\u00f5es\nint err;\nint rank;\nMPI_Comm_rank(MPI_COMM_WORLD, &rank); // Obter o rank do processo atual\n\nint count = 2; // Vamos spawnar 2 tipos de processos\nchar *array_of_commands[2];\nchar *argv1[] = {\"arg1_p1\", \"arg2_p1\", NULL}; // Argumentos para o primeiro comando\nchar *argv2[] = {\"arg1_p2\", NULL};           // Argumentos para o segundo comando\nchar **array_of_argv[2];\nint array_of_maxprocs[2];\nMPI_Info array_of_info[2];\nint root = 0; // O processo com rank 0 ser\u00e1 o root que inicia os processos\nMPI_Comm comm = MPI_COMM_WORLD; // Comunicador pai\nMPI_Comm intercomm = MPI_COMM_NULL; // Intercomunicador entre pai e filhos\nint array_of_errcodes[2]; // Array para armazenar c\u00f3digos de erro de cada processo filho\n\n// Inicializa\u00e7\u00f5es\n// Assumindo que \"child_program1\" e \"child_program2\" s\u00e3o execut\u00e1veis dispon\u00edveis\n// para o MPI_Comm_spawn_multiple no sistema.\narray_of_commands[0] = \"./child_program1\"; // Caminho para o execut\u00e1vel do filho 1\narray_of_commands[1] = \"./child_program2\"; // Caminho para o execut\u00e1vel do filho 2\n\narray_of_argv[0] = argv1;\narray_of_argv[1] = argv2;\n\narray_of_maxprocs[0] = 2; // Spawnar 2 inst\u00e2ncias de child_program1\narray_of_maxprocs[1] = 1; // Spawnar 1 inst\u00e2ncia de child_program2\n\n// Criar objetos MPI_Info para cada comando. Podem ser MPI_INFO_NULL.\nMPI_Info_create(&array_of_info[0]);\nMPI_Info_create(&array_of_info[1]);\n// Adicionar dicas, se necess\u00e1rio. Exemplo:\nMPI_Info_set(array_of_info[0], \"host\", \"localhost\");\nMPI_Info_set(array_of_info[1], \"arch\", \"x86_64\");\n\n// Apenas o processo root (rank 0) chama a fun\u00e7\u00e3o para iniciar novos processos\nif (rank == root) {\n    // Chamada da fun\u00e7\u00e3o MPI_Comm_spawn_multiple\n    err = MPI_Comm_spawn_multiple(count, array_of_commands, array_of_argv, array_of_maxprocs, array_of_info, root, comm, &intercomm, array_of_errcodes);\n\n    if (err == MPI_SUCCESS) {\n        // Sucesso na opera\u00e7\u00e3o de spawn\n        // 'intercomm' \u00e9 um intercomunicador que conecta o root com os novos processos filhos.\n        // Podemos, por exemplo, obter o n\u00famero de processos remotos.\n        int remote_size;\n        MPI_Comm_remote_size(intercomm, &remote_size);\n        // printf(\"Root: Spawned %d processos remotos.\\n\", remote_size);\n\n        // \u00c9 poss\u00edvel usar 'intercomm' para comunica\u00e7\u00e3o com os filhos aqui.\n\n        // Realizar limpeza do intercomunicador criado\n        MPI_Comm_free(&intercomm);\n    } else {\n        // printf(\"Root: Erro ao spawnar processos: %d\\n\", err);\n    }\n}\n\n// Realizar limpeza dos objetos MPI_Info criados por todos os processos que os utilizaram.\nMPI_Info_free(&array_of_info[0]);\nMPI_Info_free(&array_of_info[1]);\n"}, {"name": "MPI_Comm_split", "short_desc": "Cria novos comunicadores com base em cores e chaves.", "synopsis": "int MPI_Comm_split(MPI_Comm comm, int color, int key, MPI_Comm *newcomm)", "params": [{"name": "comm", "desc": "Comunicador original (handle)."}, {"name": "color", "desc": "Controle de atribui\u00e7\u00e3o ao subconjunto (inteiro n\u00e3o negativo)."}, {"name": "key", "desc": "Controle de atribui\u00e7\u00e3o de rank dentro do novo grupo (inteiro)."}, {"name": "newcomm", "desc": "Novo comunicador criado (handle de sa\u00edda)."}], "description": "Divide um comunicador em subgrupos disjuntos. Processos que fornecem a mesma cor s\u00e3o agrupados no mesmo novo comunicador. O argumento key determina a ordem relativa dos ranks no novo grupo.", "application": "Decomposi\u00e7\u00e3o de dom\u00ednio ou organiza\u00e7\u00e3o de processos em sub-estruturas (ex: linhas e colunas de uma grade).", "example": "// Declara\u00e7\u00f5es\nint err;\nint rank, size; // Rank e size do comunicador original\nMPI_Comm comm = MPI_COMM_WORLD; // Comunicador original (MPI_COMM_WORLD)\nMPI_Comm newcomm = MPI_COMM_NULL; // Novo comunicador que ser\u00e1 criado\nint color; // Cor para o novo comunicador\nint key;   // Chave para ordena\u00e7\u00e3o dos ranks dentro do novo comunicador\n\n// Obter rank e size do comunicador original\nMPI_Comm_rank(comm, &rank);\nMPI_Comm_size(comm, &size);\n\n// Definir a cor: processos com rank par v\u00e3o para um grupo (color 0), \u00edmpares para outro (color 1).\n// Processos com MPI_UNDEFINED para color n\u00e3o ser\u00e3o inclu\u00eddos em nenhum novo comunicador.\ncolor = rank % 2;\n\n// Definir a chave: usar o rank original para manter a ordem dentro de cada novo grupo.\nkey = rank;\n\n// Chamada da fun\u00e7\u00e3o MPI_Comm_split\nerr = MPI_Comm_split(comm, color, key, &newcomm);\n\nif (err == MPI_SUCCESS) {\n    // Sucesso na divis\u00e3o do comunicador\n    // 'newcomm' agora \u00e9 um novo comunicador, ou MPI_COMM_NULL se a cor foi MPI_UNDEFINED.\n    if (newcomm != MPI_COMM_NULL) {\n        int new_rank, new_size;\n        MPI_Comm_rank(newcomm, &new_rank);\n        MPI_Comm_size(newcomm, &new_size);\n        // printf(\"Processo %d (original) est\u00e1 no novo comunicador com cor %d. Novo rank: %d, Novo size: %d\\n\", rank, color, new_rank, new_size);\n\n        // Realizar alguma opera\u00e7\u00e3o com o novo comunicador, por exemplo, um Broadcast dentro do grupo.\n        int send_data = rank * 10;\n        int recv_data = 0; // Inicializar para evitar lixo\n\n        // Apenas para exemplo, o rank 0 de cada novo grupo faz um broadcast.\n        if (new_rank == 0) {\n            MPI_Bcast(&send_data, 1, MPI_INT, 0, newcomm);\n        } else {\n            MPI_Bcast(&recv_data, 1, MPI_INT, 0, newcomm);\n            // printf(\"Processo %d (cor %d, novo rank %d) recebeu %d do novo rank 0\\n\", rank, color, new_rank, recv_data);\n        }\n\n        // Realizar limpeza do novo comunicador\n        MPI_Comm_free(&newcomm);\n    } else {\n        // printf(\"Processo %d (original) n\u00e3o foi inclu\u00eddo em nenhum novo comunicador (color = MPI_UNDEFINED).\\n\", rank);\n    }\n} else {\n    // printf(\"Erro ao dividir o comunicador: %d\\n\", err);\n}\n"}, {"name": "MPI_Comm_split_type", "short_desc": "Cria novos comunicadores com base em tipos de divis\u00e3o.", "synopsis": "int MPI_Comm_split_type(MPI_Comm comm, int split_type, int key, MPI_Info info, MPI_Comm *newcomm)", "params": [{"name": "comm", "desc": "Comunicador original (handle)."}, {"name": "split_type", "desc": "Tipo de agrupamento (ex: MPI_COMM_TYPE_SHARED para mem\u00f3ria compartilhada)."}, {"name": "key", "desc": "Controle de rank (inteiro)."}, {"name": "info", "desc": "Objeto de informa\u00e7\u00e3o (handle)."}, {"name": "newcomm", "desc": "Novo comunicador (handle de sa\u00edda)."}], "description": "Semelhante ao MPI_Comm_split, mas agrupa processos com base em caracter\u00edsticas espec\u00edficas do hardware ou do ambiente, como processos que compartilham acesso \u00e0 mem\u00f3ria.", "application": "Otimiza\u00e7\u00e3o de algoritmos para arquiteturas multi-core ou clusters com mem\u00f3ria compartilhada.", "example": "// Declara\u00e7\u00f5es\nint err;\nint rank, size; // Rank e size do comunicador original\nMPI_Comm comm = MPI_COMM_WORLD; // Comunicador original (MPI_COMM_WORLD)\nint split_type = MPI_COMM_TYPE_SHARED; // Tipo para agrupar processos que podem compartilhar mem\u00f3ria\nint key;                               // Chave para ordena\u00e7\u00e3o dos ranks dentro do novo comunicador\nMPI_Info info = MPI_INFO_NULL;         // Objeto de informa\u00e7\u00e3o para dicas de otimiza\u00e7\u00e3o\nMPI_Comm newcomm = MPI_COMM_NULL; // Novo comunicador que ser\u00e1 criado\n\n// Obter rank e size do comunicador original\nMPI_Comm_rank(comm, &rank);\nMPI_Comm_size(comm, &size);\n\n// Definir a chave: usar o rank original para manter a ordem dentro do novo grupo de mem\u00f3ria compartilhada.\nkey = rank;\n\n// Criar um objeto MPI_Info (opcional, pode ser MPI_INFO_NULL).\n// Para MPI_COMM_TYPE_SHARED, MPI_INFO_NULL \u00e9 frequentemente suficiente.\nMPI_Info_create(&info);\n// Adicionar dicas, se necess\u00e1rio. Exemplo:\n// MPI_Info_set(info, \"shmem_alloc_policy\", \"heap\");\n\n// Chamada da fun\u00e7\u00e3o MPI_Comm_split_type\nerr = MPI_Comm_split_type(comm, split_type, key, info, &newcomm);\n\nif (err == MPI_SUCCESS) {\n    // Sucesso na divis\u00e3o do comunicador por tipo\n    // 'newcomm' agora \u00e9 um novo comunicador contendo processos que compartilham mem\u00f3ria.\n    if (newcomm != MPI_COMM_NULL) {\n        int new_rank, new_size;\n        MPI_Comm_rank(newcomm, &new_rank);\n        MPI_Comm_size(newcomm, &new_size);\n        // printf(\"Processo %d (original) est\u00e1 no comunicador de mem\u00f3ria compartilhada. Novo rank: %d, Novo size: %d\\n\", rank, new_rank, new_size);\n\n        // Exemplo de uso: aloca\u00e7\u00e3o de mem\u00f3ria compartilhada dentro do grupo\n        // Apenas o rank 0 de cada grupo de mem\u00f3ria compartilhada aloca e cria uma janela\n        if (new_rank == 0) {\n            int *shared_buffer = NULL;\n            MPI_Win win = MPI_WIN_NULL;\n\n            // Alocar mem\u00f3ria que ser\u00e1 compartilhada (vis\u00edvel para outros processos no 'newcomm')\n            MPI_Alloc_mem(sizeof(int), MPI_INFO_NULL, &shared_buffer);\n            *shared_buffer = rank * 100; // Valor inicial para este processo\n\n            // Criar uma janela RMA sobre a mem\u00f3ria compartilhada\n            MPI_Win_create(shared_buffer, sizeof(int), sizeof(int), MPI_INFO_NULL, newcomm, &win);\n            // printf(\"Processo %d (novo rank %d) alocou e inicializou mem\u00f3ria compartilhada com valor %d.\\n\", rank, new_rank, *shared_buffer);\n\n            // Realizar limpeza para a janela e mem\u00f3ria alocada\n            MPI_Win_free(&win);\n            MPI_Free_mem(shared_buffer);\n        } else {\n             // Outros processos no grupo compartilhado poderiam usar a janela criada pelo rank 0,\n             // mas para este exemplo, focamos apenas na cria\u00e7\u00e3o da janela pelo rank 0.\n        }\n\n        // Realizar limpeza do novo comunicador\n        MPI_Comm_free(&newcomm);\n    } else {\n        // printf(\"Processo %d (original) n\u00e3o foi inclu\u00eddo em um comunicador de mem\u00f3ria compartilhada (split_type = MPI_UNDEFINED).\\n\", rank);\n    }\n} else {\n    // printf(\"Erro ao dividir o comunicador por tipo: %d\\n\", err);\n}\n\n// Realizar limpeza do objeto MPI_Info\nMPI_Info_free(&info);\n"}, {"name": "MPI_Comm_test_inter", "short_desc": "Testa se um comunicador \u00e9 um intercomunicador.", "synopsis": "int MPI_Comm_test_inter(MPI_Comm comm, int *flag)", "params": [{"name": "comm", "desc": "Comunicador a ser testado (handle)."}, {"name": "flag", "desc": "Verdadeiro se for um intercomunicador, falso caso contr\u00e1rio (sa\u00edda)."}], "description": "Determina se o comunicador fornecido \u00e9 do tipo intercomunicador (conecta dois grupos) ou intracomunicador (conecta um \u00fanico grupo).", "application": "Verifica\u00e7\u00e3o din\u00e2mica de tipos de comunicadores em bibliotecas gen\u00e9ricas.", "example": "// Declara\u00e7\u00f5es\nint err;\nint rank; // Rank do processo atual\nMPI_Comm_rank(MPI_COMM_WORLD, &rank);\n\nMPI_Comm comm_world = MPI_COMM_WORLD;\nint flag_world; // Flag para indicar se MPI_COMM_WORLD \u00e9 um intercomunicador\n\nMPI_Comm intercomm_spawned = MPI_COMM_NULL; // Intercomunicador que ser\u00e1 criado pelo spawn\nint flag_spawned; // Flag para indicar se 'intercomm_spawned' \u00e9 um intercomunicador\n\n// Testar MPI_COMM_WORLD primeiro (deve ser um intracomunicador, ou seja, flag_world ser\u00e1 0)\nerr = MPI_Comm_test_inter(comm_world, &flag_world);\n\nif (err == MPI_SUCCESS) {\n    // printf(\"MPI_COMM_WORLD \u00e9 um %scomunicador.\\n\", flag_world ? \"inter\" : \"intra\");\n} else {\n    // printf(\"Erro ao testar MPI_COMM_WORLD: %d\\n\", err);\n}\n\n// Para demonstrar o teste em um intercomunicador, precisamos primeiro cri\u00e1-lo.\n// Usaremos MPI_Comm_spawn para iniciar um processo filho e obter um intercomunicador.\n// Apenas o processo raiz (rank 0) do MPI_COMM_WORLD ir\u00e1 chamar MPI_Comm_spawn.\nif (rank == 0) {\n    // Declara\u00e7\u00f5es adicionais para MPI_Comm_spawn\n    char *command = \"./child_program_test\"; // Um programa filho fict\u00edcio (deve existir e ser execut\u00e1vel)\n    char *argv[] = {NULL}; // Sem argumentos para o filho\n    int maxprocs = 1; // Spawnar 1 processo filho\n    MPI_Info info_spawn = MPI_INFO_NULL; // Sem objeto MPI_Info espec\u00edfico\n    int root = 0; // O root \u00e9 o processo atual (rank 0)\n    int errcodes[1]; // Array para c\u00f3digos de erro do processo filho\n\n    // Chamada para spawnar um processo filho e criar um intercomunicador\n    err = MPI_Comm_spawn(command, argv, maxprocs, info_spawn, root, comm_world, &intercomm_spawned, errcodes);\n\n    if (err == MPI_SUCCESS) {\n        // Sucesso no spawn. 'intercomm_spawned' agora \u00e9 um intercomunicador v\u00e1lido.\n        // Testar o intercomunicador criado (flag_spawned deve ser 1)\n        err = MPI_Comm_test_inter(intercomm_spawned, &flag_spawned);\n\n        if (err == MPI_SUCCESS) {\n            // printf(\"O intercomunicador_spawned \u00e9 um %scomunicador.\\n\", flag_spawned ? \"inter\" : \"intra\");\n        } else {\n            // printf(\"Erro ao testar o intercomunicador_spawned: %d\\n\", err);\n        }\n\n        // Realizar limpeza do intercomunicador\n        MPI_Comm_free(&intercomm_spawned);\n    } else {\n        // printf(\"Erro ao spawnar processo filho: %d\\n\", err);\n    }\n}\n// Nota: O processo filho (child_program_test) precisaria ser um programa MPI completo,\n// com MPI_Init, MPI_Comm_get_parent() para obter seu comunicador com o pai, e MPI_Finalize.\n"}, {"name": "MPI_Compare_and_swap", "short_desc": "Realiza uma opera\u00e7\u00e3o at\u00f4mica unilateral de comparar-e-trocar.", "synopsis": "int MPI_Compare_and_swap(const void *origin_addr, const void *compare_addr, void *result_addr, MPI_Datatype datatype, int target_rank, MPI_Aint target_disp, MPI_Win win)", "params": [{"name": "origin_addr", "desc": "Endere\u00e7o inicial do buffer de origem (escolha)."}, {"name": "compare_addr", "desc": "Endere\u00e7o inicial do buffer de compara\u00e7\u00e3o (escolha)."}, {"name": "datatype", "desc": "Tipo de dado do elemento em todos os buffers (handle)."}, {"name": "target_rank", "desc": "Rank do alvo (inteiro n\u00e3o negativo)."}, {"name": "target_disp", "desc": "Deslocamento do in\u00edcio da janela at\u00e9 o in\u00edcio do buffer alvo (inteiro n\u00e3o negativo)."}, {"name": "win", "desc": "Objeto de janela (handle)."}, {"name": "result_addr", "desc": "Endere\u00e7o inicial do buffer de resultado (escolha)."}], "description": "Realiza uma opera\u00e7\u00e3o at\u00f4mica de compara\u00e7\u00e3o e troca em uma janela de mem\u00f3ria remota. Se o valor no alvo for igual ao valor de compara\u00e7\u00e3o, ele \u00e9 substitu\u00eddo pelo valor de origem.", "application": "Implementa\u00e7\u00e3o de sem\u00e1foros, travas (locks) ou estruturas de dados concorrentes em mem\u00f3ria distribu\u00edda.", "example": "// Declara\u00e7\u00f5es\nint err;\nint rank, size; // Rank e size do comunicador original\nMPI_Comm comm = MPI_COMM_WORLD;\n\n// Obter rank e size do comunicador original\nMPI_Comm_rank(comm, &rank);\nMPI_Comm_size(comm, &size);\n\n// Vari\u00e1veis para a opera\u00e7\u00e3o de Compara\u00e7\u00e3o e Troca At\u00f4mica (CAS)\nint *local_data_window = NULL; // Ponteiro para a mem\u00f3ria da janela no processo alvo\nint origin_val = rank + 100;     // Valor que o processo 'origin' tenta escrever\nint compare_val;                 // Valor para compara\u00e7\u00e3o\nint result_val;                  // Valor lido do alvo ANTES da opera\u00e7\u00e3o CAS\n\nMPI_Datatype datatype = MPI_INT;\nint target_rank = 0;              // O processo 0 ser\u00e1 o alvo da opera\u00e7\u00e3o CAS\nMPI_Aint target_disp = 0;         // Deslocamento dentro da janela do alvo (neste caso, 0)\nMPI_Win win = MPI_WIN_NULL;       // Objeto de janela RMA\n\n// O processo alvo (target_rank) aloca mem\u00f3ria e cria a janela\nif (rank == target_rank) {\n    // Alocar mem\u00f3ria alinhada para RMA\n    MPI_Alloc_mem(sizeof(int), MPI_INFO_NULL, &local_data_window);\n    *local_data_window = 50; // Valor inicial na janela do processo alvo\n    // printf(\"Processo %d (alvo): Valor inicial na janela = %d\\n\", rank, *local_data_window);\n} else {\n    // Outros processos n\u00e3o alocam mem\u00f3ria para si, apenas a acessam remotamente\n    local_data_window = NULL;\n}\n\n// Criar o objeto de janela em todos os processos. O processo alvo fornece o buffer, outros NULL.\nMPI_Win_create(local_data_window, (rank == target_rank ? sizeof(int) : 0), sizeof(int), MPI_INFO_NULL, comm, &win);\n\n// Sincroniza\u00e7\u00e3o: todos os processos iniciam um fence para abrir acesso \u00e0 janela\n// MPI_Win_fence \u00e9 uma forma de sincroniza\u00e7\u00e3o coletiva. Alternativas s\u00e3o Active Target.\nMPI_Win_fence(0, win);\n\nif (rank != target_rank) {\n    // Outros processos (diferentes do alvo) tentam realizar a opera\u00e7\u00e3o CAS\n    // Definir o valor para compara\u00e7\u00e3o.\n    // Vamos tentar comparar com o valor inicial esperado (50) e, se igual, trocar para origin_val.\n    compare_val = 50;\n    \n    // Chamada da fun\u00e7\u00e3o MPI_Compare_and_swap\n    // origin_addr: valor que ser\u00e1 escrito no alvo se a compara\u00e7\u00e3o for bem-sucedida\n    // compare_addr: valor com o qual o valor atual do alvo ser\u00e1 comparado\n    // result_addr: onde o valor ANTERIOR do alvo ser\u00e1 armazenado\n    err = MPI_Compare_and_swap(&origin_val, &compare_val, &result_val, datatype, target_rank, target_disp, win);\n\n    if (err == MPI_SUCCESS) {\n        // printf(\"Processo %d: CAS bem-sucedido. Valor lido antes da troca: %d. Tentou comparar com %d e trocar por %d.\\n\", rank, result_val, compare_val, origin_val);\n    } else {\n        // printf(\"Processo %d: Erro na opera\u00e7\u00e3o CAS: %d\\n\", rank, err);\n    }\n}\n\n// Sincroniza\u00e7\u00e3o: todos os processos fecham o fence para garantir que as opera\u00e7\u00f5es RMA foram conclu\u00eddas\nMPI_Win_fence(0, win);\n\n// Ap\u00f3s a sincroniza\u00e7\u00e3o, o processo alvo pode verificar o valo
