r fornecido pelo usu\u00e1rio."}, {"name": "size", "desc": "Tamanho do buffer em bytes."}], "description": "O tamanho (size) fornecido deve ser a soma dos tamanhos de todos os envios no modo buffer (Bsends) pendentes previstos, mais MPI_BSEND_OVERHEAD para cada chamada a Bsend. Para o prop\u00f3sito de calcular o tamanho de uma mensagem, voc\u00ea deve usar MPI_Pack_size. O valor MPI_BSEND_OVERHEAD fornece a quantidade m\u00e1xima de espa\u00e7o extra que pode ser usado por Bsend nas estruturas de controle do buffer, definido em mpi.h.", "application": "Fornecer \u00e0 implementa\u00e7\u00e3o MPI o espa\u00e7o em mem\u00f3ria onde as mensagens do MPI_Bsend ser\u00e3o copiadas at\u00e9 que a infraestrutura de rede possa transferir definitivamente os dados ao destino.", "example": "// Declara\u00e7\u00f5es\nchar *user_buffer = NULL; // Ponteiro para o buffer alocado pelo usu\u00e1rio\nint buffer_size_bytes; // Tamanho do buffer em bytes\nint packed_data_size; // Tamanho dos dados a serem embalados (para c\u00e1lculo do buffer)\nMPI_Comm comm_buffer_attach = MPI_COMM_WORLD; // Comunicador para MPI_Pack_size\nvoid *detached_ptr = NULL; // Ponteiro para armazenar o endere\u00e7o do buffer desanexado\nint detached_size;         // Para armazenar o tamanho do buffer desanexado\nint err;\n\n// Determina o tamanho do buffer necess\u00e1rio para opera\u00e7\u00f5es de envio bufferizadas.\n// Por exemplo, se planejamos enviar 10 inteiros usando MPI_Bsend, precisamos calcular\n// o espa\u00e7o que eles ocupariam, mais o overhead do MPI.\nint num_elements_to_send = 10; // Exemplo de quantidade de dados a serem enviados\nerr = MPI_Pack_size(num_elements_to_send, MPI_INT, comm_buffer_attach, &packed_data_size);\n\nif (err == MPI_SUCCESS) {\n    // O tamanho total do buffer deve incluir o overhead que o MPI pode usar para suas\n    // estruturas de controle internas para cada mensagem Bsend.\n    buffer_size_bytes = packed_data_size + MPI_BSEND_OVERHEAD; // Tamanho total necess\u00e1rio\n\n    // Aloca a mem\u00f3ria para o buffer que ser\u00e1 fornecido pelo usu\u00e1rio ao MPI.\n    user_buffer = (char *)malloc(buffer_size_bytes);\n\n    if (user_buffer == NULL) {\n        // Erro: falha na aloca\u00e7\u00e3o de mem\u00f3ria\n        return 1;\n    }\n\n    // Anexa o buffer alocado pelo usu\u00e1rio ao MPI. Uma vez anexado, este buffer ser\u00e1\n    // usado automaticamente por todas as chamadas subsequentes de MPI_Bsend.\n    err = MPI_Buffer_attach(user_buffer, buffer_size_bytes);\n\n    if (err == MPI_SUCCESS) {\n        // O buffer foi anexado com sucesso.\n        // A partir deste ponto, chamadas a MPI_Bsend utilizar\u00e3o este buffer.\n        // (Nenhuma chamada a MPI_Bsend \u00e9 feita neste exemplo para focar apenas em attach/detach).\n\n        // --- Limpeza: Desanexar e liberar o buffer ---\n        // Mesmo que nenhum MPI_Bsend tenha sido feito, \u00e9 importante mostrar o ciclo completo.\n        // MPI_Buffer_detach bloqueia at\u00e9 que todas as mensagens pendentes tenham sido enviadas.\n        err = MPI_Buffer_detach(&detached_ptr, &detached_size);\n\n        if (err == MPI_SUCCESS) {\n            // O buffer foi desanexado. `detached_ptr` apontar\u00e1 para `user_buffer`.\n            if (detached_ptr != NULL) {\n                free(detached_ptr); // Libera a mem\u00f3ria alocada\n                detached_ptr = NULL; // Evita uso de ponteiro inv\u00e1lido\n            }\n        } else {\n            // Lidar com erro ao desanexar o buffer. Tentar liberar a mem\u00f3ria alocada mesmo assim.\n            if (user_buffer != NULL) {\n                free(user_buffer);\n                user_buffer = NULL;\n            }\n        }\n    } else {\n        // Erro ao anexar o buffer. Libera a mem\u00f3ria alocada.\n        if (user_buffer != NULL) {\n            free(user_buffer);\n            user_buffer = NULL;\n        }\n    }\n} else {\n    // Erro ao chamar MPI_Pack_size.\n}\n"}, {"name": "MPI_Buffer_detach", "short_desc": "Remove um buffer existente configurado previamente (usado pelo MPI_Bsend).", "synopsis": "int MPI_Buffer_detach(void *buffer_addr, int *size)\nint MPI_Buffer_detach_c(void *buffer_addr, MPI_Count *size)", "params": [{"name": "buffer_addr", "desc": "Ponteiro inicial para o endere\u00e7o do buffer a ser desanexado."}, {"name": "size", "desc": "Tamanho do buffer em bytes (sa\u00edda)."}], "description": "Desanexa o buffer associado \u00e0s rotinas de envio no modo buffer. A fun\u00e7\u00e3o bloquear\u00e1 at\u00e9 que todas as mensagens pendentes (via MPI_Bsend) no buffer tenham sido seguramente despachadas. Ela retorna o endere\u00e7o e o tamanho originais alocados para que o usu\u00e1rio ou uma biblioteca aninhada possa recuperar ou substituir esses recursos. Retorna tamanho zero e sucesso se n\u00e3o houver um buffer atual configurado.", "application": "Sincronizar a libera\u00e7\u00e3o de mem\u00f3ria atrelada a envios sob o modo bufferizado, ou proteger trechos de c\u00f3digo em bibliotecas isolando as \u00e1reas de buffer.", "example": "// Declara\u00e7\u00f5es\nchar *attached_user_buffer = NULL; // Ponteiro para o buffer anexado\nint calculated_buffer_size; // Tamanho do buffer anexado\nint packed_size_detach; // Tamanho dos dados a serem embalados\nvoid *detached_buffer_addr = NULL; // Ponteiro para armazenar o endere\u00e7o do buffer desanexado\nint detached_buffer_size = 0; // Para armazenar o tamanho do buffer desanexado\nint send_value = 999; // Valor a ser enviado via MPI_Bsend\nint recv_value; // Valor a ser recebido via MPI_Recv\nMPI_Request recv_request; // Requisi\u00e7\u00e3o para MPI_Irecv no processo receptor\nMPI_Status status_detach; // Status para opera\u00e7\u00f5es de comunica\u00e7\u00e3o\nint rank_detach;\nint size_detach;\nint dest_detach = 1; // Processo de destino\nint source_detach = 0; // Processo de origem\nint tag_detach = 300; // Etiqueta da mensagem\nMPI_Comm comm_detach = MPI_COMM_WORLD; // Comunicador\nint err;\n\n// Obt\u00e9m rank e size do comunicador\nMPI_Comm_rank(comm_detach, &rank_detach);\nMPI_Comm_size(comm_detach, &size_detach);\n\n// Garante que h\u00e1 pelo menos 2 processos para comunica\u00e7\u00e3o bidirecional\nif (size_detach < 2) {\n    return 1;\n}\n\n// --- Parte 1: Anexar um buffer (necess\u00e1rio antes de detach) ---\n// Calcula o tamanho necess\u00e1rio para o buffer para 1 inteiro + overhead\nerr = MPI_Pack_size(1, MPI_INT, comm_detach, &packed_size_detach);\n\nif (err == MPI_SUCCESS) {\n    calculated_buffer_size = packed_size_detach + MPI_BSEND_OVERHEAD;\n    attached_user_buffer = (char *)malloc(calculated_buffer_size);\n\n    if (attached_user_buffer == NULL) {\n        // Erro na aloca\u00e7\u00e3o de mem\u00f3ria\n        return 1;\n    }\n\n    err = MPI_Buffer_attach(attached_user_buffer, calculated_buffer_size);\n\n    if (err == MPI_SUCCESS) {\n        // --- Parte 2: Realizar um MPI_Bsend para ter algo no buffer ---\n        if (rank_detach == source_detach) {\n            // O processo de origem envia uma mensagem bufferizada.\n            // Esta chamada retorna imediatamente, e a mensagem fica no buffer.\n            err = MPI_Bsend(&send_value, 1, MPI_INT, dest_detach, tag_detach, comm_detach);\n            if (err == MPI_SUCCESS) {\n                // Envio bufferizado iniciado.\n            } else {\n                // Erro ao chamar MPI_Bsend.\n            }\n        } else if (rank_detach == dest_detach) {\n            // O processo de destino inicia uma recep\u00e7\u00e3o n\u00e3o bloqueante\n            // para que o envio bufferizado possa ser correspondido e conclu\u00eddo.\n            err = MPI_Irecv(&recv_value, 1, MPI_INT, source_detach, tag_detach, comm_detach, &recv_request);\n            if (err == MPI_SUCCESS) {\n                // Recep\u00e7\u00e3o n\u00e3o bloqueante iniciada.\n            } else {\n                // Erro ao chamar MPI_Irecv.\n            }\n        }\n\n        // --- Parte 3: Desanexar o buffer ---\n        // MPI_Buffer_detach bloquear\u00e1 at\u00e9 que o MPI_Bsend pendente no buffer tenha sido conclu\u00eddo\n        // (ou seja, a mensagem foi entregue ou o MPI a moveu para seu pr\u00f3prio buffer interno).\n        err = MPI_Buffer_detach(&detached_buffer_addr, &detached_buffer_size);\n\n        if (err == MPI_SUCCESS) {\n            // Verifica se o ponteiro e o tamanho retornados correspondem aos originais.\n            if (detached_buffer_addr == attached_user_buffer && detached_buffer_size == calculated_buffer_size) {\n                // Sucesso: Buffer desanexado e dados de retorno consistentes.\n            } else {\n                // Inconsist\u00eancia nos dados de retorno do detach.\n            }\n            // Libera a mem\u00f3ria alocada para o buffer, agora que foi desanexado e esvaziado.\n            if (detached_buffer_addr != NULL) {\n                free(detached_buffer_addr);\n                detached_buffer_addr = NULL;\n            }\n        } else {\n            // Lidar com erro ao desanexar o buffer.\n            // Se houve erro e o buffer n\u00e3o foi desanexado, ainda precisamos liberar a mem\u00f3ria original.\n            if (attached_user_buffer != NULL) {\n                free(attached_user_buffer);\n                attached_user_buffer = NULL;\n            }\n        }\n\n        // --- Limpeza adicional para o receptor ---\n        if (rank_detach == dest_detach) {\n            // Garante que a requisi\u00e7\u00e3o de recep\u00e7\u00e3o n\u00e3o bloqueante \u00e9 completada.\n            err = MPI_Wait(&recv_request, &status_detach);\n            if (err != MPI_SUCCESS) {\n                // Lidar com erro no MPI_Wait.\n            }\n        }\n    } else {\n        // Erro ao chamar MPI_Buffer_attach. Libera o buffer alocado.\n        if (attached_user_buffer != NULL) {\n            free(attached_user_buffer);\n            attached_user_buffer = NULL;\n        }\n    }\n} else {\n    // Erro ao chamar MPI_Pack_size.\n}\n"}, {"name": "MPI_Cancel", "short_desc": "Cancela uma requisi\u00e7\u00e3o de comunica\u00e7\u00e3o pendente.", "synopsis": "int MPI_Cancel(MPI_Request *request)", "params": [{"name": "request", "desc": "Requisi\u00e7\u00e3o de comunica\u00e7\u00e3o persistente ou n\u00e3o-bloqueante."}], "description": "Inicia o procedimento para o cancelamento de uma requisi\u00e7\u00e3o de opera\u00e7\u00e3o de comunica\u00e7\u00e3o ass\u00edncrona. O uso principal esperado \u00e9 em esquemas onde mensagens s\u00e3o esperadas especulativamente (MPI_Irecv), permitindo que requisi\u00e7\u00f5es de recep\u00e7\u00e3o ociosas sejam canceladas.\nCancelar uma opera\u00e7\u00e3o de envio (Send) tem chances menores de ocorrer suavemente por conta de suas caracter\u00edsticas otimistas (informa\u00e7\u00f5es partindo imediatamente) e, embora v\u00e1lido localmente de acordo com a norma, costuma incorrer em custo computacional e troca de mensagens extras nos bastidores.", "application": "Gest\u00e3o de fluxo e descarte de especula\u00e7\u00e3o na computa\u00e7\u00e3o (opera\u00e7\u00f5es onde \"se\" ocorrer um evento, a comunica\u00e7\u00e3o completa; se n\u00e3o, o `MPI_Cancel` faz a limpeza da requisi\u00e7\u00e3o de recebimento pendente).", "example": "// Declara\u00e7\u00f5es\nint rank_cancel;\nint size_cancel;\nint source_cancel = 0; // Processo que pode enviar dados\nint dest_cancel = 1;   // Processo que postar\u00e1 um Irecv e potencialmente o cancelar\u00e1\nint tag_cancel = 400; // Etiqueta da mensagem\nMPI_Comm comm_cancel = MPI_COMM_WORLD; // Comunicador\nint recv_buffer_cancel[10]; // Buffer para a recep\u00e7\u00e3o especulativa\nMPI_Request irecv_request; // Requisi\u00e7\u00e3o da opera\u00e7\u00e3o de recep\u00e7\u00e3o n\u00e3o bloqueante\nMPI_Status status_cancel; // Status da requisi\u00e7\u00e3o ap\u00f3s MPI_Wait\nint cancelled_flag; // Flag para verificar se a requisi\u00e7\u00e3o foi cancelada\nint err;\n\n// Obt\u00e9m rank e size do comunicador\nMPI_Comm_rank(comm_cancel, &rank_cancel);\nMPI_Comm_size(comm_cancel, &size_cancel);\n\n// Garante que h\u00e1 pelo menos 2 processos para o exemplo\nif (size_cancel < 2) {\n    return 1;\n}\n\nif (rank_cancel == dest_cancel) {\n    // Processo de destino inicia uma recep\u00e7\u00e3o n\u00e3o bloqueante (especulativa).\n    // Digamos que ele espera receber 10 inteiros do processo 'source_cancel'.\n    err = MPI_Irecv(recv_buffer_cancel, 10, MPI_INT, source_cancel, tag_cancel, comm_cancel, &irecv_request);\n    if (err == MPI_SUCCESS) {\n        // Em um cen\u00e1rio real, haveria alguma l\u00f3gica para decidir se a recep\u00e7\u00e3o\n        // ainda \u00e9 necess\u00e1ria. Para este exemplo, vamos simplesmente tentar cancelar a requisi\u00e7\u00e3o.\n        // Simula uma condi\u00e7\u00e3o onde a mensagem n\u00e3o \u00e9 mais esperada.\n\n        // Adiciona uma barreira para tentar garantir que o Irecv foi postado antes de um poss\u00edvel envio\n        // (ajuda a evitar que o Irecv seja satisfeito antes do cancelamento ser tentado).\n        MPI_Barrier(comm_cancel);\n\n        // Tenta cancelar a requisi\u00e7\u00e3o de recep\u00e7\u00e3o pendente.\n        // MPI_Cancel \u00e9 uma opera\u00e7\u00e3o local e n\u00e3o bloqueante.\n        err = MPI_Cancel(&irecv_request);\n\n        if (err == MPI_SUCCESS) {\n            // Ap\u00f3s MPI_Cancel, a requisi\u00e7\u00e3o deve ser completada (seja por cancelamento ou por ter sido completada antes).\n            // MPI_Wait (ou MPI_Test) \u00e9 usado para limpar a requisi\u00e7\u00e3o e verificar seu status.\n            err = MPI_Wait(&irecv_request, &status_cancel);\n            \n            if (err == MPI_SUCCESS) {\n                // Verifica se a requisi\u00e7\u00e3o foi realmente cancelada.\n                err = MPI_Test_cancelled(&status_cancel, &cancelled_flag);\n                if (err == MPI_SUCCESS) {\n                    if (cancelled_flag) {\n                        // Requisi\u00e7\u00e3o foi cancelada com sucesso.\n                    } else {\n                        // Requisi\u00e7\u00e3o n\u00e3o foi cancelada (ex: j\u00e1 tinha sido completada, ou n\u00e3o p\u00f4de ser cancelada).\n                    }\n                } else {\n                    // Erro ao chamar MPI_Test_cancelled.\n                }\n            } else {\n                // Erro ao chamar MPI_Wait (pode indicar que a comunica\u00e7\u00e3o n\u00e3o p\u00f4de ser completada ou cancelada).\n            }\n        } else {\n            // Erro ao chamar MPI_Cancel. Se houver um erro, ainda precisamos esperar pela requisi\u00e7\u00e3o original.\n            err = MPI_Wait(&irecv_request, &status_cancel);\n            if (err != MPI_SUCCESS) {\n                // Lidar com erro no MPI_Wait.\n            }\n        }\n    } else {\n        // Erro ao chamar MPI_Irecv.\n    }\n} else if (rank_cancel == source_cancel) {\n    // O processo de origem pode ou n\u00e3o enviar uma mensagem.\n    // Para permitir que o MPI_Cancel tenha uma chance maior de sucesso no receptor,\n    // o remetente n\u00e3o enviar\u00e1 a mensagem neste exemplo.\n\n    // Garante sincronia para que o receptor tenha tempo de postar seu Irecv.\n    MPI_Barrier(comm_cancel);\n\n    // Em um cen\u00e1rio real, um MPI_Isend aqui poderia ou n\u00e3o ser correspondido\n    // dependendo do momento do cancelamento.\n}\n\n// N\u00e3o h\u00e1 recursos adicionais para liberar diretamente de MPI_Cancel. A requisi\u00e7\u00e3o\n// `irecv_request` \u00e9 limpa por MPI_Wait ou MPI_Test."}, {"name": "MPI_Cart_coords", "short_desc": "Determina as coordenadas de um processo na topologia cartesiana a partir do seu rank no grupo.", "synopsis": "int MPI_Cart_coords(MPI_Comm comm, int rank, int maxdims, int coords[])", "params": [{"name": "comm", "desc": "Comunicador com topologia cartesiana associada."}, {"name": "rank", "desc": "Rank do processo dentro do grupo de `comm` para determinar a coordenada."}, {"name": "maxdims", "desc": "Dimens\u00e3o m\u00e1xima ou comprimento da matriz (array) coords."}, {"name": "coords", "desc": "Array de inteiros (tamanho maxdims) contendo as coordenadas Cartesianas correspondentes (sa\u00edda)."}], "description": "Retorna o correspondente vetor de coordenadas (n-dimensionais) para o identificador l\u00f3gico escalar (rank) na topologia cartesiana especificada.", "application": "\u00c9 empregado em c\u00f3digos onde se mapeia processos paralelos num reticulado f\u00edsico ou l\u00f3gico para realizar c\u00e1lculos de diferen\u00e7as finitas, vizinhan\u00e7a na distribui\u00e7\u00e3o de malhas etc.", "example": "// Declara\u00e7\u00f5es\nMPI_Comm cart_comm_coords = MPI_COMM_NULL; // Novo comunicador cartesiano\nint rank_world_coords; // Rank no comunicador global\nint size_world_coords; // Tamanho do comunicador global\nint ndims_coords = 2; // N\u00famero de dimens\u00f5es para a topologia cartesiana\nint dims_coords[2]; // Array para especificar o n\u00famero de processos em cada dimens\u00e3o\nint periods_coords[2] = {0, 1}; // Periodicidade: {n\u00e3o-peri\u00f3dica na dim 0, peri\u00f3dica na dim 1}\nint reorder_coords = 1; // Flag: 1 permite ao MPI reordenar ranks para otimiza\u00e7\u00e3o\nint my_cart_rank_coords; // Rank do processo no novo comunicador cartesiano\nint process_coords[2]; // Array para armazenar as coordenadas cartesianas do processo\nint err;\n\n// Obt\u00e9m o rank e o tamanho do comunicador global\nMPI_Comm_rank(MPI_COMM_WORLD, &rank_world_coords);\nMPI_Comm_size(MPI_COMM_WORLD, &size_world_coords);\n\n// --- Configura\u00e7\u00e3o das dimens\u00f5es para MPI_Cart_create ---\n// Define as dimens\u00f5es da grade cartesiana.\n// MPI_Dims_create \u00e9 uma fun\u00e7\u00e3o utilit\u00e1ria que pode ajudar a distribuir os processos\n// de forma otimizada em uma grade. Aqui, vamos inicializar 'dims_coords' com 0s\n// e deixar MPI_Dims_create preench\u00ea-los automaticamente para uma grade balanceada.\ndims_coords[0] = 0; // Deixa o MPI determinar\ndims_coords[1] = 0; // Deixa o MPI determinar\nerr = MPI_Dims_create(size_world_coords, ndims_coords, dims_coords);\n\nif (err == MPI_SUCCESS) {\n    // Cria o comunicador com a topologia cartesiana\n    err = MPI_Cart_create(MPI_COMM_WORLD, ndims_coords, dims_coords, periods_coords, reorder_coords, &cart_comm_coords);\n\n    if (err == MPI_SUCCESS) {\n        // Verifica se o processo faz parte do novo comunicador.\n        // Se 'reorder_coords' for 0 e o n\u00famero de processos n\u00e3o se encaixar exatamente\n        // na grade, alguns processos podem receber MPI_COMM_NULL.\n        if (cart_comm_coords != MPI_COMM_NULL) {\n            // Obt\u00e9m o rank do processo dentro do novo comunicador cartesiano\n            err = MPI_Comm_rank(cart_comm_coords, &my_cart_rank_coords);\n\n            if (err == MPI_SUCCESS) {\n                // Obt\u00e9m as coordenadas cartesianas para o rank atual no comunicador cartesiano.\n                // 'my_cart_rank_coords' \u00e9 o rank cujo mapeamento desejamos encontrar.\n                // 'ndims_coords' \u00e9 o comprimento m\u00e1ximo do array 'process_coords'.\n                err = MPI_Cart_coords(cart_comm_coords, my_cart_rank_coords, ndims_coords, process_coords);\n\n                if (err == MPI_SUCCESS) {\n                    // Coordenadas obtidas com sucesso. 'process_coords' agora cont\u00e9m as coordenadas.\n                } else {\n                    // Erro ao chamar MPI_Cart_coords.\n                }\n            } else {\n                // Erro ao chamar MPI_Comm_rank no novo comunicador.\n            }\n\n            // --- Limpeza: Libera o comunicador cartesiano --- \n            err = MPI_Comm_free(&cart_comm_coords);\n            if (err != MPI_SUCCESS) {\n                // Lidar com erro na libera\u00e7\u00e3o do comunicador.\n            }\n        } else {\n            // Este processo n\u00e3o foi inclu\u00eddo na topologia cartesiana.\n        }\n    } else {\n        // Erro ao chamar MPI_Cart_create.\n    }\n} else {\n    // Erro ao chamar MPI_Dims_create.\n}\n"}, {"name": "MPI_Cart_create", "short_desc": "Cria um novo comunicador no qual informa\u00e7\u00f5es de topologia cartesiana foram agregadas.", "synopsis": "int MPI_Cart_create(MPI_Comm comm_old, int ndims, const int dims[],\nconst int periods[], int reorder, MPI_Comm *comm_cart)", "params": [{"name": "comm_old", "desc": "Comunicador de entrada."}, {"name": "ndims", "desc": "N\u00famero de dimens\u00f5es da grade (grid) cartesiana."}, {"name": "dims", "desc": "Array de inteiros especificando a quantidade de processos em cada dimens\u00e3o."}, {"name": "periods", "desc": "Array l\u00f3gico/inteiro especificando a periodicidade (true se c\u00edclico) em cada dimens\u00e3o."}, {"name": "reorder", "desc": "Flag que indica se a ordem original dos ranks pode ou n\u00e3o ser reordenada para gerar topologias mais eficientes (logical/integer)."}, {"name": "comm_cart", "desc": "Novo comunicador com atributos cartesianos correspondentes (sa\u00edda)."}], "description": "Gera uma nova topologia cartesiana comunicativa contendo informa\u00e7\u00f5es para facilitar o envio e deslocamento ao longo de dimens\u00f5es estritas do plano ou hipercubo. Se reorder for 0 (falso), o rank do processo n\u00e3o muda. Se for n\u00e3o-nulo (verdadeiro), a infraestrutura poder\u00e1 realocar processos para os recursos f\u00edsicos subjacentes a fim de aproximar a estrutura topol\u00f3gica das conex\u00f5es de rede.", "application": "Constru\u00e7\u00e3o da arquitetura l\u00f3gica de comunica\u00e7\u00e3o de um aplicativo distribu\u00eddo, base elementar para computa\u00e7\u00e3o em matrizes multidimensionais (como processamento de imagem, fluidos, matrizes densas).", "example": "// Declara\u00e7\u00f5es\nMPI_Comm cart_comm_create = MPI_COMM_NULL; // Vari\u00e1vel para o novo comunicador cartesiano (inicializa com NULL)\nint rank_world_create; // Rank no comunicador global\nint size_world_create; // Tamanho do comunicador global\nint ndims_create = 2; // N\u00famero de dimens\u00f5es da grade cartesiana (ex: 2D)\nint dims_create[2]; // Array para especificar o n\u00famero de processos em cada dimens\u00e3o\nint periods_create[2] = {0, 1}; // Periodicidade: {n\u00e3o-peri\u00f3dica na dim 0, peri\u00f3dica na dim 1}\nint reorder_create = 1; // Flag: 1 permite ao MPI reordenar ranks para otimiza\u00e7\u00e3o, 0 mant\u00e9m ordem original\nint my_new_rank_create; // Rank do processo no novo comunicador (se for diferente do rank original)\nint err;\n\n// Obt\u00e9m o rank e o tamanho do comunicador global\nMPI_Comm_rank(MPI_COMM_WORLD, &rank_world_create);\nMPI_Comm_size(MPI_COMM_WORLD, &size_world_create);\n\n// --- Configura\u00e7\u00e3o das dimens\u00f5es para a grade cartesiana ---\n// MPI_Dims_create \u00e9 uma fun\u00e7\u00e3o utilit\u00e1ria que ajuda a definir as dimens\u00f5es de forma balanceada.\n// Inicializamos 'dims_create' com 0s e deixamos MPI_Dims_create preench\u00ea-los.\ndims_create[0] = 0; // Deixa o MPI determinar a dimens\u00e3o 0\ndims_create[1] = 0; // Deixa o MPI determinar a dimens\u00e3o 1\nerr = MPI_Dims_create(size_world_create, ndims_create, dims_create);\n\nif (err == MPI_SUCCESS) {\n    // Cria o comunicador com a topologia cartesiana.\n    // O MPI_COMM_WORLD \u00e9 o comunicador de entrada 'comm_old'.\n    err = MPI_Cart_create(MPI_COMM_WORLD, ndims_create, dims_create, periods_create, reorder_create, &cart_comm_create);\n\n    if (err == MPI_SUCCESS) {\n        // Verifica se o processo faz parte do novo comunicador.\n        // Se 'reorder_create' for 0 e o n\u00famero de processos n\u00e3o se encaixar exatamente\n        // na grade, alguns processos podem receber MPI_COMM_NULL para 'comm_cart_create'.\n        if (cart_comm_create != MPI_COMM_NULL) {\n            // O comunicador cartesiano foi criado com sucesso.\n            // Obt\u00e9m o rank do processo dentro do novo comunicador cartesiano.\n            err = MPI_Comm_rank(cart_comm_create, &my_new_rank_create);\n            if (err == MPI_SUCCESS) {\n                // 'my_new_rank_create' \u00e9 o rank do processo no comunicador cartesiano.\n                // Este rank pode ser diferente de 'rank_world_create' se 'reorder_create' for 1.\n            } else {\n                // Erro ao chamar MPI_Comm_rank no novo comunicador.\n            }\n\n            // --- Limpeza: Libera o comunicador cartesiano --- \n            err = MPI_Comm_free(&cart_comm_create);\n            if (err != MPI_SUCCESS) {\n                // Lidar com erro na libera\u00e7\u00e3o do comunicador.\n            }\n        } else {\n            // Este processo n\u00e3o foi inclu\u00eddo na topologia cartesiana.\n            // Isso pode acontecer se 'reorder_create' for 0 e o n\u00famero de processos n\u00e3o se\n            // encaixar perfeitamente na grade especificada por 'dims_create'.\n        }\n    } else {\n        // Erro ao chamar MPI_Cart_create.\n    }\n} else {\n    // Erro ao chamar MPI_Dims_create.\n}\n"}, {"name": "MPI_Cart_get", "short_desc": "Recupera informa\u00e7\u00f5es da topologia cartesiana associada a um comunicador.", "synopsis": "int MPI_Cart_get(MPI_Comm comm, int maxdims, int dims[], int periods[], int coords[])", "params": [{"name": "comm", "desc": "Comunicador com estrutura cartesiana (handle)."}, {"name": "maxdims", "desc": "Comprimento dos vetores dims, periods e coords no programa chamador (inteiro)."}, {"name": "dims", "desc": "N\u00famero de processos para cada dimens\u00e3o cartesiana (vetor de inteiros)."}, {"name": "periods", "desc": "Periodicidade para cada dimens\u00e3o cartesiana (vetor de l\u00f3gicos)."}, {"name": "coords", "desc": "Coordenadas do processo chamador na estrutura cartesiana (vetor de inteiros)."}], "description": "Recupera as informa\u00e7\u00f5es da topologia cartesiana associada ao comunicador especificado. Retorna o n\u00famero de dimens\u00f5es, as dimens\u00f5es, a periodicidade de cada dimens\u00e3o e as coordenadas do processo chamador na grade cartesiana.", "application": "Utilizada para que um processo descubra sua pr\u00f3pria posi\u00e7\u00e3o e a estrutura de uma grade cartesiana na qual ele est\u00e1 inserido.", "example": "// Declara\u00e7\u00f5es\nMPI_Comm cart_comm = MPI_COMM_NULL;\nint rank, size;\nint ndims_create = 2; // N\u00famero de dimens\u00f5es para a topologia cartesiana\nint dims_create[2] = {0, 0}; // Dimens\u00f5es da grade, ser\u00e3o preenchidas por MPI_Dims_create\nint periods_create[2] = {1, 0}; // Periodicidade: dimens\u00e3o 0 \u00e9 peri\u00f3dica, dimens\u00e3o 1 n\u00e3o\nint reorder = 1; // Permitir que o MPI reordene os ranks\nint maxdims = 2; // Tamanho m\u00e1ximo dos arrays para recuperar informa\u00e7\u00f5es\nint dims_get[2]; // Array para armazenar o n\u00famero de processos em cada dimens\u00e3o\nint periods_get[2]; // Array para armazenar a periodicidade de cada dimens\u00e3o\nint coords_get[2]; // Array para armazenar as coordenadas do processo chamador\nint err;\n\n// Obter o rank e o tamanho de MPI_COMM_WORLD para criar a topologia cartesiana\nMPI_Comm_rank(MPI_COMM_WORLD, &rank);\nMPI_Comm_size(MPI_COMM_WORLD, &size);\n\n// Calcular as dimens\u00f5es ideais da grade cartesiana\n// Para um ambiente com 4 processos, por exemplo, dims_create pode ser {2, 2}\nMPI_Dims_create(size, ndims_create, dims_create);\n\n// Criar o comunicador cartesiano\nerr = MPI_Cart_create(MPI_COMM_WORLD, ndims_create, dims_create, periods_create, reorder, &cart_comm);\n\nif (err == MPI_SUCCESS && cart_comm != MPI_COMM_NULL) {\n    // Recuperar as informa\u00e7\u00f5es da topologia cartesiana do comunicador\n    // maxdims deve ser igual ou maior que o n\u00famero real de dimens\u00f5es (ndims_create)\n    err = MPI_Cart_get(cart_comm, maxdims, dims_get, periods_get, coords_get);\n\n    if (err == MPI_SUCCESS) {\n        // As informa\u00e7\u00f5es da topologia est\u00e3o agora em dims_get, periods_get e coords_get.\n        // fprintf(stderr, \"Rank %d: Coordenadas (%d, %d) na grade %dx%d (Periodicidade: %d, %d)\\n\", \n        //          rank, coords_get[0], coords_get[1], dims_get[0], dims_get[1], periods_get[0], periods_get[1]);\n    }\n}\n\n// Limpeza: Liberar o comunicador cartesiano, se foi criado e n\u00e3o \u00e9 nulo.\nif (cart_comm != MPI_COMM_NULL) {\n    MPI_Comm_free(&cart_comm);\n}\n"}, {"name": "MPI_Cart_map", "short_desc": "Mapeia um processo para informa\u00e7\u00f5es de topologia cartesiana.", "synopsis": "int MPI_Cart_map(MPI_Comm comm, int ndims, const int dims[], const int periods[], int *newrank)", "params": [{"name": "comm", "desc": "Comunicador de entrada (handle)."}, {"name": "ndims", "desc": "N\u00famero de dimens\u00f5es da estrutura cartesiana (inteiro)."}, {"name": "dims", "desc": "Vetor de inteiros de tamanho ndims especificando o n\u00famero de processos em cada dimens\u00e3o."}, {"name": "periods", "desc": "Vetor de inteiros (l\u00f3gicos) de tamanho ndims especificando a periodicidade em cada dimens\u00e3o."}, {"name": "newrank", "desc": "Rank do processo chamador na nova topologia cartesiana (inteiro). Retorna MPI_UNDEFINED se o processo n\u00e3o fizer parte da topologia."}], "description": "Calcula o rank \"ideal\" de um processo chamador em uma topologia cartesiana baseada no comunicador original. Esta fun\u00e7\u00e3o \u00e9 usada pelo sistema para otimizar o mapeamento de processos virtuais para a topologia da m\u00e1quina f\u00edsica.", "application": "\u00datil para criar mapeamentos otimizados de processos para topologias de hardware antes de efetivamente criar o comunicador cartesiano.", "example": "// Declara\u00e7\u00f5es\nint rank, size;\nint ndims = 2; // N\u00famero de dimens\u00f5es da estrutura cartesiana hipot\u00e9tica\nint dims[2] = {0, 0}; // Vetor para especificar o n\u00famero de processos em cada dimens\u00e3o\nint periods[2] = {1, 0}; // Periodicidade: dimens\u00e3o 0 peri\u00f3dica, dimens\u00e3o 1 n\u00e3o peri\u00f3dica\nint newrank_map; // Rank \"ideal\" do processo chamador na nova topologia\nint err;\n\n// Obter o rank e o tamanho de MPI_COMM_WORLD para simular a cria\u00e7\u00e3o da topologia\nMPI_Comm_rank(MPI_COMM_WORLD, &rank);\nMPI_Comm_size(MPI_COMM_WORLD, &size);\n\n// Calcular as dimens\u00f5es ideais da grade cartesiana para 'size' processos\n// Por exemplo, para size=4, dims pode se tornar {2, 2}\nMPI_Dims_create(size, ndims, dims);\n\n// Calcular o rank \"ideal\" do processo chamador em uma topologia cartesiana hipot\u00e9tica\n// MPI_COMM_WORLD \u00e9 usado como o comunicador base para o mapeamento.\n// Esta fun\u00e7\u00e3o apenas calcula um rank, n\u00e3o cria um comunicador real.\nerr = MPI_Cart_map(MPI_COMM_WORLD, ndims, dims, periods, &newrank_map);\n\nif (err == MPI_SUCCESS) {\n    // O valor de newrank_map representa o rank que este processo teria\n    // se um comunicador cartesiano com as especifica\u00e7\u00f5es dadas fosse criado.\n    // Pode ser MPI_UNDEFINED se o processo n\u00e3o fizer parte da topologia calculada.\n    // fprintf(stderr, \"Rank %d de MPI_COMM_WORLD seria rank %d na nova topologia cartesiana hipot\u00e9tica.\\n\", rank, newrank_map);\n}\n\n// MPI_Cart_map n\u00e3o cria novos recursos de comunicador que precisem de limpeza,\n// apenas calcula um rank. A limpeza \u00e9 desnecess\u00e1ria.\n"}, {"name": "MPI_Cart_rank", "short_desc": "Determina o rank de um processo em um comunicador dado sua localiza\u00e7\u00e3o cartesiana.", "synopsis": "int MPI_Cart_rank(MPI_Comm comm, const int coords[], int *rank)", "params": [{"name": "comm", "desc": "Comunicador com estrutura cartesiana (handle)."}, {"name": "coords", "desc": "Vetor de inteiros contendo as coordenadas cartesianas do processo."}, {"name": "rank", "desc": "Rank do processo especificado (inteiro)."}], "description": "Transforma coordenadas cartesianas no rank correspondente do processo dentro do comunicador. Se a dimens\u00e3o n\u00e3o for peri\u00f3dica e a coordenada estiver fora dos limites, o resultado \u00e9 err\u00f4neo (dependendo da implementa\u00e7\u00e3o, pode retornar MPI_PROC_NULL).", "application": "Permite que um processo obtenha o rank de outro processo com base em suas coordenadas na grade cartesiana para o envio de mensagens ponto a ponto.", "example": "// Declara\u00e7\u00f5es\nMPI_Comm cart_comm = MPI_COMM_NULL;\nint rank, size;\nint ndims_create = 2; // N\u00famero de dimens\u00f5es para a topologia cartesiana\nint dims_create[2] = {0, 0}; // Dimens\u00f5es da grade\nint periods_create[2] = {0, 0}; // N\u00e3o peri\u00f3dica em ambas as dimens\u00f5es\nint reorder = 0; // N\u00e3o permitir reordenamento\nint target_coords[2] = {0, 1}; // Coordenadas para as quais queremos encontrar o rank\nint target_rank; // Rank correspondente \u00e0s coordenadas\nint err;\n\n// Obter o rank e o tamanho de MPI_COMM_WORLD para criar a topologia cartesiana\nMPI_Comm_rank(MPI_COMM_WORLD, &rank);\nMPI_Comm_size(MPI_COMM_WORLD, &size);\n\n// Definir dimens\u00f5es espec\u00edficas ou calcul\u00e1-las.\n// Para este exemplo, vamos assumir uma grade 2xN ou NxD.\nMPI_Dims_create(size, ndims_create, dims_create);\n\n// Garantir que as coordenadas alvo sejam v\u00e1lidas dentro da grade criada.\n// Se target_coords[0] for maior que dims_create[0]-1 ou target_coords[1] maior que dims_create[1]-1,\n// MPI_Cart_rank pode retornar MPI_PROC_NULL.\nif (dims_create[0] == 0) dims_create[0] = 1;\nif (dims_create[1] == 0) dims_create[1] = 1;\n\ntarget_coords[0] = (target_coords[0] < dims_create[0]) ? target_coords[0] : 0;\ntarget_coords[1] = (target_coords[1] < dims_create[1]) ? target_coords[1] : 0;\n\n// Criar o comunicador cartesiano\nerr = MPI_Cart_create(MPI_COMM_WORLD, ndims_create, dims_create, periods_create, reorder, &cart_comm);\n\nif (err == MPI_SUCCESS && cart_comm != MPI_COMM_NULL) {\n    // Transformar as coordenadas cartesianas no rank correspondente\n    err = MPI_Cart_rank(cart_comm, target_coords, &target_rank);\n\n    if (err == MPI_SUCCESS) {\n        // target_rank agora cont\u00e9m o rank do processo com as coordenadas especificadas.\n        // Se as coordenadas estiverem fora dos limites de uma dimens\u00e3o n\u00e3o peri\u00f3dica, target_rank pode ser MPI_PROC_NULL.\n        // fprintf(stderr, \"Rank %d: As coordenadas (%d, %d) correspondem ao rank %d.\\n\", rank, target_coords[0], target_coords[1], target_rank);\n    }\n}\n\n// Limpeza: Liberar o comunicador cartesiano, se foi criado e n\u00e3o \u00e9 nulo.\nif (cart_comm != MPI_COMM_NULL) {\n    MPI_Comm_free(&cart_comm);\n}\n"}, {"name": "MPI_Cart_shift", "short_desc": "Retorna os ranks de origem e destino para uma opera\u00e7\u00e3o de deslocamento em uma dire\u00e7\u00e3o e quantidade especificadas.", "synopsis": "int MPI_Cart_shift(MPI_Comm comm, int direction, int disp, int *rank_source, int *rank_dest)", "params": [{"name": "comm", "desc": "Comunicador com estrutura cartesiana (handle)."}, {"name": "direction", "desc": "Dimens\u00e3o da coordenada ao longo da qual o deslocamento ser\u00e1 realizado (inteiro)."}, {"name": "disp", "desc": "Deslocamento (inteiro). Valores positivos deslocam para \"frente\" e negativos para \"tr\u00e1s\"."}, {"name": "rank_source", "desc": "Rank do processo de origem (inteiro)."}, {"name": "rank_dest", "desc": "Rank do processo de destino (inteiro)."}], "description": "Dada a dire\u00e7\u00e3o do deslocamento e o tamanho do passo (disp), esta fun\u00e7\u00e3o computa os ranks do vizinho anterior (rank_source) e do vizinho posterior (rank_dest) na topologia cartesiana. Se o deslocamento ultrapassar os limites e a topologia n\u00e3o for peri\u00f3dica na dire\u00e7\u00e3o especificada, ser\u00e1 retornado MPI_PROC_NULL.", "application": "Essencial para calcular ranks vizinhos em opera\u00e7\u00f5es de troca de mensagens (como halo exchange) em grades cartesianas usando opera\u00e7\u00f5es como MPI_Sendrecv.", "example": "// Declara\u00e7\u00f5es\nMPI_Comm cart_comm = MPI_COMM_NULL;\nint rank, size;\nint ndims_create = 2; // N\u00famero de dimens\u00f5es para a topologia cartesiana\nint dims_create[2] = {0, 0}; // Dimens\u00f5es da grade\nint periods_create[2] = {1, 0}; // Periodicidade: dimens\u00e3o 0 \u00e9 peri\u00f3dica, dimens\u00e3o 1 n\u00e3o\nint reorder = 1; // Permitir reordenamento\nint direction = 0; // Dimens\u00e3o ao longo da qual o deslocamento ser\u00e1 realizado (primeira dimens\u00e3o, \u00edndice 0)\nint disp = 1; // Deslocamento de 1 posi\u00e7\u00e3o para 'frente'\nint rank_source; // Rank do vizinho na dire\u00e7\u00e3o 'para tr\u00e1s' (source)\nint rank_dest; // Rank do vizinho na dire\u00e7\u00e3o 'para frente' (destination)\nint sendbuf[10]; // Buffer de envio\nint recvbuf[10]; // Buffer de recebimento\nint count = 10; // N\u00famero de elementos a enviar/receber\nMPI_Status status; // Objeto de status para MPI_Sendrecv\nint i;\nint err;\n\n// Obter o rank e o tamanho de MPI_COMM_WORLD\nMPI_Comm_rank(MPI_COMM_WORLD, &rank);\nMPI_Comm_size(MPI_COMM_WORLD, &size);\n\n// Calcular as dimens\u00f5es ideais da grade cartesiana\nMPI_Dims_create(size, ndims_create, dims_create);\n\n// Criar o comunicador cartesiano\nerr = MPI_Cart_create(MPI_COMM_WORLD, ndims_create, dims_create, periods_create, reorder, &cart_comm);\n\nif (err == MPI_SUCCESS && cart_comm != MPI_COMM_NULL) {\n    // Preencher o buffer de envio com dados espec\u00edficos do rank\n    for (i = 0; i < count; i++) {\n        sendbuf[i] = rank * 100 + i; // Exemplo de dados: cada rank envia um valor distinto\n    }\n\n    // Calcular os ranks dos vizinhos na topologia cartesiana\n    // direction=0 (primeira dimens\u00e3o), disp=1 (deslocar para 'frente' por 1 unidade)\n    err = MPI_Cart_shift(cart_comm, direction, disp, &rank_source, &rank_dest);\n\n    if (err == MPI_SUCCESS) {\n        // Realizar uma comunica\u00e7\u00e3o ponto a ponto com os vizinhos usando MPI_Sendrecv\n        // Envia para rank_dest e recebe de rank_source.\n        // MPI_PROC_NULL \u00e9 retornado para vizinhos que n\u00e3o existem (ex: borda de dimens\u00e3o n\u00e3o peri\u00f3dica).\n        err = MPI_Sendrecv(sendbuf, count, MPI_INT, rank_dest, 0,\n                           recvbuf, count, MPI_INT, rank_source, 0,\n                           cart_comm, &status);\n\n        if (err == MPI_SUCCESS) {\n            // Os dados recebidos est\u00e3o agora em recvbuf.\n            // if (rank_source != MPI_PROC_NULL) {\n            //     fprintf(stderr, \"Rank %d (coords %d,%d) recebeu de %d. Primeiro elemento: %d\\n\", rank, coords[0], coords[1], rank_source, recvbuf[0]);\n            // } else {\n            //     fprintf(stderr, \"Rank %d (coords %d,%d) n\u00e3o recebeu (rank_source \u00e9 NULL).\\n\", rank, coords[0], coords[1]);\n            // }\n        }\n    }\n}\n\n// Limpeza: Liberar o comunicador cartesiano, se foi criado e n\u00e3o \u00e9 nulo.\nif (cart_comm != MPI_COMM_NULL) {\n    MPI_Comm_free(&cart_comm);\n}\n"}, {"name": "MPI_Cart_sub", "short_desc": "Particiona um comunicador em subgrupos que formam subgrades cartesianas de menor dimens\u00e3o.", "synopsis": "int MPI_Cart_sub(MPI_Comm comm, const int remain_dims[], MPI_Comm *newcomm)", "params": [{"name": "comm", "desc": "Comunicador cartesiano de entrada (handle)."}, {"name": "remain_dims", "desc": "A i-\u00e9sima dimens\u00e3o \u00e9 mantida no subgrid (true) ou descartada (false) (vetor de l\u00f3gicos)."}, {"name": "newcomm", "desc": "Novo comunicador que engloba a subgrade cartesiana que inclui o processo chamador (handle)."}], "description": "Cria novos comunicadores dividindo uma grade cartesiana em subgrades de dimens\u00e3o menor. O vetor remain_dims indica quais dimens\u00f5es da grade original far\u00e3o parte do novo comunicador. Por exemplo, em uma grade 2D, se remain_dims indica manter as colunas, as colunas formar\u00e3o comunicadores 1D independentes.", "application": "Utilizada quando opera\u00e7\u00f5es coletivas precisam ser restritas apenas a fatias da grade (por exemplo, um broadcast ao longo das colunas de uma matriz 2D).", "example": "// Declara\u00e7\u00f5es\nMPI_Comm cart_comm = MPI_COMM_NULL;\nMPI_Comm sub_comm = MPI_COMM_NULL;\nint rank, size;\nint ndims_create = 2; // Criaremos uma grade 2D\nint dims_create[2] = {0, 0}; // Dimens\u00f5es da grade\nint periods_create[2] = {0, 0}; // N\u00e3o peri\u00f3dica em ambas as dimens\u00f5es\nint reorder = 0; // N\u00e3o permitir reordenamento\n// remain_dims = {0, 1} significa que a dimens\u00e3o 0 ser\u00e1 \"fatiada\" (discarded)\n// e a dimens\u00e3o 1 ser\u00e1 mantida (retained).\n// Isto criar\u00e1 subcomunicadores para cada \"coluna\" da grade 2D.\nint remain_dims[2] = {0, 1}; // keep_dims: {false, true}\nint sub_rank, sub_size; // Rank e tamanho no novo subcomunicador\nint err;\n\n// Obter o rank e o tamanho de MPI_COMM_WORLD\nMPI_Comm_rank(MPI_COMM_WORLD, &rank);\nMPI_Comm_size(MPI_COMM_WORLD, &size);\n\n// Calcular as dimens\u00f5es ideais da grade cartesiana (ex: 2xN para pelo menos 2 processos)\n// Assegura que haja pelo menos duas 'linhas' ou 'colunas' para formar subgrupos.\nMPI_Dims_create(size, ndims_create, dims_create);\n// Assegura que as dimens\u00f5es n\u00e3o sejam zero se size for muito pequeno\nif (dims_create[0] == 0) dims_create[0] = 1;\nif (dims_create[1] == 0) dims_create[1] = 1;\n\n// Criar o comunicador cartesiano original\nerr = MPI_Cart_create(MPI_COMM_WORLD, ndims_create, dims_create, periods_create, reorder, &cart_comm);\n\nif (err == MPI_SUCCESS && cart_comm != MPI_COMM_NULL) {\n    // Criar novos comunicadores dividindo a grade cartesiana em subgrades.\n    // remain_dims={0,1} significa que processos com a mesma coordenada na dimens\u00e3o 1\n    // (e coordenadas arbitr\u00e1rias na dimens\u00e3o 0) far\u00e3o parte do mesmo subcomunicador.\n    // Na pr\u00e1tica, se for uma grade 2D, cada \"coluna\" formar\u00e1 um subcomunicador 1D.\n    err = MPI_Cart_sub(cart_comm, remain_dims, &sub_comm);\n\n    if (err == MPI_SUCCESS && sub_comm != MPI_COMM_NULL) {\n        // Recuperar o rank e o tamanho no novo subcomunicador\n        MPI_Comm_rank(sub_comm, &sub_rank);\n        MPI_Comm_size(sub_comm, &sub_size);\n\n        // fprintf(stderr, \"Rank %d de MPI_COMM_WORLD agora \u00e9 rank %d de %d no subcomunicador (coluna).\\n\", rank, sub_rank, sub_size);\n    }\n}\n\n// Limpeza: Liberar o comunicador cartesiano original, se foi criado e n\u00e3o \u00e9 nulo.\nif (cart_comm != MPI_COMM_NULL) {\n    MPI_Comm_free(&cart_comm);\n}\n// Limpeza: Liberar o novo subcomunicador, se foi criado e n\u00e3o \u00e9 nulo.\nif (sub_comm != MPI_COMM_NULL) {\n    MPI_Comm_free(&sub_comm);\n}\n"}, {"name": "MPI_Cartdim_get", "short_desc": "Recupera informa\u00e7\u00f5es da topologia Cartesiana associada a um comunicador.", "synopsis": "int MPI_Cartdim_get(MPI_Comm comm, int *ndims)", "params": [{"name": "comm", "desc": "comunicador com estrutura Cartesiana (handle)"}, {"name": "ndims", "desc": "n\u00famero de dimens\u00f5es da estrutura Cartesiana (inteiro)"}], "description": "Esta rotina recupera o n\u00famero de dimens\u00f5es da topologia Cartesiana associada ao comunicador fornecido.", "application": "Usado para consultar as propriedades de um comunicador que foi criado com uma topologia Cartesiana (por exemplo, via MPI_Cart_create).", "example": "// Declara\u00e7\u00f5es\nMPI_Comm cart_comm = MPI_COMM_NULL;\nint rank, size;\nint ndims_create = 3; // N\u00famero de dimens\u00f5es que vamos criar para a topologia cartesiana\nint dims_create[3] = {0, 0, 0}; // Dimens\u00f5es da grade\nint periods_create[3] = {1, 0, 1}; // Periodicidade para cada dimens\u00e3o\nint reorder = 1; // Permitir reordenamento\nint retrieved_ndims; // Vari\u00e1vel para armazenar o n\u00famero de dimens\u00f5es recuperado\nint err;\n\n// Obter o rank e o tamanho de MPI_COMM_WORLD\nMPI_Comm_rank(MPI_COMM_WORLD, &rank);\nMPI_Comm_size(MPI_COMM_WORLD, &size);\n\n// Calcular as dimens\u00f5es ideais da grade cartesiana com 3 dimens\u00f5es.\n// Por exemplo, para size=8, dims_create pode se tornar {2, 2, 2}.\nMPI_Dims_create(size, ndims_create, dims_create);\n\n// Criar um comunicador com topologia cartesiana\nerr = MPI_Cart_create(MPI_COMM_WORLD, ndims_create, dims_create, periods_create, reorder, &cart_comm);\n\nif (err == MPI_SUCCESS && cart_comm != MPI_COMM_NULL) {\n    // Recuperar o n\u00famero de dimens\u00f5es da topologia cartesiana associada ao comunicador.\n    err = MPI_Cartdim_get(cart_comm, &retrieved_ndims);\n\n    if (err == MPI_SUCCESS) {\n        // retrieved_ndims agora cont\u00e9m o n\u00famero de dimens\u00f5es da topologia.\n        // fprintf(stderr, \"Rank %d: O comunicador cartesiano tem %d dimens\u00f5es (esperado: %d).\\n\", rank, retrieved_ndims, ndims_create);\n    }\n}\n\n// Limpeza: Liberar o comunicador cartesiano, se foi criado e n\u00e3o \u00e9 nulo.\nif (cart_comm != MPI_COMM_NULL) {\n    MPI_Comm_free(&cart_comm);\n}\n"}, {"name": "MPI_Close_port", "short_desc": "Fecha uma porta.", "synopsis": "int MPI_Close_port(const char *port_name)", "params": [{"name": "port_name", "desc": "nome da porta (string)"}], "description": "Fecha uma porta anteriormente aberta que estava sendo usada para conex\u00f5es din\u00e2micas.", "application": "Usado no modelo cliente-servidor para liberar um nome de porta que n\u00e3o \u00e9 mais necess\u00e1rio para aceitar conex\u00f5es.", "example": "// Declara\u00e7\u00f5es\nchar port_name_buffer[MPI_MAX_PORT_NAME]; // Buffer para armazenar o nome da porta\nint err;\n\n// Abrir uma porta para comunica\u00e7\u00e3o din\u00e2mica. O nome da porta \u00e9 armazenado em port_name_buffer.\nerr = MPI_Open_port(MPI_INFO_NULL, port_name_buffer);\n\nif (err == MPI_SUCCESS) {\n    // A porta foi aberta com sucesso e seu nome est\u00e1 em port_name_buffer.\n    // Em um cen\u00e1rio real, este nome seria comunicado para um processo cliente\n    // que usaria MPI_Comm_connect.\n    // fprintf(stderr, \"Porta aberta: %s\\n\", port_name_buffer);\n\n    // Fechar a porta previamente aberta.\n    err = MPI_Close_port(port_name_buffer);\n\n    if (err == MPI_SUCCESS) {\n        // A porta foi fechada com sucesso.\n        // fprintf(stderr, \"Porta fechada com sucesso.\\n\");\n    } else {\n        // fprintf(stderr, \"Erro ao fechar a porta.\\n\");\n    }\n} else {\n    // fprintf(stderr, \"Erro ao abrir a porta.\\n\");\n}\n"}, {"name": "MPI_Comm_accept", "short_desc": "Aceita uma solicita\u00e7\u00e3o para formar um novo intercomunicador.", "synopsis": "int MPI_Comm_accept(const char *port_name, MPI_Info info, int root, MPI_Comm comm, MPI_Comm *newcomm)", "params": [{"name": "port_name", "desc": "nome da porta (string)"}, {"name": "info", "desc": "informa\u00e7\u00f5es dependentes da implementa\u00e7\u00e3o (handle)"}, {"name": "root", "desc": "rank do n\u00f3 raiz no comunicador comm (inteiro)"}, {"name": "comm", "desc": "intracomunicador sobre o qual a chamada \u00e9 coletiva (handle)"}, {"name": "newcomm", "desc": "intercomunicador com o cliente como grupo remoto (handle)"}], "description": "Atua como a contraparte do servidor para MPI_Comm_connect. Aceita uma conex\u00e3o de um cliente em uma porta especificada.", "application": "Permite que processos estabele\u00e7am comunica\u00e7\u00e3o dinamicamente com outros processos em execu\u00e7\u00e3o.", "example": "// Declara\u00e7\u00f5es\nchar port_name_buffer[MPI_MAX_PORT_NAME]; // Buffer para armazenar o nome da porta\nMPI_Info info = MPI_INFO_NULL; // Objeto info para configura\u00e7\u00f5es, ou MPI_INFO_NULL\nint root = 0; // Rank do processo raiz que aceitar\u00e1 a conex\u00e3o\nMPI_Comm comm_world_for_accept = MPI_COMM_WORLD; // Intracomunicador sobre o qual a chamada \u00e9 coletiva\nMPI_Comm newcomm_intercomm = MPI_COMM_NULL; // Intercomunicador resultante da conex\u00e3o\nint rank, size;\nint err;\n\n// Obter o rank e o tamanho para decidir quem ser\u00e1 o root e participar do Bcast.\nMPI_Comm_rank(MPI_COMM_WORLD, &rank);\nMPI_Comm_size(MPI_COMM_WORLD, &size);\n\n// O processo root abre a porta. Outros processos n\u00e3o precisam fazer isso.\nif (rank == root) {\n    err = MPI_Open_port(info, port_name_buffer);\n    if (err != MPI_SUCCESS) {\n        // Em caso de erro, invalidar o nome da porta para que os outros processos n\u00e3o tentem usar.\n        port_name_buffer[0] = '\\0'; \n        // fprintf(stderr, \"Rank %d: Erro ao abrir a porta.\\n\", rank);\n    } else {\n        // fprintf(stderr, \"Rank %d: Porta aberta: %s\\n\", rank, port_name_buffer);\n        // Em um cen\u00e1rio real, o nome da porta seria comunicado a um processo cliente.\n    }\n}\n\n// Transmitir o nome da porta para todos os processos no comunicador 'comm_world_for_accept'.\n// Isso \u00e9 necess\u00e1rio porque MPI_Comm_accept \u00e9 uma chamada coletiva.\nMPI_Bcast(port_name_buffer, MPI_MAX_PORT_NAME, MPI_CHAR, root, comm_world_for_accept);\n\n// Verificar se a porta foi aberta com sucesso pelo root (ou se houve erro no Bcast).\nif (port_name_buffer[0] != '\\0') {\n    // A chamada MPI_Comm_accept \u00e9 coletiva em 'comm_world_for_accept'.\n    // Ela aguarda uma conex\u00e3o de um cliente na porta especificada.\n    err = MPI_Comm_accept(port_name_buffer, info, root, comm_world_for_accept, &newcomm_intercomm);\n\n    if (err == MPI_SUCCESS) {\n        // Um novo intercomunicador (newcomm_intercomm) foi criado.\n        // Ele conecta este grupo (o servidor) ao grupo do cliente.\n        // fprintf(stderr, \"Rank %d: Conex\u00e3o aceita, novo intercomunicador criado.\\n\", rank);\n        // O 'newcomm_intercomm' pode agora ser usado para comunica\u00e7\u00e3o com o cliente.\n    } else {\n        // fprintf(stderr, \"Rank %d: Erro ao aceitar a conex\u00e3o.\\n\", rank);\n    }\n} else {\n    // fprintf(stderr, \"Rank %d: Nenhuma porta v\u00e1lida para aceitar conex\u00e3o.\\n\", rank);\n}\n\n// Limpeza: Se um novo intercomunicador foi criado, ele deve ser liberado.\nif (newcomm_intercomm != MPI_COMM_NULL) {\n    MPI_Comm_free(&newcomm_intercomm);\n}\n\n// Limpeza: O processo root fecha a porta que abriu.\nif (rank == root && port_name_buffer[0] != '\\0') {\n    int close_err = MPI_Close_port(port_name_buffer);\n    if (close_err != MPI_SUCCESS) {\n        // fprintf(stderr, \"Rank %d: Erro ao fechar a porta.\\n\", rank);\n    }\n}\n"}, {"name": "MPI_Comm_c2f", "short_desc": "Converte MPI_Comm para o tipo INTEGER do Fortran.", "synopsis": "MPI_Fint MPI_Comm_c2f(MPI_Comm comm)", "params": [{"name": "comm", "desc": "comunicador (handle)"}], "description": "Esta fun\u00e7\u00e3o traduz um handle de comunicador C em um handle de comunicador compat\u00edvel com Fortran.", "application": "Utilizado em aplica\u00e7\u00f5es que misturam C e Fortran para passar comunicadores entre as duas linguagens.", "example": "// Declara\u00e7\u00f5es\nMPI_Comm c_comm = MPI_COMM_WORLD; // Comunicador em C (handle)\nMPI_Fint f_handle; // Vari\u00e1vel para armazenar o handle Fortran correspondente\n// Nota: MPI_Comm_c2f n\u00e3o retorna um c\u00f3digo de erro MPI_SUCCESS. \n// Seu retorno direto \u00e9 o handle Fortran. N\u00e3o h\u00e1 uma vari\u00e1vel 'int err' para seu resultado.\n\n// \u00c9 uma boa pr\u00e1tica verificar se o comunicador C \u00e9 v\u00e1lido antes da convers\u00e3o.\nif (c_comm != MPI_COMM_NULL) {\n    // Traduzir o handle do comunicador C para um handle compat\u00edvel com Fortran.\n    // Este handle Fortran pode ent\u00e3o ser passado para rotinas Fortran.\n    f_handle = MPI_Comm_c2f(c_comm);\n\n    // O valor de f_handle agora pode ser usado em c\u00f3digo Fortran.\n    // fprintf(stderr, \"Handle C do comunicador: %d, Handle Fortran: %d\\n\", (int)c_comm, (int)f_handle);\n\n    // N\u00e3o h\u00e1 recursos adicionais de comunicador para liberar aqui, pois f_handle\n    // \u00e9 apenas uma representa\u00e7\u00e3o do 'c_comm' existente, n\u00e3o um novo comunicador.\n} else {\n    // fprintf(stderr, \"Comunicador C \u00e9 MPI_COMM_NULL, n\u00e3o \u00e9 poss\u00edvel converter para handle Fortran.\\n\");\n}\n"}, {"name": "MPI_Comm_call_errhandler", "short_desc": "Chama o manipulador de erros instalado em um comunicador.", "synopsis": "int MPI_Comm_call_errhandler(MPI_Comm comm, int errorcode)", "params": [{"name": "comm", "desc": "comunicador com manipulador de erros (handle)"}, {"name": "errorcode", "desc": "c\u00f3digo de erro (inteiro)"}], "description": "Invoca manualmente o manipulador de erros associado ao comunicador especificado com o c\u00f3digo de erro fornecido.", "application": "\u00datil para disparar l\u00f3gica de tratamento de erro personalizada ou padr\u00e3o do MPI quando um erro \u00e9 detectado pelo c\u00f3digo do usu\u00e1rio.", "example": "// Declara\u00e7\u00f5es\nMPI_Comm comm = MPI_COMM_WORLD; // Comunicador para o qual o manipulador de erros ser\u00e1 invocado\nint errorcode = MPI_ERR_OTHER; // C\u00f3digo de erro a ser passado para o manipulador\nint err;\nint rank;\n\n// Obter o rank do processo para identifica\u00e7\u00e3o em mensagens de erro/debug.\nMPI_Comm_rank(MPI_COMM_WORLD, &rank);\n\n// Por padr\u00e3o, o manipulador de erros para MPI_COMM_WORLD \u00e9 MPI_ERRORS_ARE_FATAL,\n// o que terminaria o programa. Para demonstrar a chamada sem terminar,\n// vamos temporariamente mudar o manipulador para MPI_ERRORS_RETURN.\n// Isso far\u00e1 com que MPI_Comm_call_errhandler retorne o 'errorcode' passado.\nint original_err;\nMPI_Errhandler old_errhandler;\n\n// Salvar o manipulador de erros atual (opcional, para restaurar depois)\nMPI_Comm_get_errhandler(comm, &old_errhandler);\n\n// Definir o manipulador de erros para MPI_ERRORS_RETURN.\nerr = MPI_Comm_set_errhandler(comm, MPI_ERRORS_RETURN);\n\nif (err == MPI_SUCCESS) {\n    // Invocar manualmente o manipulador de erros associado ao comunicador.\n    // Com MPI_ERRORS_RETURN, esta chamada retornar\u00e1 'errorcode' (MPI_ERR_OTHER neste caso).\n    err = MPI_Comm_call_errhandler(comm, errorcode);\n\n    if (err != MPI_SUCCESS) {\n        // fprintf(stderr, \"Rank %d: O manipulador de erros foi invocado com c\u00f3digo %d, e retornou %d (esperado %d).\\n\", \n        //          rank, errorcode, err, errorcode);\n    } else {\n        // Isso n\u00e3o deve acontecer se o 'errorcode' for diferente de MPI_SUCCESS e o handler for MPI_ERRORS_RETURN.\n        // fprintf(stderr, \"Rank %d: Erro inesperado: MPI_Comm_call_errhandler retornou MPI_SUCCESS com c\u00f3digo %d.\\n\", rank, errorcode);\n    }\n} else {\n    // fprintf(stderr, \"Rank %d: Erro ao definir o manipulador de erros.\\n\", rank);\n}\n\n// Limpeza: Restaurar o manipulador de erros original.\n// MPI_ERRORS_RETURN n\u00e3o precisa de MPI_Errhandler_free, mas old_errhandler pode precisar\n// se fosse um customizado criado com MPI_Comm_create_errhandler. \n// Como salvamos um handler pr\u00e9-definido (como MPI_ERRORS_ARE_FATAL), n\u00e3o o liberamos.\nMPI_Comm_set_errhandler(comm, old_errhandler);\n"}, {"name": "MPI_Comm_compare", "short_desc": "Compara dois comunicadores.", "synopsis": "int MPI_Comm_compare(MPI_Comm comm1, MPI_Comm comm2, int *result)", "params": [{"name": "comm1", "desc": "primeiro comunicador (handle)"}, {"name": "comm2", "desc": "segundo comunicador (handle)"}, {"name": "result", "desc": "resultado da compara\u00e7\u00e3o (inteiro)"}], "description": "Compara dois comunicadores e retorna um dos seguintes resultados: MPI_IDENT, MPI_CONGRUENT, MPI_SIMILAR ou MPI_UNEQUAL.", "application": "Usado para determinar a rela\u00e7\u00e3o entre dois handles de comunicador, \u00fatil para evitar duplica\u00e7\u00f5es desnecess\u00e1rias ou validar a l\u00f3gica de comunica\u00e7\u00e3o.", "example": "// Declara\u00e7\u00f5es\nMPI_Comm comm1 = MPI_COMM_WORLD;\nMPI_Comm comm2 = MPI_COMM_WORLD;\nMPI_Comm duplicated_comm = MPI_COMM_NULL; // Para demonstra\u00e7\u00e3o de compara\u00e7\u00e3o com um comunicador diferente\nint result;\nint err;\n\n// Duplica MPI_COMM_WORLD para ter um comunicador id\u00eantico mas com contexto diferente\n// Esta \u00e9 uma opera\u00e7\u00e3o coletiva, todos os processos devem cham\u00e1-la.\nerr = MPI_Comm_dup(MPI_COMM_WORLD, &duplicated_comm);\n\nif (err == MPI_SUCCESS) {\n    // Compara MPI_COMM_WORLD com ele mesmo. Espera-se MPI_IDENT (referem-se ao mesmo objeto).\n    err = MPI_Comm_compare(comm1, comm2, &result);\n\n    if (err == MPI_SUCCESS) {\n        // if (result == MPI_IDENT) { /* Comunicadores s\u00e3o id\u00eanticos */ }\n\n        // Agora compara MPI_COMM_WORLD com a sua duplicata.\n        // Espera-se MPI_CONGRUENT (mesmo grupo, mas contexto de comunica\u00e7\u00e3o diferente).\n        err = MPI_Comm_compare(comm1, duplicated_comm, &result);\n        if (err == MPI_SUCCESS) {\n            // if (result == MPI_CONGRUENT) { /* Comunicadores s\u00e3o congruentes */ }\n            // Sucesso na compara\u00e7\u00e3o.\n        }\n    }\n} else {\n    // Erro ao duplicar o comunicador.\n}\n\n// Limpeza: Libera o comunicador duplicado, se foi criado com sucesso.\nif (duplicated_comm != MPI_COMM_NULL) {\n    MPI_Comm_free(&duplicated_comm);\n}\n"}, {"name": "MPI_Comm_connect", "short_desc": "Faz uma solicita\u00e7\u00e3o para formar um novo intercomunicador.", "synopsis": "int MPI_Comm_connect(const char *port_name, MPI_Info info, int root, MPI_Comm comm, MPI_Comm *newcomm)", "params": [{"name": "port_name", "desc": "endere\u00e7o de rede/nome da porta (string)"}, {"name": "info", "desc": "informa\u00e7\u00f5es dependentes da implementa\u00e7\u00e3o (handle)"}, {"name": "root", "desc": "rank do n\u00f3 raiz no comunicador comm (inteiro)"}, {"name": "comm", "desc": "intracomunicador sobre o qual a chamada \u00e9 coletiva (handle)"}, {"name": "newcomm", "desc": "intercomunicador com o servidor como grupo remoto (handle)"}], "description": "Atua como a contraparte do cliente para MPI_Comm_accept. Inicia uma conex\u00e3o com um servidor ouvindo em uma porta espec\u00edfica.", "application": "Permite que processos se conectem dinamicamente a processos servidores j\u00e1 existentes em uma rede MPI.", "example": "// Declara\u00e7\u00f5es\nchar port_name[MPI_MAX_PORT_NAME]; // Buffer para armazenar o nome da porta\nMPI_Info info = MPI_INFO_NULL;\nint root_server = 0; // O rank do n\u00f3 raiz no comunicador do servidor que aceitar\u00e1 a conex\u00e3o\nMPI_Comm client_comm = MPI_COMM_WORLD; // Comunicador base para a conex\u00e3o (cliente)\nMPI_Comm newcomm = MPI_COMM_NULL; // O novo intercomunicador criado pela conex\u00e3o\nint err;\nint rank; // Rank do processo para simular o cliente\n\n// Obt\u00e9m o rank do processo para simular um cliente (geralmente rank 0 para este exemplo)\nMPI_Comm_rank(client_comm, &rank);\n\n// Para fins de exemplo, vamos 'simular' um port_name que teria sido\n// gerado por MPI_Open_port em um processo servidor real.\n// Em uma aplica\u00e7\u00e3o real, o port_name seria trocado entre processos via um canal externo.\nsnprintf(port_name, MPI_MAX_PORT_NAME, \"example_port_for_connect\");\n\n// Cria um objeto MPI_Info (pode ser usado para passar dicas, como seguran\u00e7a ou desempenho)\nerr = MPI_Info_create(&info);\n\nif (err == MPI_SUCCESS) {\n    // Opcional: Define algumas dicas para a conex\u00e3o.\n    // err = MPI_Info_set(info, \"security_level\", \"high\");\n\n    // Somente um cliente (e.g., rank 0) tenta conectar.\n    // Em um cen\u00e1rio real, o cliente e o servidor seriam processos diferentes e a conex\u00e3o\n    // seria estabelecida atrav\u00e9s de MPI_Comm_connect no cliente e MPI_Comm_accept no servidor.\n    if (rank == 0) {\n        // Tenta conectar ao servidor que supostamente estaria \"escutando\" no 'port_name'.\n        // 'root_server' \u00e9 o rank do servidor dentro do comunicador 'client_comm' (se eles compartilhassem um).\n        // Em um modelo de cliente/servidor separado, 'root_server' se refere ao rank do servidor no intercomunicador.\n        err = MPI_Comm_connect(port_name, info, root_server, client_comm, &newcomm);\n\n        if (err == MPI_SUCCESS) {\n            // Sucesso na conex\u00e3o. 'newcomm' agora \u00e9 um intercomunicador.\n            // Pode-se usar 'newcomm' para comunica\u00e7\u00e3o com o servidor.\n            // Exemplo: int message = 123; MPI_Send(&message, 1, MPI_INT, 0, 0, newcomm);\n        } else {\n            // Erro na conex\u00e3o.\n        }\n    }\n} else {\n    // Erro ao criar o objeto MPI_Info.\n}\n\n// Limpeza: Libera o objeto MPI_Info, se foi criado com sucesso.\nif (info != MPI_INFO_NULL) {\n    MPI_Info_free(&info);\n}\n\n// Limpeza: Desconecta e libera o novo comunicador (se criado e o processo for o cliente).\n// MPI_Comm_disconnect \u00e9 uma opera\u00e7\u00e3o coletiva no 'newcomm'.\n// O processo que possui 'newcomm' (o cliente neste caso) deve chamar esta fun\u00e7\u00e3o.\nif (newcomm != MPI_COMM_NULL) {\n    err = MPI_Comm_disconnect(&newcomm); // 'newcomm' se torna MPI_COMM_NULL ap\u00f3s o disconnect.\n    if (err != MPI_SUCCESS) {\n        // Erro ao desconectar o comunicador.\n    }\n}\n"}, {"name": "MPI_Comm_create", "short_desc": "Cria um novo comunicador.", "synopsis": "int MPI_Comm_create(MPI_Comm comm, MPI_Group group, MPI_Comm *newcomm)", "params": [{"name": "comm", "desc": "comunicador original (handle)"}, {"name": "group", "desc": "grupo que \u00e9 um subconjunto do grupo do comunicador original (handle)"}, {"name": "newcomm", "desc": "novo comunicador criado (handle)"}], "description": "Cria um novo comunicador composto pelos processos definidos pelo grupo especificado, utilizando um novo contexto de comunica\u00e7\u00e3o.", "application": "Fundamental para organizar processos em grupos menores e isolados para opera\u00e7\u00f5es de comunica\u00e7\u00e3o espec\u00edficas.", "example": "// Declara\u00e7\u00f5es\nMPI_Comm comm = MPI_COMM_WORLD; // Comunicador original\nMPI_Group world_group = MPI_GROUP_NULL; // Grupo do comunicador original\nMPI_Group new_group = MPI_GROUP_NULL;   // Novo grupo para o comunicador\nMPI_Comm newcomm = MPI_COMM_NULL;       // Novo comunicador criado\nint rank, size;                          // Rank e tamanho do processo\nint ranks_in_new_group[2];               // Exemplo: incluir ranks 0 e 1\nint err;\n\n// Obt\u00e9m o rank e o tamanho do comunicador original\nMPI_Comm_rank(comm, &rank);\nMPI_Comm_size(comm, &size);\n\n// Define os ranks que far\u00e3o parte do novo grupo. Exemplo: ranks 0 e 1.\n// O exemplo assume que o n\u00famero total de processos (size) \u00e9 pelo menos 2.\nif (size >= 2) {\n    ranks_in_new_group[0] = 0;\n    ranks_in_new_group[1] = 1;\n\n    // 1. Obt\u00e9m o grupo associado ao comunicador original (MPI_COMM_WORLD).\n    err = MPI_Comm_group(comm, &world_group);\n\n    if (err == MPI_SUCCESS) {\n        // 2. Cria um novo grupo que inclui apenas os ranks especificados de 'world_group'.\n        err = MPI_Group_incl(world_group, 2, ranks_in_new_group, &new_group);\n\n        if (err == MPI_SUCCESS) {\n            // 3. Cria o novo comunicador. Esta \u00e9 uma opera\u00e7\u00e3o coletiva sobre 'comm'.\n            // Todos os processos em 'comm' devem chamar esta fun\u00e7\u00e3o.\n            // Para os ranks que n\u00e3o est\u00e3o em 'new_group', 'newcomm' ser\u00e1 MPI_COMM_NULL.\n            err = MPI_Comm_create(comm, new_group, &newcomm);\n\n            if (err == MPI_SUCCESS) {\n                if (newcomm != MPI_COMM_NULL) {\n                    // Sucesso na cria\u00e7\u00e3o do comunicador para este processo.\n                    // Este processo (que est\u00e1 em new_group) agora pode usar 'newcomm'.\n                    // int new_rank, new_size;\n                    // MPI_Comm_rank(newcomm, &new_rank);\n                    // MPI_Comm_size(newcomm, &new_size);\n                    // printf(\"Processo %d (WORLD), agora rank %d (NEWCOMM) em um comunicador de tamanho %d.\\n\", rank, new_rank, new_size);\n                } else {\n                    // Este processo n\u00e3o faz parte do 'new_group'.\n                    // printf(\"Processo %d (WORLD) n\u00e3o faz parte do newcomm.\\n\", rank);\n                }\n            } else {\n                // Erro na cria\u00e7\u00e3o do comunicador.\n            }\n        } else {\n            // Erro ao criar o novo grupo.\n        }\n    } else {\n        // Erro ao obter o grupo do comunicador original.\n    }\n} else {\n    // O n\u00famero de processos (%d) \u00e9 insuficiente para o exemplo (requer >= 2).\n    // printf(\"Aviso: N\u00e3o h\u00e1 processos suficientes para criar o grupo desejado. Requer >= 2, tem %d.\\n\", size);\n}\n\n// Limpeza: Libera o novo grupo criado, se n\u00e3o for MPI_GROUP_NULL.\nif (new_group != MPI_GROUP_NULL) {\n    MPI_Group_free(&new_group);\n}\n\n// Limpeza: Libera o grupo original, se n\u00e3o for MPI_GROUP_NULL (obtido por MPI_Comm_group).\nif (world_group != MPI_GROUP_NULL) {\n    MPI_Group_free(&world_group);\n}\n\n// Limpeza: Libera o novo comunicador, se criado com sucesso e n\u00e3o for MPI_COMM_NULL.\nif (newcomm != MPI_COMM_NULL) {\n    MPI_Comm_free(&newcomm);\n}\n"}, {"name": "MPI_Comm_create_errhandler", "short_desc": "Cria um manipulador de erros de comunicador.", "synopsis": "int MPI_Comm_create_errhandler(MPI_Comm_errhandler_function *comm_errhandler_fn, MPI_Errhandler *errhandler)", "params": [{"name": "comm_errhandler_fn", "desc": "fun\u00e7\u00e3o de tratamento de erro definida pelo usu\u00e1rio (fun\u00e7\u00e3o)"}, {"name": "errhandler", "desc": "manipulador de erros MPI criado (handle)"}], "description": "Registra uma fun\u00e7\u00e3o personalizada como um novo manipulador de erros que pode ser associado a comunicadores.", "application": "Permite que os desenvolvedores implementem l\u00f3gica customizada para lidar com erros MPI.", "example": "// Declara\u00e7\u00f5es\nMPI_Errhandler errhandler = MPI_ERRHANDLER_NULL;\nint err;\n// Ponteiro para a fun\u00e7\u00e3o de callback do handler de erro.\n// Note: MPI_Comm_errhandler_function \u00e9 um typedef para um ponteiro de fun\u00e7\u00e3o.\nMPI_Comm_errhandler_function *comm_errhandler_fn_ptr;\n\n// Defini\u00e7\u00e3o da fun\u00e7\u00e3o de tratamento de erro personalizada.\n// Esta fun\u00e7\u00e3o ser\u00e1 chamada se um erro ocorrer no comunicador ao qual este handler est\u00e1 associado.\nvoid my_custom_comm_errhandler_func(MPI_Comm *comm_p, int *error_code_p, ...) {\n    // Em um contexto real, voc\u00ea pode querer imprimir mensagens de erro detalhadas, fazer log,\n    // ou tentar recuperar. Para este exemplo, apenas imprime uma mensagem simples.\n    char error_string[MPI_MAX_ERROR_STRING];\n    int len;\n    MPI_Error_string(*error_code_p, error_string, &len);\n    // fprintf(stderr, \"MPI_Comm_create_errhandler Exemplo: Erro detectado no comunicador: %s (C\u00f3digo: %d)\\n\", error_string, *error_code_p);\n    // Dependendo do erro e da pol\u00edtica, pode-se decidir finalizar o MPI ou o programa (e.g., MPI_Abort).\n    // Para o prop\u00f3sito do exemplo, n\u00e3o vamos chamar MPI_Abort aqui.\n}\n\n// Atribui a fun\u00e7\u00e3o personalizada ao ponteiro da fun\u00e7\u00e3o.\ncomm_errhandler_fn_ptr = &my_custom_comm_errhandler_func;\n\n// 1. Cria um novo manipulador de erros MPI a partir da fun\u00e7\u00e3o personalizada.\nerr = MPI_Comm_create_errhandler(comm_errhandler_fn_ptr, &errhandler);\n\nif (err == MPI_SUCCESS) {\n    // Sucesso na cria\u00e7\u00e3o do manipulador de erros.\n    // Agora, podemos associar este manipulador a um comunicador.\n    MPI_Comm target_comm = MPI_COMM_WORLD; // Comunicador para associar o handler\n    MPI_Errhandler old_errhandler = MPI_ERRHANDLER_NULL; // Para guardar o handler original\n\n    // Opcional: Salvar o manipulador de erros atual do comunicador para restaurar depois.\n    err = MPI_Comm_get_errhandler(target_comm, &old_errhandler);\n\n    if (err == MPI_SUCCESS) {\n        // 2. Associa o novo manipulador de erros ao comunicador.\n        err = MPI_Comm_set_errhandler(target_comm, errhandler);\n\n        if (err == MPI_SUCCESS) {\n            // O MPI_COMM_WORLD agora usar\u00e1 'errhandler' para tratar erros.\n            // Para que o handler seja invocado, o modo de tratamento de erros do comunicador\n            // deve ser MPI_ERRORS_RETURN, e n\u00e3o MPI_ERRORS_ARE_FATAL.\n            // Exemplo de como for\u00e7ar um erro (requer MPI_ERRORS_RETURN): \n            // int buf = 0;\n            // MPI_Request request; \n            // int invalid_rank = -1; // Rank inv\u00e1lido para for\u00e7ar um erro\n            // MPI_Isend(&buf, 1, MPI_INT, invalid_rank, 0, target_comm, &request); \n            // MPI_Wait(&request, MPI_STATUS_IGNORE); // Isso invocaria o handler\n        }\n    }\n\n    // 3. Opcional: Restaurar o manipulador de erros original para o comunicador.\n    if (old_errhandler != MPI_ERRHANDLER_NULL) {\n        MPI_Comm_set_errhandler(target_comm, old_errhandler);\n        // N\u00e3o precisamos liberar old_errhandler se for um dos handlers predefinidos (MPI_ERRORS_ARE_FATAL, etc.).\n        // Se fosse um handler criado pelo usu\u00e1rio, precisar\u00edamos liberar.\n        // MPI_Errhandler_free(&old_errhandler); // Se old_errhandler foi criado pelo usu\u00e1rio\n    }\n} else {\n    // Erro ao criar o manipulador de erros.\n}\n\n// Limpeza: Libera o manipulador de erros criado.\nif (errhandler != MPI_ERRHANDLER_NULL) {\n    MPI_Errhandler_free(&errhandler);\n}\n"}, {"name": "MPI_Comm_create_group", "short_desc": "Cria um novo comunicador a partir de um grupo.", "synopsis": "int MPI_Comm_create_group(MPI_Comm comm, MPI_Group group, int tag, MPI_Comm *newcomm)", "params": [{"name": "comm", "desc": "intracomunicador (handle)"}, {"name": "group", "desc": "grupo de processos (handle)"}, {"name": "tag", "desc": "tag de comunica\u00e7\u00e3o (inteiro)"}, {"name": "newcomm", "desc": "novo comunicador (handle)"}], "description": "Semelhante ao MPI_Comm_create, mas \u00e9 coletivo apenas sobre os processos que fazem parte do novo grupo.", "application": "Mais eficiente que MPI_Comm_create quando apenas um pequeno subgrupo de processos precisa criar um novo comunicador.", "example": "// Declara\u00e7\u00f5es\nMPI_Comm comm = MPI_COMM_WORLD;     // Comunicador base\nMPI_Group world_group = MPI_GROUP_NULL;   // Grupo do comunicador base\nMPI_Group new_group = MPI_GROUP_NULL;     // Novo grupo para o comunicador\nMPI_Comm newcomm = MPI_COMM_NULL;         // Novo comunicador\nint rank, size;                     // Rank e tamanho do processo\nint ranks_in_new_group_arr[2];      // Ranks a serem inclu\u00eddos no novo grupo\nint tag = 100;                      // Uma tag de comunica\u00e7\u00e3o para o novo contexto (deve ser \u00fanica)\nint err;\n\n// Obt\u00e9m o rank e o tamanho do comunicador original\nMPI_Comm_rank(comm, &rank);\nMPI_Comm_size(comm, &size);\n\n// Define quais ranks far\u00e3o parte do novo grupo. Exemplo: ranks 0 e 1.\n// A fun\u00e7\u00e3o \u00e9 coletiva APENAS sobre os membros do 'group'.\nif (size >= 2) {\n    ranks_in_new_group_arr[0] = 0;\n    ranks_in_new_group_arr[1] = 1;\n\n    // 1. Obt\u00e9m o grupo de MPI_COMM_WORLD\n    err = MPI_Comm_group(comm, &world_group);\n\n    if (err == MPI_SUCCESS) {\n        // 2. Cria um novo grupo que cont\u00e9m apenas os ranks 0 e 1 de 'world_group'.\n        err = MPI_Group_incl(world_group, 2, ranks_in_new_group_arr, &new_group);\n\n        if (err == MPI_SUCCESS) {\n            // 3. Cria o novo comunicador. Esta chamada \u00e9 coletiva para todos os processos em 'comm'.\n            // Os processos que n\u00e3o est\u00e3o em 'new_group' receber\u00e3o 'newcomm' como MPI_COMM_NULL.\n            err = MPI_Comm_create_group(comm, new_group, tag, &newcomm);\n\n            if (err == MPI_SUCCESS) {\n                // Para os ranks no 'new_group', 'newcomm' \u00e9 um comunicador v\u00e1lido.\n                // Para os ranks fora do 'new_group', 'newcomm' ser\u00e1 MPI_COMM_NULL.\n                if (newcomm != MPI_COMM_NULL) {\n                    // Sucesso na cria\u00e7\u00e3o do comunicador para este processo.\n                    // int new_group_rank;\n                    // MPI_Comm_rank(newcomm, &new_group_rank);\n                    // printf(\"Processo %d no COMM_WORLD, rank %d no newcomm de tamanho %d.\\n\", rank, new_group_rank, newcomm_size);\n                }\n            } else {\n                // Erro na cria\u00e7\u00e3o do comunicador.\n            }\n        } else {\n            // Erro ao criar o novo grupo.\n        }\n    }\n} else {\n    // O n\u00famero de processos (%d) \u00e9 insuficiente para o exemplo (requer >= 2).\n    // printf(\"Aviso: N\u00e3o h\u00e1 processos suficientes para criar o grupo desejado. Requer >= 2, tem %d.\\n\", size);\n}\n\n// Limpeza: Libera o novo grupo criado, se n\u00e3o for MPI_GROUP_NULL.\nif (new_group != MPI_GROUP_NULL) {\n    MPI_Group_free(&new_group);\n}\n\n// Limpeza: Libera o grupo original (obtido de MPI_COMM_WORLD), se n\u00e3o for MPI_GROUP_NULL.\nif (world_group != MPI_GROUP_NULL) {\n    MPI_Group_free(&world_group);\n}\n\n// Limpeza: Libera o novo comunicador, se criado com sucesso e n\u00e3o for MPI_COMM_NULL.\nif (newcomm != MPI_COMM_NULL) {\n    MPI_Comm_free(&newcomm);\n}\n"}, {"name": "MPI_Comm_create_keyval", "short_desc": "Cria uma nova chave de atributo para comunicadores.", "synopsis": "int MPI_Comm_create_keyval(MPI_Comm_copy_attr_function *comm_copy_attr_fn, MPI_Comm_delete_attr_function *comm_delete_attr_fn, int *comm_keyval, void *extra_state)", "params": [{"name": "comm_copy_attr_fn", "desc": "fun\u00e7\u00e3o de retorno de chamada para c\u00f3pia (fun\u00e7\u00e3o)"}, {"name": "comm_delete_attr_fn", "desc": "fun\u00e7\u00e3o de retorno de chamada para exclus\u00e3o (fun\u00e7\u00e3o)"}, {"name": "comm_keyval", "desc": "valor da chave para acesso futuro (inteiro)"}, {"name": "extra_state", "desc": "estado extra passado para as fun\u00e7\u00f5es de retorno (ponteiro)"}], "description": "Cria uma nova chave de atributo que pode ser usada para armazenar e recuperar informa\u00e7\u00f5es personalizadas em comunicadores.", "application": "Comumente usado em bibliotecas para armazenar metadados espec\u00edficos de m\u00f3dulos dentro de comunicadores MPI.", "example": "// Declara\u00e7\u00f5es\n// Ponteiros para as fun\u00e7\u00f5es de callback.\n// MPI_Comm_copy_attr_function e MPI_Comm_delete_attr_function s\u00e3o typedefs para ponteiros de fun\u00e7\u00e3o.\nMPI_Comm_copy_attr_function *comm_copy_attr_fn_ptr;\nMPI_Comm_delete_attr_function *comm_delete_attr_fn_ptr;\nint comm_keyval = MPI_KEYVAL_INVALID; // Inicializa com valor inv\u00e1lido para a chave do atributo\nint my_extra_state_data = 123;      // Exemplo de dado para o par\u00e2metro 'extra_state'\nvoid *extra_state = &my_extra_state_data;\nint err;\n\n// --- Defini\u00e7\u00f5es das Fun\u00e7\u00f5es de Callback para o Atributo ---\n\n// Fun\u00e7\u00e3o de c\u00f3pia de atributo: Chamada quando um comunicador com este atributo \u00e9 duplicado.\n// Retorna MPI_SUCCESS se o atributo deve ser copiado, ou um c\u00f3digo de erro caso contr\u00e1rio.\nint my_copy_attr_function(MPI_Comm oldcomm, int keyval, void *extra_state, void *attribute_val_in, void *attribute_val_out, int *flag) {\n    // printf(\"my_copy_attr_function chamada!\\n\");\n    // Se o atributo existe no comunicador antigo (*attribute_val_in \u00e9 n\u00e3o-NULL)\n    if (attribute_val_in != NULL) {\n        // Copia o valor do atributo (assumindo que \u00e9 um int para este exemplo)\n        *((int*)attribute_val_out) = *((int*)attribute_val_in);\n        *flag = 1; // Indica que o atributo deve ser copiado para o novo comunicador\n    } else {\n        *flag = 0; // Indica que o atributo n\u00e3o deve ser copiado\n    }\n    return MPI_SUCCESS;\n}\n\n// Fun\u00e7\u00e3o de exclus\u00e3o de atributo: Chamada quando um atributo \u00e9 removido\n// ou o comunicador ao qual est\u00e1 associado \u00e9 liberado.\n// Retorna MPI_SUCCESS ou um c\u00f3digo de erro.\nint my_delete_attr_function(MPI_Comm comm, int keyval, void *attribute_val, void *extra_state) {\n    // printf(\"my_delete_attr_function chamada! Valor do atributo: %d\\n\", (attribute_val != NULL ? *(int*)attribute_val : -1));\n    // Aqui voc\u00ea liberaria qualquer mem\u00f3ria alocada dinamicamente para 'attribute_val'.\n    // Para este exemplo, o valor \u00e9 um inteiro simples (stack-allocated), ent\u00e3o n\u00e3o h\u00e1 aloca\u00e7\u00e3o din\u00e2mica para liberar.\n    return MPI_SUCCESS;\n}\n\n// Atribui as fun\u00e7\u00f5es personalizadas aos ponteiros de fun\u00e7\u00e3o.\ncomm_copy_attr_fn_ptr = &my_copy_attr_function;\ncomm_delete_attr_fn_ptr = &my_delete_attr_function;\n\n// 1. Cria uma nova chave de atributo que pode ser usada com comunicadores.\nerr = MPI_Comm_create_keyval(comm_copy_attr_fn_ptr, comm_delete_attr_fn_ptr, &comm_keyval, extra_state);\n\nif (err == MPI_SUCCESS) {\n    // Sucesso na cria\u00e7\u00e3o da chave. Agora podemos usar 'comm_keyval' para armazenar e recuperar dados.\n\n    // Exemplo: Armazenar um atributo em MPI_COMM_WORLD\n    MPI_Comm comm_to_set_attr = MPI_COMM_WORLD;\n    int attribute_value = 42;\n    void *attr_data_ptr = &attribute_value; // Ponteiro para o dado do atributo\n\n    // 2. Define o atributo no comunicador usando a chave criada.\n    err = MPI_Comm_set_attr(comm_to_set_attr, comm_keyval, attr_data_ptr);\n\n    if (err == MPI_SUCCESS) {\n        // Atributo definido. Agora vamos tentar recuper\u00e1-lo.\n        void *retrieved_attr_ptr;\n        int flag_found; // Indica se o atributo foi encontrado\n\n        // 3. Recupera o atributo do comunicador.\n        err = MPI_Comm_get_attr(comm_to_set_attr, comm_keyval, &retrieved_attr_ptr, &flag_found);\n\n        if (err == MPI_SUCCESS && flag_found) {\n            // int retrieved_value = *(int*)retrieved_attr_ptr; // Deve ser 42\n            // printf(\"Atributo recuperado com sucesso: %d\\n\", retrieved_value);\n        } else {\n            // Erro ao recuperar o atributo ou atributo n\u00e3o encontrado.\n        }\n\n        // Exemplo de duplica\u00e7\u00e3o de comunicador para testar a fun\u00e7\u00e3o de c\u00f3pia (my_copy_attr_function).\n        MPI_Comm duplicated_comm = MPI_COMM_NULL;\n        err = MPI_Comm_dup(comm_to_set_attr, &duplicated_comm);\n        if (err == MPI_SUCCESS) {\n            // A fun\u00e7\u00e3o my_copy_attr_function deve ter sido chamada aqui para copiar o atributo.\n            // Limpeza: Libera o comunicador duplicado.\n            MPI_Comm_free(&duplicated_comm);\n        }\n    } else {\n        // Erro ao definir o atributo.\n    }\n} else {\n    // Erro ao criar a chave de atributo.\n}\n\n// Limpeza: Libera a chave de atributo criada.\n// Isso tamb\u00e9m invocar\u00e1 a fun\u00e7\u00e3o my_delete_attr_function para qualquer atributo\n// ainda associado a esta chave em qualquer comunicador.\nif (comm_keyval != MPI_KEYVAL_INVALID) {\n    err = MPI_Comm_free_keyval(&comm_keyval);\n}\n"}, {"name": "MPI_Comm_delete_attr", "short_desc": "Exclui um valor de atributo associado a uma chave em um comunicador.", "synopsis": "int MPI_Comm_delete_attr(MPI_Comm comm, int comm_keyval)", "params": [{"name": "comm", "desc": "comunicador do qual o atributo ser\u00e1 exclu\u00eddo (handle)"}, {"name": "comm_keyval", "desc": "valor da chave (inteiro)"}], "description": "Remove um atributo anteriormente definido em um comunicador atrav\u00e9s de uma chave espec\u00edfica.", "application": "Usado para limpeza de recursos ou remo\u00e7\u00e3o de metadados quando n\u00e3o s\u00e3o mais necess\u00e1rios.", "example": "// Declara\u00e7\u00f5es\nMPI_Comm comm = MPI_COMM_WORLD;\nint comm_keyval = MPI_KEYVAL_INVALID; // Chave do atributo a ser deletado\nint attribute_value = 100;            // Valor do atributo a ser armazenado\nvoid *attr_ptr = &attribute_value;    // Ponteiro para o valor do atributo\nint err;\n\n// --- Fun\u00e7\u00f5es dummy para a cria\u00e7\u00e3o da chave (n\u00e3o s\u00e3o o foco, mas s\u00e3o necess\u00e1rias para MPI_Comm_create_keyval) ---\n// Fun\u00e7\u00e3o de c\u00f3pia: n\u00e3o copiar por padr\u00e3o para este exemplo.\nint dummy_copy_fn(MPI_Comm o
