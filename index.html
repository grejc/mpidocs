(&session);\n}\n\nMPI_T_finalize();"}, {"name": "MPI_T_pvar_session_free", "short_desc": "Libera uma sess\u00e3o de vari\u00e1vel de desempenho existente.", "synopsis": "int MPI_T_pvar_session_free(MPI_T_pvar_session *session)", "params": [{"name": "session", "desc": "identificador da sess\u00e3o de experimento de desempenho (handle)"}], "description": "Libera uma sess\u00e3o de vari\u00e1vel de desempenho. Ap\u00f3s a libera\u00e7\u00e3o, chamadas para a interface de informa\u00e7\u00f5es da ferramenta MPI n\u00e3o podem mais ser feitas no contexto da sess\u00e3o. O identificador \u00e9 definido como MPI_T_PVAR_SESSION_NULL em caso de sucesso.", "application": "Finaliza\u00e7\u00e3o de sess\u00f5es de monitoramento de desempenho para liberar recursos.", "example": "// Declara\u00e7\u00f5es\nMPI_T_pvar_session session;\n\nMPI_T_init_thread(MPI_THREAD_SINGLE, NULL);\nMPI_T_pvar_session_create(&session);\n\n// Libera todos os recursos associados \u00e0 sess\u00e3o\nint err = MPI_T_pvar_session_free(&session);\n\nif (err == MPI_SUCCESS) {\n    // Sess\u00e3o destru\u00edda e handle invalidado\n}\n\nMPI_T_finalize();"}, {"name": "MPI_T_pvar_start", "short_desc": "Inicia uma vari\u00e1vel de desempenho.", "synopsis": "int MPI_T_pvar_start(MPI_T_pvar_session session, MPI_T_pvar_handle handle)", "params": [{"name": "session", "desc": "identificador da sess\u00e3o de experimento de desempenho (handle)"}, {"name": "handle", "desc": "handle de uma vari\u00e1vel de desempenho (handle)"}], "description": "Inicia a coleta de dados para uma vari\u00e1vel de desempenho espec\u00edfica em uma sess\u00e3o. Se MPI_T_PVAR_ALL_HANDLES for passado no handle, tenta iniciar todas as vari\u00e1veis na sess\u00e3o.", "application": "Ativa\u00e7\u00e3o seletiva ou global de contadores de desempenho.", "example": "// Declara\u00e7\u00f5es\nMPI_T_pvar_session session;\nMPI_T_pvar_handle handle;\nint count;\n\nMPI_T_init_thread(MPI_THREAD_SINGLE, NULL);\nMPI_T_pvar_session_create(&session);\nMPI_T_pvar_handle_alloc(session, 0, NULL, &handle, &count);\n\n// Inicia a coleta de dados para esta m\u00e9trica\nint err = MPI_T_pvar_start(session, handle);\n\nif (err == MPI_SUCCESS) {\n    // Coleta iniciada\n}\n\nMPI_T_pvar_handle_free(session, &handle);\nMPI_T_pvar_session_free(&session);\nMPI_T_finalize();"}, {"name": "MPI_T_pvar_stop", "short_desc": "Para uma vari\u00e1vel de desempenho.", "synopsis": "int MPI_T_pvar_stop(MPI_T_pvar_session session, MPI_T_pvar_handle handle)", "params": [{"name": "session", "desc": "Identificador da sess\u00e3o de experimento de desempenho (handle)."}, {"name": "handle", "desc": "Handle de uma vari\u00e1vel de desempenho (handle)."}], "description": "MPI_T_pvar_stop interrompe a coleta de dados para uma vari\u00e1vel de desempenho espec\u00edfica dentro de uma sess\u00e3o da interface de ferramentas do MPI (MPI Tool Interface). Se MPI_T_PVAR_ALL_HANDLES for usado, tenta parar todas as vari\u00e1veis da sess\u00e3o.", "application": "Controle fino sobre a medi\u00e7\u00e3o de m\u00e9tricas internas do MPI.", "example": "// Declara\u00e7\u00f5es\nMPI_T_pvar_session session;\nMPI_T_pvar_handle handle;\nint count;\n\nMPI_T_init_thread(MPI_THREAD_SINGLE, NULL);\nMPI_T_pvar_session_create(&session);\nMPI_T_pvar_handle_alloc(session, 0, NULL, &handle, &count);\n\n// Interrompe a coleta de dados\nint err = MPI_T_pvar_stop(session, handle);\n\nif (err == MPI_SUCCESS) {\n    // Coleta interrompida com sucesso\n}\n\nMPI_T_pvar_handle_free(session, &handle);\nMPI_T_pvar_session_free(&session);\nMPI_T_finalize();"}, {"name": "MPI_T_pvar_write", "short_desc": "Escreve um valor em uma vari\u00e1vel de desempenho.", "synopsis": "int MPI_T_pvar_write(MPI_T_pvar_session session, MPI_T_pvar_handle handle, const void *buf)", "params": [{"name": "session", "desc": "Identificador da sess\u00e3o de experimento de desempenho (handle)."}, {"name": "handle", "desc": "Handle de uma vari\u00e1vel de desempenho (handle)."}, {"name": "buf", "desc": "Endere\u00e7o inicial do local de armazenamento para o valor da vari\u00e1vel (escolha)."}], "description": "MPI_T_pvar_write tenta gravar um valor em uma vari\u00e1vel de desempenho especificada. O usu\u00e1rio deve garantir que o buffer buf seja do tamanho correto para o tipo de dado e contagem da vari\u00e1vel, informa\u00e7\u00f5es que podem ser obtidas previamente. Esta fun\u00e7\u00e3o n\u00e3o permite o uso da constante MPI_T_PVAR_ALL_HANDLES.", "application": "Utilizado para resetar ou ajustar vari\u00e1veis de desempenho que permitem escrita pela interface de ferramentas.", "example": "// Declara\u00e7\u00f5es\nMPI_T_pvar_session session;\nMPI_T_pvar_handle handle;\nint pvar_value = 100;\n\n// Inicializa a sess\u00e3o e o handle para uma vari\u00e1vel de performance\nMPI_T_pvar_session_create(&session);\nMPI_T_pvar_handle_alloc(session, 0, NULL, &handle, NULL, NULL, NULL, NULL, NULL, NULL);\n\n// Escreve um valor na vari\u00e1vel de desempenho\nint err = MPI_T_pvar_write(session, handle, &pvar_value);\n\nif (err == MPI_SUCCESS) {\n    // A vari\u00e1vel foi atualizada com sucesso\n}\n\n// Limpeza\nMPI_T_pvar_handle_free(session, &handle);\nMPI_T_pvar_session_free(&session);"}, {"name": "MPI_Test", "short_desc": "Testa a conclus\u00e3o de uma requisi\u00e7\u00e3o de comunica\u00e7\u00e3o n\u00e3o bloqueante.", "synopsis": "int MPI_Test(MPI_Request *request, int *flag, MPI_Status *status)", "params": [{"name": "request", "desc": "Requisi\u00e7\u00e3o de comunica\u00e7\u00e3o (handle)."}, {"name": "flag", "desc": "Verdadeiro se a opera\u00e7\u00e3o foi conclu\u00edda (l\u00f3gico)."}, {"name": "status", "desc": "Objeto de status (Status)."}], "description": "MPI_Test verifica se a opera\u00e7\u00e3o associada a request foi conclu\u00edda. Diferente de MPI_Wait, ela n\u00e3o bloqueia a execu\u00e7\u00e3o. Se a opera\u00e7\u00e3o estiver conclu\u00edda, flag \u00e9 definido como verdadeiro e status cont\u00e9m informa\u00e7\u00f5es sobre a mensagem. Se a requisi\u00e7\u00e3o for conclu\u00edda, o handle request \u00e9 definido como MPI_REQUEST_NULL.", "application": "Usado em loops de computa\u00e7\u00e3o para verificar periodicamente se comunica\u00e7\u00f5es ass\u00edncronas terminaram, permitindo sobreposi\u00e7\u00e3o de c\u00e1lculo e comunica\u00e7\u00e3o.", "example": "// Declara\u00e7\u00f5es\nMPI_Request request;\nint flag = 0;\nMPI_Status status;\nint data = 42;\n\n// Inicia uma opera\u00e7\u00e3o de envio n\u00e3o bloqueante\nMPI_Isend(&data, 1, MPI_INT, 0, 0, MPI_COMM_WORLD, &request);\n\n// Verifica se a opera\u00e7\u00e3o foi conclu\u00edda sem bloquear\nint err = MPI_Test(&request, &flag, &status);\n\nif (err == MPI_SUCCESS && flag) {\n    // Opera\u00e7\u00e3o conclu\u00edda\n}"}, {"name": "MPI_Test_cancelled", "short_desc": "Testa se uma requisi\u00e7\u00e3o foi cancelada.", "synopsis": "int MPI_Test_cancelled(const MPI_Status *status, int *flag)", "params": [{"name": "status", "desc": "Objeto de status (Status)."}, {"name": "flag", "desc": "Retorna verdadeiro se a requisi\u00e7\u00e3o foi cancelada (l\u00f3gico)."}], "description": "MPI_Test_cancelled verifica, atrav\u00e9s do objeto de status retornado por uma opera\u00e7\u00e3o de teste ou espera, se a requisi\u00e7\u00e3o correspondente foi cancelada com sucesso via MPI_Cancel.", "application": "Verifica\u00e7\u00e3o ap\u00f3s tentativas de cancelamento de mensagens pendentes.", "example": "// Declara\u00e7\u00f5es\nMPI_Request request;\nMPI_Status status;\nint flag = 0;\nint cancelled = 0;\n\n// Inicia e cancela uma opera\u00e7\u00e3o\nMPI_Irecv(NULL, 0, MPI_INT, 0, 0, MPI_COMM_WORLD, &request);\nMPI_Cancel(&request);\nMPI_Wait(&request, &status);\n\n// Verifica se a opera\u00e7\u00e3o foi cancelada\nint err = MPI_Test_cancelled(&status, &cancelled);\n\nif (err == MPI_SUCCESS && cancelled) {\n    // A requisi\u00e7\u00e3o foi cancelada\n}"}, {"name": "MPI_Testall", "short_desc": "Testa a conclus\u00e3o de todas as requisi\u00e7\u00f5es iniciadas anteriormente.", "synopsis": "int MPI_Testall(int count, MPI_Request array_of_requests[], int *flag, MPI_Status *array_of_statuses)", "params": [{"name": "count", "desc": "Contagem de requisi\u00e7\u00f5es (inteiro n\u00e3o negativo)."}, {"name": "array_of_requests", "desc": "Array de requisi\u00e7\u00f5es (handle)."}, {"name": "flag", "desc": "Verdadeiro se todas as opera\u00e7\u00f5es foram conclu\u00eddas (l\u00f3gico)."}, {"name": "array_of_statuses", "desc": "Array de objetos de status (Status)."}], "description": "MPI_Testall verifica se todas as requisi\u00e7\u00f5es no array foram conclu\u00eddas. flag s\u00f3 ser\u00e1 verdadeiro se todas as opera\u00e7\u00f5es terminarem. Caso contr\u00e1rio, flag \u00e9 falso e os objetos de status n\u00e3o s\u00e3o modificados. Se houver erro em alguma requisi\u00e7\u00e3o, a fun\u00e7\u00e3o retorna MPI_ERR_IN_STATUS.", "application": "Verifica\u00e7\u00e3o simult\u00e2nea de um grupo de comunica\u00e7\u00f5es n\u00e3o bloqueantes.", "example": "// Declara\u00e7\u00f5es\nint count = 2;\nMPI_Request requests[2];\nMPI_Status statuses[2];\nint flag = 0;\nint data1 = 1, data2 = 2;\n\n// Inicia m\u00faltiplas opera\u00e7\u00f5es\nMPI_Isend(&data1, 1, MPI_INT, 0, 0, MPI_COMM_WORLD, &requests[0]);\nMPI_Isend(&data2, 1, MPI_INT, 0, 0, MPI_COMM_WORLD, &requests[1]);\n\n// Testa se todas terminaram\nint err = MPI_Testall(count, requests, &flag, statuses);\n\nif (err == MPI_SUCCESS && flag) {\n    // Todas as opera\u00e7\u00f5es foram conclu\u00eddas\n}"}, {"name": "MPI_Testany", "short_desc": "Testa a conclus\u00e3o de qualquer uma das requisi\u00e7\u00f5es iniciadas anteriormente.", "synopsis": "int MPI_Testany(int count, MPI_Request array_of_requests[], int *indx, int *flag, MPI_Status *status)", "params": [{"name": "count", "desc": "Contagem de requisi\u00e7\u00f5es (inteiro n\u00e3o negativo)."}, {"name": "array_of_requests", "desc": "Array de requisi\u00e7\u00f5es (handle)."}, {"name": "indx", "desc": "\u00cdndice da opera\u00e7\u00e3o que foi conclu\u00edda ou MPI_UNDEFINED se nenhuma terminou (inteiro)."}, {"name": "flag", "desc": "Verdadeiro se uma das opera\u00e7\u00f5es foi conclu\u00edda (l\u00f3gico)."}, {"name": "status", "desc": "Objeto de status (Status)."}], "description": "MPI_Testany verifica se pelo menos uma das requisi\u00e7\u00f5es no array foi conclu\u00edda. Se sim, flag \u00e9 verdadeiro, indx retorna o \u00edndice da requisi\u00e7\u00e3o no array e status cont\u00e9m os detalhes. A requisi\u00e7\u00e3o conclu\u00edda \u00e9 definida como MPI_REQUEST_NULL.", "application": "Processamento de mensagens conforme elas chegam, sem ordem fixa.", "example": "// Declara\u00e7\u00f5es\nint count = 2;\nMPI_Request requests[2];\nMPI_Status status;\nint indx, flag = 0;\nint data1 = 1, data2 = 2;\n\n// Inicia opera\u00e7\u00f5es\nMPI_Isend(&data1, 1, MPI_INT, 0, 0, MPI_COMM_WORLD, &requests[0]);\nMPI_Isend(&data2, 1, MPI_INT, 0, 0, MPI_COMM_WORLD, &requests[1]);\n\n// Testa se pelo menos uma terminou\nint err = MPI_Testany(count, requests, &indx, &flag, &status);\n\nif (err == MPI_SUCCESS && flag) {\n    // Opera\u00e7\u00e3o no \u00edndice 'indx' conclu\u00edda\n}"}, {"name": "MPI_Testsome", "short_desc": "Testa quais das requisi\u00e7\u00f5es fornecidas foram conclu\u00eddas.", "synopsis": "int MPI_Testsome(int incount, MPI_Request array_of_requests[], int *outcount, int array_of_indices[], MPI_Status *array_of_statuses)", "params": [{"name": "incount", "desc": "Tamanho do array de requisi\u00e7\u00f5es (inteiro n\u00e3o negativo)."}, {"name": "array_of_requests", "desc": "Array de requisi\u00e7\u00f5es (handle)."}, {"name": "outcount", "desc": "N\u00famero de requisi\u00e7\u00f5es conclu\u00eddas (inteiro)."}, {"name": "array_of_indices", "desc": "Array de \u00edndices das opera\u00e7\u00f5es conclu\u00eddas (inteiro)."}, {"name": "array_of_statuses", "desc": "Array de objetos de status para as opera\u00e7\u00f5es conclu\u00eddas (Status)."}], "description": "MPI_Testsome retorna informa\u00e7\u00f5es sobre todas as requisi\u00e7\u00f5es que j\u00e1 foram conclu\u00eddas no momento da chamada. Ela retorna o n\u00famero de conclus\u00f5es em outcount e preenche os arrays de \u00edndices e status correspondentes.", "application": "Gerenciamento eficiente de m\u00faltiplas requisi\u00e7\u00f5es pendentes, processando todas as que estiverem prontas de uma vez.", "example": "// Declara\u00e7\u00f5es\nint incount = 2;\nMPI_Request requests[2];\nint outcount;\nint indices[2];\nMPI_Status statuses[2];\nint data1 = 1, data2 = 2;\n\n// Inicia opera\u00e7\u00f5es\nMPI_Isend(&data1, 1, MPI_INT, 0, 0, MPI_COMM_WORLD, &requests[0]);\nMPI_Isend(&data2, 1, MPI_INT, 0, 0, MPI_COMM_WORLD, &requests[1]);\n\n// Testa quais terminaram\nint err = MPI_Testsome(incount, requests, &outcount, indices, statuses);\n\nif (err == MPI_SUCCESS) {\n    // outcount cont\u00e9m quantas terminaram\n}"}, {"name": "MPI_Topo_test", "short_desc": "Determina o tipo de topologia associada a um comunicador.", "synopsis": "int MPI_Topo_test(MPI_Comm comm, int *status)", "params": [{"name": "comm", "desc": "Comunicador (handle)."}, {"name": "status", "desc": "Tipo de topologia do comunicador (estado)."}], "description": "MPI_Topo_test identifica se um comunicador possui uma topologia virtual associada. Os valores de status podem indicar MPI_GRAPH (grafo), MPI_CART (cartesiana) ou MPI_UNDEFINED (nenhuma topologia).", "application": "Verifica\u00e7\u00e3o de propriedades do comunicador antes de chamar rotinas espec\u00edficas de topologia.", "example": "// Declara\u00e7\u00f5es\nMPI_Comm comm = MPI_COMM_WORLD;\nint status;\n\n// Testa a topologia do comunicador\nint err = MPI_Topo_test(comm, &status);\n\nif (err == MPI_SUCCESS) {\n    if (status == MPI_CART) { /* Topologia Cartesiana */ }\n    else if (status == MPI_GRAPH) { /* Topologia Grafo */ }\n    else { /* Sem topologia ou topologia desconhecida */ }\n}"}, {"name": "MPI_Type_c2f", "short_desc": "Converte um MPI_Datatype de C para um INTEGER do Fortran.", "synopsis": "MPI_Fint MPI_Type_c2f(MPI_Datatype datatype)", "params": [{"name": "datatype", "desc": "Tipo de dado MPI (handle)."}], "description": "MPI_Type_c2f traduz um handle de tipo de dado MPI do C para um inteiro compat\u00edvel com Fortran.", "application": "Interoperabilidade C/Fortran.", "example": "// Declara\u00e7\u00f5es\nMPI_Datatype datatype = MPI_INT;\nMPI_Fint fortran_handle;\n\n// Converte o tipo C para um handle compat\u00edvel com Fortran\nfortran_handle = MPI_Type_c2f(datatype);\n\n// Como n\u00e3o h\u00e1 erro de retorno, verificamos a validade b\u00e1sica\nif (fortran_handle != 0) {\n    // Convers\u00e3o realizada\n}"}, {"name": "MPI_Type_commit", "short_desc": "Efetiva (commit) um tipo de dado.", "synopsis": "int MPI_Type_commit(MPI_Datatype *datatype)", "params": [{"name": "datatype", "desc": "Tipo de dado a ser efetivado (handle)."}], "description": "MPI_Type_commit deve ser chamado antes que um tipo de dado derivado, criado por construtores como MPI_Type_contiguous, possa ser usado em opera\u00e7\u00f5es de comunica\u00e7\u00e3o. Tipos predefinidos (como MPI_INT) n\u00e3o precisam de commit.", "application": "Finaliza\u00e7\u00e3o de tipos de dados customizados para uso em mensagens.", "example": "// Declara\u00e7\u00f5es\nMPI_Datatype newtype;\nint blocklen = 3;\n\n// Cria um tipo derivado\nMPI_Type_contiguous(blocklen, MPI_INT, &newtype);\n\n// Efetiva o tipo para uso\nint err = MPI_Type_commit(&newtype);\n\nif (err == MPI_SUCCESS) {\n    // Tipo pronto para uso em comunica\u00e7\u00f5es\n}\n\n// Limpeza\nMPI_Type_free(&newtype);"}, {"name": "MPI_Type_contiguous", "short_desc": "Cria um tipo de dado cont\u00edguo.", "synopsis": "int MPI_Type_contiguous(int count, MPI_Datatype oldtype, MPI_Datatype *newtype)", "params": [{"name": "count", "desc": "N\u00famero de replica\u00e7\u00f5es (inteiro n\u00e3o negativo)."}, {"name": "oldtype", "desc": "Tipo de dado base (handle)."}, {"name": "newtype", "desc": "Novo tipo de dado criado (handle)."}], "description": "MPI_Type_contiguous cria um novo tipo de dado que representa a repeti\u00e7\u00e3o de count elementos do tipo oldtype, organizados de forma cont\u00edgua na mem\u00f3ria.", "application": "Simplifica\u00e7\u00e3o de envio de vetores ou blocos cont\u00edguos de mem\u00f3ria como uma \u00fanica unidade.", "example": "// Declara\u00e7\u00f5es\nint count = 5;\nMPI_Datatype oldtype = MPI_INT;\nMPI_Datatype newtype;\n\n// Cria tipo cont\u00edguo de 5 inteiros\nint err = MPI_Type_contiguous(count, oldtype, &newtype);\n\nif (err == MPI_SUCCESS) {\n    MPI_Type_commit(&newtype);\n    // Tipo criado e commitado\n    MPI_Type_free(&newtype);\n}"}, {"name": "MPI_Type_create_darray", "short_desc": "Cria um tipo de dado representando um array distribu\u00eddo.", "synopsis": "int MPI_Type_create_darray(int size, int rank, int ndims, const int array_of_gsizes[], const int array_of_distribs[], const int array_of_dargs[], const int array_of_psizes[], int order, MPI_Datatype oldtype, MPI_Datatype *newtype)", "params": [{"name": "size", "desc": "Tamanho do grupo de processos (inteiro positivo)."}, {"name": "rank", "desc": "Rank no grupo de processos (inteiro n\u00e3o negativo)."}, {"name": "ndims", "desc": "N\u00famero de dimens\u00f5es do array e do grid de processos (inteiro positivo)."}, {"name": "array_of_gsizes", "desc": "N\u00famero de elementos do tipo oldtype em cada dimens\u00e3o do array global."}, {"name": "array_of_distribs", "desc": "Distribui\u00e7\u00e3o do array em cada dimens\u00e3o (ex: MPI_DISTRIBUTE_BLOCK)."}, {"name": "array_of_dargs", "desc": "Argumento de distribui\u00e7\u00e3o em cada dimens\u00e3o."}, {"name": "array_of_psizes", "desc": "Tamanho do grid de processos em cada dimens\u00e3o."}, {"name": "order", "desc": "Flag de ordem de armazenamento (MPI_ORDER_C ou MPI_ORDER_FORTRAN)."}, {"name": "oldtype", "desc": "Tipo de dado base (handle)."}, {"name": "newtype", "desc": "Novo tipo de dado criado (handle)."}], "description": "MPI_Type_create_darray \u00e9 uma ferramenta poderosa para gerenciar arrays multidimensionais distribu\u00eddos entre processos. Ela gera automaticamente um tipo de dado que descreve a parte local de um array global, facilitando opera\u00e7\u00f5es de E/S paralela ou redistribui\u00e7\u00e3o de dados.", "application": "Fundamental em computa\u00e7\u00e3o cient\u00edfica de alto desempenho para lidar com grandes matrizes distribu\u00eddas em malhas de processos.", "example": "// Declara\u00e7\u00f5es\nint size = 4;\nint rank = 0;\nint ndims = 1;\nint gsizes[1] = {100};\nint distribs[1] = {MPI_DISTRIBUTE_BLOCK};\nint darg[1] = {MPI_DISTRIBUTE_DFLT_DARG};\nint psizes[1] = {4};\nint order = MPI_ORDER_C;\nMPI_Datatype oldtype = MPI_INT;\nMPI_Datatype newtype;\n\n// Cria um tipo de dado para um array distribu\u00eddo\nint err = MPI_Type_create_darray(size, rank, ndims, gsizes, distribs, darg, psizes, order, oldtype, &newtype);\n\nif (err == MPI_SUCCESS) {\n    MPI_Type_commit(&newtype);\n    // Libera\u00e7\u00e3o de recursos ap\u00f3s uso\n    MPI_Type_free(&newtype);\n}"}, {"name": "MPI_Type_create_f90_complex", "short_desc": "Retorna um tipo predefinido que corresponde ao intervalo de precis\u00e3o e expoente especificado para complexos Fortran 90.", "synopsis": "int MPI_Type_create_f90_complex(int p, int r, MPI_Datatype *newtype)", "params": [{"name": "p", "desc": "precis\u00e3o em d\u00edgitos decimais (inteiro)"}, {"name": "r", "desc": "intervalo do expoente decimal (inteiro)"}, {"name": "newtype", "desc": "o tipo de dado MPI solicitado (handle)"}], "description": "Cria um tipo de dado MPI que corresponde a um complexo do Fortran 90 com a precis\u00e3o e o intervalo de expoente solicitados.", "application": "Interoperabilidade entre C e Fortran 90 para tipos complexos.", "example": "// Declara\u00e7\u00f5es\nMPI_Datatype complex_type;\n\n// Cria um tipo correspondente a complexo com precis\u00e3o de 6 d\u00edgitos e range de 37\nint err = MPI_Type_create_f90_complex(6, 37, &complex_type);\n\nif (err == MPI_SUCCESS) {\n    MPI_Type_commit(&complex_type);\n    // Limpeza\n    MPI_Type_free(&complex_type);\n}"}, {"name": "MPI_Type_create_f90_integer", "short_desc": "Retorna um tipo predefinido que corresponde ao intervalo especificado para inteiros Fortran 90.", "synopsis": "int MPI_Type_create_f90_integer(int r, MPI_Datatype *newtype)", "params": [{"name": "r", "desc": "intervalo do expoente decimal, ou seja, n\u00famero de d\u00edgitos decimais (inteiro)"}, {"name": "newtype", "desc": "o tipo de dado MPI solicitado (handle)"}], "description": "Cria um tipo de dado MPI que corresponde a um inteiro do Fortran 90 capaz de representar o intervalo solicitado.", "application": "Interoperabilidade C/Fortran para tipos inteiros de tamanho espec\u00edfico.", "example": "// Declara\u00e7\u00f5es\nMPI_Datatype int_type;\n\n// Cria um tipo de inteiro capaz de representar at\u00e9 9 d\u00edgitos decimais\nint err = MPI_Type_create_f90_integer(9, &int_type);\n\nif (err == MPI_SUCCESS) {\n    MPI_Type_commit(&int_type);\n    // Limpeza\n    MPI_Type_free(&int_type);\n}"}, {"name": "MPI_Type_create_f90_real", "short_desc": "Retorna um tipo predefinido que corresponde ao intervalo de precis\u00e3o e expoente especificado para reais Fortran 90.", "synopsis": "int MPI_Type_create_f90_real(int p, int r, MPI_Datatype *newtype)", "params": [{"name": "p", "desc": "precis\u00e3o em d\u00edgitos decimais (inteiro)"}, {"name": "r", "desc": "intervalo do expoente decimal (inteiro)"}, {"name": "newtype", "desc": "o tipo de dado MPI solicitado (handle)"}], "description": "Cria um tipo de dado MPI que corresponde a um real do Fortran 90 com a precis\u00e3o e o intervalo de expoente solicitados.", "application": "Interoperabilidade C/Fortran para tipos de ponto flutuante.", "example": "// Declara\u00e7\u00f5es\nMPI_Datatype real_type;\n\n// Cria um tipo real com precis\u00e3o de 15 d\u00edgitos e range de 307\nint err = MPI_Type_create_f90_real(15, 307, &real_type);\n\nif (err == MPI_SUCCESS) {\n    MPI_Type_commit(&real_type);\n    // Limpeza\n    MPI_Type_free(&real_type);\n}"}, {"name": "MPI_Type_create_hindexed", "short_desc": "Cria um tipo de dado para um tipo indexado com deslocamentos em bytes.", "synopsis": "int MPI_Type_create_hindexed(int count, const int array_of_blocklengths[], const MPI_Aint array_of_displacements[], MPI_Datatype oldtype, MPI_Datatype *newtype)", "params": [{"name": "count", "desc": "n\u00famero de blocos (inteiro n\u00e3o negativo)"}, {"name": "array_of_blocklengths", "desc": "n\u00famero de elementos em cada bloco (array de inteiros n\u00e3o negativos)"}, {"name": "array_of_displacements", "desc": "deslocamento em bytes de cada bloco (array de inteiros)"}, {"name": "oldtype", "desc": "tipo de dado antigo (handle)"}, {"name": "newtype", "desc": "novo tipo de dado (handle)"}], "description": "Semelhante ao MPI_Type_indexed, mas os deslocamentos s\u00e3o especificados em bytes em vez de unidades do tipo de dado original.", "application": "Cria\u00e7\u00e3o de tipos de dados complexos com padr\u00f5es de acesso n\u00e3o uniformes em bytes.", "example": "// Declara\u00e7\u00f5es\nint count = 2;\nint blocklengths[2] = {1, 1};\nMPI_Aint displacements[2] = {0, 16};\nMPI_Datatype newtype;\n\n// Cria um tipo baseado em deslocamentos absolutos em bytes\nint err = MPI_Type_create_hindexed(count, blocklengths, displacements, MPI_INT, &newtype);\n\nif (err == MPI_SUCCESS) {\n    MPI_Type_commit(&newtype);\n    // Limpeza\n    MPI_Type_free(&newtype);\n}"}, {"name": "MPI_Type_create_hindexed_block", "short_desc": "Cria um tipo de dado hindexed com blocos de tamanho constante.", "synopsis": "int MPI_Type_create_hindexed_block(int count, int blocklength, const MPI_Aint array_of_displacements[], MPI_Datatype oldtype, MPI_Datatype *newtype)", "params": [{"name": "count", "desc": "n\u00famero de blocos (inteiro n\u00e3o negativo)"}, {"name": "blocklength", "desc": "tamanho de cada bloco (inteiro n\u00e3o negativo)"}, {"name": "array_of_displacements", "desc": "deslocamento em bytes de cada bloco (array de inteiros)"}, {"name": "oldtype", "desc": "tipo de dado antigo (handle)"}, {"name": "newtype", "desc": "novo tipo de dado (handle)"}], "description": "Cria um tipo de dado consistindo de um n\u00famero de blocos, todos com o mesmo comprimento, com deslocamentos especificados em bytes.", "application": "Estruturas de dados com blocos fixos e espa\u00e7amentos variados em bytes.", "example": "// Declara\u00e7\u00f5es\nint count = 2;\nint blocklength = 4;\nMPI_Aint displacements[2] = {0, 24};\nMPI_Datatype newtype;\n\n// Cria um tipo com blocos de tamanho constante e deslocamentos em bytes\nint err = MPI_Type_create_hindexed_block(count, blocklength, displacements, MPI_DOUBLE, &newtype);\n\nif (err == MPI_SUCCESS) {\n    MPI_Type_commit(&newtype);\n    // Limpeza\n    MPI_Type_free(&newtype);\n}"}, {"name": "MPI_Type_create_hvector", "short_desc": "Cria um tipo de dado com um passo (stride) constante dado em bytes.", "synopsis": "int MPI_Type_create_hvector(int count, int blocklength, MPI_Aint stride, MPI_Datatype oldtype, MPI_Datatype *newtype)", "params": [{"name": "count", "desc": "n\u00famero de blocos (inteiro n\u00e3o negativo)"}, {"name": "blocklength", "desc": "n\u00famero de elementos em cada bloco (inteiro n\u00e3o negativo)"}, {"name": "stride", "desc": "n\u00famero de bytes entre o in\u00edcio de cada bloco (inteiro)"}, {"name": "oldtype", "desc": "tipo de dado antigo (handle)"}, {"name": "newtype", "desc": "novo tipo de dado (handle)"}], "description": "Semelhante ao MPI_Type_vector, mas o stride \u00e9 medido em bytes em vez de m\u00faltiplus do tamanho do tipo de dado.", "application": "Mapeamento de colunas de matrizes em mem\u00f3ria n\u00e3o cont\u00edgua onde o stride n\u00e3o \u00e9 m\u00faltiplo do tamanho do tipo.", "example": "// Declara\u00e7\u00f5es\nint count = 10;\nint blocklength = 1;\nMPI_Aint stride = 32;\nMPI_Datatype newtype;\n\n// Cria um vetor com stride medido em bytes\nint err = MPI_Type_create_hvector(count, blocklength, stride, MPI_INT, &newtype);\n\nif (err == MPI_SUCCESS) {\n    MPI_Type_commit(&newtype);\n    // Limpeza\n    MPI_Type_free(&newtype);\n}"}, {"name": "MPI_Type_create_indexed_block", "short_desc": "Cria um tipo de dado indexado com blocos de tamanho constante.", "synopsis": "int MPI_Type_create_indexed_block(int count, int blocklength, const int array_of_displacements[], MPI_Datatype oldtype, MPI_Datatype *newtype)", "params": [{"name": "count", "desc": "n\u00famero de blocos (inteiro n\u00e3o negativo)"}, {"name": "blocklength", "desc": "tamanho de cada bloco (inteiro n\u00e3o negativo)"}, {"name": "array_of_displacements", "desc": "array de deslocamentos em unidades de oldtype (inteiro)"}, {"name": "oldtype", "desc": "tipo de dado antigo (handle)"}, {"name": "newtype", "desc": "novo tipo de dado (handle)"}], "description": "Cria um tipo de dado composto por blocos de tamanho igual, onde cada bloco pode ter um deslocamento diferente em unidades do tipo original.", "application": "Simplifica\u00e7\u00e3o da cria\u00e7\u00e3o de tipos indexados quando todos os blocos t\u00eam o mesmo tamanho.", "example": "// Declara\u00e7\u00f5es\nint count = 3;\nint blocklength = 2;\nint displacements[3] = {0, 5, 10};\nMPI_Datatype newtype;\n\n// Cria tipo com blocos de tamanho fixo em \u00edndices do tipo base\nint err = MPI_Type_create_indexed_block(count, blocklength, displacements, MPI_INT, &newtype);\n\nif (err == MPI_SUCCESS) {\n    MPI_Type_commit(&newtype);\n    // Limpeza\n    MPI_Type_free(&newtype);\n}"}, {"name": "MPI_Type_create_keyval", "short_desc": "Cria um par chave-valor de atributo para tipos de dados MPI.", "synopsis": "int MPI_Type_create_keyval(MPI_Type_copy_attr_function *type_copy_attr_fn, MPI_Type_delete_attr_function *type_delete_attr_fn, int *type_keyval, void *extra_state)", "params": [{"name": "type_copy_attr_fn", "desc": "fun\u00e7\u00e3o de callback de c\u00f3pia para type_keyval (fun\u00e7\u00e3o)"}, {"name": "type_delete_attr_fn", "desc": "fun\u00e7\u00e3o de callback de exclus\u00e3o para type_keyval (fun\u00e7\u00e3o)"}, {"name": "type_keyval", "desc": "valor da chave para acesso futuro (inteiro)"}, {"name": "extra_state", "desc": "estado extra para a fun\u00e7\u00e3o de callback (Nenhum)"}], "description": "Gera uma nova chave de atributo que pode ser usada para anexar informa\u00e7\u00f5es personalizadas a tipos de dados MPI.", "application": "Cache de informa\u00e7\u00f5es personalizadas em objetos de tipo de dado.", "example": "// Declara\u00e7\u00f5es\nint keyval;\n\n// Cria uma nova chave de atributo para tipos de dados\nint err = MPI_Type_create_keyval(MPI_TYPE_NULL_COPY_FN, MPI_TYPE_NULL_DELETE_FN, &keyval, NULL);\n\nif (err == MPI_SUCCESS) {\n    // Limpeza ap\u00f3s o uso\n    MPI_Type_free_keyval(&keyval);\n}"}, {"name": "MPI_Type_create_resized", "short_desc": "Cria um tipo de dado com um novo limite inferior e extens\u00e3o a partir de um tipo de dado existente", "synopsis": "int MPI_Type_create_resized(MPI_Datatype oldtype, MPI_Aint lb, MPI_Aint extent, MPI_Datatype *newtype)\n\nint MPI_Type_create_resized_c(MPI_Datatype oldtype, MPI_Count lb, MPI_Count extent, MPI_Datatype *newtype)", "params": [{"name": "oldtype", "desc": "tipo de dado de entrada (handle)"}, {"name": "lb", "desc": "novo limite inferior do tipo de dado (inteiro)"}, {"name": "extent", "desc": "nova extens\u00e3o do tipo de dado (inteiro)"}, {"name": "newtype", "desc": "tipo de dado de sa\u00edda (handle)"}], "description": "ERROS\nTodas as rotinas MPI (exceto MPI_Wtime e MPI_Wtick) retornam um valor de erro; rotinas C como o valor da fun\u00e7\u00e3o e rotinas Fortran no \u00faltimo argumento. Antes do valor ser retornado, o manipulador de erro MPI atual \u00e9 chamado. Por padr\u00e3o, este manipulador de erro aborta o trabalho MPI. O manipulador de erro pode ser alterado com MPI_Comm_set_errhandler (para comunicadores), MPI_File_set_errhandler (para arquivos) e MPI_Win_set_errhandler (para janelas RMA). A rotina MPI-1 MPI_Errhandler_set pode ser usada, mas seu uso \u00e9 desencorajado. O manipulador de erro predefinido MPI_ERRORS_RETURN pode ser usado para fazer com que os valores de erro sejam retornados. Observe que o MPI n\u00e3o garante que um programa MPI possa continuar ap\u00f3s um erro; no entanto, as implementa\u00e7\u00f5es MPI tentar\u00e3o continuar sempre que poss\u00edvel.\n\nMPI_SUCCESS\n- Nenhum erro; a rotina MPI foi conclu\u00edda com sucesso.\nMPI_ERR_ARG\n- Argumento inv\u00e1lido. Algum argumento \u00e9 inv\u00e1lido e n\u00e3o \u00e9 identificado por uma classe de erro espec\u00edfica (ex: MPI_ERR_RANK).\nMPI_ERR_TYPE\n- Argumento de tipo de dado inv\u00e1lido. Adicionalmente, este erro pode ocorrer se um MPI_Datatype n\u00e3o comprometido (veja MPI_Type_commit) for usado em uma chamada de comunica\u00e7\u00e3o.\nMPI_ERR_OTHER\n- Outro erro; use MPI_Error_string para obter mais informa\u00e7\u00f5es sobre este c\u00f3digo de erro.", "application": "", "example": "// Declara\u00e7\u00f5es\nMPI_Datatype oldtype = MPI_INT;\nMPI_Aint lb = 0;\nMPI_Aint extent = 8;\nMPI_Datatype newtype;\n\n// Altera o limite inferior e a extens\u00e3o de um tipo de dado\nint err = MPI_Type_create_resized(oldtype, lb, extent, &newtype);\n\nif (err == MPI_SUCCESS) {\n    MPI_Type_commit(&newtype);\n    // Limpeza\n    MPI_Type_free(&newtype);\n}"}, {"name": "MPI_Type_create_struct", "short_desc": "Cria um tipo de dado MPI a partir de um conjunto geral de tipos de dados, deslocamentos e tamanhos de bloco", "synopsis": "int MPI_Type_create_struct(int count, const int array_of_blocklengths[], const MPI_Aint array_of_displacements[], const MPI_Datatype array_of_types[], MPI_Datatype *newtype)\n\nint MPI_Type_create_struct_c(int count, const MPI_Count array_of_blocklengths[], const MPI_Count array_of_displacements[], const MPI_Datatype array_of_types[], MPI_Datatype *newtype)", "params": [{"name": "count", "desc": "n\u00famero de blocos (inteiro) --- tamb\u00e9m o n\u00famero de entradas nos arrays array_of_types, array_of_displacements e array_of_blocklengths"}, {"name": "array_of_blocklengths", "desc": "n\u00famero de elementos em cada bloco (array de inteiros)"}, {"name": "array_of_displacements", "desc": "deslocamento em bytes de cada bloco (array de endere\u00e7os)"}, {"name": "array_of_types", "desc": "tipo de elementos em cada bloco (array de handles para objetos de tipo de dado)"}, {"name": "newtype", "desc": "novo tipo de dado (handle)"}], "description": "NOTAS\nSe um deslocamento \u00e9 uma constante, ele deve ser do tipo MPI_Aint no C e do tipo INTEGER(KIND=MPI_ADDRESS_KIND) no Fortran, para ser compat\u00edvel com as declara\u00e7\u00f5es de prot\u00f3tipo. No Fortran, a vers\u00e3o MPI-1 MPI_TYPE_STRUCT \u00e9 desencorajada em favor de MPI_TYPE_CREATE_STRUCT.\n\nERROS\nTodas as rotinas MPI (exceto MPI_Wtime e MPI_Wtick) retornam um valor de erro; rotinas C como o valor da fun\u00e7\u00e3o e rotinas Fortran no \u00faltimo argumento. Antes do valor ser retornado, o manipulador de erro MPI atual \u00e9 chamado. Por padr\u00e3o, este manipulador de erro aborta o trabalho MPI.\n\nMPI_SUCCESS\n- Nenhum erro; a rotina MPI foi conclu\u00edda com sucesso.\nMPI_ERR_TYPE\n- Argumento de tipo de dado inv\u00e1lido.\nMPI_ERR_COUNT\n- Argumento de contagem inv\u00e1lido.\nMPI_ERR_ARG\n- Argumento inv\u00e1lido.", "application": "", "example": "// Declara\u00e7\u00f5es\nint count = 2;\nint array_of_blocklengths[] = {1, 1};\nMPI_Aint array_of_displacements[] = {0, sizeof(int)};\nMPI_Datatype array_of_types[] = {MPI_INT, MPI_FLOAT};\nMPI_Datatype newtype;\n\n// Cria um tipo de dado estruturado combinando um inteiro e um float\nint err = MPI_Type_create_struct(count, array_of_blocklengths, array_of_displacements, array_of_types, &newtype);\n\nif (err == MPI_SUCCESS) {\n    MPI_Type_commit(&newtype);\n    // Realiza opera\u00e7\u00f5es com o novo tipo...\n    MPI_Type_free(&newtype);\n}"}, {"name": "MPI_Type_create_subarray", "short_desc": "Cria um tipo de dado para um sub-array de um array regular multidimensional", "synopsis": "int MPI_Type_create_subarray(int ndims, const int array_of_sizes[], const int array_of_subsizes[], const int array_of_starts[], int order, MPI_Datatype oldtype, MPI_Datatype *newtype)\n\nint MPI_Type_create_subarray_c(int ndims, const MPI_Count array_of_sizes[], const MPI_Count array_of_subsizes[], const MPI_Count array_of_starts[], int order, MPI_Datatype oldtype, MPI_Datatype *newtype)", "params": [{"name": "ndims", "desc": "n\u00famero de dimens\u00f5es do array (inteiro positivo)"}, {"name": "array_of_sizes", "desc": "n\u00famero de elementos do tipo oldtype em cada dimens\u00e3o do array completo (array de inteiros positivos)"}, {"name": "array_of_subsizes", "desc": "n\u00famero de elementos do tipo oldtype em cada dimens\u00e3o do sub-array (array de inteiros positivos)"}, {"name": "array_of_starts", "desc": "coordenadas iniciais do sub-array em cada dimens\u00e3o (array de inteiros n\u00e3o negativos)"}, {"name": "order", "desc": "ordem de armazenamento do array (estado)"}, {"name": "oldtype", "desc": "tipo de dado do elemento do array (handle)"}, {"name": "newtype", "desc": "novo tipo de dado (handle)"}], "description": "NOTAS\nO argumento 'order' pode ser MPI_ORDER_C (ordem de linha maior) ou MPI_ORDER_FORTRAN (ordem de coluna maior).\n\nERROS\nTodas as rotinas MPI retornam um valor de erro. Por padr\u00e3o, este manipulador de erro aborta o trabalho MPI.\n\nMPI_SUCCESS\n- Nenhum erro.\nMPI_ERR_TYPE\n- Argumento de tipo de dado inv\u00e1lido.\nMPI_ERR_ARG\n- Argumento inv\u00e1lido.\nMPI_ERR_COUNT\n- Argumento de contagem inv\u00e1lido.", "application": "", "example": "// Declara\u00e7\u00f5es\nint ndims = 2;\nint array_of_sizes[] = {10, 10};\nint array_of_subsizes[] = {5, 5};\nint array_of_starts[] = {0, 0};\nint order = MPI_ORDER_C;\nMPI_Datatype oldtype = MPI_INT;\nMPI_Datatype newtype;\n\n// Cria um tipo para representar um sub-array 5x5 dentro de uma matriz 10x10\nint err = MPI_Type_create_subarray(ndims, array_of_sizes, array_of_subsizes, array_of_starts, order, oldtype, &newtype);\n\nif (err == MPI_SUCCESS) {\n    MPI_Type_commit(&newtype);\n    // Realiza opera\u00e7\u00f5es com o sub-array...\n    MPI_Type_free(&newtype);\n}"}, {"name": "MPI_Type_delete_attr", "short_desc": "Exclui um valor de atributo associado a uma chave em um tipo de dado", "synopsis": "int MPI_Type_delete_attr(MPI_Datatype datatype, int type_keyval)", "params": [{"name": "datatype", "desc": "tipo de dado do qual o atributo \u00e9 exclu\u00eddo (handle)"}, {"name": "type_keyval", "desc": "valor da chave (inteiro)"}], "description": "ERROS\nTodas as rotinas MPI retornam um valor de erro. Por padr\u00e3o, o manipulador de erro aborta o trabalho.\n\nMPI_SUCCESS\n- Nenhum erro.\nMPI_ERR_TYPE\n- Tipo de dado inv\u00e1lido.\nMPI_ERR_ARG\n- Argumento inv\u00e1lido.", "application": "", "example": "// Declara\u00e7\u00f5es\nMPI_Datatype datatype = MPI_INT;\nint type_keyval = 1; // Supondo que a chave foi registrada previamente\n\n// Remove um atributo previamente associado ao tipo de dado\nint err = MPI_Type_delete_attr(datatype, type_keyval);\n\nif (err == MPI_SUCCESS) {\n    // Atributo exclu\u00eddo com sucesso\n}"}, {"name": "MPI_Type_dup", "short_desc": "Duplica um tipo de dado existente", "synopsis": "int MPI_Type_dup(MPI_Datatype oldtype, MPI_Datatype *newtype)", "params": [{"name": "oldtype", "desc": "tipo de dado de entrada (handle)"}, {"name": "newtype", "desc": "c\u00f3pia do tipo de dado (handle)"}], "description": "NOTAS\nMPI_Type_dup cria um novo tipo de dado que \u00e9 id\u00eantico a oldtype. O novo tipo de dado deve ser liberado com MPI_Type_free.\n\nERROS\nMPI_SUCCESS\n- Nenhum erro.\nMPI_ERR_TYPE\n- Tipo de dado inv\u00e1lido.\nMPI_ERR_ARG\n- Argumento inv\u00e1lido.", "application": "", "example": "// Declara\u00e7\u00f5es\nMPI_Datatype oldtype = MPI_INT;\nMPI_Datatype newtype;\n\n// Cria uma c\u00f3pia do tipo de dado original\nint err = MPI_Type_dup(oldtype, &newtype);\n\nif (err == MPI_SUCCESS) {\n    // newtype agora \u00e9 um handle v\u00e1lido que deve ser liberado\n    MPI_Type_free(&newtype);\n}"}, {"name": "MPI_Type_extent", "short_desc": "Retorna a extens\u00e3o de um tipo de dado", "synopsis": "int MPI_Type_extent(MPI_Datatype datatype, MPI_Aint *extent)", "params": [{"name": "datatype", "desc": "tipo de dado (handle)"}, {"name": "extent", "desc": "extens\u00e3o do tipo de dado (inteiro)"}], "description": "ERROS\nTodas as rotinas MPI retornam um valor de erro. Por padr\u00e3o, o manipulador de erro aborta o trabalho.\n\nMPI_SUCCESS\n- Nenhum erro.\nMPI_ERR_TYPE\n- Tipo de dado inv\u00e1lido.\nMPI_ERR_ARG\n- Argumento inv\u00e1lido.", "application": "", "example": "// Declara\u00e7\u00f5es\nMPI_Datatype datatype = MPI_FLOAT;\nMPI_Aint extent;\n\n// Obt\u00e9m o tamanho em bytes do tipo de dado\nint err = MPI_Type_extent(datatype, &extent);\n\nif (err == MPI_SUCCESS) {\n    // A vari\u00e1vel extent cont\u00e9m o tamanho do tipo\n}"}, {"name": "MPI_Type_f2c", "short_desc": "Converte INTEGER Fortran para MPI_Type", "synopsis": "MPI_Datatype MPI_Type_f2c(MPI_Fint datatype)", "params": [{"name": "datatype", "desc": "tipo de dado Fortran (inteiro)"}], "description": "Esta fun\u00e7\u00e3o converte um tipo de dado Fortran em um tipo de dado C.", "application": "", "example": "// Declara\u00e7\u00f5es\nMPI_Fint f_type = 1; // Exemplo de handle Fortran (MPI_INTEGER)\nMPI_Datatype c_type;\n\n// Converte handle Fortran para C\nc_type = MPI_Type_f2c(f_type);\n\n// Se a convers\u00e3o for v\u00e1lida, pode-se usar o tipo\nif (c_type != MPI_DATATYPE_NULL) {\n    // Opera\u00e7\u00f5es com c_type\n}"}, {"name": "MPI_Type_free", "short_desc": "Libera o tipo de dado", "synopsis": "int MPI_Type_free(MPI_Datatype *datatype)", "params": [{"name": "datatype", "desc": "tipo de dado a ser liberado (handle)"}], "description": "ERROS\nTodas as rotinas MPI retornam um valor de erro. Por padr\u00e3o, o manipulador de erro aborta o trabalho.\n\nMPI_SUCCESS\n- Nenhum erro.\nMPI_ERR_TYPE\n- Tipo de dado inv\u00e1lido.", "application": "", "example": "// Declara\u00e7\u00f5es\nMPI_Datatype newtype;\n// Supondo que newtype j\u00e1 foi criado e commitado\n\n// Libera o tipo de dado da mem\u00f3ria\nint err = MPI_Type_free(&newtype);\n\nif (err == MPI_SUCCESS) {\n    // O handle newtype est\u00e1 agora definido como MPI_DATATYPE_NULL\n}"}, {"name": "MPI_Type_free_keyval", "short_desc": "Libera uma chave de atributo para tipos de dados", "synopsis": "int MPI_Type_free_keyval(int *type_keyval)", "params": [{"name": "type_keyval", "desc": "valor da chave (inteiro)"}], "description": "ERROS\nMPI_SUCCESS\n- Nenhum erro.\nMPI_ERR_KEYVAL\n- Valor de chave inv\u00e1lido.", "application": "", "example": "// Declara\u00e7\u00f5es\nint type_keyval = 5; // Chave previamente criada com MPI_Type_create_keyval\n\n// Libera a chave de atributo\nint err = MPI_Type_free_keyval(&type_keyval);\n\nif (err == MPI_SUCCESS) {\n    // Chave liberada\n}"}, {"name": "MPI_Type_get_attr", "short_desc": "Recupera o valor do atributo pela chave", "synopsis": "int MPI_Type_get_attr(MPI_Datatype datatype, int type_keyval, void *attribute_val, int *flag)", "params": [{"name": "datatype", "desc": "tipo de dado ao qual o atributo est\u00e1 anexado (handle)"}, {"name": "type_keyval", "desc": "valor da chave (inteiro)"}, {"name": "attribute_val", "desc": "valor do atributo"}, {"name": "flag", "desc": "falso se nenhum atributo estiver associado \u00e0 chave (l\u00f3gico)"}], "description": "NOTAS\nAtributos devem ser extra\u00eddos na mesma linguagem em que foram inseridos.\n\nERROS\nMPI_SUCCESS\n- Nenhum erro.\nMPI_ERR_KEYVAL\n- Valor de chave inv\u00e1lido.\nMPI_ERR_ARG\n- Argumento inv\u00e1lido.", "application": "", "example": "// Declara\u00e7\u00f5es\nMPI_Datatype datatype = MPI_INT;\nint type_keyval = 1;\nvoid *attribute_val;\nint flag;\ nt *combiner)", "params": [{"name": "datatype", "desc": "tipo de dado (handle)"}], "description": "Recupera informa\u00e7\u00f5es sobre o combinador e o n\u00famero de argumentos usados para criar o tipo de dado.", "application": "", "example": "// Declara\u00e7\u00f5es\nMPI_Datatype datatype = MPI_INT;\nint num_integers, num_addresses, num_large_counts, num_datatypes, combiner;\n\n// Recupera a estrutura interna de um tipo de dado\nint err = MPI_Type_get_envelope(datatype, &num_integers, &num_addresses, &num_large_counts, &num_datatypes, &combiner);\n\nif (err == MPI_SUCCESS) {\n    // O tipo de dado \u00e9 processado com sucesso baseado no combiner retornado\n}"}, {"name": "MPI_Type_get_extent", "short_desc": "Obt\u00e9m a extens\u00e3o do tipo", "synopsis": "int MPI_Type_get_extent(MPI_Datatype datatype, MPI_Aint *lb, MPI_Aint *extent)", "params": [], "description": "Retorna o limite inferior e a extens\u00e3o de um tipo de dado.", "application": "", "example": "// Declara\u00e7\u00f5es\nMPI_Datatype datatype = MPI_DOUBLE;\nMPI_Aint lb, extent;\n\n// Obt\u00e9m o limite inferior e a extens\u00e3o total em bytes\nint err = MPI_Type_get_extent(datatype, &lb, &extent);\n\nif (err == MPI_SUCCESS) {\n    // Informa\u00e7\u00f5es sobre o tamanho do tipo de dado est\u00e3o dispon\u00edveis em 'extent'\n}"}, {"name": "MPI_Type_get_extent_x", "short_desc": "Obt\u00e9m a extens\u00e3o do tipo (vers\u00e3o de contagem grande)", "synopsis": "int MPI_Type_get_extent_x(MPI_Datatype datatype, MPI_Count *lb, MPI_Count *extent)", "params": [], "description": "Retorna o limite inferior e a extens\u00e3o de um tipo de dado usando contagens grandes.", "application": "", "example": "// Declara\u00e7\u00f5es\nMPI_Datatype datatype = MPI_FLOAT;\nMPI_Count lb, extent;\n\n// Similar ao MPI_Type_get_extent, mas usando MPI_Count para grandes deslocamentos\nint err = MPI_Type_get_extent_x(datatype, &lb, &extent);\n\nif (err == MPI_SUCCESS) {\n    // 'extent' cont\u00e9m a extens\u00e3o do tipo de dado como um valor de 64 bits\n}"}, {"name": "MPI_Type_get_name", "short_desc": "Obt\u00e9m o nome do tipo", "synopsis": "int MPI_Type_get_name(MPI_Datatype datatype, char *type_name, int *resultlen)", "params": [], "description": "Retorna o nome associado a um tipo de dado.", "application": "", "example": "// Declara\u00e7\u00f5es\nMPI_Datatype datatype = MPI_INT;\nchar type_name[MPI_MAX_OBJECT_NAME];\nint resultlen;\n\n// Recupera o nome associado ao tipo de dado\nint err = MPI_Type_get_name(datatype, type_name, &resultlen);\n\nif (err == MPI_SUCCESS) {\n    // O nome do tipo foi copiado para 'type_name'\n}"}, {"name": "MPI_Type_get_true_extent", "short_desc": "Obt\u00e9m o limite inferior e a extens\u00e3o reais para um tipo de dado", "synopsis": "int MPI_Type_get_true_extent(MPI_Datatype datatype, MPI_Aint *true_lb, MPI_Aint *true_extent)\n\nint MPI_Type_get_true_extent_c(MPI_Datatype datatype, MPI_Count *true_lb, MPI_Count *true_extent)", "params": [{"name": "datatype", "desc": "tipo de dado (handle)"}, {"name": "true_lb", "desc": "limite inferior real do tipo de dado (inteiro)"}, {"name": "true_extent", "desc": "tamanho real do tipo de dado (inteiro)"}], "description": "ERROS\nMPI_SUCCESS\n- Nenhum erro.\nMPI_ERR_ARG\n- Argumento inv\u00e1lido.\nMPI_ERR_TYPE\n- Tipo de dado inv\u00e1lido.", "application": "", "example": "// Declara\u00e7\u00f5es\nMPI_Datatype datatype = MPI_INT;\nMPI_Aint true_lb, true_extent;\n\n// Obt\u00e9m o limite inferior e a extens\u00e3o reais, ignorando o padding\nint err = MPI_Type_get_true_extent(datatype, &true_lb, &true_extent);\n\nif (err == MPI_SUCCESS) {\n    // Valores reais calculados sem considerar gaps de mem\u00f3ria\n}"}, {"name": "MPI_Type_get_true_extent_x", "short_desc": "Obt\u00e9m o limite inferior e a extens\u00e3o reais como valores MPI_Count para um tipo de dado", "synopsis": "int MPI_Type_get_true_extent_x(MPI_Datatype datatype, MPI_Count *true_lb, MPI_Count *true_extent)", "params": [{"name": "datatype", "desc": "tipo de dado (handle)"}, {"name": "true_lb", "desc": "limite inferior real do tipo de dado (inteiro)"}, {"name": "true_extent", "desc": "tamanho real do tipo de dado (inteiro)"}], "description": "ERROS\nMPI_SUCCESS\n- Nenhum erro.\nMPI_ERR_ARG\n- Argumento inv\u00e1lido.\nMPI_ERR_TYPE\n- Tipo de dado inv\u00e1lido.", "application": "", "example": "// Declara\u00e7\u00f5es\nMPI_Datatype datatype = MPI_INT;\nMPI_Count true_lb, true_extent;\n\n// Obt\u00e9m o limite inferior e a extens\u00e3o reais usando contagens grandes\nint err = MPI_Type_get_true_extent_x(datatype, &true_lb, &true_extent);\n\nif (err == MPI_SUCCESS) {\n    // Valores reais de extens\u00e3o obtidos com sucesso\n}"}, {"name": "MPI_Type_hindexed", "short_desc": "Cria um tipo de dado indexado com deslocamentos em bytes", "synopsis": "int MPI_Type_hindexed(int count, int array_of_blocklengths[], MPI_Aint array_of_displacements[], MPI_Datatype oldtype, MPI_Datatype *newtype)", "params": [{"name": "count", "desc": "n\u00famero de blocos (inteiro)"}, {"name": "array_of_blocklengths", "desc": "n\u00famero de elementos em cada bloco (inteiro n\u00e3o negativo)"}, {"name": "array_of_displacements", "desc": "deslocamento em bytes de cada bloco (inteiro)"}, {"name": "oldtype", "desc": "tipo de dado antigo (handle)"}], "description": "ERROS\nMPI_SUCCESS\n- Nenhum erro.\nMPI_ERR_ARG\n- Argumento inv\u00e1lido.\nMPI_ERR_COUNT\n- Contagem inv\u00e1lida.\nMPI_ERR_TYPE\n- Tipo de dado inv\u00e1lido.", "application": "", "example": "// Declara\u00e7\u00f5es\nint count = 2;\nint array_of_blocklengths[] = {1, 1};\nMPI_Aint array_of_displacements[] = {0, 16};\nMPI_Datatype oldtype = MPI_INT;\nMPI_Datatype newtype;\n\n// Cria um tipo de dado baseado em deslocamentos absolutos em bytes\nint err = MPI_Type_hindexed(count, array_of_blocklengths, array_of_displacements, oldtype, &newtype);\n\nif (err == MPI_SUCCESS) {\n    MPI_Type_commit(&newtype);\n    MPI_Type_free(&newtype);\n}"}, {"name": "MPI_Type_hvector", "short_desc": "Cria um tipo de dado vetor com deslocamento em bytes", "synopsis": "int MPI_Type_hvector(int count, int blocklength, MPI_Aint stride, MPI_Datatype oldtype, MPI_Datatype *newtype)", "params": [{"name": "count", "desc": "n\u00famero de blocos (inteiro n\u00e3o negativo)"}, {"name": "blocklength", "desc": "n\u00famero de elementos em cada bloco (inteiro n\u00e3o negativo)"}, {"name": "stride", "desc": "n\u00famero de bytes entre o in\u00edcio de cada bloco (inteiro)"}, {"name": "oldtype", "desc": "tipo de dado antigo (handle)"}], "description": "ERROS\nMPI_SUCCESS\n- Nenhum erro.\nMPI_ERR_ARG\n- Argumento inv\u00e1lido.\nMPI_ERR_COUNT\n- Contagem inv\u00e1lida.\nMPI_ERR_TYPE\n- Tipo de dado inv\u00e1lido.", "application": "", "example": "// Declara\u00e7\u00f5es\nint count = 4;\nint blocklength = 1;\nMPI_Aint stride = 8;\nMPI_Datatype oldtype = MPI_INT;\nMPI_Datatype newtype;\n\n// Cria um tipo de dado com blocos igualmente espa\u00e7ados por um deslocamento em bytes\nint err = MPI_Type_hvector(count, blocklength, stride, oldtype, &newtype);\n\nif (err == MPI_SUCCESS) {\n    MPI_Type_commit(&newtype);\n    MPI_Type_free(&newtype);\n}"}, {"name": "MPI_Type_indexed", "short_desc": "Cria um tipo de dado indexado", "synopsis": "int MPI_Type_indexed(int count, const int array_of_blocklengths[], const int array_of_displacements[], MPI_Datatype oldtype, MPI_Datatype *newtype)\n\nint MPI_Type_indexed_c(MPI_Count count, const MPI_Count array_of_blocklengths[], const MPI_Count array_of_displacements[], MPI_Datatype oldtype, MPI_Datatype *newtype)", "params": [{"name": "count", "desc": "n\u00famero de blocos (inteiro n\u00e3o negativo)"}, {"name": "array_of_blocklengths", "desc": "n\u00famero de elementos por bloco (inteiro n\u00e3o negativo)"}, {"name": "array_of_displacements", "desc": "deslocamento para cada bloco, em m\u00faltiplos de oldtype (inteiro)"}, {"name": "oldtype", "desc": "tipo de dado antigo (handle)"}], "description": "ERROS\nMPI_SUCCESS\n- Nenhum erro.\nMPI_ERR_ARG\n- Argumento inv\u00e1lido.\nMPI_ERR_COUNT\n- Contagem inv\u00e1lida.\nMPI_ERR_TYPE\n- Tipo de dado inv\u00e1lido.", "application": "", "example": "// Declara\u00e7\u00f5es\nint count = 2;\nint array_of_blocklengths[] = {1, 3};\nint array_of_displacements[] = {0, 5};\nMPI_Datatype oldtype = MPI_INT;\nMPI_Datatype newtype;\n\n// Cria um tipo de dado a partir de blocos indexados por m\u00faltiplos do tipo base\nint err = MPI_Type_indexed(count, array_of_blocklengths, array_of_displacements, oldtype, &newtype);\n\nif (err == MPI_SUCCESS) {\n    MPI_Type_commit(&newtype);\n    MPI_Type_free(&newtype);\n}"}, {"name": "MPI_Type_lb", "short_desc": "Retorna o limite inferior de um tipo de dado.", "synopsis": "int MPI_Type_lb(MPI_Datatype datatype, MPI_Aint *displacement)", "params": [{"name": "datatype", "desc": "Tipo de dado (handle)."}, {"name": "displacement", "desc": "Deslocamento do limite inferior em bytes (sa\u00edda)."}], "description": "Retorna o deslocamento do limite inferior de um tipo de dado em rela\u00e7\u00e3o \u00e0 sua origem. (Nota: Depreciado em favor de MPI_Type_get_extent).", "application": "C\u00e1lculo de alinhamento e layouts de mem\u00f3ria para tipos de dados personalizados.", "example": "// Declara\u00e7\u00f5es\nMPI_Datatype datatype = MPI_INT;\nMPI_Aint displacement;\n\n// Recupera o deslocamento do limite inferior (Legacy)\nint err = MPI_Type_lb(datatype, &displacement);\n\nif (err == MPI_SUCCESS) {\n    // Deslocamento lido com sucesso\n}"}, {"name": "MPI_Type_match_size", "short_desc": "Retorna um tipo de dado MPI que corresponde a um tamanho especificado.", "synopsis": "int MPI_Type_match_size(int typeclass, int size, MPI_Datatype *datatype)", "params": [{"name": "typeclass", "desc": "Classe do tipo (MPI_TYPECLASS_INTEGER, MPI_TYPECLASS_REAL, MPI_TYPECLASS_COMPLEX)."}, {"name": "size", "desc": "Tamanho desejado em bytes (inteiro)."}, {"name": "datatype", "desc": "Tipo de dado MPI retornado (handle)."}], "description": "Encontra um tipo de dado MPI que tenha o tamanho e a classe solicitados.", "application": "Portabilidade entre sistemas com diferentes tamanhos padr\u00e3o de tipos primitivos.", "example": "// Declara\u00e7\u00f5es\nint typeclass = MPI_TYPECLASS_INTEGER;\nint size = 4;\nMPI_Datatype datatype;\n\n// Busca um tipo inteiro de 4 bytes (como MPI_INT)\nint err = MPI_Type_match_size(typeclass, size, &datatype);\n\nif (err == MPI_SUCCESS) {\n    // O tipo foi encontrado e pode ser usado\n    MPI_Type_free(&datatype);\n}"}, {"name": "MPI_Type_set_attr", "short_desc": "Armazena um valor de atributo associado a um tipo de dado.", "synopsis": "int MPI_Type_set_attr(MPI_Datatype datatype, int type_keyval, void *attribute_val)", "params": [{"name": "datatype", "desc": "Tipo de dado MPI ao qual o atributo ser\u00e1 anexado (handle)."}, {"name": "type_keyval", "desc": "Valor da chave (inteiro)."}, {"name": "attribute_val", "desc": "Valor do atributo (ponteiro)."}], "description": "Associa uma informa\u00e7\u00e3o personalizada (atributo) a um tipo de dado MPI.", "application": "Gerenciamento de metadados personalizados em bibliotecas baseadas em MPI.", "example": "// Declara\u00e7\u00f5es\nMPI_Datatype datatype = MPI_INT;\nint type_keyval;\nint attribute_val = 12345;\n\n// Cria uma chave para o atributo\nMPI_Type_create_keyval(MPI_TYPE_NULL_COPY_FN, MPI_TYPE_NULL_DELETE_FN, &type_keyval, NULL);\n\n// Associa o valor \u00e0 chave do tipo\nint err = MPI_Type_set_attr(datatype, type_keyval, &attribute_val);\n\nif (err == MPI_SUCCESS) {\n    // O atributo foi definido\n}\n\nMPI_Type_free_keyval(&type_keyval);"}, {"name": "MPI_Type_set_name", "short_desc": "Define um nome para um tipo de dado.", "synopsis": "int MPI_Type_set_name(MPI_Datatype datatype, const char *type_name)", "params": [{"name": "datatype", "desc": "Tipo de dado a ser nomeado (handle)."}, {"name": "type_name", "desc": "Nome a ser associado (string)."}], "description": "Atribui um nome leg\u00edvel a um tipo de dado MPI para facilitar o rastreamento e depura\u00e7\u00e3o.", "application": "Melhoria na depura\u00e7\u00e3o e diagn\u00f3sticos de erros.", "example": "// Declara\u00e7\u00f5es\nMPI_Datatype datatype = MPI_INT;\nconst char *type_name = \"MeuInteiroCustomizado\";\n\n// Atribui um nome para fins de depura\u00e7\u00e3o\nint err = MPI_Type_set_name(datatype, (char *)type_name);\n\nif (err == MPI_SUCCESS) {\n    // Nome definido com sucesso\n}"}, {"name": "MPI_Type_size", "short_desc": "Retorna a quantidade de dados \u00fateis em um tipo de dado.", "synopsis": "int MPI_Type_size(MPI_Datatype datatype, int *size)", "params": [{"name": "datatype", "desc": "Tipo de dado (handle)."}, {"name": "size", "desc": "Tamanho do tipo de dado em bytes (sa\u00edda)."}], "description": "Retorna o n\u00famero total de bytes ocupados pelos dados \u00fateis definidos no tipo de dado, ignorando lacunas de alinhamento.", "application": "C\u00e1lculo de buffers de empacotamento ou verifica\u00e7\u00e3o de integridade de dados.", "example": "// Declara\u00e7\u00f5es\nMPI_Datatype datatype = MPI_INT;\nint size;\n\n// Obt\u00e9m o tamanho em bytes do tipo MPI_INT\nint err = MPI_Type_size(datatype, &size);\n\nif (err == MPI_SUCCESS) {\n    // size agora cont\u00e9m o n\u00famero de bytes (geralmente 4)\n}"}, {"name": "MPI_Type_size_x", "short_desc": "Retorna o tamanho de um tipo de dado (vers\u00e3o estendida).", "synopsis": "int MPI_Type_size_x(MPI_Datatype datatype, MPI_Count *size)", "params": [{"name": "datatype", "desc": "Tipo de dado (handle)."}, {"name": "size", "desc": "Tamanho do tipo de dado em bytes (sa\u00edda, MPI_Count)."}], "description": "Vers\u00e3o de MPI_Type_size que suporta tamanhos que excedem o limite de um inteiro de 32 bits.", "application": "Trabalho com tipos de dados massivos em sistemas de HPC.", "example": "// Declara\u00e7\u00f5es\nMPI_Datatype datatype = MPI_INT;\nMPI_Count size;\n\n// Vers\u00e3o que suporta contagens maiores (MPI_Count)\nint err = MPI_Type_size_x(datatype, &size);\n\nif (err == MPI_SUCCESS) {\n    // size cont\u00e9m o tamanho como um valor de 64 bits\n}"}, {"name": "MPI_Type_struct", "short_desc": "Cria um novo tipo de dado estruturado.", "synopsis": "int MPI_Type_struct(int count, int array_of_blocklengths[], MPI_Aint array_of_displacements[], MPI_Datatype array_of_types[], MPI_Datatype *newtype)", "params": [{"name": "count", "desc": "N\u00famero de blocos (inteiro)."}, {"name": "array_of_blocklengths", "desc": "N\u00famero de elementos em cada bloco (array de inteiros)."}, {"name": "array_of_displacements", "desc": "Deslocamento de cada bloco em bytes (array de inteiros de endere\u00e7o)."}, {"name": "array_of_types", "desc": "Tipo de dado de cada bloco (array de handles)."}, {"name": "newtype", "desc": "Novo tipo de dado criado (handle)."}], "description": "Construtor de tipo de dado mais flex\u00edvel do MPI, permitindo misturar diferentes tipos e deslocamentos arbitr\u00e1rios. (Depreciado em favor de MPI_Type_create_struct).", "application": "Representa\u00e7\u00e3o de estruturas complexas de C ou Fortran para comunica\u00e7\u00e3o.", "example": "// Declara\u00e7\u00f5es\nint count = 2;\nint array_of_blocklengths[] = {1, 1};\nMPI_Aint array_of_displacements[] = {0, 8};\nMPI_Datatype array_of_types[] = {MPI_INT, MPI_DOUBLE};\nMPI_Datatype newtype;\n\n// Cria uma estrutura misturando int e double\nint err = MPI_Type_struct(count, array_of_blocklengths, array_of_displacements, array_of_types, &newtype);\n\nif (err == MPI_SUCCESS) {\n    MPI_Type_commit(&newtype);\n    MPI_Type_free(&newtype);\n}"}, {"name": "MPI_Type_ub", "short_desc": "Retorna o limite superior de um tipo de dado.", "synopsis": "int MPI_Type_ub(MPI_Datatype datatype, MPI_Aint *displacement)", "params": [{"name": "datatype", "desc": "Tipo de dado (handle)."}, {"name": "displacement", "desc": "Deslocamento do limite superior em bytes (sa\u00edda)."}], "description": "Retorna o limite superior de um tipo de dado. (Nota: Depreciado em favor de MPI_Type_get_extent).", "application": "Determina\u00e7\u00e3o do espa\u00e7amento necess\u00e1rio entre elementos em arrays de tipos customizados.", "example": "// Declara\u00e7\u00f5es\nMPI_Datatype datatype = MPI_INT;\nMPI_Aint displacement;\n\n// Obt\u00e9m o limite superior do tipo de dado\nint err = MPI_Type_ub(datatype, &displacement);\n\nif (err == MPI_SUCCESS) {\n    // displacement cont\u00e9m o limite superior do tipo\n}"}, {"name": "MPI_Type_vector", "short_desc": "Cria um tipo de dado vetorial com espa\u00e7amento constante.", "synopsis": "int MPI_Type_vector(int count, int blocklength, int stride, MPI_Datatype oldtype, MPI_Datatype *newtype)", "params": [{"name": "count", "desc": "N\u00famero de blocos (inteiro n\u00e3o negativo)."}, {"name": "blocklength", "desc": "N\u00famero de elementos em cada bloco (inteiro n\u00e3o negativo)."}, {"name": "stride", "desc": "N\u00famero de elementos entre o in\u00edcio de blocos sucessivos (inteiro)."}, {"name": "oldtype", "desc": "Tipo de dado de entrada (handle)."}, {"name": "newtype", "desc": "Novo tipo de dado (handle)."}], "description": "Permite a cria\u00e7\u00e3o de tipos que consistem em blocos de tamanho fixo igualmente espa\u00e7ados.", "application": "Extra\u00e7\u00e3o de colunas de uma matriz armazenada em ordem de linha.", "example": "// Declara\u00e7\u00f5es\nint count = 5;\nint blocklength = 1;\nint stride = 2;\nMPI_Datatype oldtype = MPI_INT;\nMPI_Datatype newtype;\n\n// Cria um tipo vetorial de 5 blocos com passo de 2 inteiros\nint err = MPI_Type_vector(count, blocklength, stride, oldtype, &newtype);\n\nif (err == MPI_SUCCESS) {\n    MPI_Type_commit(&newtype);\n    MPI_Type_free(&newtype);\n}"}, {"name": "MPI_Unpack", "short_desc": "Desempacota dados de um buffer cont\u00edguo.", "synopsis": "int MPI_Unpack(const void *inbuf, int insize, int *position, void *outbuf, int outcount, MPI_Datatype datatype, MPI_Comm comm)", "params": [{"name": "inbuf", "desc": "Buffer de entrada contendo dados empacot dados que foram empacotados usando a representa\u00e7\u00e3o de dados externa padr\u00e3o do MPI.", "application": "Comunica\u00e7\u00e3o entre diferentes implementa\u00e7\u00f5es de MPI ou arquiteturas com diferentes formatos bin\u00e1rios.", "example": "// Declara\u00e7\u00f5es\nchar datarep[] = \"external32\";\nchar inbuf[100];\nMPI_Aint insize = 100;\nMPI_Aint position = 0;\nint outbuf[10];\nint outcount = 10;\nMPI_Datatype datatype = MPI_INT;\n\n// Desempacota usando representa\u00e7\u00e3o externa padr\u00e3o\nint err = MPI_Unpack_external(datarep, inbuf, insize, &position, outbuf, outcount, datatype);\n\nif (err == MPI_SUCCESS) {\n    // Desempacotamento conclu\u00eddo\n}"}, {"name": "MPI_Unpublish_name", "short_desc": "Remove um nome de servi\u00e7o publicado.", "synopsis": "int MPI_Unpublish_name(const char *service_name, MPI_Info info, const char *port_name)", "params": [{"name": "service_name", "desc": "Nome do servi\u00e7o (string)."}, {"name": "info", "desc": "Informa\u00e7\u00f5es adicionais (handle)."}, {"name": "port_name", "desc": "Nome da porta (string)."}], "description": "Remove a associa\u00e7\u00e3o entre um nome de servi\u00e7o e uma porta MPI no servi\u00e7o de nomes.", "application": "Limpeza de servi\u00e7os din\u00e2micos ap\u00f3s o t\u00e9rmino do servidor.", "example": "// Declara\u00e7\u00f5es\nconst char *service_name = \"meu_servico_mpi\";\nMPI_Info info = MPI_INFO_NULL;\nconst char *port_name = \"nome_da_porta_registrada\";\n\n// Remove o registro do servi\u00e7o no servidor de nomes\nint err = MPI_Unpublish_name(service_name, info, port_name);\n\nif (err == MPI_SUCCESS) {\n    // Servi\u00e7o despublicado com sucesso\n}"}, {"name": "MPI_Wait", "short_desc": "Aguarda a conclus\u00e3o de uma opera\u00e7\u00e3o MPI.", "synopsis": "int MPI_Wait(MPI_Request *request, MPI_Status *status)", "params": [{"name": "request", "desc": "Requisi\u00e7\u00e3o da opera\u00e7\u00e3o (handle)."}, {"name": "status", "desc": "Objeto de status (Status)."}], "description": "Bloqueia a execu\u00e7\u00e3o at\u00e9 que a opera\u00e7\u00e3o associada \u00e0 requisi\u00e7\u00e3o seja conclu\u00edda.", "application": "Sincroniza\u00e7\u00e3o ap\u00f3s chamadas n\u00e3o bloqueantes (ex: MPI_Isend, MPI_Irecv).", "example": "// Declara\u00e7\u00f5es\nMPI_Request request;\nMPI_Status status;\nint buffer = 100;\n\n// Inicia uma comunica\u00e7\u00e3o ass\u00edncrona (exemplo)\nMPI_Isend(&buffer, 1, MPI_INT, 0, 0, MPI_COMM_WORLD, &request);\n\n// Bloqueia at\u00e9 a conclus\u00e3o da opera\u00e7\u00e3o\nint err = MPI_Wait(&request, &status);\n\nif (err == MPI_SUCCESS) {\n    // Opera\u00e7\u00e3o conclu\u00edda\n}"}, {"name": "MPI_Waitall", "short_desc": "Aguarda a conclus\u00e3o de todas as requisi\u00e7\u00f5es em uma lista.", "synopsis": "int MPI_Waitall(int count, MPI_Request array_of_requests[], MPI_Status array_of_statuses[])", "params": [{"name": "count", "desc": "N\u00famero de requisi\u00e7\u00f5es (inteiro)."}, {"name": "array_of_requests", "desc": "Array de requisi\u00e7\u00f5es (array de handles)."}, {"name": "array_of_statuses", "desc": "Array de objetos de status (array de Status)."}], "description": "Bloqueia at\u00e9 que todas as opera\u00e7\u00f5es associadas \u00e0s requisi\u00e7\u00f5es no array sejam finalizadas.", "application": "Ponto de sincroniza\u00e7\u00e3o global para m\u00faltiplas comunica\u00e7\u00f5es n\u00e3o bloqueantes.", "example": "// Declara\u00e7\u00f5es\nint count = 2;\nMPI_Request array_of_requests[2];\nMPI_Status array_of_statuses[2];\nint buffers[2] = {1, 2};\n\n// Inicia m\u00faltiplas opera\u00e7\u00f5es\nMPI_Isend(&buffers[0], 1, MPI_INT, 0, 0, MPI_COMM_WORLD, &array_of_requests[0]);\nMPI_Isend(&buffers[1], 1, MPI_INT, 0, 1, MPI_COMM_WORLD, &array_of_requests[1]);\n\n// Espera por todas as opera\u00e7\u00f5es\nint err = MPI_Waitall(count, array_of_requests, array_of_statuses);\n\nif (err == MPI_SUCCESS) {\n    // Todas as requisi\u00e7\u00f5es foram finalizadas\n}"}, {"name": "MPI_Waitany", "short_desc": "Aguarda at\u00e9 que qualquer uma das requisi\u00e7\u00f5es seja conclu\u00edda.", "synopsis": "int MPI_Waitany(int count, MPI_Request array_of_requests[], int *index, MPI_Status *status)", "params": [{"name": "count", "desc": "N\u00famero de requisi\u00e7\u00f5es (inteiro)."}, {"name": "array_of_requests", "desc": "Array de requisi\u00e7\u00f5es (array de handles)."}, {"name": "index", "desc": "\u00cdndice da requisi\u00e7\u00e3o que foi conclu\u00edda (inteiro, sa\u00edda)."}, {"name": "status", "desc": "Objeto de status da opera\u00e7\u00e3o conclu\u00edda (Status)."}], "description": "Bloqueia at\u00e9 que pelo menos uma das opera\u00e7\u00f5es no array termine.", "application": "Processamento de mensagens assim\u00e9tricas onde a ordem de chegada \u00e9 desconhecida.", "example": "// Declara\u00e7\u00f5es\nint count = 2;\nMPI_Request array_of_requests[2];\nint index;\nMPI_Status status;\nint buffers[2] = {10, 20};\n\nMPI_Isend(&buffers[0], 1, MPI_INT, 0, 0, MPI_COMM_WORLD, &array_of_requests[0]);\nMPI_Isend(&buffers[1], 1, MPI_INT, 0, 1, MPI_COMM_WORLD, &array_of_requests[1]);\n\n// Espera que qualquer uma das opera\u00e7\u00f5es termine\nint err = MPI_Waitany(count, array_of_requests, &index, &status);\n\nif (err == MPI_SUCCESS) {\n    // A requisi\u00e7\u00e3o no \u00edndice 'index' foi conclu\u00edda\n}"}, {"name": "MPI_Waitsome", "short_desc": "Aguarda at\u00e9 que uma ou mais requisi\u00e7\u00f5es sejam conclu\u00eddas.", "synopsis": "int MPI_Waitsome(int incount, MPI_Request array_of_requests[], int *outcount, int array_of_indices[], MPI_Status array_of_statuses[])", "params": [{"name": "incount", "desc": "N\u00famero de requisi\u00e7\u00f5es de entrada (inteiro)."}, {"name": "array_of_requests", "desc": "Array de requisi\u00e7\u00f5es (array de handles)."}, {"name": "outcount", "desc": "N\u00famero de requisi\u00e7\u00f5es conclu\u00eddas (inteiro, sa\u00edda)."}, {"name": "array_of_indices", "desc": "\u00cdndice das requisi\u00e7\u00f5es conclu\u00eddas (array de inteiros)."}, {"name": "array_of_statuses", "desc": "Status das requisi\u00e7\u00f5es conclu\u00eddas (array de Status)."}], "description": "Retorna assim que pelo menos uma das requisi\u00e7\u00f5es for finalizada, retornando todas as que j\u00e1 estiverem prontas no momento da chamada.", "application": "Aumento de efici\u00eancia em algoritmos que podem processar dados parcialmente dispon\u00edveis.", "example": "// Declara\u00e7\u00f5es\nint incount = 2;\nMPI_Request array_of_requests[2];\nint outcount;\nint array_of_indices[2];\nMPI_Status array_of_statuses[2];\nint buffers[2] = {5, 6};\n\nMPI_Isend(&buffers[0], 1, MPI_INT, 0, 0, MPI_COMM_WORLD, &array_of_requests[0]);\nMPI_Isend(&buffers[1], 1, MPI_INT, 0, 1, MPI_COMM_WORLD, &array_of_requests[1]);\n\n// Aguarda a conclus\u00e3o de ao menos uma das requisi\u00e7\u00f5es\nint err = MPI_Waitsome(incount, array_of_requests, &outcount, array_of_indices, array_of_statuses);\n\nif (err == MPI_SUCCESS && outcount != MPI_UNDEFINED) {\n    // Opera\u00e7\u00f5es pendentes foram finalizadas\n}"}, {"name": "MPI_Win_allocate", "short_desc": "Cria e aloca uma janela MPI para comunica\u00e7\u00f5es one-sided.", "synopsis": "int MPI_Win_allocate(MPI_Aint size, int disp_unit, MPI_Info info, MPI_Comm comm, void *baseptr, MPI_Win *win)", "params": [{"name": "size", "desc": "Tamanho da janela em bytes (inteiro n\u00e3o negativo)."}, {"name": "disp_unit", "desc": "Tamanho da unidade local para deslocamentos (inteiro positivo)."}, {"name": "info", "desc": "Argumento de informa\u00e7\u00e3o (handle)."}, {"name": "comm", "desc": "Comunicador (handle)."}, {"name": "baseptr", "desc": "Endere\u00e7o inicial da janela alocada (escolha, sa\u00edda)."}, {"name": "win", "desc": "Objeto de janela retornado (handle, sa\u00edda)."}], "description": "Aloca mem\u00f3ria local e cria uma janela MPI para opera\u00e7\u00f5es de acesso direto \u00e0 mem\u00f3ria (RMA).", "application": "Implementa\u00e7\u00e3o eficiente de acesso remoto \u00e0 mem\u00f3ria sem necessidade de participa\u00e7\u00e3o ativa do alvo.", "example": "// Declara\u00e7\u00f5es\nMPI_Aint size = 1024;\nint disp_unit = 1;\nMPI_Info info = MPI_INFO_NULL;\nMPI_Comm comm = MPI_COMM_WORLD;\nvoid *baseptr;\nMPI_Win win;\n\n// Aloca mem\u00f3ria exposta via RMA\nint err = MPI_Win_allocate(size, disp_unit, info, comm, &baseptr, &win);\n\nif (err == MPI_SUCCESS) {\n    // Janela alocada, deve ser liberada ao final\n    MPI_Win_free(&win);\n}"}, {"name": "MPI_Win_allocate_shared", "short_desc": "Cria uma janela MPI com mem\u00f3ria compartilhada entre processos no mesmo n\u00f3.", "synopsis": "int MPI_Win_allocate_shared(MPI_Aint size, int disp_unit, MPI_Info info, MPI_Comm comm, void *baseptr, MPI_Win *win)", "params": [{"name": "size", "desc": "Tamanho local da janela em bytes (inteiro n\u00e3o negativo)."}, {"name": "disp_unit", "desc": "Unidade de deslocamento (inteiro positivo)."}, {"name": "info", "desc": "Objeto de informa\u00e7\u00e3o (handle)."}, {"name": "comm", "desc": "Comunicador intra-n\u00f3 (handle)."}, {"name": "baseptr", "desc": "Ponteiro para o segmento local compartilhado (sa\u00edda)."}, {"name": "win", "desc": "Objeto de janela (handle, sa\u00edda)."}], "description": "Aloca mem\u00f3ria que pode ser acessada diretamente (load/store) por todos os processos no mesmo comunicador, ideal para sistemas de mem\u00f3ria compartilhada.", "application": "Otimiza\u00e7\u00e3o dr\u00e1stica de comunica\u00e7\u00f5es entre processos rodando no mesmo hardware f\u00edsico.", "example": "// Declara\u00e7\u00f5es\nMPI_Aint size = 1024;\nint disp_unit = 1;\nMPI_Info info = MPI_INFO_NULL;\nMPI_Comm comm = MPI_COMM_WORLD;\nvoid *baseptr;\nMPI_Win win;\n\n// Aloca mem\u00f3ria compartilhada entre processos do mesmo n\u00f3\nint err = MPI_Win_allocate_shared(size, disp_unit, info, comm, &baseptr, &win);\n\nif (err == MPI_SUCCESS) {\n    // Mem\u00f3ria compartilhada pronta para uso\n    MPI_Win_free(&win);\n}"}, {
