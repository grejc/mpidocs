3o rara, o controle retornar, o bloco 'if (err == MPI_SUCCESS)' seria relevante.\n    if (err == MPI_SUCCESS) {\n        // A tentativa de abortar foi iniciada com sucesso (se a fun\u00e7\u00e3o retornar).\n        // Isto \u00e9 altamente improv\u00e1vel de ser executado.\n    } else {\n        // Se a chamada para MPI_Abort falhar em si mesma (extremamente improv\u00e1vel).\n    }\n} else {\n    // Outros processos continuariam ou aguardariam o t\u00e9rmino, dependendo da implementa\u00e7\u00e3o e do sucesso do aborto.\n}\n"}, {"name": "MPI_Accumulate", "short_desc": "Acumula dados no processo de destino usando acesso \u00e0 mem\u00f3ria remota (RMA).", "synopsis": "int MPI_Accumulate(const void *origin_addr, int origin_count, MPI_Datatype origin_datatype, int target_rank, MPI_Aint target_disp, int target_count, MPI_Datatype target_datatype, MPI_Op op, MPI_Win win)", "params": [{"name": "origin_addr", "desc": "endere\u00e7o inicial do buffer local (escolha)"}, {"name": "target_rank", "desc": "rank do destino (inteiro n\u00e3o negativo)"}, {"name": "target_disp", "desc": "deslocamento do in\u00edcio da janela at\u00e9 o in\u00edcio do buffer de destino (inteiro n\u00e3o negativo)"}, {"name": "op", "desc": "opera\u00e7\u00e3o de redu\u00e7\u00e3o (handle)"}, {"name": "win", "desc": "objeto de janela (handle)"}], "description": "Combina o conte\u00fado do buffer de origem com o buffer de destino no rank remoto usando a opera\u00e7\u00e3o especificada (ex: soma, m\u00e1ximo). \u00c9 uma opera\u00e7\u00e3o at\u00f4mica para elementos individuais.", "application": "Atualiza\u00e7\u00f5es remotas at\u00f4micas em algoritmos distribu\u00eddos.", "example": "// Declara\u00e7\u00f5es\nint rank = 0; // Simula\u00e7\u00e3o de rank para o exemplo isolado.\nint size = 2; // Simula\u00e7\u00e3o de size para o exemplo isolado.\nMPI_Win win = MPI_WIN_NULL;\nint err = MPI_SUCCESS;\nMPI_Info info = MPI_INFO_NULL;\n\n// Vari\u00e1veis para a opera\u00e7\u00e3o MPI_Accumulate\nint local_value; // Buffer de origem no processo chamador\nint origin_count = 1;\nMPI_Datatype origin_datatype = MPI_INT;\nint target_rank = 0; // Rank alvo para a opera\u00e7\u00e3o (ex: processo raiz)\nMPI_Aint target_disp = 0; // Deslocamento no buffer da janela do alvo\nint target_count = 1;\nMPI_Datatype target_datatype = MPI_INT;\nMPI_Op op = MPI_SUM; // Opera\u00e7\u00e3o de redu\u00e7\u00e3o (ex: soma)\n\n// Buffer que ser\u00e1 exposto na janela (apenas no processo alvo)\nint *win_buffer = NULL;\nMPI_Aint winsize; // Tamanho da janela\nint windisp_unit; // Unidade de deslocamento da janela\n\n// Aloca\u00e7\u00e3o e inicializa\u00e7\u00e3o do buffer da janela para o processo alvo (rank 0 neste exemplo)\nif (rank == target_rank) {\n    winsize = sizeof(int); // A janela expor\u00e1 um \u00fanico inteiro\n    win_buffer = (int *)malloc(winsize);\n    if (win_buffer == NULL) {\n        err = MPI_ERR_OTHER; // Erro de aloca\u00e7\u00e3o\n    } else {\n        *win_buffer = 0; // Inicializa o valor na janela\n        windisp_unit = sizeof(int); // A unidade de deslocamento \u00e9 o tamanho de um int\n    }\n} else {\n    winsize = 0; // Outros processos n\u00e3o exp\u00f5em janela\n    win_buffer = NULL;\n    windisp_unit = 1; // Define uma unidade padr\u00e3o, embora irrelevante para janela de tamanho 0\n}\n\nif (err != MPI_ERR_OTHER) { // Se n\u00e3o houve erro de aloca\u00e7\u00e3o inicial\n    // Cria uma janela MPI para acesso remoto \u00e0 mem\u00f3ria (RMA)\n    err = MPI_Win_create(win_buffer, winsize, windisp_unit, info, comm, &win);\n}\n\n\nif (err == MPI_SUCCESS) {\n    // Inicializa o valor local do processo\n    local_value = rank + 10; // Cada processo tem um valor diferente\n\n    // Inicia um epoch de acesso RMA com MPI_Win_fence para sincronizar todos os processos.\n    err = MPI_Win_fence(0, win);\n\n    if (err == MPI_SUCCESS) {\n        // Somente processos que n\u00e3o s\u00e3o o alvo realizam a opera\u00e7\u00e3o de acumula\u00e7\u00e3o\n        if (rank != target_rank) {\n            // Realiza a opera\u00e7\u00e3o de acumula\u00e7\u00e3o: local_value \u00e9 adicionado a win_buffer no target_rank\n            err = MPI_Accumulate(&local_value, origin_count, origin_datatype,\n                                 target_rank, target_disp, target_count, target_datatype,\n                                 op, win);\n\n            if (err != MPI_SUCCESS) {\n                // Tratamento de erro para MPI_Accumulate\n            }\n        }\n    } else {\n        // Tratamento de erro para MPI_Win_fence\n    }\n\n    // Termina o epoch de acesso RMA com outro MPI_Win_fence para garantir que todas as opera\u00e7\u00f5es RMA sejam conclu\u00eddas\n    int fence_err = MPI_Win_fence(0, win);\n    if (fence_err != MPI_SUCCESS) {\n        // Tratamento de erro para o segundo MPI_Win_fence\n        if (err == MPI_SUCCESS) err = fence_err; // Propaga erro se nenhum outro erro ocorreu\n    }\n\n    // No processo alvo, o resultado da acumula\u00e7\u00e3o pode ser lido ap\u00f3s o fence\n    if (rank == target_rank && win_buffer != NULL) {\n        // printf(\"Processo %d: Valor acumulado na janela = %d\\n\", rank, *win_buffer); // L\u00f3gica de aplica\u00e7\u00e3o com o valor acumulado\n    }\n} else {\n    // Tratamento de erro para MPI_Win_create ou aloca\u00e7\u00e3o inicial\n}\n\n// Libera os recursos da janela MPI\nif (win != MPI_WIN_NULL) { // Verifica se a janela foi criada\n    int free_err = MPI_Win_free(&win);\n    if (free_err != MPI_SUCCESS) {\n        // Tratamento de erro para MPI_Win_free\n    }\n}\n\n// Libera a mem\u00f3ria alocada para o buffer da janela\nif (rank == target_rank && win_buffer != NULL) {\n    free(win_buffer);\n}\n"}, {"name": "MPI_Add_error_class", "short_desc": "Adiciona uma classe de erro MPI \u00e0s classes conhecidas.", "synopsis": "int MPI_Add_error_class(int *errorclass)", "params": [{"name": "errorclass", "desc": "valor para a nova classe de erro (inteiro)"}], "description": "Cria uma nova classe de erro definida pelo usu\u00e1rio para uso em manipuladores de erro personalizados.", "application": "Extensibilidade do sistema de tratamento de erros do MPI.", "example": "// Declara\u00e7\u00f5es\nint errorclass; // Vari\u00e1vel para armazenar a nova classe de erro\nint err;        // Vari\u00e1vel para armazenar o retorno da fun\u00e7\u00e3o\n\n// Cria uma nova classe de erro definida pelo usu\u00e1rio\nerr = MPI_Add_error_class(&errorclass);\n\nif (err == MPI_SUCCESS) {\n    // A nova classe de erro foi criada com sucesso.\n    // 'errorclass' agora cont\u00e9m o identificador da nova classe.\n    // printf(\"Nova classe de erro criada: %d\\n\", errorclass); // L\u00f3gica de aplica\u00e7\u00e3o\n} else {\n    // Tratamento de erro para MPI_Add_error_class\n}\n"}, {"name": "MPI_Add_error_code", "short_desc": "Adiciona um c\u00f3digo de erro MPI a uma classe de erro MPI.", "synopsis": "int MPI_Add_error_code(int errorclass, int *errorcode)", "params": [{"name": "errorclass", "desc": "classe de erro (inteiro)"}, {"name": "errorcode", "desc": "novo c\u00f3digo de erro associado \u00e0 classe (inteiro)"}], "description": "Cria um novo c\u00f3digo de erro dentro de uma classe de erro existente.", "application": "Refinamento do tratamento de erros com c\u00f3digos espec\u00edficos dentro de uma classe.", "example": "// Declara\u00e7\u00f5es\nint base_errorclass = MPI_ERR_OTHER; // Uma classe de erro existente ou rec\u00e9m-criada. Usando MPI_ERR_OTHER para exemplo.\nint errorcode;                       // Vari\u00e1vel para armazenar o novo c\u00f3digo de erro gerado\nint err;                             // Vari\u00e1vel para armazenar o retorno da fun\u00e7\u00e3o\n\n// Para demonstrar de forma completa, primeiro criamos uma classe de erro personalizada\nint custom_class;\nerr = MPI_Add_error_class(&custom_class);\n\nif (err == MPI_SUCCESS) {\n    // Adiciona um novo c\u00f3digo de erro dentro da classe de erro rec\u00e9m-criada (custom_class)\n    err = MPI_Add_error_code(custom_class, &errorcode);\n\n    if (err == MPI_SUCCESS) {\n        // O novo c\u00f3digo de erro foi criado com sucesso.\n        // 'errorcode' agora cont\u00e9m o identificador do novo c\u00f3digo.\n        // printf(\"Novo c\u00f3digo de erro %d adicionado \u00e0 classe %d\\n\", errorcode, custom_class); // L\u00f3gica de aplica\u00e7\u00e3o\n    } else {\n        // Tratamento de erro para MPI_Add_error_code\n    }\n} else {\n    // Tratamento de erro para MPI_Add_error_class\n}\n"}, {"name": "MPI_Add_error_string", "short_desc": "Associa uma string de erro a um c\u00f3digo ou classe de erro MPI.", "synopsis": "int MPI_Add_error_string(int errorcode, const char *string)", "params": [{"name": "errorcode", "desc": "c\u00f3digo ou classe de erro (inteiro)"}, {"name": "string", "desc": "texto correspondente ao errorcode (string)"}], "description": "Define a mensagem descritiva associada a um c\u00f3digo de erro ou classe de erro personalizada. A string n\u00e3o deve exceder MPI_MAX_ERROR_STRING.", "application": "Personaliza\u00e7\u00e3o de mensagens de erro para o usu\u00e1rio.", "example": "// Declara\u00e7\u00f5es\nint error_class_for_string; // Classe de erro personalizada\nint custom_error_code;      // C\u00f3digo de erro personalizado dentro da classe\nconst char *error_string_desc = \"Erro de configura\u00e7\u00e3o de recurso personalizado.\";\nint err;                    // Vari\u00e1vel para armazenar o retorno da fun\u00e7\u00e3o\n\n// Primeiro, cria uma classe de erro para nosso exemplo completo\nerr = MPI_Add_error_class(&error_class_for_string);\n\nif (err == MPI_SUCCESS) {\n    // Em seguida, adiciona um c\u00f3digo de erro a essa classe\n    err = MPI_Add_error_code(error_class_for_string, &custom_error_code);\n\n    if (err == MPI_SUCCESS) {\n        // Finalmente, associa uma string descritiva ao c\u00f3digo de erro\n        err = MPI_Add_error_string(custom_error_code, error_string_desc);\n\n        if (err == MPI_SUCCESS) {\n            // A string de erro foi associada com sucesso.\n            // Agora, MPI_Error_string pode recuperar esta mensagem para 'custom_error_code'.\n            // printf(\"String de erro adicionada para o c\u00f3digo %d: \\\"%s\\\"\\n\", custom_error_code, error_string_desc); // L\u00f3gica de aplica\u00e7\u00e3o\n        } else {\n            // Tratamento de erro para MPI_Add_error_string\n        }\n    } else {\n        // Tratamento de erro para MPI_Add_error_code\n    }\n} else {\n    // Tratamento de erro para MPI_Add_error_class\n}\n"}, {"name": "MPI_Address", "short_desc": "Obt\u00e9m o endere\u00e7o de uma posi\u00e7\u00e3o na mem\u00f3ria.", "synopsis": "int MPI_Address(void *location, MPI_Aint *address)", "params": [{"name": "location", "desc": "posi\u00e7\u00e3o na mem\u00f3ria do chamador (escolha)"}, {"name": "address", "desc": "endere\u00e7o da posi\u00e7\u00e3o (inteiro)"}], "description": "Retorna o endere\u00e7o de uma vari\u00e1vel na mem\u00f3ria. Esta fun\u00e7\u00e3o est\u00e1 obsoleta em favor de MPI_Get_address.", "application": "C\u00e1lculo de deslocamentos para cria\u00e7\u00e3o de tipos de dados derivados.", "example": "// Declara\u00e7\u00f5es\nint my_variable = 123;         // Uma vari\u00e1vel local para obter o endere\u00e7o\nvoid *location = &my_variable; // Ponteiro para a localiza\u00e7\u00e3o na mem\u00f3ria\nMPI_Aint address;              // Vari\u00e1vel para armazenar o endere\u00e7o obtido\nint err;                       // Vari\u00e1vel para armazenar o retorno da fun\u00e7\u00e3o\n\n// Obt\u00e9m o endere\u00e7o de 'my_variable' na mem\u00f3ria.\n// Nota: Esta fun\u00e7\u00e3o est\u00e1 obsoleta em favor de MPI_Get_address.\nerr = MPI_Address(location, &address);\n\nif (err == MPI_SUCCESS) {\n    // O endere\u00e7o da vari\u00e1vel foi obtido com sucesso.\n    // 'address' agora cont\u00e9m o endere\u00e7o da mem\u00f3ria como um MPI_Aint.\n    // printf(\"Endere\u00e7o de my_variable: 0x%llx (MPI_Aint)\\n\", (unsigned long long)address); // L\u00f3gica de aplica\u00e7\u00e3o\n} else {\n    // Tratamento de erro para MPI_Address\n}\n"}, {"name": "MPI_Aint_add", "short_desc": "Retorna a soma de base e deslocamento (disp).", "synopsis": "MPI_Aint MPI_Aint_add(MPI_Aint base, MPI_Aint disp)", "params": [{"name": "base", "desc": "endere\u00e7o base (inteiro)"}, {"name": "disp", "desc": "deslocamento (inteiro)"}], "description": "Realiza a adi\u00e7\u00e3o aritm\u00e9tica de um endere\u00e7o MPI_Aint e um deslocamento, retornando um novo endere\u00e7o v\u00e1lido no mesmo objeto.", "application": "Aritm\u00e9tica de endere\u00e7os segura e port\u00e1til em MPI.", "example": "// Declara\u00e7\u00f5es\nMPI_Aint base_address = 0x1000; // Um endere\u00e7o base de exemplo (em bytes)\nMPI_Aint displacement = 64;     // Um deslocamento de exemplo (em bytes)\nMPI_Aint new_address;           // Vari\u00e1vel para armazenar o resultado da adi\u00e7\u00e3o\n\n// Realiza a adi\u00e7\u00e3o aritm\u00e9tica de um endere\u00e7o MPI_Aint e um deslocamento.\n// Esta fun\u00e7\u00e3o utilit\u00e1ria retorna diretamente o novo endere\u00e7o (MPI_Aint), n\u00e3o um c\u00f3digo de erro MPI.\n// Portanto, o requisito de armazenar o retorno em 'int err' n\u00e3o se aplica diretamente.\nnew_address = MPI_Aint_add(base_address, displacement);\n\n// Neste ponto, 'new_address' cont\u00e9m o resultado da soma de base_address e displacement.\n// printf(\"Endere\u00e7o base: 0x%llx\\n\", (unsigned long long)base_address); // L\u00f3gica de aplica\u00e7\u00e3o\n// printf(\"Deslocamento: %llu\\n\", (unsigned long long)displacement); // L\u00f3gica de aplica\u00e7\u00e3o\n// printf(\"Novo endere\u00e7o calculado: 0x%llx\\n\", (unsigned long long)new_address); // L\u00f3gica de aplica\u00e7\u00e3o\n"}, {"name": "MPI_Aint_diff", "short_desc": "Retorna a diferen\u00e7a entre addr1 e addr2.", "synopsis": "MPI_Aint MPI_Aint_diff(MPI_Aint addr1, MPI_Aint addr2)", "params": [{"name": "addr1", "desc": "endere\u00e7o minuendo (inteiro)"}, {"name": "addr2", "desc": "endere\u00e7o subtraendo (inteiro)"}], "description": "Calcula a diferen\u00e7a sinalizada entre dois endere\u00e7os MPI_Aint. Ambos os endere\u00e7os devem pertencer ao mesmo objeto no mesmo processo.", "application": "C\u00e1lculo de dist\u00e2ncias entre endere\u00e7os na mem\u00f3ria.", "example": "// Declara\u00e7\u00f5es\nMPI_Aint addr_start;\nMPI_Aint addr_mid;\nMPI_Aint diff_result; // Resultado da diferen\u00e7a de endere\u00e7os\n\nchar my_array[100]; // Um array para simular um objeto na mem\u00f3ria\n\n// Obt\u00e9m o endere\u00e7o inicial do array\nMPI_Get_address(&my_array[0], &addr_start);\n// Obt\u00e9m o endere\u00e7o de um elemento intermedi\u00e1rio no array\nMPI_Get_address(&my_array[50], &addr_mid);\n\n// Calcula a diferen\u00e7a entre os dois endere\u00e7os.\n// MPI_Aint_diff retorna um valor MPI_Aint, n\u00e3o um c\u00f3digo de erro.\n// Portanto, a verifica\u00e7\u00e3o com 'MPI_SUCCESS' n\u00e3o se aplica diretamente.\ndiff_result = MPI_Aint_diff(addr_mid, addr_start);\n\n// O valor de 'diff_result' agora cont\u00e9m a diferen\u00e7a em bytes entre os endere\u00e7os.\n// Por exemplo, para my_array[50] e my_array[0], o resultado seria 50.\n// (Em um programa real, poder\u00edamos imprimir ou usar 'diff_result').\n\n// N\u00e3o h\u00e1 recursos MPI alocados para liberar neste exemplo."}, {"name": "MPI_Allgather", "short_desc": "Coleta dados de todas as tarefas e distribui os dados combinados para todas elas.", "synopsis": "int MPI_Allgather(const void *sendbuf, int sendcount, MPI_Datatype sendtype, void *recvbuf, int recvcount, MPI_Datatype recvtype, MPI_Comm comm)", "params": [{"name": "sendbuf", "desc": "endere\u00e7o inicial do buffer de envio (escolha)"}, {"name": "sendcount", "desc": "n\u00famero de elementos no buffer de envio (inteiro n\u00e3o negativo)"}, {"name": "sendtype", "desc": "tipo de dado dos elementos do buffer de envio (handle)"}, {"name": "recvcount", "desc": "n\u00famero de elementos recebidos de qualquer processo (inteiro n\u00e3o negativo)"}, {"name": "recvtype", "desc": "tipo de dado dos elementos do buffer de recebimento (handle)"}, {"name": "comm", "desc": "comunicador (handle)"}, {"name": "recvbuf", "desc": "endere\u00e7o do buffer de recebimento (escolha)"}], "description": "Cada processo envia dados do seu buffer de envio para todos os processos no comunicador. O resultado final \u00e9 que todos os processos possuem o conjunto completo de dados coletados.", "application": "Situa\u00e7\u00f5es onde todos os processos precisam ter conhecimento global de dados distribu\u00eddos (ex: atualiza\u00e7\u00e3o de vetores globais).", "example": "// Declara\u00e7\u00f5es\nint rank, size; // Rank do processo e tamanho do comunicador\nint send_data; // Dado que cada processo enviar\u00e1\nint *recv_buffer; // Buffer para receber os dados de todos os processos\nint sendcount = 1; // N\u00famero de elementos a enviar por processo\nint recvcount_per_proc = 1; // N\u00famero de elementos a receber de CADA processo\nMPI_Datatype sendtype = MPI_INT; // Tipo de dado para envio\nMPI_Datatype recvtype = MPI_INT; // Tipo de dado para recebimento\nMPI_Comm comm = MPI_COMM_WORLD; // Comunicador padr\u00e3o\nint err; // Vari\u00e1vel para armazenar o c\u00f3digo de erro\n\n// Obt\u00e9m o rank e o tamanho do comunicador\nMPI_Comm_rank(comm, &rank);\nMPI_Comm_size(comm, &size);\n\n// Cada processo envia seu pr\u00f3prio rank como dado\nsend_data = rank;\n\n// O buffer de recebimento precisa ser grande o suficiente para armazenar\n// os dados de TODOS os processos (size * recvcount_per_proc elementos)\nrecv_buffer = (int *)malloc(size * recvcount_per_proc * sizeof(int));\n\n// Verifica se a aloca\u00e7\u00e3o de mem\u00f3ria foi bem-sucedida\nif (recv_buffer == NULL) {\n    // Em um programa MPI real, um MPI_Abort seria apropriado aqui\n    // fprintf(stderr, \"Erro: Falha na aloca\u00e7\u00e3o de mem\u00f3ria para recv_buffer no rank %d.\\n\", rank);\n    return 1; // Retorna um c\u00f3digo de erro para o contexto externo\n}\n\n// Realiza a opera\u00e7\u00e3o Allgather:\n// Cada processo envia 'send_data' (1 inteiro) para todos os outros processos,\n// e cada processo recebe os dados de todos os outros em 'recv_buffer'.\nerr = MPI_Allgather(&send_data, sendcount, sendtype,\n                    recv_buffer, recvcount_per_proc, recvtype, comm);\n\nif (err == MPI_SUCCESS) {\n    // Sucesso: Todos os processos agora possuem uma c\u00f3pia da cole\u00e7\u00e3o completa de dados.\n    // Por exemplo, para 3 processos (rank 0, 1, 2), recv_buffer conteria [0, 1, 2] em todos.\n    // (Em um programa real, poder\u00edamos inspecionar 'recv_buffer' aqui para verificar).\n}\n\n// Limpeza: Libera a mem\u00f3ria alocada dinamicamente\nfree(recv_buffer);"}, {"name": "MPI_Allgatherv", "short_desc": "Re\u00fane dados de todas as tarefas e entrega os dados combinados para todas as tarefas, permitindo tamanhos variados.", "synopsis": "int MPI_Allgatherv(const void *sendbuf, int sendcount, MPI_Datatype sendtype, void *recvbuf, const int recvcounts[], const int displs[], MPI_Datatype recvtype, MPI_Comm comm)", "params": [{"name": "sendbuf", "desc": "Endere\u00e7o inicial do buffer de envio (escolha)."}, {"name": "sendcount", "desc": "N\u00famero de elementos no buffer de envio (inteiro n\u00e3o negativo)."}, {"name": "sendtype", "desc": "Tipo de dado dos elementos do buffer de envio (handle)."}, {"name": "recvcounts", "desc": "Array de inteiros n\u00e3o negativos (de tamanho igual ao grupo) contendo o n\u00famero de elementos recebidos de cada processo."}, {"name": "displs", "desc": "Array de inteiros (de tamanho igual ao grupo). A entrada i especifica o deslocamento (relativo a recvbuf) onde colocar os dados vindos do processo i."}, {"name": "recvtype", "desc": "Tipo de dado dos elementos do buffer de recebimento (handle)."}, {"name": "comm", "desc": "Comunicador (handle)."}], "description": "MPI_Allgatherv re\u00fane dados de todos os membros de um grupo e distribui os dados combinados para todos os membros. A principal diferen\u00e7a entre MPI_Allgather e MPI_Allgatherv \u00e9 que MPI_Allgather assume que todos os processos enviam o mesmo n\u00famero de elementos, enquanto MPI_Allgatherv permite que cada processo envie um n\u00famero diferente de elementos. Al\u00e9m disso, os deslocamentos no buffer de recebimento podem ser especificados individualmente para cada processo de origem.", "application": "Usado quando todos os processos precisam ter uma c\u00f3pia completa de dados distribu\u00eddos de tamanhos desiguais.", "example": "// Declara\u00e7\u00f5es\nint rank, size; // Rank do processo e tamanho do comunicador\nint send_buffer[10]; // Buffer para os dados que o processo ir\u00e1 enviar (tamanho m\u00e1ximo arbitr\u00e1rio)\nint sendcount; // N\u00famero de elementos a enviar por este processo\nint *recv_buffer; // Buffer para receber os dados de todos os processos\nint *recv_counts; // Array: recv_counts[i] \u00e9 o n\u00famero de elementos a receber do processo i\nint *displs; // Array: displs[i] \u00e9 o deslocamento no recv_buffer para os dados do processo i\nMPI_Datatype sendtype = MPI_INT; // Tipo de dado para envio\nMPI_Datatype recvtype = MPI_INT; // Tipo de dado para recebimento\nMPI_Comm comm = MPI_COMM_WORLD; // Comunicador padr\u00e3o\nint err; // Vari\u00e1vel para armazenar o c\u00f3digo de erro\nint total_recv_elements = 0; // Soma total dos elementos a serem recebidos por cada processo\n\n// Obt\u00e9m o rank e o tamanho do comunicador\nMPI_Comm_rank(comm, &rank);\nMPI_Comm_size(comm, &size);\n\n// Cada processo envia um n\u00famero de elementos baseado em seu rank + 1 (exemplo vari\u00e1vel)\nsendcount = rank + 1; // Processo 0 envia 1, processo 1 envia 2, etc.\n\n// Preenche o buffer de envio com valores para demonstra\u00e7\u00e3o\nfor (int i = 0; i < sendcount; ++i) {\n    send_buffer[i] = rank * 10 + i; // Ex: P0 envia [0], P1 envia [10, 11], P2 envia [20, 21, 22]\n}\n\n// Aloca mem\u00f3ria para os arrays de contagens e deslocamentos, que s\u00e3o globais a todos os processos\nrecv_counts = (int *)malloc(size * sizeof(int));\ndispls = (int *)malloc(size * sizeof(int));\n\nif (recv_counts == NULL || displs == NULL) {\n    // Tratamento de erro de aloca\u00e7\u00e3o de mem\u00f3ria\n    if (recv_counts) free(recv_counts);\n    if (displs) free(displs);\n    return 1;\n}\n\n// Determina as contagens de recebimento e deslocamentos para cada processo.\n// Neste exemplo, cada processo 'i' enviar\u00e1 'i+1' elementos, e todos os processos\n// precisam saber disso para configurar seus buffers de recebimento corretamente.\ndispls[0] = 0; // O primeiro bloco a ser recebido come\u00e7a no deslocamento 0\ntotal_recv_elements = 0;\n\nfor (int i = 0; i < size; ++i) {\n    recv_counts[i] = i + 1; // Contagem de elementos recebidos do processo 'i' ser\u00e1 'i+1'\n    total_recv_elements += recv_counts[i];\n    if (i > 0) {\n        displs[i] = displs[i-1] + recv_counts[i-1]; // Deslocamento acumulado para o pr\u00f3ximo bloco\n    }\n}\n\n// Aloca o buffer de recebimento com base na soma total de elementos que cada processo receber\u00e1\nrecv_buffer = (int *)malloc(total_recv_elements * sizeof(int));\n\nif (recv_buffer == NULL) {\n    // Tratamento de erro de aloca\u00e7\u00e3o de mem\u00f3ria\n    free(recv_counts);\n    free(displs);\n    return 1;\n}\n\n// Realiza a opera\u00e7\u00e3o Allgatherv\n// Cada processo envia 'send_buffer' e recebe os dados de todos em 'recv_buffer',\n// com contagens e deslocamentos vari\u00e1veis.\nerr = MPI_Allgatherv(send_buffer, sendcount, sendtype,\n                     recv_buffer, recv_counts, displs, recvtype, comm);\n\nif (err == MPI_SUCCESS) {\n    // Sucesso: Todos os processos agora possuem a cole\u00e7\u00e3o completa de dados,\n    // com os blocos de cada processo de origem posicionados de acordo com 'displs'.\n    // (Em um programa real, poder\u00edamos inspecionar 'recv_buffer' aqui).\n}\n\n// Limpeza: Libera a mem\u00f3ria alocada dinamicamente\nfree(recv_buffer);\nfree(recv_counts);\nfree(displs);"}, {"name": "MPI_Alloc_mem", "short_desc": "Aloca mem\u00f3ria para passagem de mensagens e RMA.", "synopsis": "int MPI_Alloc_mem(MPI_Aint size, MPI_Info info, void *baseptr)", "params": [{"name": "size", "desc": "Tamanho do segmento de mem\u00f3ria em bytes (inteiro n\u00e3o negativo)."}, {"name": "info", "desc": "Argumento de informa\u00e7\u00e3o (handle)."}, {"name": "baseptr", "desc": "Ponteiro para o in\u00edcio do segmento de mem\u00f3ria alocado (escolha)."}], "description": "MPI_Alloc_mem aloca mem\u00f3ria que pode ser particularmente eficiente para opera\u00e7\u00f5es de comunica\u00e7\u00e3o, como opera\u00e7\u00f5es de Acesso Remoto \u00e0 Mem\u00f3ria (RMA). Embora o ponteiro retornado seja do tipo void *, ele \u00e9 na verdade um ponteiro para um ponteiro (void **). No Fortran, o uso desta rotina pode exigir extens\u00f5es espec\u00edficas do compilador para lidar com ponteiros.", "application": "Utilizado para alocar mem\u00f3ria que ser\u00e1 usada como janelas RMA ou buffers de comunica\u00e7\u00e3o de alto desempenho.", "example": "// Declara\u00e7\u00f5es\nMPI_Aint mem_size = 4096; // Tamanho da mem\u00f3ria a alocar em bytes (4KB)\nMPI_Info info = MPI_INFO_NULL; // Argumento de informa\u00e7\u00e3o (MPI_INFO_NULL para comportamento padr\u00e3o)\nvoid *allocated_memory_ptr = NULL; // Ponteiro para o in\u00edcio do segmento de mem\u00f3ria alocado\nint err; // Vari\u00e1vel para armazenar o c\u00f3digo de erro\n\n// Aloca mem\u00f3ria otimizada para MPI usando MPI_Alloc_mem\n// O terceiro argumento \u00e9 um ponteiro para o ponteiro 'allocated_memory_ptr',\n// onde o endere\u00e7o da mem\u00f3ria alocada ser\u00e1 armazenado.\nerr = MPI_Alloc_mem(mem_size, info, &allocated_memory_ptr);\n\nif (err == MPI_SUCCESS) {\n    // Sucesso: a mem\u00f3ria foi alocada.\n    // Agora podemos usar a mem\u00f3ria alocada, por exemplo, inicializando-a.\n    int *int_ptr = (int *)allocated_memory_ptr;\n    MPI_Aint num_ints = mem_size / sizeof(int);\n    for (MPI_Aint i = 0; i < num_ints; ++i) {\n        int_ptr[i] = i * 2; // Preenche com valores de exemplo\n    }\n    // ... A mem\u00f3ria 'allocated_memory_ptr' agora pode ser usada eficientemente\n    // para opera\u00e7\u00f5es de comunica\u00e7\u00e3o ou Acesso Remoto \u00e0 Mem\u00f3ria (RMA) ...\n}\n\n// Limpeza: Libera a mem\u00f3ria alocada por MPI_Alloc_mem.\n// \u00c9 crucial verificar se o ponteiro n\u00e3o \u00e9 NULL antes de tentar liberar,\n// caso a aloca\u00e7\u00e3o inicial tenha falhado.\nif (allocated_memory_ptr != NULL) {\n    err = MPI_Free_mem(allocated_memory_ptr);\n    if (err != MPI_SUCCESS) {\n        // Tratamento de erro na libera\u00e7\u00e3o de mem\u00f3ria\n        // fprintf(stderr, \"Erro ao liberar mem\u00f3ria MPI_Alloc_mem.\\n\");\n    }\n}"}, {"name": "MPI_Allreduce", "short_desc": "Combina valores de todos os processos e distribui o resultado de volta para todos os processos.", "synopsis": "int MPI_Allreduce(const void *sendbuf, void *recvbuf, int count, MPI_Datatype datatype, MPI_Op op, MPI_Comm comm)", "params": [{"name": "sendbuf", "desc": "Endere\u00e7o inicial do buffer de envio (escolha)."}, {"name": "count", "desc": "N\u00famero de elementos no buffer de envio (inteiro n\u00e3o negativo)."}, {"name": "datatype", "desc": "Tipo de dado dos elementos do buffer de envio (handle)."}, {"name": "op", "desc": "Opera\u00e7\u00e3o de redu\u00e7\u00e3o (handle)."}, {"name": "comm", "desc": "Comunicador (handle)."}, {"name": "recvbuf", "desc": "Endere\u00e7o inicial do buffer de recebimento (escolha)."}], "description": "MPI_Allreduce combina os valores do buffer de envio de cada processo usando a opera\u00e7\u00e3o especificada (como soma, m\u00e1ximo, etc.) e coloca o resultado combinado no buffer de recebimento de todos os processos do grupo. \u00c9 equivalente a um MPI_Reduce seguido por um MPI_Bcast, mas geralmente \u00e9 implementado de forma mais eficiente.", "application": "Comum em algoritmos que precisam de um valor global (como a soma total ou o valor m\u00e1ximo) em todos os n\u00f3s para decidir o pr\u00f3ximo passo da computa\u00e7\u00e3o.", "example": "// Declara\u00e7\u00f5es\nint rank, size; // Rank do processo e tamanho do comunicador\nint send_value; // Valor que cada processo contribuir\u00e1 para a redu\u00e7\u00e3o\nint recv_result; // Vari\u00e1vel para armazenar o resultado da opera\u00e7\u00e3o de redu\u00e7\u00e3o\nint count = 1; // N\u00famero de elementos a serem reduzidos (aqui, apenas um inteiro)\nMPI_Datatype datatype = MPI_INT; // Tipo de dado dos elementos\nMPI_Op op = MPI_SUM; // Opera\u00e7\u00e3o de redu\u00e7\u00e3o (soma de todos os valores)\nMPI_Comm comm = MPI_COMM_WORLD; // Comunicador padr\u00e3o\nint err; // Vari\u00e1vel para armazenar o c\u00f3digo de erro\n\n// Obt\u00e9m o rank e o tamanho do comunicador\nMPI_Comm_rank(comm, &rank);\nMPI_Comm_size(comm, &size);\n\n// Cada processo envia seu rank como o valor para a redu\u00e7\u00e3o\nsend_value = rank;\n\n// Realiza a opera\u00e7\u00e3o Allreduce:\n// Combina os 'send_value' de todos os processos usando a opera\u00e7\u00e3o 'MPI_SUM',\n// e coloca o resultado combinado em 'recv_result' em TODOS os processos.\nerr = MPI_Allreduce(&send_value, &recv_result, count, datatype, op, comm);\n\nif (err == MPI_SUCCESS) {\n    // Sucesso: 'recv_result' agora cont\u00e9m a soma de todos os ranks (0 + 1 + ... + size-1).\n    // Por exemplo, se houver 3 processos (0, 1, 2), recv_result ser\u00e1 3 em todos os processos.\n    // (Em um programa real, poder\u00edamos inspecionar 'recv_result' aqui).\n}\n\n// N\u00e3o h\u00e1 recursos MPI alocados dinamicamente para liberar neste exemplo."}, {"name": "MPI_Alltoall", "short_desc": "Envia dados de todos para todos os processos.", "synopsis": "int MPI_Alltoall(const void *sendbuf, int sendcount, MPI_Datatype sendtype, void *recvbuf, int recvcount, MPI_Datatype recvtype, MPI_Comm comm)", "params": [{"name": "sendbuf", "desc": "Endere\u00e7o inicial do buffer de envio (escolha)."}, {"name": "sendcount", "desc": "N\u00famero de elementos enviados para cada processo (inteiro n\u00e3o negativo)."}, {"name": "sendtype", "desc": "Tipo de dado dos elementos do buffer de envio (handle)."}, {"name": "recvcount", "desc": "N\u00famero de elementos recebidos de qualquer processo (inteiro n\u00e3o negativo)."}, {"name": "recvtype", "desc": "Tipo de dado dos elementos do buffer de recebimento (handle)."}, {"name": "comm", "desc": "Comunicador (handle)."}, {"name": "recvbuf", "desc": "Endere\u00e7o do buffer de recebimento (escolha)."}], "description": "MPI_Alltoall \u00e9 uma opera\u00e7\u00e3o de transposi\u00e7\u00e3o de dados. Cada processo envia uma parte distinta de seu buffer de envio para cada processo no comunicador (incluindo ele mesmo). Ao final, o i-\u00e9simo bloco recebido por qualquer processo vem do i-\u00e9simo processo de origem. Todos os processos devem enviar e receber a mesma quantidade de dados.", "application": "Usado em transposi\u00e7\u00f5es de matrizes e algoritmos de embaralhamento (shuffling) onde cada processo tem dados para todos os outros.", "example": "// Declara\u00e7\u00f5es\nint rank, size; // Rank do processo e tamanho do comunicador\nint *send_buffer; // Buffer para os dados que este processo enviar\u00e1 para os outros\nint *recv_buffer; // Buffer para receber os dados dos outros processos\nint sendcount = 2; // N\u00famero de elementos enviados para CADA processo\nint recvcount_per_proc = 2; // N\u00famero de elementos recebidos de CADA processo (deve ser igual a sendcount)\nMPI_Datatype sendtype = MPI_INT; // Tipo de dado para envio\nMPI_Datatype recvtype = MPI_INT; // Tipo de dado para recebimento\nMPI_Comm comm = MPI_COMM_WORLD; // Comunicador padr\u00e3o\nint err; // Vari\u00e1vel para armazenar o c\u00f3digo de erro\n\n// Obt\u00e9m o rank e o tamanho do comunicador\nMPI_Comm_rank(comm, &rank);\nMPI_Comm_size(comm, &size);\n\n// O buffer de envio deve ser grande o suficiente para enviar 'sendcount' elementos\n// para cada um dos 'size' processos (incluindo ele mesmo).\nsend_buffer = (int *)malloc(size * sendcount * sizeof(int));\n\n// O buffer de recebimento deve ser grande o suficiente para receber 'recvcount_per_proc'\n// elementos de cada um dos 'size' processos.\nrecv_buffer = (int *)malloc(size * recvcount_per_proc * sizeof(int));\n\nif (send_buffer == NULL || recv_buffer == NULL) {\n    // Tratamento de erro de aloca\u00e7\u00e3o de mem\u00f3ria\n    if (send_buffer) free(send_buffer);\n    if (recv_buffer) free(recv_buffer);\n    return 1;\n}\n\n// Preenche o buffer de envio.\n// send_buffer[j * sendcount + i] \u00e9 o i-\u00e9simo elemento a ser enviado ao processo 'j'.\nfor (int dest = 0; dest < size; ++dest) {\n    for (int i = 0; i < sendcount; ++i) {\n        send_buffer[dest * sendcount + i] = rank * 100 + dest * 10 + i; // Valores distintos para exemplo\n    }\n}\n\n// Realiza a opera\u00e7\u00e3o Alltoall:\n// Cada processo envia um bloco de dados para cada outro processo e recebe um bloco de cada outro.\n// Ap\u00f3s a opera\u00e7\u00e3o, o bloco 'j' em 'recv_buffer' conter\u00e1 os dados enviados pelo processo 'j'.\nerr = MPI_Alltoall(send_buffer, sendcount, sendtype,\n                   recv_buffer, recvcount_per_proc, recvtype, comm);\n\nif (err == MPI_SUCCESS) {\n    // Sucesso: 'recv_buffer' agora cont\u00e9m os dados recebidos de todos os processos.\n    // (Em um programa real, poder\u00edamos inspecionar 'recv_buffer' aqui para verificar).\n}\n\n// Limpeza: Libera a mem\u00f3ria alocada dinamicamente\nfree(send_buffer);\nfree(recv_buffer);"}, {"name": "MPI_Alltoallv", "short_desc": "Envia dados de todos para todos os processos; cada processo pode enviar uma quantidade diferente de dados e fornecer deslocamentos.", "synopsis": "int MPI_Alltoallv(const void *sendbuf, const int sendcounts[], const int sdispls[], MPI_Datatype sendtype, void *recvbuf, const int recvcounts[], const int rdispls[], MPI_Datatype recvtype, MPI_Comm comm)", "params": [{"name": "sendbuf", "desc": "Endere\u00e7o inicial do buffer de envio (escolha)."}, {"name": "sendcounts", "desc": "Array de inteiros n\u00e3o negativos especificando o n\u00famero de elementos a enviar para cada rank."}, {"name": "sdispls", "desc": "Array de inteiros. A entrada j especifica o deslocamento (relativo a sendbuf) de onde retirar os dados para o processo j."}, {"name": "sendtype", "desc": "Tipo de dado dos elementos do buffer de envio (handle)."}, {"name": "recvcounts", "desc": "Array de inteiros n\u00e3o negativos especificando o n\u00famero de elementos que podem ser recebidos de cada rank."}, {"name": "rdispls", "desc": "Array de inteiros. A entrada i especifica o deslocamento (relativo a recvbuf) onde colocar os dados vindos do processo i."}, {"name": "recvtype", "desc": "Tipo de dado dos elementos do buffer de recebimento (handle)."}, {"name": "comm", "desc": "Comunicador (handle)."}, {"name": "recvbuf", "desc": "Endere\u00e7o do buffer de recebimento (escolha)."}], "description": "MPI_Alltoallv \u00e9 a vers\u00e3o generalizada de MPI_Alltoall. Ela permite que a quantidade de dados enviada de cada processo para cada destino seja diferente. Os deslocamentos nos buffers de envio e recebimento tamb\u00e9m s\u00e3o especificados de forma independente para cada par de processos. Isso permite uma comunica\u00e7\u00e3o 'todos-para-todos' muito mais flex\u00edvel.", "application": "Utilizado em comunica\u00e7\u00f5es esparsas ou quando a carga de dados entre os processos n\u00e3o \u00e9 uniforme.", "example": "// Declara\u00e7\u00f5es\nint rank, size; // Rank do processo e tamanho do comunicador\nint *send_buffer_data; // Buffer de dados para envio\nint *recv_buffer_data; // Buffer de dados para recebimento\n\nint *send_counts; // Array: send_counts[i] \u00e9 o n\u00famero de elementos a enviar para o processo i\nint *sdispls;    // Array: sdispls[i] \u00e9 o deslocamento no send_buffer_data para o processo i\nint *recv_counts; // Array: recv_counts[i] \u00e9 o n\u00famero de elementos a receber do processo i\nint *rdispls;    // Array: rdispls[i] \u00e9 o deslocamento no recv_buffer_data para o processo i\n\nMPI_Datatype sendtype = MPI_INT; // Tipo de dado para envio\nMPI_Datatype recvtype = MPI_INT; // Tipo de dado para recebimento\nMPI_Comm comm = MPI_COMM_WORLD; // Comunicador padr\u00e3o\nint err; // Vari\u00e1vel para armazenar o c\u00f3digo de erro\n\nint total_send_elements = 0; // Total de elementos que este processo enviar\u00e1\nint total_recv_elements = 0; // Total de elementos que este processo receber\u00e1\n\n// Obt\u00e9m o rank e o tamanho do comunicador\nMPI_Comm_rank(comm, &rank);\nMPI_Comm_size(comm, &size);\n\n// Aloca os arrays de contagens e deslocamentos\nsend_counts = (int *)malloc(size * sizeof(int));\nsdispls = (int *)malloc(size * sizeof(int));\nrecv_counts = (int *)malloc(size * sizeof(int));\nrdispls = (int *)malloc(size * sizeof(int));\n\nif (!send_counts || !sdispls || !recv_counts || !rdispls) {\n    // Tratamento de erro de aloca\u00e7\u00e3o de mem\u00f3ria\n    if (send_counts) free(send_counts);\n    if (sdispls) free(sdispls);\n    if (recv_counts) free(recv_counts);\n    if (rdispls) free(rdispls);\n    return 1;\n}\n\n// === Preenche send_counts e sdispls para ESTE PROCESSO ===\n// Neste exemplo, cada processo 'rank' envia 'rank + 1' elementos para o processo 'dest'\n// Isso simplifica a l\u00f3gica, mas em cen\u00e1rios reais, 'send_counts[dest]' pode variar livremente.\ntotal_send_elements = 0;\nfor (int dest = 0; dest < size; ++dest) {\n    send_counts[dest] = (rank + 1); // Exemplo: P0 envia 1 elemento para todos, P1 envia 2 para todos, etc.\n    sdispls[dest] = total_send_elements; // Deslocamento acumulado para o pr\u00f3ximo bloco de envio\n    total_send_elements += send_counts[dest];\n}\n\n// === Preenche recv_counts e rdispls para ESTE PROCESSO ===\n// Cada processo 'rank' espera receber de um processo 'src' o n\u00famero de elementos que 'src' envia para 'rank'.\n// Pela l\u00f3gica de envio acima, o processo 'src' envia 'src + 1' elementos para 'rank'.\ntotal_recv_elements = 0;\nfor (int src = 0; src < size; ++src) {\n    recv_counts[src] = (src + 1); // Este processo espera receber 'src + 1' elementos do processo 'src'\n    rdispls[src] = total_recv_elements; // Deslocamento acumulado para o pr\u00f3ximo bloco de recebimento\n    total_recv_elements += recv_counts[src];\n}\n\n// Aloca os buffers de dados principais com base nos totais calculados\nsend_buffer_data = (int *)malloc(total_send_elements * sizeof(int));\nrecv_buffer_data = (int *)malloc(total_recv_elements * sizeof(int));\n\nif (!send_buffer_data || !recv_buffer_data) {\n    // Tratamento de erro de aloca\u00e7\u00e3o de mem\u00f3ria\n    free(send_counts); free(sdispls); free(recv_counts); free(rdispls);\n    if (send_buffer_data) free(send_buffer_data);\n    if (recv_buffer_data) free(recv_buffer_data);\n    return 1;\n}\n\n// Preenche o buffer de envio com dados de exemplo\nfor (int i = 0; i < total_send_elements; ++i) {\n    send_buffer_data[i] = rank * 1000 + i; // Valores para identifica\u00e7\u00e3o\n}\n\n// Realiza a opera\u00e7\u00e3o Alltoallv\nerr = MPI_Alltoallv(send_buffer_data, send_counts, sdispls, sendtype,\n                    recv_buffer_data, recv_counts, rdispls, recvtype, comm);\n\nif (err == MPI_SUCCESS) {\n    // Sucesso: 'recv_buffer_data' agora cont\u00e9m os dados recebidos de todos os processos,\n    // com os blocos posicionados de acordo com 'rdispls' e com tamanhos 'recv_counts'.\n    // (Em um programa real, poder\u00edamos inspecionar 'recv_buffer_data' aqui).\n}\n\n// Limpeza: Libera toda a mem\u00f3ria alocada dinamicamente\nfree(send_buffer_data);\nfree(recv_buffer_data);\nfree(send_counts);\nfree(sdispls);\nfree(recv_counts);\nfree(rdispls);"}, {"name": "MPI_Alltoallw", "short_desc": "Comunica\u00e7\u00e3o todos-para-todos generalizada permitindo diferentes tipos de dados, contagens e deslocamentos para cada parceiro.", "synopsis": "int MPI_Alltoallw(const void *sendbuf, const int sendcounts[], const int sdispls[], const MPI_Datatype sendtypes[], void *recvbuf, const int recvcounts[], const int rdispls[], const MPI_Datatype recvtypes[], MPI_Comm comm)", "params": [{"name": "sendbuf", "desc": "Endere\u00e7o inicial do buffer de envio (escolha)."}, {"name": "sendcounts", "desc": "Array de inteiros n\u00e3o negativos especificando o n\u00famero de elementos a enviar para cada rank."}, {"name": "sdispls", "desc": "Array de inteiros. A entrada j especifica o deslocamento em bytes (relativo a sendbuf) de onde retirar os dados para o processo j."}, {"name": "sendtypes", "desc": "Array de tipos de dados. A entrada j especifica o tipo de dado a enviar para o processo j."}, {"name": "recvcounts", "desc": "Array de inteiros n\u00e3o negativos especificando o n\u00famero de elementos que podem ser recebidos de cada rank."}, {"name": "rdispls", "desc": "Array de inteiros. A entrada i especifica o deslocamento em bytes (relativo a recvbuf) onde colocar os dados vindos do processo i."}, {"name": "recvtypes", "desc": "Array de tipos de dados. A entrada i especifica o tipo de dado recebido do processo i."}, {"name": "comm", "desc": "Comunicador (handle)."}, {"name": "recvbuf", "desc": "Endere\u00e7o do buffer de recebimento (escolha)."}], "description": "MPI_Alltoallw \u00e9 a forma mais geral de comunica\u00e7\u00e3o todos-para-todos. Diferente de MPI_Alltoallv, onde todos os elementos devem ser do mesmo tipo de dado, MPI_Alltoallw permite que cada bloco de dados enviado ou recebido tenha um tipo de dado diferente. Al\u00e9m disso, os deslocamentos s\u00e3o especificados em bytes, e n\u00e3o em unidades do tipo de dado.", "application": "Usado em situa\u00e7\u00f5es de comunica\u00e7\u00e3o extremamente complexas onde os dados trocados entre diferentes pares de processos t\u00eam estruturas e tipos completamente distintos.", "example": "// Declara\u00e7\u00f5es\nint rank, size; // Rank do processo e tamanho do comunicador\n\n// Buffers base que podem conter dados de tipos mistos\nvoid *send_buffer_base = NULL;\nvoid *recv_buffer_base = NULL;\n\nint *send_counts; // Array: send_counts[i] \u00e9 o n\u00famero de elementos a enviar para o processo i\nint *sdispls;    // Array: sdispls[i] \u00e9 o deslocamento em BYTES no send_buffer_base para o processo i\nMPI_Datatype *send_types; // Array: send_types[i] \u00e9 o tipo de dado a enviar para o processo i\n\nint *recv_counts; // Array: recv_counts[i] \u00e9 o n\u00famero de elementos a receber do processo i\nint *rdispls;    // Array: rdispls[i] \u00e9 o deslocamento em BYTES no recv_buffer_base para o processo i\nMPI_Datatype *recv_types; // Array: recv_types[i] \u00e9 o tipo de dado a receber do processo i\n\nMPI_Comm comm = MPI_COMM_WORLD; // Comunicador padr\u00e3o\nint err; // Vari\u00e1vel para armazenar o c\u00f3digo de erro\n\nMPI_Aint total_send_bytes = 0; // Total de bytes que este processo enviar\u00e1\nMPI_Aint total_recv_bytes = 0; // Total de bytes que este processo receber\u00e1\n\n// Obt\u00e9m o rank e o tamanho do comunicador\nMPI_Comm_rank(comm, &rank);\nMPI_Comm_size(comm, &size);\n\n// Aloca os arrays de controle para todos os processos\nsend_counts = (int *)malloc(size * sizeof(int));\nsdispls = (int *)malloc(size * sizeof(int));\nsend_types = (MPI_Datatype *)malloc(size * sizeof(MPI_Datatype));\nrecv_counts = (int *)malloc(size * sizeof(int));\nrdispls = (int *)malloc(size * sizeof(int));\nrecv_types = (MPI_Datatype *)malloc(size * sizeof(MPI_Datatype));\n\nif (!send_counts || !sdispls || !send_types || !recv_counts || !rdispls || !recv_types) {\n    // Tratamento de erro de aloca\u00e7\u00e3o de mem\u00f3ria (simplificado)\n    // Em um programa real, liberar recursos j\u00e1 alocados e chamar MPI_Abort.\n    return 1;\n}\n\n// === Preenche send_counts, sdispls, send_types para ESTE PROCESSO ===\n// Define o que ESTE PROCESSO enviar\u00e1 para cada outro processo 'dest'.\n// Por exemplo, processos de rank par enviam 3 inteiros para pares e 5 caracteres para \u00edmpares.\n// Processos de rank \u00edmpar enviam 5 caracteres para pares e 3 inteiros para \u00edmpares.\ntotal_send_bytes = 0;\nfor (int dest = 0; dest < size; ++dest) {\n    if (rank % 2 == 0) { // Se este rank \u00e9 par\n        send_counts[dest] = (dest % 2 == 0) ? 3 : 5; // 3 int para par, 5 char para \u00edmpar\n        send_types[dest] = (dest % 2 == 0) ? MPI_INT : MPI_CHAR;\n    } else { // Se este rank \u00e9 \u00edmpar\n        send_counts[dest] = (dest % 2 == 0) ? 5 : 3; // 5 char para par, 3 int para \u00edmpar\n        send_types[dest] = (dest % 2 == 0) ? MPI_CHAR : MPI_INT;\n    }\n    sdispls[dest] = total_send_bytes; // Deslocamento em BYTES\n    total_send_bytes += send_counts[dest] * (send_types[dest] == MPI_INT ? sizeof(int) : sizeof(char));\n}\n\n// === Preenche recv_counts, rdispls, recv_types para ESTE PROCESSO ===\n// Define o que ESTE PROCESSO espera receber de cada outro processo 'src'.\n// A l\u00f3gica \u00e9 o inverso do envio: 'este' processo ('rank') recebe do 'src'\n// o que 'src' enviou para 'rank'.\ntotal_recv_bytes = 0;\nfor (int src = 0; src < size; ++src) {\n    if (src % 2 == 0) { // Se o processo de origem 'src' \u00e9 par\n        recv_counts[src] = (rank % 2 == 0) ? 3 : 5; // Recebe 3 int se 'rank' par, 5 char se 'rank' \u00edmpar\n        recv_types[src] = (rank % 2 == 0) ? MPI_INT : MPI_CHAR;\n    } else { // Se o processo de origem 'src' \u00e9 \u00edmpar\n        recv_counts[src] = (rank % 2 == 0) ? 5 : 3; // Recebe 5 char se 'rank' par, 3 int se 'rank' \u00edmpar\n        recv_types[src] = (rank % 2 == 0) ? MPI_CHAR : MPI_INT;\n    }\n    rdispls[src] = total_recv_bytes; // Deslocamento em BYTES\n    total_recv_bytes += recv_counts[src] * (recv_types[src] == MPI_INT ? sizeof(int) : sizeof(char));\n}\n\n// Aloca os buffers de dados principais com o tamanho total em bytes\nsend_buffer_base = malloc(total_send_bytes > 0 ? total_send_bytes : 1); // Garante aloca\u00e7\u00e3o m\u00ednima\nrecv_buffer_base = malloc(total_recv_bytes > 0 ? total_recv_bytes : 1); // Garante aloca\u00e7\u00e3o m\u00ednima\n\nif (!send_buffer_base || !recv_buffer_base) {\n    // Tratamento de erro de aloca\u00e7\u00e3o de mem\u00f3ria (simplificado)\n    // Liberar tudo e retornar.\n    free(send_counts); free(sdispls); free(send_types);\n    free(recv_counts); free(rdispls); free(recv_types);\n    if (send_buffer_base) free(send_buffer_base);\n    if (recv_buffer_base) free(recv_buffer_base);\n    return 1;\n}\n\n// Preenche o buffer de envio com dados de exemplo\nfor (int dest = 0; dest < size; ++dest) {\n    if (send_types[dest] == MPI_INT) {\n        int *ptr = (int *)((char *)send_buffer_base + sdispls[dest]);\n        for (int i = 0; i < send_counts[dest]; ++i) {\n            ptr[i] = rank * 1000 + dest * 10 + i; // Exemplo de valor inteiro\n        }\n    } else if (send_types[dest] == MPI_CHAR) {\n        char *ptr = (char *)((char *)send_buffer_base + sdispls[dest]);\n        for (int i = 0; i < send_counts[dest]; ++i) {\n            ptr[i] = (char)('a' + rank + dest + i); // Exemplo de valor de caractere\n        }\n    }\n}\n\n// Realiza a opera\u00e7\u00e3o Alltoallw, a forma mais geral de comunica\u00e7\u00e3o todos-para-todos\nerr = MPI_Alltoallw(send_buffer_base, send_counts, sdispls, send_types,\n                    recv_buffer_base, recv_counts, rdispls, recv_types, comm);\n\nif (err == MPI_SUCCESS) {\n    // Sucesso: 'recv_buffer_base' agora cont\u00e9m os dados recebidos de todos os processos.\n    // Para inspecionar, seria necess\u00e1rio iterar pelos blocos usando 'rdispls' e 'recv_types'.\n    // (Em um programa real, poder\u00edamos imprimir ou processar os dados recebidos aqui).\n}\n\n// Limpeza: Libera toda a mem\u00f3ria alocada dinamicamente\nfree(send_buffer_base);\nfree(recv_buffer_base);\nfree(send_counts);\nfree(sdispls);\nfree(send_types);\nfree(recv_counts);\nfree(rdispls);\nfree(recv_types);"}, {"name": "MPI_Attr_delete", "short_desc": "Remove um valor de atributo associado a uma chave em um comunicador.", "synopsis": "int MPI_Attr_delete(MPI_Comm comm, int keyval)", "params": [{"name": "comm", "desc": "Comunicador ao qual o atributo est\u00e1 anexado (handle)."}, {"name": "keyval", "desc": "Valor da chave (inteiro)."}], "description": "MPI_Attr_delete remove um atributo de um comunicador. Esta fun\u00e7\u00e3o \u00e9 considerada obsoleta no padr\u00e3o MPI atual e foi substitu\u00edda por MPI_Comm_delete_attr. Ela libera o valor associado \u00e0 chave especificada, chamando a fun\u00e7\u00e3o de exclus\u00e3o (delete callback) definida quando a chave foi criada.", "application": "Utilizada para limpar atributos que n\u00e3o s\u00e3o mais necess\u00e1rios em um comunicador.", "example": "// Declara\u00e7\u00f5es\nMPI_Comm comm = MPI_COMM_WORLD; // Comunicador (aqui, usando o global)\nint keyval = MPI_KEYVAL_INVALID; // Valor da chave para o atributo, inicializado como inv\u00e1lido\nint attribute_value = 42; // Valor do atributo a ser associado\nint err; // Vari\u00e1vel para armazenar o c\u00f3digo de erro\n\n// Fun\u00e7\u00e3o de dele\u00e7\u00e3o de callback para MPI_Keyval_create.\n// Esta fun\u00e7\u00e3o \u00e9 chamada quando o comunicador \u00e9 liberado ou o atributo \u00e9 deletado.\n// Em um cen\u00e1rio real, ela liberaria recursos associados a 'attribute_val' se este fosse um ponteiro para mem\u00f3ria alocada.\nint attribute_delete_callback(MPI_Comm oldcomm, int keyval_arg, void *attribute_val, void *extra_state) {\n    // printf(\"Atributo com keyval %d est\u00e1 sendo deletado. Valor (se aplic\u00e1vel): %d\\n\", keyval_arg, *(int*)attribute_val);\n    return MPI_SUCCESS;\n}\n\n// Cria uma nova chave de atributo.\n// O 'MPI_NULL_COPY_FN' indica que a fun\u00e7\u00e3o de c\u00f3pia n\u00e3o faz nada.\n// 'attribute_delete_callback' \u00e9 a fun\u00e7\u00e3o a ser chamada na dele\u00e7\u00e3o.\nerr = MPI_Keyval_create(MPI_NULL_COPY_FN, attribute_delete_callback, &keyval, NULL);\n\nif (err == MPI_SUCCESS) {\n    // Associa um atributo (neste caso, um inteiro) ao comunicador usando a chave 'keyval'.\n    // O terceiro argumento \u00e9 um ponteiro para o valor do atributo.\n    err = MPI_Attr_put(comm, keyval, &attribute_value);\n\n    if (err == MPI_SUCCESS) {\n        // Deleta o atributo associado \u00e0 chave 'keyval' do comunicador 'comm'.\n        // Isso far\u00e1 com que 'attribute_delete_callback' seja chamada.\n        err = MPI_Attr_delete(comm, keyval);\n\n        if (err == MPI_SUCCESS) {\n            // Sucesso: o atributo foi removido.\n            // Nota: MPI_Attr_delete \u00e9 uma fun\u00e7\u00e3o obsoleta; MPI_Comm_delete_attr \u00e9 a recomendada.\n        }\n    }\n}\n\n// Limpeza: Libera a chave do atributo.\n// \u00c9 importante liberar a chave criada com MPI_Keyval_create.\nif (keyval != MPI_KEYVAL_INVALID) {\n    err = MPI_Keyval_free(&keyval);\n    if (err != MPI_SUCCESS) {\n        // Tratamento de erro na libera\u00e7\u00e3o da chave\n        // fprintf(stderr, \"Erro ao liberar keyval do atributo.\\n\");\n    }\n}"}, {"name": "MPI_Attr_get", "short_desc": "Recupera o valor de um atributo por chave.", "synopsis": "int MPI_Attr_get(MPI_Comm comm, int keyval, void *attribute_val, int *flag)", "params": [{"name": "comm", "desc": "Comunicador ao qual o atributo est\u00e1 anexado (handle)."}, {"name": "keyval", "desc": "Valor da chave (inteiro)."}, {"name": "attribute_val", "desc": "Valor do atributo, a menos que flag = false."}, {"name": "flag", "desc": "Verdadeiro se um valor de atributo foi extra\u00eddo; falso se nenhum atributo est\u00e1 associado \u00e0 chave."}], "description": "MPI_Attr_get recupera o valor de um atributo previamente armazenado em um comunicador. Se a chave especificada tiver um valor associado, flag ser\u00e1 definido como verdadeiro e o valor ser\u00e1 retornado em attribute_val. Esta fun\u00e7\u00e3o \u00e9 obsoleta e foi substitu\u00edda por MPI_Comm_get_attr.", "application": "Usado para acessar informa\u00e7\u00f5es contextuais ou metadados armazenados em comunicadores por bibliotecas ou m\u00f3dulos.", "example": "// Declara\u00e7\u00f5es\nMPI_Comm comm = MPI_COMM_WORLD; // Comunicador\nint keyval = MPI_KEYVAL_INVALID; // Valor da chave do atributo, inicializado como inv\u00e1lido\nint stored_value = 98765; // Valor inteiro a ser armazenado como atributo\nint retrieved_value = 0; // Vari\u00e1vel para receber o valor do atributo\nint flag = 0; // Flag para indicar se o atributo foi encontrado (0 = falso, 1 = verdadeiro)\nint err; // Vari\u00e1vel para armazenar o c\u00f3digo de erro\n\n// Fun\u00e7\u00f5es de callback para MPI_Keyval_create (dummy para este exemplo)\n// Fun\u00e7\u00f5es dummy, pois o foco \u00e9 na recupera\u00e7\u00e3o do atributo.\n// A fun\u00e7\u00e3o de c\u00f3pia pode ser MPI_NULL_COPY_FN se o atributo n\u00e3o for dinamicamente alocado.\nint attribute_copy_callback(MPI_Comm oldcomm, int keyval_arg, void *extra_state,\n                            void *attribute_val_in, void *attribute_val_out, int *flag_out) {\n    // Copia o valor inteiro diretamente (o valor n\u00e3o \u00e9 alocado dinamicamente).\n    *(int*)attribute_val_out = *(int*)attribute_val_in;\n    *flag_out = 1;\n    return MPI_SUCCESS;\n}\n\nint attribute_delete_callback(MPI_Comm oldcomm, int keyval_arg, void *attribute_val, void *extra_state) {\n    // N\u00e3o h\u00e1 nada para liberar neste exemplo, j\u00e1 que 'attribute_value' \u00e9 uma vari\u00e1vel local.\n    return MPI_SUCCESS;\n}\n\n// Cria uma nova chave de atributo\nerr = MPI_Keyval_create(attribute_copy_callback, attribute_delete_callback, &keyval, NULL);\n\nif (err == MPI_SUCCESS) {\n    // Associa o valor 'stored_value' ao comunicador usando a chave 'keyval'.\n    // O terceiro argumento \u00e9 um ponteiro para o valor do atributo.\n    err = MPI_Attr_put(comm, keyval, &stored_value);\n\n    if (err == MPI_SUCCESS) {\n        // Tenta recuperar o valor do atributo associado \u00e0 chave 'keyval' no comunicador 'comm'.\n        // O terceiro argumento \u00e9 um ponteiro para a vari\u00e1vel que receber\u00e1 o valor.\n        // O quarto argumento \u00e9 um ponteiro para a flag que indicar\u00e1 se o atributo foi encontrado.\n        err = MPI_Attr_get(comm, keyval, &retrieved_value, &flag);\n\n        if (err == MPI_SUCCESS) {\n            // Verifica se o atributo foi encontrado\n            if (flag) {\n                // Sucesso: atributo encontrado e recuperado em 'retrieved_value'.\n                // (Em um programa real, poder\u00edamos imprimir 'retrieved_value' ou us\u00e1-lo).\n            } else {\n                // O atributo n\u00e3o foi encontrado, o que n\u00e3o deve acontecer neste fluxo de exemplo.\n                // fprintf(stderr, \"Erro: Atributo com keyval %d n\u00e3o encontrado.\\n\", keyval);\n            }\n        }\n    }\n}\n\n// Limpeza: Libera a chave do atributo criada.\nif (keyval != MPI_KEYVAL_INVALID) {\n    err = MPI_Keyval_free(&keyval);\n    if (err != MPI_SUCCESS) {\n        // Tratamento de erro\n        // fprintf(stderr, \"Erro ao liberar keyval do atributo.\\n\");\n    }\n}"}, {"name": "MPI_Attr_put", "short_desc": "Armazena o valor do atributo associado a uma chave vinculada ao comunicador (Descontinuado).", "synopsis": "int MPI_Attr_put(MPI_Comm comm, int keyval, void *attribute_val)", "params": [{"name": "comm", "desc": "Comunicador alvo em que o valor do atributo incidir\u00e1 (handle)."}, {"name": "keyval", "desc": "A chave global de atributo instanciada via gerador de identificadores como o MPI_Keyval_create (inteiro)."}, {"name": "attribute_val", "desc": "Ponteiro gen\u00e9rico contendo o estado a salvaguardar anexado a esta key (void*)."}], "description": "A fun\u00e7\u00e3o `MPI_Attr_put` propicia o ambiente oportuno para parear ou associar propriedades persistentes atrav\u00e9s de um `keyval` previamente constru\u00eddo para se referir no interior de um cont\u00eainer de `comm`. A mec\u00e2nica atua com sem\u00e2ntica destrutiva: na probabilidade de haver inst\u00e2ncias velhas indexadas no identificador para tal comunicador, suas liga\u00e7\u00f5es com mem\u00f3rias sobem callbacks expl\u00edcitos \u00e0 fun\u00e7\u00e3o de delete pr\u00e9-atribu\u00edda pelo usu\u00e1rio. Note-se fortemente que o MPI-2 abandonou e repudiou oficialmente `MPI_Attr_put`, elegendo sua evolu\u00e7\u00e3o correta perante MPI-2/MPI-3 pela designa\u00e7\u00e3o can\u00f4nica `MPI_Comm_set_attr`.", "application": "Restrita e designada somente para manuten\u00e7\u00e3o das bases de rotinas antiquadas da especifica\u00e7\u00e3o MPI-1 onde atributos de topologias globais requeriam inser\u00e7\u00f5es locais dentro das subcamadas da runtime.", "example": "// Declara\u00e7\u00f5es\n// NOTA: MPI_Attr_put \u00e9 uma fun\u00e7\u00e3o legada e n\u00e3o \u00e9 mais recomendada. Para desenvolvimento moderno, utilize MPI_Comm_set_attr e MPI_Comm_get_attr.\n// As fun\u00e7\u00f5es de c\u00f3pia e exclus\u00e3o de atributos (MPI_Copy_function e MPI_Delete_function) para MPI_Attr_put devem ser definidas de acordo com a documenta\u00e7\u00e3o do MPI-1.0.\n// Para simplicidade e compatibilidade (apesar da deprecia\u00e7\u00e3o), usaremos fun\u00e7\u00f5es NULL para o exemplo.\nMPI_Comm comm_attr_test;\nint keyval_attr; // Chave de atributo\nint my_attribute_value = 42; // Valor a ser associado\nint *retrieved_attribute_ptr = NULL; // Ponteiro para armazenar o valor recuperado\nint flag_get; // Flag para indicar se o atributo foi encontrado\nint err;\n\n// Duplica MPI_COMM_WORLD para criar um comunicador de teste (pode-se usar MPI_COMM_WORLD diretamente)\nerr = MPI_Comm_dup(MPI_COMM_WORLD, &comm_attr_test);\n\nif (err == MPI_SUCCESS) {\n    // Cria uma nova chave de atributo. Para MPI_Attr_put, esta chave \u00e9 global.\n    // MPI_Keyval_create cria a chave e associa as fun\u00e7\u00f5es de c\u00f3pia/exclus\u00e3o. No MPI-1, as fun\u00e7\u00f5es NULL eram permitidas.\n    err = MPI_Keyval_create(MPI_NULL_COPY_FN, MPI_NULL_DELETE_FN, &keyval_attr, NULL);\n\n    if (err == MPI_SUCCESS) {\n        // Associa o valor do atributo (convertido para void*) ao comunicador usando a chave.\n        // Se j\u00e1 houver um atributo com esta chave no comunicador, a fun\u00e7\u00e3o de exclus\u00e3o ser\u00e1 chamada.\n        err = MPI_Attr_put(comm_attr_test, keyval_attr, &my_attribute_value);\n\n        if (err == MPI_SUCCESS) {\n            // Tenta recuperar o atributo para verificar se foi salvo corretamente.\n            // MPI_Attr_get \u00e9 a fun\u00e7\u00e3o correspondente para recuperar atributos definidos por MPI_Attr_put.\n            err = MPI_Attr_get(comm_attr_test, keyval_attr, (void**)&retrieved_attribute_ptr, &flag_get);\n            if (err == MPI_SUCCESS) {\n                if (flag_get && retrieved_attribute_ptr != NULL) {\n                    // Atributo recuperado com sucesso. O valor *retrieved_attribute_ptr deve ser 42.\n                } else if (!flag_get) {\n                    // Atributo n\u00e3o encontrado no comunicador.\n                }\n            } else {\n                // Erro ao chamar MPI_Attr_get.\n            }\n        } else {\n            // Erro ao chamar MPI_Attr_put.\n        }\n\n        // --- Limpeza --- \n        // Libera a chave de atributo criada.\n        err = MPI_Keyval_free(&keyval_attr);\n        if (err != MPI_SUCCESS) {\n            // Lidar com erro na libera\u00e7\u00e3o da chave.\n        }\n    } else {\n        // Erro ao chamar MPI_Keyval_create.\n    }\n\n    // Libera o comunicador duplicado.\n    err = MPI_Comm_free(&comm_attr_test);\n    if (err != MPI_SUCCESS) {\n        // Lidar com erro na libera\u00e7\u00e3o do comunicador.\n    }\n} else {\n    // Erro ao chamar MPI_Comm_dup.\n}", "raw_man": "MPI_Attr_put(3)                                       MPI                                       MPI_Attr_put(3)\n\nNAME\n       MPI_Attr_put -  Stores attribute value associated with a key\n\nSYNOPSIS\n       int MPI_Attr_put(MPI_Comm comm, int keyval, void *attribute_val)\n\nINPUT PARAMETERS\n       comm   - communicator to which attribute will be attached (handle)\n       keyval - key value, as returned by MPI_KEYVAL_CREATE (integer)\n       attribute_val\n              - attribute value (None)\n\nDEPRECATED FUNCTION\n       The  current  MPI  standard defines this routine as deprecated. The routine may continue to be used, but\n       new code should use the replacement routine.  The replacement for this routine is MPI_Comm_set_attr .\n\nTHREAD AND INTERRUPT SAFETY\n       This routine is thread-safe.  This means that this routine may be safely used by multiple threads  with\u2010\n       out  the  need  for  any user-provided thread locks.  However, the routine is not interrupt safe.  Typi\u2010\n       cally, this is due to the use of memory allocation routines such as malloc or  other  non-MPICH  runtime\n       routines that are themselves not interrupt-safe.\n\nNOTES FOR FORTRAN\n       All  MPI  routines  in Fortran (except for MPI_WTIME and MPI_WTICK ) have an additional argument ierr at\n       the end of the argument list.  ierr is an integer and has the same meaning as the return  value  of  the\n       routine in C.  In Fortran, MPI routines are subroutines, and are invoked with the call statement.\n\n       All MPI objects (e.g., MPI_Datatype , MPI_Comm ) are of type INTEGER in Fortran.\n\nERRORS\n       All MPI routines (except MPI_Wtime and MPI_Wtick ) return an error value; C routines as the value of the\n       function and Fortran routines in the last argument.  Before the value is returned, the current MPI error\n       handler is called.  By default, this error handler aborts the MPI job.  The error handler may be changed\n       with   MPI_Comm_set_errhandler   (for   communicators),   MPI_File_set_errhandler   (for   files),   and\n       MPI_Win_set_errhandler (for RMA windows).  The MPI-1 routine MPI_Errhandler_set may be used but its  use\n       is  deprecated.   The predefined error handler MPI_ERRORS_RETURN may be used to cause error values to be\n       returned.  Note that MPI does not guarantee that an MPI program can continue past an error; however, MPI\n       implementations will attempt to continue whenever possible.\n\n       MPI_SUCCESS\n              - No error; MPI routine completed successfully.\n       MPI_ERR_COMM\n              - Invalid communicator.  A common error is to use a null communicator in a call (not even allowed\n              in MPI_Comm_rank ).\n       MPI_ERR_KEYVAL\n              - Invalid keyval\n       MPI_ERR_OTHER\n              - Other error; use MPI_Error_string to get more information about this error code.\n\nSEE ALSO\n       MPI_Attr_get, MPI_Keyval_create, MPI_Attr_delete, MPI_Comm_set_attr\n\n                                                   10/6/2025                                    MPI_Attr_put(3)\n"}, {"name": "MPI_Barrier", "short_desc": "Bloqueia at\u00e9 que todos os processos no comunicador tenham alcan\u00e7ado esta rotina.", "synopsis": "int MPI_Barrier(MPI_Comm comm)", "params": [{"name": "comm", "desc": "Comunicador (handle)."}], "description": "Bloqueia o chamador at\u00e9 que todos os processos no comunicador a tenham chamado; ou seja, a chamada retorna em qualquer processo somente depois que todos os membros do comunicador tiverem entrado na chamada.", "application": "Usado para sincronizar processos de forma global, garantindo que nenhum processo avance al\u00e9m da barreira at\u00e9 que todos os processos do comunicador tenham alcan\u00e7ado esse ponto.", "example": "// Declara\u00e7\u00f5es\nMPI_Comm comm_barrier = MPI_COMM_WORLD; // Comunicador para a barreira\nint rank_barrier;\nint err;\n\n// Obt\u00e9m o rank do processo para prop\u00f3sitos de logging.\nMPI_Comm_rank(comm_barrier, &rank_barrier);\n\n// Ponto de sincroniza\u00e7\u00e3o: Todos os processos no comunicador 'comm_barrier' devem alcan\u00e7ar esta chamada\n// antes que qualquer um deles possa prosseguir. Isso garante que todas as opera\u00e7\u00f5es anteriores\n// em todos os processos do grupo foram conclu\u00eddas.\nerr = MPI_Barrier(comm_barrier);\n\nif (err == MPI_SUCCESS) {\n    // Todos os processos sincronizaram e podem continuar suas execu\u00e7\u00f5es.\n    // Nenhuma limpeza de recursos \u00e9 necess\u00e1ria diretamente para MPI_Barrier.\n} else {\n    // Lidar com erro na opera\u00e7\u00e3o de barreira.\n}\n"}, {"name": "MPI_Bcast", "short_desc": "Faz o broadcast de uma mensagem do processo com rank \"root\" para todos os outros processos do comunicador.", "synopsis": "int MPI_Bcast(void *buffer, int count, MPI_Datatype datatype, int root,\nMPI_Comm comm)\nint MPI_Bcast_c(void *buffer, MPI_Count count, MPI_Datatype datatype, int root,\nMPI_Comm comm)", "params": [{"name": "buffer", "desc": "Endere\u00e7o inicial do buffer de envio/recebimento."}, {"name": "count", "desc": "N\u00famero de entradas no buffer."}, {"name": "datatype", "desc": "Tipo de dados do buffer."}, {"name": "root", "desc": "Rank do processo raiz (que faz o envio do broadcast)."}, {"name": "comm", "desc": "Comunicador (handle)."}], "description": "Transmite (faz o broadcast) uma mensagem do processo com rank \"root\" para todos os processos do grupo associado ao comunicador. Ao final da chamada, o conte\u00fado do buffer raiz \u00e9 copiado para os buffers de recep\u00e7\u00e3o em todos os processos.", "application": "Distribui\u00e7\u00e3o eficiente de dados id\u00eanticos (como par\u00e2metros de configura\u00e7\u00e3o ou vari\u00e1veis globais iniciais) de um processo mestre para todos os processos do comunicador.", "example": "// Declara\u00e7\u00f5es\nint data_to_bcast; // Buffer para os dados a serem transmitidos/recebidos\nint count_bcast = 1; // N\u00famero de elementos a serem transmitidos\nMPI_Datatype datatype_bcast = MPI_INT; // Tipo de dado dos elementos\nint root_process = 0; // Rank do processo raiz que far\u00e1 o broadcast\nMPI_Comm comm_bcast = MPI_COMM_WORLD; // Comunicador\nint rank_bcast; // Rank do processo atual\nint size_bcast; // N\u00famero total de processos no comunicador\nint err;\n\n// Obt\u00e9m o rank e o tamanho do comunicador\nMPI_Comm_rank(comm_bcast, &rank_bcast);\nMPI_Comm_size(comm_bcast, &size_bcast);\n\n// O processo raiz inicializa os dados que ser\u00e3o transmitidos\nif (rank_bcast == root_process) {\n    data_to_bcast = 12345; // Valor a ser transmitido\n} else {\n    data_to_bcast = 0; // Outros processos ter\u00e3o este valor antes do Bcast (ser\u00e1 sobrescrito)\n}\n\n// Transmite (broadcast) os dados do processo raiz para todos os outros processos no comunicador.\n// Todos os processos (incluindo o raiz) chamam MPI_Bcast. Ao final da chamada, 'data_to_bcast'\n// ter\u00e1 o valor do processo raiz em todos os processos.\nerr = MPI_Bcast(&data_to_bcast, count_bcast, datatype_bcast, root_process, comm_bcast);\n\nif (err == MPI_SUCCESS) {\n    // Os dados foram broadcasted com sucesso.\n    // N\u00e3o h\u00e1 recursos espec\u00edficos para liberar diretamente de MPI_Bcast.\n} else {\n    // Lidar com erro no broadcast.\n}\n"}, {"name": "MPI_Bsend", "short_desc": "Envio b\u00e1sico com buffer fornecido pelo usu\u00e1rio.", "synopsis": "int MPI_Bsend(const void *buf, int count, MPI_Datatype datatype, int dest,\nint tag, MPI_Comm comm)\nint MPI_Bsend_c(const void *buf, MPI_Count count, MPI_Datatype datatype,\nint dest, int tag, MPI_Comm comm)", "params": [{"name": "buf", "desc": "Endere\u00e7o inicial do buffer de envio."}, {"name": "count", "desc": "N\u00famero de elementos no buffer de envio."}, {"name": "datatype", "desc": "Tipo de dados de cada elemento no buffer de envio."}, {"name": "dest", "desc": "Rank do processo de destino."}, {"name": "tag", "desc": "Etiqueta da mensagem."}, {"name": "comm", "desc": "Comunicador."}], "description": "Este envio \u00e9 fornecido como uma fun\u00e7\u00e3o de conveni\u00eancia; ele permite que o usu\u00e1rio envie mensagens sem se preocupar sobre onde elas ser\u00e3o armazenadas (pois o usu\u00e1rio deve ter fornecido espa\u00e7o de buffer com MPI_Buffer_attach).\nAo decidir quanto espa\u00e7o de buffer alocar, lembre-se de que o espa\u00e7o de buffer n\u00e3o est\u00e1 dispon\u00edvel para reutiliza\u00e7\u00e3o por chamadas subsequentes de MPI_Bsend a menos que voc\u00ea tenha certeza de que a mensagem foi recebida (n\u00e3o apenas de que ela deveria ter sido recebida).\nEm C, voc\u00ea pode for\u00e7ar a entrega das mensagens utilizando MPI_Buffer_detach seguido de MPI_Buffer_attach. O MPI_Buffer_detach n\u00e3o ser\u00e1 conclu\u00eddo at\u00e9 que todas as mensagens no buffer tenham sido entregues.", "application": "Usado quando se necessita que a fun\u00e7\u00e3o de envio retorne imediatamente e a biblioteca deve gerenciar a transfer\u00eancia futura ass\u00edncrona dos dados usando uma por\u00e7\u00e3o de mem\u00f3ria (buffer) explicitamente alocada pelo usu\u00e1rio.", "example": "// Declara\u00e7\u00f5es\nint rank_bsend;\nint size_bsend;\nint send_data = 567; // Dados a serem enviados\nint recv_data; // Buffer para receber dados\nint dest_rank = 1; // Processo de destino\nint source_rank = 0; // Processo de origem\nint tag_bsend = 100; // Etiqueta da mensagem\nMPI_Comm comm_bsend = MPI_COMM_WORLD; // Comunicador\nchar *bsend_buffer = NULL; // Ponteiro para o buffer de envio fornecido pelo usu\u00e1rio\nint bsend_buffer_size; // Tamanho do buffer de envio em bytes\nMPI_Status status_bsend; // Status da opera\u00e7\u00e3o de recep\u00e7\u00e3o\nint err;\n\n// Obt\u00e9m o rank e o tamanho do comunicador\nMPI_Comm_rank(comm_bsend, &rank_bsend);\nMPI_Comm_size(comm_bsend, &size_bsend);\n\n// Garante que h\u00e1 pelo menos 2 processos para comunica\u00e7\u00e3o bidirecional\nif (size_bsend < 2) {\n    return 1; // Retorna um c\u00f3digo de erro simples\n}\n\n// --- Configura\u00e7\u00e3o do buffer para envios bufferizados (necess\u00e1rio para MPI_Bsend) ---\n// Calcula o tamanho necess\u00e1rio para o buffer de Bsend.\n// 1. Tamanho dos dados que ser\u00e3o enviados (1 inteiro).\n// 2. Overhead adicional necess\u00e1rio para o MPI_Bsend, que o MPI usa para estruturas de controle.\nint packed_size;\nerr = MPI_Pack_size(1, MPI_INT, comm_bsend, &packed_size);\n\nif (err == MPI_SUCCESS) {\n    bsend_buffer_size = packed_size + MPI_BSEND_OVERHEAD;\n\n    // Aloca a mem\u00f3ria para o buffer de envio fornecido pelo usu\u00e1rio\n    bsend_buffer = (char *)malloc(bsend_buffer_size);\n\n    if (bsend_buffer == NULL) {\n        // Erro: falha na aloca\u00e7\u00e3o de mem\u00f3ria\n        return 1;\n    }\n\n    // Anexa o buffer ao MPI. Agora, MPI_Bsend pode ser chamado usando este buffer.\n    err = MPI_Buffer_attach(bsend_buffer, bsend_buffer_size);\n\n    if (err == MPI_SUCCESS) {\n        if (rank_bsend == source_rank) {\n            // Processo de origem envia dados usando MPI_Bsend (envio bufferizado).\n            // O MPI_Bsend copia os dados para o buffer interno e retorna imediatamente.\n            // O envio real dos dados pela rede pode ocorrer em segundo plano.\n            err = MPI_Bsend(&send_data, 1, MPI_INT, dest_rank, tag_bsend, comm_bsend);\n            if (err == MPI_SUCCESS) {\n                // Envio bufferizado iniciado com sucesso.\n            } else {\n                // Erro ao chamar MPI_Bsend.\n            }\n        } else if (rank_bsend == dest_rank) {\n            // Processo de destino recebe os dados.\n            // MPI_Recv bloquear\u00e1 at\u00e9 que a mensagem correspondente seja recebida.\n            err = MPI_Recv(&recv_data, 1, MPI_INT, source_rank, tag_bsend, comm_bsend, &status_bsend);\n            if (err == MPI_SUCCESS) {\n                // Dados recebidos com sucesso.\n            } else {\n                // Erro ao chamar MPI_Recv.\n            }\n        }\n\n        // --- Limpeza: Desanexar e liberar o buffer ---\n        // MPI_Buffer_detach bloquear\u00e1 at\u00e9 que todas as mensagens bufferizadas pendentes\n        // (enviadas via MPI_Bsend) tenham sido seguramente despachadas.\n        int detached_size; // Vari\u00e1vel para armazenar o tamanho do buffer desanexado\n        void *detached_buffer_ptr; // Vari\u00e1vel para armazenar o ponteiro para o buffer desanexado\n        err = MPI_Buffer_detach(&detached_buffer_ptr, &detached_size);\n\n        if (err == MPI_SUCCESS) {\n            // O buffer foi desanexado. 'detached_buffer_ptr' aponta para o buffer original.\n            if (detached_buffer_ptr != NULL) {\n                free(detached_buffer_ptr); // Libera a mem\u00f3ria alocada\n                detached_buffer_ptr = NULL; // Evita uso de ponteiro inv\u00e1lido\n            }\n        } else {\n            // Lidar com erro ao desanexar o buffer.\n            // Se houve erro e o buffer n\u00e3o foi desanexado, ainda precisamos liber\u00e1-lo.\n            if (bsend_buffer != NULL) {\n                 free(bsend_buffer);\n                 bsend_buffer = NULL;\n            }\n        }\n    } else {\n        // Erro ao chamar MPI_Buffer_attach. Libera o buffer alocado.\n        if (bsend_buffer != NULL) {\n            free(bsend_buffer);\n            bsend_buffer = NULL;\n        }\n    }\n} else {\n    // Erro ao chamar MPI_Pack_size.\n}\n"}, {"name": "MPI_Bsend_init", "short_desc": "Constr\u00f3i um identificador (handle) de requisi\u00e7\u00e3o para um envio em modo bufferizado.", "synopsis": "int MPI_Bsend_init(const void *buf, int count, MPI_Datatype datatype, int dest,\nint tag, MPI_Comm comm, MPI_Request *request)\nint MPI_Bsend_init_c(const void *buf, MPI_Count count, MPI_Datatype datatype,\nint dest, int tag, MPI_Comm comm, MPI_Request *request)", "params": [{"name": "buf", "desc": "Endere\u00e7o inicial do buffer de envio."}, {"name": "count", "desc": "N\u00famero de elementos enviados."}, {"name": "datatype", "desc": "Tipo de cada elemento."}, {"name": "dest", "desc": "Rank do processo de destino."}, {"name": "tag", "desc": "Etiqueta da mensagem."}, {"name": "comm", "desc": "Comunicador."}, {"name": "request", "desc": "Handle da requisi\u00e7\u00e3o de comunica\u00e7\u00e3o persistente (sa\u00edda)."}], "description": "Cria uma requisi\u00e7\u00e3o persistente para envio no modo bufferizado. Permite definir os argumentos de comunica\u00e7\u00e3o uma vez e disparar os envios recorrentes v\u00e1rias vezes via MPI_Start ou MPI_Startall sem a sobrecarga cont\u00ednua da configura\u00e7\u00e3o de inicializa\u00e7\u00e3o.", "application": "Comunica\u00e7\u00f5es repetitivas com o mesmo padr\u00e3o onde o comportamento em buffer (BSEND) precisa ser utilizado, geralmente para maximizar o overlap (sobreposi\u00e7\u00e3o) entre comunica\u00e7\u00e3o e computa\u00e7\u00e3o.", "example": "// Declara\u00e7\u00f5es\nint rank_bsend_init;\nint size_bsend_init;\nint send_data_init = 789; // Dados a serem enviados\nint recv_data_init; // Buffer para receber dados\nint dest_rank_init = 1; // Processo de destino\nint source_rank_init = 0; // Processo de origem\nint tag_init = 200; // Etiqueta da mensagem\nMPI_Comm comm_bsend_init = MPI_COMM_WORLD; // Comunicador\nMPI_Request bsend_request; // Requisi\u00e7\u00e3o persistente para MPI_Bsend_init\nMPI_Status status_bsend_init; // Status da opera\u00e7\u00e3o de comunica\u00e7\u00e3o\nchar *bsend_buffer_init = NULL; // Ponteiro para o buffer de Bsend\nint bsend_buffer_size_init; // Tamanho do buffer de Bsend\nint err;\n\n// Obt\u00e9m o rank e o tamanho do comunicador\nMPI_Comm_rank(comm_bsend_init, &rank_bsend_init);\nMPI_Comm_size(comm_bsend_init, &size_bsend_init);\n\n// Garante que h\u00e1 pelo menos 2 processos para comunica\u00e7\u00e3o\nif (size_bsend_init < 2) {\n    return 1;\n}\n\n// --- Configura\u00e7\u00e3o do buffer para envios bufferizados (necess\u00e1rio para MPI_Bsend_init) ---\n// Calcula o tamanho necess\u00e1rio para o buffer\nint packed_size_init;\nerr = MPI_Pack_size(1, MPI_INT, comm_bsend_init, &packed_size_init);\n\nif (err == MPI_SUCCESS) {\n    bsend_buffer_size_init = packed_size_init + MPI_BSEND_OVERHEAD;\n    bsend_buffer_init = (char *)malloc(bsend_buffer_size_init);\n\n    if (bsend_buffer_init == NULL) {\n        // Erro: falha na aloca\u00e7\u00e3o de mem\u00f3ria\n        return 1;\n    }\n\n    err = MPI_Buffer_attach(bsend_buffer_init, bsend_buffer_size_init);\n\n    if (err == MPI_SUCCESS) {\n        if (rank_bsend_init == source_rank_init) {\n            // Inicializa uma requisi\u00e7\u00e3o de envio bufferizado persistente.\n            // Esta chamada apenas prepara a comunica\u00e7\u00e3o; o envio n\u00e3o come\u00e7a ainda.\n            err = MPI_Bsend_init(&send_data_init, 1, MPI_INT, dest_rank_init, tag_init, comm_bsend_init, &bsend_request);\n            if (err == MPI_SUCCESS) {\n                // Inicia a comunica\u00e7\u00e3o persistente. Os dados s\u00e3o copiados para o buffer interno do MPI.\n                err = MPI_Start(&bsend_request);\n                if (err == MPI_SUCCESS) {\n                    // Espera pela conclus\u00e3o da comunica\u00e7\u00e3o. Para MPI_Bsend, isso significa que\n                    // os dados foram copiados para o buffer interno do MPI e a chamada \u00e9 localmente completa.\n                    err = MPI_Wait(&bsend_request, &status_bsend_init);\n                    if (err == MPI_SUCCESS) {\n                        // Envio persistente conclu\u00eddo com sucesso.\n                    } else {\n                        // Erro ao chamar MPI_Wait.\n                    }\n                } else {\n                    // Erro ao chamar MPI_Start.\n                }\n            } else {\n                // Erro ao chamar MPI_Bsend_init.\n            }\n        } else if (rank_bsend_init == dest_rank_init) {\n            // Processo de destino recebe os dados.\n            err = MPI_Recv(&recv_data_init, 1, MPI_INT, source_rank_init, tag_init, comm_bsend_init, &status_bsend_init);\n            if (err == MPI_SUCCESS) {\n                // Dados recebidos com sucesso.\n            } else {\n                // Erro ao chamar MPI_Recv.\n            }\n        }\n\n        // --- Limpeza ---\n        // Libera a requisi\u00e7\u00e3o persistente criada por MPI_Bsend_init.\n        // Deve ser chamada AP\u00d3S todas as opera\u00e7\u00f5es MPI_Start/MPI_Wait associadas \u00e0 requisi\u00e7\u00e3o.\n        if (rank_bsend_init == source_rank_init) {\n            err = MPI_Request_free(&bsend_request);\n            if (err != MPI_SUCCESS) {\n                // Lidar com erro na libera\u00e7\u00e3o da requisi\u00e7\u00e3o.\n            }\n        }\n\n        // Desanexa e libera o buffer do Bsend.\n        int detached_size_init;\n        void *detached_buffer_ptr_init;\n        err = MPI_Buffer_detach(&detached_buffer_ptr_init, &detached_size_init);\n\n        if (err == MPI_SUCCESS) {\n            if (detached_buffer_ptr_init != NULL) {\n                free(detached_buffer_ptr_init);\n                detached_buffer_ptr_init = NULL;\n            }\n        } else {\n            // Lidar com erro ao desanexar o buffer. Tentar liberar a mem\u00f3ria mesmo assim.\n            if (bsend_buffer_init != NULL) {\n                 free(bsend_buffer_init);\n                 bsend_buffer_init = NULL;\n            }\n        }\n    } else {\n        // Erro ao chamar MPI_Buffer_attach. Libera o buffer alocado.\n        if (bsend_buffer_init != NULL) {\n            free(bsend_buffer_init);\n            bsend_buffer_init = NULL;\n        }\n    }\n} else {\n    // Erro ao chamar MPI_Pack_size.\n}\n"}, {"name": "MPI_Buffer_attach", "short_desc": "Anexa um buffer fornecido pelo usu\u00e1rio para envio (modo bufferizado).", "synopsis": "int MPI_Buffer_attach(void *buffer, int size)\nint MPI_Buffer_attach_c(void *buffer, MPI_Count size)", "params": [{"name": "buffer", "desc": "Endere\u00e7o inicial do buffe
