r final na sua janela\nif (rank == target_rank) {\n    // printf(\"Processo %d (alvo): Valor final na janela = %d\\n\", rank, *local_data_window);\n}\n\n// Realizar limpeza do objeto de janela\nMPI_Win_free(&win);\n\n// O processo alvo libera a mem\u00f3ria alocada\nif (rank == target_rank) {\n    MPI_Free_mem(local_data_window);\n}\n"}, {"name": "MPI_Dims_create", "short_desc": "Cria uma divis\u00e3o de processos em uma grade cartesiana.", "synopsis": "int MPI_Dims_create(int nnodes, int ndims, int dims[])", "params": [{"name": "nnodes", "desc": "N\u00famero de n\u00f3s na grade (inteiro)."}, {"name": "ndims", "desc": "N\u00famero de dimens\u00f5es cartesianas (inteiro)."}, {"name": "dims", "desc": "Array de inteiros de tamanho ndims especificando o n\u00famero de n\u00f3s em cada dimens\u00e3o."}], "description": "Sugere uma distribui\u00e7\u00e3o equilibrada de processos em uma grade cartesiana de n dimens\u00f5es, com base no n\u00famero total de n\u00f3s dispon\u00edveis.", "application": "Cria\u00e7\u00e3o autom\u00e1tica de topologias de grade para algoritmos que operam em matrizes ou volumes decompostos.", "example": "// Declara\u00e7\u00f5es\nint err;\nint rank, size; // Rank e size do comunicador original\nMPI_Comm_rank(MPI_COMM_WORLD, &rank); // Obter rank para imprimir condicionalmente\n\n// Par\u00e2metros para MPI_Dims_create\nint nnodes;     // Total de processos para a grade\nint ndims = 2;  // N\u00famero de dimens\u00f5es da grade cartesiana (ex: 2D)\nint dims[2];    // Array para armazenar o n\u00famero de processos em cada dimens\u00e3o\n\n// Obter o n\u00famero total de processos (nnodes) do MPI_COMM_WORLD\nMPI_Comm_size(MPI_COMM_WORLD, &nnodes);\n\n// Inicializar o array dims. Se um elemento for 0, MPI_Dims_create ir\u00e1 determin\u00e1-lo.\n// Para um exemplo gen\u00e9rico e equilibrado, inicializamos ambos com 0.\ndims[0] = 0; // MPI ir\u00e1 determinar o tamanho da primeira dimens\u00e3o\ndims[1] = 0; // MPI ir\u00e1 determinar o tamanho da segunda dimens\u00e3o\n\n// Apenas o rank 0 precisa chamar para obter o layout, pois o resultado \u00e9 um acordo global.\nif (rank == 0) {\n    // Chamada da fun\u00e7\u00e3o MPI_Dims_create\n    err = MPI_Dims_create(nnodes, ndims, dims);\n\n    if (err == MPI_SUCCESS) {\n        // Sucesso na cria\u00e7\u00e3o das dimens\u00f5es\n        // printf(\"Para %d n\u00f3s e %d dimens\u00f5es, a grade sugerida \u00e9: %dx%d\\n\", nnodes, ndims, dims[0], dims[1]);\n\n        // Demonstra\u00e7\u00e3o com uma restri\u00e7\u00e3o: fixar uma dimens\u00e3o\n        // Resetar dims para nova tentativa\n        dims[0] = 2; // Queremos 2 processos na primeira dimens\u00e3o\n        dims[1] = 0; // A segunda dimens\u00e3o ser\u00e1 determinada por MPI\n\n        err = MPI_Dims_create(nnodes, ndims, dims);\n        if (err == MPI_SUCCESS) {\n            // printf(\"Com a primeira dimens\u00e3o fixada em 2, a grade sugerida \u00e9: %dx%d\\n\", dims[0], dims[1]);\n        } else {\n            // printf(\"Erro ao criar dimens\u00f5es com restri\u00e7\u00e3o: %d\\n\", err);\n        }\n    } else {\n        // printf(\"Erro ao criar dimens\u00f5es: %d\\n\", err);\n    }\n}\n// N\u00e3o h\u00e1 recursos MPI para liberar neste exemplo.\n"}, {"name": "MPI_Dist_graph_create", "short_desc": "Cria um novo comunicador com informa\u00e7\u00f5es de topologia de grafo distribu\u00eddo.", "synopsis": "int MPI_Dist_graph_create(MPI_Comm comm_old, int n, const int sources[], const int degrees[], const int destinations[], const int weights[], MPI_Info info, int reorder, MPI_Comm *comm_dist_graph)", "params": [{"name": "comm_old", "desc": "Comunicador de entrada (handle)."}, {"name": "n", "desc": "N\u00famero de n\u00f3s de origem para os quais este processo especifica arestas."}, {"name": "sources", "desc": "Array contendo os n n\u00f3s de origem."}, {"name": "degrees", "desc": "Array especificando o n\u00famero de destinos para cada n\u00f3 de origem."}, {"name": "destinations", "desc": "N\u00f3s de destino para cada n\u00f3 de origem."}, {"name": "weights", "desc": "Pesos para as arestas de origem para destino."}, {"name": "info", "desc": "Dicas de otimiza\u00e7\u00e3o (handle)."}, {"name": "reorder", "desc": "Se os ranks podem ser reordenados (booleano)."}, {"name": "comm_dist_graph", "desc": "Comunicador com a topologia de grafo distribu\u00eddo adicionada (handle de sa\u00edda)."}], "description": "Cria um comunicador com uma topologia de grafo onde a defini\u00e7\u00e3o das arestas \u00e9 distribu\u00edda entre os processos.", "application": "Modelagem de depend\u00eancias de comunica\u00e7\u00e3o complexas e irregulares em larga escala.", "example": "// Declara\u00e7\u00f5es\nint err;\nint rank, size; // Rank e size do comunicador original\nMPI_Comm comm_old = MPI_COMM_WORLD; // Comunicador original\nMPI_Comm comm_dist_graph = MPI_COMM_NULL; // Comunicador com topologia de grafo distribu\u00eddo\nMPI_Info info = MPI_INFO_NULL;             // Objeto de informa\u00e7\u00e3o para dicas de otimiza\u00e7\u00e3o\nint reorder = 1; // Permitir que o MPI reordene os ranks para otimiza\u00e7\u00e3o (1 = true, 0 = false)\n\n// Obter rank e size do comunicador original\nMPI_Comm_rank(comm_old, &rank);\nMPI_Comm_size(comm_old, &size);\n\n// Definir os par\u00e2metros para a topologia de grafo distribu\u00eddo.\n// Vamos criar uma topologia de anel: cada processo se conecta ao pr\u00f3ximo.\n// Cada processo define suas *pr\u00f3prias* arestas de sa\u00edda.\nint n_local_sources; // N\u00famero de n\u00f3s de origem para os quais este processo especifica arestas\nint sources[1];      // O n\u00f3 de origem \u00e9 o pr\u00f3prio processo\nint degrees[1];      // N\u00famero de destinos para este n\u00f3 de origem\nint destinations[1]; // O n\u00f3 de destino \u00e9 o pr\u00f3ximo rank no anel\nint weights[1];      // Peso da aresta de sa\u00edda\n\nif (size > 1) {\n    n_local_sources = 1;      // Cada processo \u00e9 uma origem (ele mesmo)\n    sources[0] = rank;        // A origem local \u00e9 o pr\u00f3prio processo\n    degrees[0] = 1;           // Este processo tem 1 destino\n    destinations[0] = (rank + 1) % size; // O destino \u00e9 o pr\u00f3ximo rank em um anel\n    weights[0] = 1;           // Peso da aresta (pode ser qualquer valor)\n} else { // Para um \u00fanico processo, n\u00e3o h\u00e1 arestas\n    n_local_sources = 0;\n}\n\n// Criar um objeto MPI_Info (opcional, pode ser MPI_INFO_NULL)\nMPI_Info_create(&info);\n// Exemplo de dica: MPI_Info_set(info, \"graph_algo\", \"fruchterman_reingold\");\n\n// Chamada da fun\u00e7\u00e3o MPI_Dist_graph_create\nerr = MPI_Dist_graph_create(comm_old, n_local_sources, sources, degrees, destinations, weights, info, reorder, &comm_dist_graph);\n\nif (err == MPI_SUCCESS) {\n    // Sucesso na cria\u00e7\u00e3o do comunicador com topologia de grafo\n    // 'comm_dist_graph' agora \u00e9 um novo comunicador com a topologia de anel definida.\n    if (comm_dist_graph != MPI_COMM_NULL) {\n        int new_rank, new_size;\n        MPI_Comm_rank(comm_dist_graph, &new_rank);\n        MPI_Comm_size(comm_dist_graph, &new_size);\n        // printf(\"Processo %d (original) est\u00e1 no novo comunicador de grafo distribu\u00eddo. Novo rank: %d, Novo size: %d\\n\", rank, new_rank, new_size);\n\n        // \u00c9 poss\u00edvel verificar os vizinhos usando MPI_Dist_graph_neighbors (demonstrado em outro exemplo).\n\n        // Realizar limpeza do novo comunicador\n        MPI_Comm_free(&comm_dist_graph);\n    }\n} else {\n    // printf(\"Erro ao criar o comunicador de grafo distribu\u00eddo: %d\\n\", err);\n}\n\n// Realizar limpeza do objeto MPI_Info\nMPI_Info_free(&info);\n"}, {"name": "MPI_Dist_graph_create_adjacent", "short_desc": "Cria um comunicador com topologia de grafo distribu\u00eddo usando informa\u00e7\u00f5es de vizinhan\u00e7a adjacente.", "synopsis": "int MPI_Dist_graph_create_adjacent(MPI_Comm comm_old, int indegree, const int sources[], const int sourceweights[], int outdegree, const int destinations[], const int destweights[], MPI_Info info, int reorder, MPI_Comm *comm_dist_graph)", "params": [{"name": "comm_old", "desc": "Comunicador de entrada (handle)."}, {"name": "indegree", "desc": "N\u00famero de arestas chegando neste processo."}, {"name": "sources", "desc": "Ranks dos processos que t\u00eam este processo como destino."}, {"name": "sourceweights", "desc": "Pesos das arestas de entrada."}, {"name": "outdegree", "desc": "N\u00famero de arestas saindo deste processo."}, {"name": "destinations", "desc": "Ranks dos processos para os quais este processo \u00e9 uma origem."}, {"name": "destweights", "desc": "Pesos das arestas de sa\u00edda."}, {"name": "info", "desc": "Dicas de otimiza\u00e7\u00e3o (handle)."}, {"name": "reorder", "desc": "Se os ranks podem ser reordenados (booleano)."}, {"name": "comm_dist_graph", "desc": "Comunicador com topologia de grafo distribu\u00eddo (handle de sa\u00edda)."}], "description": "Cria um comunicador de grafo distribu\u00eddo onde cada processo especifica apenas suas arestas de entrada e sa\u00edda diretas.", "application": "Defini\u00e7\u00e3o local e eficiente de topologias de comunica\u00e7\u00e3o em malhas ou grafos de grande porte.", "example": "// Declara\u00e7\u00f5es\nint err;\nint rank, size; // Rank e size do comunicador original\nMPI_Comm comm_old = MPI_COMM_WORLD; // Comunicador original\nMPI_Comm comm_dist_graph = MPI_COMM_NULL; // Comunicador com topologia de grafo distribu\u00eddo adjacente\nMPI_Info info = MPI_INFO_NULL;             // Objeto de informa\u00e7\u00e3o para dicas de otimiza\u00e7\u00e3o\nint reorder = 1; // Permitir que o MPI reordene os ranks para otimiza\u00e7\u00e3o (1 = true, 0 = false)\n\n// Obter rank e size do comunicador original\nMPI_Comm_rank(comm_old, &rank);\nMPI_Comm_size(comm_old, &size);\n\n// Definir os par\u00e2metros para a topologia de grafo adjacente.\n// Vamos criar uma topologia de anel: cada processo recebe do anterior e envia para o pr\u00f3ximo.\nint indegree;        // N\u00famero de arestas de entrada para este processo\nint sources[1];      // Ranks dos processos que t\u00eam este processo como destino\nint sourceweights[1]; // Pesos das arestas de entrada\n\nint outdegree;       // N\u00famero de arestas de sa\u00edda deste processo\nint destinations[1]; // Ranks dos processos para os quais este processo \u00e9 uma origem\nint destweights[1];  // Pesos das arestas de sa\u00edda\n\n// Para um anel, cada processo tem 1 vizinho de entrada e 1 de sa\u00edda (se size > 1)\nif (size > 1) {\n    indegree = 1;\n    sources[0] = (rank - 1 + size) % size; // Processo anterior no anel\n    sourceweights[0] = 10; // Peso da aresta de entrada\n\n    outdegree = 1;\n    destinations[0] = (rank + 1) % size; // Pr\u00f3ximo processo no anel\n    destweights[0] = 20; // Peso da aresta de sa\u00edda\n} else { // Para um \u00fanico processo, n\u00e3o h\u00e1 vizinhos\n    indegree = 0;\n    outdegree = 0;\n}\n\n// Criar um objeto MPI_Info (opcional, pode ser MPI_INFO_NULL)\nMPI_Info_create(&info);\n// Exemplo de dica: MPI_Info_set(info, \"graph_layout\", \"circular\");\n\n// Chamada da fun\u00e7\u00e3o MPI_Dist_graph_create_adjacent\nerr = MPI_Dist_graph_create_adjacent(comm_old, indegree, sources, sourceweights, outdegree, destinations, destweights, info, reorder, &comm_dist_graph);\n\nif (err == MPI_SUCCESS) {\n    // Sucesso na cria\u00e7\u00e3o do comunicador com topologia de grafo adjacente\n    // 'comm_dist_graph' agora \u00e9 um novo comunicador com a topologia de anel definida.\n    if (comm_dist_graph != MPI_COMM_NULL) {\n        int new_rank, new_size;\n        MPI_Comm_rank(comm_dist_graph, &new_rank);\n        MPI_Comm_size(comm_dist_graph, &new_size);\n        // printf(\"Processo %d (original) est\u00e1 no novo comunicador de grafo adjacente. Novo rank: %d, Novo size: %d\\n\", rank, new_rank, new_size);\n\n        // Realizar limpeza do novo comunicador\n        MPI_Comm_free(&comm_dist_graph);\n    }\n} else {\n    // printf(\"Erro ao criar o comunicador de grafo adjacente: %d\\n\", err);\n}\n\n// Realizar limpeza do objeto MPI_Info\nMPI_Info_free(&info);\n"}, {"name": "MPI_Dist_graph_neighbors", "short_desc": "Fornece informa\u00e7\u00f5es de adjac\u00eancia para uma topologia de grafo distribu\u00eddo.", "synopsis": "int MPI_Dist_graph_neighbors(MPI_Comm comm, int maxindegree, int sources[], int sourceweights[], int maxoutdegree, int destinations[], int destweights[])", "params": [{"name": "comm", "desc": "Comunicador com topologia de grafo distribu\u00eddo (handle)."}, {"name": "maxindegree", "desc": "Tamanho dos arrays de entrada (inteiro)."}, {"name": "maxoutdegree", "desc": "Tamanho dos arrays de sa\u00edda (inteiro)."}, {"name": "sources", "desc": "Processos de origem (sa\u00edda)."}, {"name": "sourceweights", "desc": "Pesos das arestas de entrada (sa\u00edda)."}, {"name": "destinations", "desc": "Processos de destino (sa\u00edda)."}, {"name": "destweights", "desc": "Pesos das arestas de sa\u00edda (sa\u00edda)."}], "description": "Recupera as informa\u00e7\u00f5es de vizinhos (arestas de entrada e sa\u00edda) para o processo chamador em uma topologia de grafo distribu\u00eddo.", "application": "Consulta de topologia para implementa\u00e7\u00e3o de algoritmos de troca de mensagens baseados em grafos.", "example": "// Declara\u00e7\u00f5es\nint err;\nint rank, size; // Rank e size do comunicador original\nMPI_Comm comm_old = MPI_COMM_WORLD;\nMPI_Comm comm_dist_graph = MPI_COMM_NULL; // Comunicador com topologia de grafo distribu\u00eddo\n\n// Obter rank e size do comunicador original\nMPI_Comm_rank(comm_old, &rank);\nMPI_Comm_size(comm_old, &size);\n\n// Primeiro, precisamos criar um comunicador com topologia de grafo distribu\u00eddo.\n// Usaremos MPI_Dist_graph_create_adjacent para um exemplo de anel.\nint indegree_create, outdegree_create;\nint sources_create[1], sourceweights_create[1];\nint destinations_create[1], destweights_create[1];\nMPI_Info info_create = MPI_INFO_NULL;\nint reorder_create = 1;\n\nif (size > 1) {\n    indegree_create = 1;\n    sources_create[0] = (rank - 1 + size) % size;\n    sourceweights_create[0] = 10;\n\n    outdegree_create = 1;\n    destinations_create[0] = (rank + 1) % size;\n    destweights_create[0] = 20;\n} else {\n    indegree_create = 0;\n    outdegree_create = 0;\n}\n\n// Criar o comunicador de grafo distribu\u00eddo\nerr = MPI_Dist_graph_create_adjacent(comm_old, indegree_create, sources_create, sourceweights_create,\n                                     outdegree_create, destinations_create, destweights_create,\n                                     info_create, reorder_create, &comm_dist_graph);\n\nif (err == MPI_SUCCESS && comm_dist_graph != MPI_COMM_NULL) {\n    // O comunicador de grafo foi criado com sucesso.\n    // Agora, vamos recuperar as informa\u00e7\u00f5es dos vizinhos usando MPI_Dist_graph_neighbors.\n\n    int indegree_count, outdegree_count, weighted_count;\n    // Primeiro, descobrir o n\u00famero de vizinhos para alocar os arrays corretamente.\n    err = MPI_Dist_graph_neighbors_count(comm_dist_graph, &indegree_count, &outdegree_count, &weighted_count);\n\n    if (err == MPI_SUCCESS) {\n        // Declara\u00e7\u00f5es para os resultados de MPI_Dist_graph_neighbors\n        // Alocar os arrays com base nos tamanhos retornados. Usa malloc para ser flex\u00edvel.\n        int *sources = (int*) malloc(indegree_count * sizeof(int));\n        int *sourceweights = (int*) malloc(indegree_count * sizeof(int));\n        int *destinations = (int*) malloc(outdegree_count * sizeof(int));\n        int *destweights = (int*) malloc(outdegree_count * sizeof(int));\n\n        // Checar por falhas na aloca\u00e7\u00e3o de mem\u00f3ria\n        if (!sources || !sourceweights || !destinations || !destweights) {\n            // printf(\"Processo %d: Erro na aloca\u00e7\u00e3o de mem\u00f3ria para vizinhos.\\n\", rank);\n            // Libere qualquer mem\u00f3ria j\u00e1 alocada antes de sair, se necess\u00e1rio.\n            free(sources); free(sourceweights); free(destinations); free(destweights);\n            err = MPI_ERR_OTHER; // Sinaliza um erro gen\u00e9rico\n        } else {\n            // Chamada da fun\u00e7\u00e3o MPI_Dist_graph_neighbors\n            err = MPI_Dist_graph_neighbors(comm_dist_graph, indegree_count, sources, sourceweights,\n                                           outdegree_count, destinations, destweights);\n\n            if (err == MPI_SUCCESS) {\n                // Sucesso na recupera\u00e7\u00e3o das informa\u00e7\u00f5es dos vizinhos.\n                // printf(\"Processo %d: Vizinhos - Entrada (%d): \", rank, indegree_count);\n                // for (int i = 0; i < indegree_count; ++i) {\n                //     printf(\"%d (peso: %d)%s\", sources[i], weighted_count ? sourceweights[i] : 0, (i == indegree_count - 1) ? \"\" : \", \");\n                // }\n                // printf(\"; Sa\u00edda (%d): \", outdegree_count);\n                // for (int i = 0; i < outdegree_count; ++i) {\n                //     printf(\"%d (peso: %d)%s\", destinations[i], weighted_count ? destweights[i] : 0, (i == outdegree_count - 1) ? \"\" : \", \");\n                // }\n                // printf(\"\\n\");\n            } else {\n                // printf(\"Processo %d: Erro ao obter vizinhos do grafo distribu\u00eddo: %d\\n\", rank, err);\n            }\n        }\n\n        // Realizar limpeza de mem\u00f3ria alocada dinamicamente\n        free(sources);\n        free(sourceweights);\n        free(destinations);\n        free(destweights);\n\n    } else {\n        // printf(\"Processo %d: Erro ao contar vizinhos do grafo distribu\u00eddo: %d\\n\", rank, err);\n    }\n\n    // Realizar limpeza do comunicador de grafo\n    MPI_Comm_free(&comm_dist_graph);\n} else {\n    // printf(\"Processo %d: Erro ao criar o comunicador de grafo distribu\u00eddo para teste de vizinhos: %d\\n\", rank, err);\n}\n"}, {"name": "MPI_Dist_graph_neighbors_count", "short_desc": "Fornece o n\u00famero de vizinhos em uma topologia de grafo distribu\u00eddo.", "synopsis": "int MPI_Dist_graph_neighbors_count(MPI_Comm comm, int *indegree, int *outdegree, int *weighted)", "params": [{"name": "comm", "desc": "Comunicador com topologia de grafo distribu\u00eddo (handle)."}, {"name": "indegree", "desc": "N\u00famero de arestas de entrada (inteiro de sa\u00edda)."}, {"name": "outdegree", "desc": "N\u00famero de arestas de sa\u00edda (inteiro de sa\u00edda)."}, {"name": "weighted", "desc": "Indica se a topologia possui pesos (booleano de sa\u00edda)."}], "description": "Retorna a quantidade de arestas de entrada e sa\u00edda associadas ao processo chamador em um grafo distribu\u00eddo.", "application": "Determina\u00e7\u00e3o pr\u00e9via do tamanho dos buffers necess\u00e1rios para armazenar informa\u00e7\u00f5es de vizinhan\u00e7a.", "example": "// Declara\u00e7\u00f5es\nint err;\nint rank, size; // Rank e size do comunicador original\nMPI_Comm comm_old = MPI_COMM_WORLD;\nMPI_Comm comm_dist_graph = MPI_COMM_NULL; // Comunicador com topologia de grafo distribu\u00eddo\n\n// Par\u00e2metros de sa\u00edda da fun\u00e7\u00e3o MPI_Dist_graph_neighbors_count\nint indegree;  // N\u00famero de arestas de entrada para este processo\nint outdegree; // N\u00famero de arestas de sa\u00edda deste processo\nint weighted;  // Indica se a topologia possui pesos (1 = true, 0 = false)\n\n// Obter rank e size do comunicador original\nMPI_Comm_rank(comm_old, &rank);\nMPI_Comm_size(comm_old, &size);\n\n// Primeiro, precisamos criar um comunicador com topologia de grafo distribu\u00eddo.\n// Usaremos MPI_Dist_graph_create_adjacent para um exemplo de anel.\nint indegree_create, outdegree_create;\nint sources_create[1], sourceweights_create[1];\nint destinations_create[1], destweights_create[1];\nMPI_Info info_create = MPI_INFO_NULL; // MPI_INFO_NULL \u00e9 v\u00e1lido para este exemplo\nint reorder_create = 1; // Permitir reordenamento\n\nif (size > 1) {\n    indegree_create = 1;\n    sources_create[0] = (rank - 1 + size) % size;\n    sourceweights_create[0] = 10; // Aresta de entrada com peso\n\n    outdegree_create = 1;\n    destinations_create[0] = (rank + 1) % size;\n    destweights_create[0] = 20; // Aresta de sa\u00edda com peso\n} else {\n    indegree_create = 0;\n    outdegree_create = 0;\n}\n\n// Criar o comunicador de grafo distribu\u00eddo\nerr = MPI_Dist_graph_create_adjacent(comm_old, indegree_create, sources_create, sourceweights_create,\n                                     outdegree_create, destinations_create, destweights_create,\n                                     info_create, reorder_create, &comm_dist_graph);\n\nif (err == MPI_SUCCESS && comm_dist_graph != MPI_COMM_NULL) {\n    // O comunicador de grafo foi criado com sucesso.\n    // Agora, vamos contar os vizinhos usando MPI_Dist_graph_neighbors_count.\n\n    // Chamada da fun\u00e7\u00e3o MPI_Dist_graph_neighbors_count\n    err = MPI_Dist_graph_neighbors_count(comm_dist_graph, &indegree, &outdegree, &weighted);\n\n    if (err == MPI_SUCCESS) {\n        // Sucesso na contagem dos vizinhos.\n        // printf(\"Processo %d: Indegree = %d, Outdegree = %d, Weighted = %s\\n\", rank, indegree, outdegree, weighted ? \"true\" : \"false\");\n    } else {\n        // printf(\"Processo %d: Erro ao contar vizinhos do grafo distribu\u00eddo: %d\\n\", rank, err);\n    }\n\n    // Realizar limpeza do comunicador de grafo\n    MPI_Comm_free(&comm_dist_graph);\n} else {\n    // printf(\"Processo %d: Erro ao criar o comunicador de grafo distribu\u00eddo para teste de contagem de vizinhos: %d\\n\", rank, err);\n}\n"}, {"name": "MPI_Errhandler_create", "short_desc": "Cria um manipulador de erros no estilo MPI (Removida no MPI-2).", "synopsis": "int MPI_Errhandler_create(MPI_Comm_errhandler_function *comm_errhandler_fn, MPI_Errhandler *errhandler)", "params": [{"name": "comm_errhandler_fn", "desc": "Procedimento de tratamento de erro definido pelo usu\u00e1rio (fun\u00e7\u00e3o)."}, {"name": "errhandler", "desc": "Manipulador de erros MPI (handle)."}], "description": "Cria um manipulador de erros que pode ser associado a comunicadores. Esta rotina foi marcada como removida no padr\u00e3o MPI. Os usu\u00e1rios devem utilizar a rotina de substitui\u00e7\u00e3o `MPI_Comm_create_errhandler`. O manipulador criado pode ser usado para capturar e processar erros ocorridos durante chamadas MPI.", "application": "Gerenciamento customizado de erros em aplica\u00e7\u00f5es MPI legadas.", "example": "// Declara\u00e7\u00f5es\n// Defini\u00e7\u00e3o da fun\u00e7\u00e3o de tratamento de erro personalizada.\n// Esta assinatura \u00e9 compat\u00edvel com MPI_Errhandler_create.\nvoid my_custom_errhandler_create_fn(MPI_Comm *comm_ptr, int *error_code_ptr, ...) {\n    // Em um manipulador de erro real, voc\u00ea registraria o erro ou\n    // decidiria se o programa deve abortar ou tentar se recuperar.\n    // Para este exemplo, apenas demonstramos que a fun\u00e7\u00e3o seria invocada\n    // se um erro ocorresse e o handler estivesse ativo.\n    // Ex: MPI_Abort(*comm_ptr, *error_code_ptr);\n}\n\nMPI_Comm_errhandler_function* comm_err_fn_ptr = my_custom_errhandler_create_fn; // Ponteiro para a fun\u00e7\u00e3o\nMPI_Errhandler new_errhandler = MPI_ERRHANDLER_NULL; // Novo manipulador de erro\nMPI_Errhandler old_errhandler_create = MPI_ERRHANDLER_NULL; // Para guardar o manipulador antigo\nMPI_Comm current_comm_create = MPI_COMM_WORLD; // Comunicador de exemplo\nint err; // Vari\u00e1vel para armazenar o retorno das fun\u00e7\u00f5es MPI\n\n// Cria um novo manipulador de erros usando a fun\u00e7\u00e3o personalizada\nerr = MPI_Errhandler_create(comm_err_fn_ptr, &new_errhandler);\n\nif (err == MPI_SUCCESS) {\n    // Guarda o manipulador de erros atual do comunicador antes de substitu\u00ed-lo\n    // (Isso \u00e9 uma boa pr\u00e1tica para restaurar depois, se necess\u00e1rio)\n    err = MPI_Comm_get_errhandler(current_comm_create, &old_errhandler_create); // Usando a rotina de substitui\u00e7\u00e3o\n    if (err == MPI_SUCCESS) {\n        // Associa o manipulador de erros rec\u00e9m-criado ao comunicador MPI_COMM_WORLD\n        err = MPI_Comm_set_errhandler(current_comm_create, new_errhandler); // Usando a rotina de substitui\u00e7\u00e3o\n        if (err == MPI_SUCCESS) {\n            // Neste ponto, qualquer erro em opera\u00e7\u00f5es MPI no current_comm_create\n            // invocaria 'my_custom_errhandler_create_fn'.\n            // Exemplo de uma opera\u00e7\u00e3o que pode falhar (com um rank inv\u00e1lido para demonstrar):\n            // int data = 0;\n            // MPI_Send(&data, 1, MPI_INT, -1, 0, current_comm_create); // Isso causaria um erro\n\n            // Depois do uso, restaura o manipulador de erros original\n            err = MPI_Comm_set_errhandler(current_comm_create, old_errhandler_create); // Usando a rotina de substitui\u00e7\u00e3o\n            if (err != MPI_SUCCESS) { /* tratamento de erro */ }\n        }\n    }\n}\n\n// Libera o manipulador de erros criado\nif (new_errhandler != MPI_ERRHANDLER_NULL) { // Verifica se foi criado com sucesso antes de liberar\n    err = MPI_Errhandler_free(&new_errhandler);\n    if (err != MPI_SUCCESS) { /* tratamento de erro */ }\n}\n"}, {"name": "MPI_Errhandler_free", "short_desc": "Libera um manipulador de erros MPI.", "synopsis": "int MPI_Errhandler_free(MPI_Errhandler *errhandler)", "params": [{"name": "errhandler", "desc": "Manipulador de erros MPI a ser liberado (handle)."}], "description": "Marca o manipulador de erros associado a `errhandler` para desaloca\u00e7\u00e3o e define `errhandler` como `MPI_ERRHANDLER_NULL`. O manipulador de erros real s\u00f3 ser\u00e1 liberado quando n\u00e3o houver mais objetos (como comunicadores) referenciando-o.", "application": "Limpeza de recursos ap\u00f3s o uso de manipuladores de erro customizados.", "example": "// Declara\u00e7\u00f5es\n// Defini\u00e7\u00e3o de uma fun\u00e7\u00e3o de tratamento de erro simples para demonstra\u00e7\u00e3o.\nvoid my_custom_errhandler_free_fn(MPI_Comm *comm_ptr, int *error_code_ptr, ...) {\n    // Este manipulador apenas demonstra que a fun\u00e7\u00e3o seria chamada.\n    // Em produ\u00e7\u00e3o, ele lidaria com o erro de forma apropriada.\n}\n\nMPI_Comm_errhandler_function* comm_err_fn_ptr_free = my_custom_errhandler_free_fn;\nMPI_Errhandler custom_errhandler = MPI_ERRHANDLER_NULL; // Manipulador de erro a ser liberado\nMPI_Errhandler old_errhandler_free = MPI_ERRHANDLER_NULL; // Para guardar o manipulador antigo\nMPI_Comm current_comm_free = MPI_COMM_WORLD; // Comunicador de exemplo\nint err; // Vari\u00e1vel para armazenar o retorno das fun\u00e7\u00f5es MPI\n\n// Cria um manipulador de erros para demonstrar MPI_Errhandler_free\nerr = MPI_Errhandler_create(comm_err_fn_ptr_free, &custom_errhandler);\n\nif (err == MPI_SUCCESS) {\n    // Guarda o manipulador atual antes de associar o novo\n    err = MPI_Comm_get_errhandler(current_comm_free, &old_errhandler_free); // Usando a rotina de substitui\u00e7\u00e3o\n    if (err == MPI_SUCCESS) {\n        // Associa o manipulador criado ao comunicador\n        err = MPI_Comm_set_errhandler(current_comm_free, custom_errhandler); // Usando a rotina de substitui\u00e7\u00e3o\n        if (err == MPI_SUCCESS) {\n            // O manipulador de erros 'custom_errhandler' est\u00e1 agora em uso.\n            // ... (uso do comunicador com o handler personalizado) ...\n\n            // Antes de liberar, \u00e9 uma boa pr\u00e1tica restaurar o handler original ou um padr\u00e3o.\n            err = MPI_Comm_set_errhandler(current_comm_free, old_errhandler_free); // Usando a rotina de substitui\u00e7\u00e3o\n            if (err != MPI_SUCCESS) { /* tratamento de erro */ }\n        }\n    }\n}\n\n// Libera o manipulador de erros. Ap\u00f3s esta chamada, custom_errhandler ser\u00e1 MPI_ERRHANDLER_NULL.\n// O manipulador real s\u00f3 \u00e9 desalocado quando n\u00e3o \u00e9 mais referenciado por nenhum objeto MPI.\nif (custom_errhandler != MPI_ERRHANDLER_NULL) {\n    err = MPI_Errhandler_free(&custom_errhandler);\n    if (err == MPI_SUCCESS) {\n        // O manipulador custom_errhandler agora \u00e9 MPI_ERRHANDLER_NULL.\n    }\n}\n"}, {"name": "MPI_Errhandler_get", "short_desc": "Obt\u00e9m o manipulador de erros de um comunicador (Removida no MPI-2).", "synopsis": "int MPI_Errhandler_get(MPI_Comm comm, MPI_Errhandler *errhandler)", "params": [{"name": "comm", "desc": "Comunicador (handle)."}, {"name": "errhandler", "desc": "Manipulador de erros atualmente associado ao comunicador (handle)."}], "description": "Retorna o manipulador de erros atualmente associado ao comunicador especificado. Esta rotina foi removida no padr\u00e3o MPI atual; a substituta recomendada \u00e9 `MPI_Comm_get_errhandler`.", "application": "Inspe\u00e7\u00e3o do estado de tratamento de erro de um comunicador em sistemas legados.", "example": "// Declara\u00e7\u00f5es\nMPI_Errhandler retrieved_errhandler = MPI_ERRHANDLER_NULL; // Manipulador de erros retornado\nMPI_Comm target_comm_get = MPI_COMM_WORLD; // Comunicador de exemplo\nint err; // Vari\u00e1vel para armazenar o retorno das fun\u00e7\u00f5es MPI\n\n// Obt\u00e9m o manipulador de erros atualmente associado a MPI_COMM_WORLD\nerr = MPI_Errhandler_get(target_comm_get, &retrieved_errhandler);\n\nif (err == MPI_SUCCESS) {\n    // 'retrieved_errhandler' agora cont\u00e9m o manipulador de erros ativo para target_comm_get.\n    // Pode ser um dos manipuladores padr\u00e3o (MPI_ERRORS_ARE_FATAL, MPI_ERRORS_RETURN)\n    // ou um manipulador personalizado. N\u00e3o h\u00e1 necessidade de liberar 'retrieved_errhandler'\n    // aqui, pois ele \u00e9 apenas um handle para um objeto existente, n\u00e3o uma nova aloca\u00e7\u00e3o.\n    //\n    // Exemplo de verifica\u00e7\u00e3o do manipulador obtido:\n    // if (retrieved_errhandler == MPI_ERRORS_ARE_FATAL) {\n    //     // O manipulador de erros \u00e9 o padr\u00e3o que aborta o programa em caso de erro.\n    // }\n}\n"}, {"name": "MPI_Errhandler_set", "short_desc": "Define o manipulador de erros de um comunicador (Removida no MPI-2).", "synopsis": "int MPI_Errhandler_set(MPI_Comm comm, MPI_Errhandler errhandler)", "params": [{"name": "comm", "desc": "Comunicador (handle)."}, {"name": "errhandler", "desc": "Novo manipulador de erros para o comunicador (handle)."}], "description": "Associa um novo manipulador de erros a um comunicador. Esta rotina foi removida no padr\u00e3o MPI atual; a substituta recomendada \u00e9 `MPI_Comm_set_errhandler`.", "application": "Altera\u00e7\u00e3o da pol\u00edtica de tratamento de erros em tempo de execu\u00e7\u00e3o para aplica\u00e7\u00f5es legadas.", "example": "// Declara\u00e7\u00f5es\nMPI_Errhandler old_errhandler_set = MPI_ERRHANDLER_NULL; // Para guardar o manipulador de erros anterior\nMPI_Errhandler new_errhandler_to_set = MPI_ERRORS_RETURN; // O novo manipulador de erros a ser definido\nMPI_Comm target_comm_set = MPI_COMM_WORLD; // Comunicador de exemplo\nint err; // Vari\u00e1vel para armazenar o retorno das fun\u00e7\u00f5es MPI\n\n// 1. Opcional, mas boa pr\u00e1tica: obter o manipulador de erros atual para restaurar depois.\nerr = MPI_Errhandler_get(target_comm_set, &old_errhandler_set);\n\nif (err == MPI_SUCCESS) {\n    // 2. Associa o novo manipulador de erros (neste caso, MPI_ERRORS_RETURN) ao comunicador.\n    // Com MPI_ERRORS_RETURN, as chamadas MPI retornar\u00e3o um c\u00f3digo de erro em vez de abortar.\n    err = MPI_Errhandler_set(target_comm_set, new_errhandler_to_set);\n\n    if (err == MPI_SUCCESS) {\n        // Agora, qualquer erro em opera\u00e7\u00f5es MPI no target_comm_set retornar\u00e1 um c\u00f3digo de erro\n        // para 'err' em vez de fazer o programa abortar ou invocar um handler fatal.\n        // Exemplo de uma opera\u00e7\u00e3o que poderia falhar (com rank inv\u00e1lido):\n        // int data_send = 123;\n        // int receive_buffer;\n        // int invalid_rank = -1; // Rank inv\u00e1lido\n        // err = MPI_Sendrecv(&data_send, 1, MPI_INT, invalid_rank, 0,\n        //                    &receive_buffer, 1, MPI_INT, invalid_rank, 0,\n        //                    target_comm_set, MPI_STATUS_IGNORE);\n        // if (err != MPI_SUCCESS) {\n        //     // O erro foi retornado e pode ser tratado aqui.\n        //     // char error_string[MPI_MAX_ERROR_STRING];\n        //     // int resultlen;\n        //     // MPI_Error_string(err, error_string, &resultlen);\n        //     // (A string de erro estaria dispon\u00edvel aqui)\n        // }\n\n        // 3. Ap\u00f3s o uso, restaura o manipulador de erros original\n        // para garantir que o comportamento padr\u00e3o do comunicador seja mantido.\n        err = MPI_Errhandler_set(target_comm_set, old_errhandler_set);\n        if (err != MPI_SUCCESS) { /* tratamento de erro */ }\n    }\n}\n// N\u00e3o h\u00e1 recursos MPI alocados que precisem ser liberados especificamente para esta fun\u00e7\u00e3o.\n"}, {"name": "MPI_Error_class", "short_desc": "Converte um c\u00f3digo de erro em uma classe de erro.", "synopsis": "int MPI_Error_class(int errorcode, int *errorclass)", "params": [{"name": "errorcode", "desc": "C\u00f3digo de erro retornado por uma rotina MPI (inteiro)."}, {"name": "errorclass", "desc": "Classe de erro associada ao c\u00f3digo (inteiro)."}], "description": "Mapeia c\u00f3digos de erro espec\u00edficos da implementa\u00e7\u00e3o para um conjunto padronizado de classes de erro MPI. Isso permite que as aplica\u00e7\u00f5es tratem erros de forma port\u00e1til, independentemente da implementa\u00e7\u00e3o MPI espec\u00edfica utilizada.", "application": "Tratamento de erros port\u00e1til e diagn\u00f3stico de falhas.", "example": "// Declara\u00e7\u00f5es\nint simulated_error_code; // C\u00f3digo de erro de uma opera\u00e7\u00e3o MPI\nint error_class; // Classe de erro resultante\nint rank_dummy_err_class; // Vari\u00e1vel dummy para a chamada a MPI_Comm_rank\nint err; // Vari\u00e1vel para armazenar o retorno das fun\u00e7\u00f5es MPI\n\n// Simula uma chamada MPI que resultaria em um erro.\n// MPI_COMM_NULL \u00e9 um comunicador inv\u00e1lido, ent\u00e3o MPI_Comm_rank falhar\u00e1.\n// Assegura que o manipulador de erro padr\u00e3o do comunicador retorne o erro.\nMPI_Errhandler old_errhandler_err_class = MPI_ERRHANDLER_NULL;\nerr = MPI_Comm_get_errhandler(MPI_COMM_WORLD, &old_errhandler_err_class);\nif (err == MPI_SUCCESS) {\n    MPI_Comm_set_errhandler(MPI_COMM_WORLD, MPI_ERRORS_RETURN);\n}\n\n// Tenta uma opera\u00e7\u00e3o que certamente falhar\u00e1 para obter um c\u00f3digo de erro real.\nerr = MPI_Comm_rank(MPI_COMM_NULL, &rank_dummy_err_class);\n\n// Se a opera\u00e7\u00e3o falhou (o que esperamos neste caso)\nif (err != MPI_SUCCESS) {\n    simulated_error_code = err; // Usa o c\u00f3digo de erro retornado pela chamada falha\n\n    // Obt\u00e9m a classe de erro para o c\u00f3digo de erro simulado\n    err = MPI_Error_class(simulated_error_code, &error_class);\n\n    if (err == MPI_SUCCESS) {\n        // Agora 'error_class' cont\u00e9m a classe de erro (ex: MPI_ERR_COMM, MPI_ERR_TYPE).\n        // Podemos usar isso para tratamento de erros gen\u00e9rico.\n        // if (error_class == MPI_ERR_COMM) {\n        //     // A classe de erro indica um problema com o comunicador.\n        // } else {\n        //     // \u00c9 outro tipo de erro.\n        // }\n    }\n}\n\n// Restaura o manipulador de erro original do comunicador.\nif (old_errhandler_err_class != MPI_ERRHANDLER_NULL) {\n    MPI_Comm_set_errhandler(MPI_COMM_WORLD, old_errhandler_err_class);\n}\n"}, {"name": "MPI_Error_string", "short_desc": "Retorna uma string descritiva para um determinado c\u00f3digo de erro.", "synopsis": "int MPI_Error_string(int errorcode, char *string, int *resultlen)", "params": [{"name": "errorcode", "desc": "C\u00f3digo de erro retornado por uma rotina MPI (inteiro)."}, {"name": "string", "desc": "Texto correspondente ao c\u00f3digo de erro (string)."}, {"name": "resultlen", "desc": "Comprimento da string retornada (inteiro)."}], "description": "Fornece uma representa\u00e7\u00e3o textual leg\u00edvel por humanos para qualquer c\u00f3digo de erro MPI. O buffer fornecido para `string` deve ter pelo menos `MPI_MAX_ERROR_STRING` caracteres.", "application": "Registro (logging) de erros e exibi\u00e7\u00e3o de mensagens de diagn\u00f3stico para o usu\u00e1rio.", "example": "// Declara\u00e7\u00f5es\nint specific_error_code = MPI_ERR_TYPE; // Um c\u00f3digo de erro MPI de exemplo (tipo de dado inv\u00e1lido)\nchar error_message[MPI_MAX_ERROR_STRING]; // Buffer para a string de erro\nint result_length; // Comprimento da string retornada\nint err; // Vari\u00e1vel para armazenar o retorno das fun\u00e7\u00f5es MPI\n\n// Obt\u00e9m a representa\u00e7\u00e3o textual do c\u00f3digo de erro\nerr = MPI_Error_string(specific_error_code, error_message, &result_length);\n\nif (err == MPI_SUCCESS) {\n    // 'error_message' agora cont\u00e9m uma descri\u00e7\u00e3o leg\u00edvel do erro.\n    // 'result_length' cont\u00e9m o comprimento real da string (excluindo o terminador nulo).\n    // Exemplo: error_message poderia conter \"Invalid datatype\".\n    //\n    // Tamb\u00e9m \u00e9 poss\u00edvel obter a string para um erro real de uma opera\u00e7\u00e3o MPI.\n    // int rank_check;\n    // MPI_Errhandler old_errhandler_err_string = MPI_ERRHANDLER_NULL;\n    // MPI_Comm_get_errhandler(MPI_COMM_WORLD, &old_errhandler_err_string);\n    // MPI_Comm_set_errhandler(MPI_COMM_WORLD, MPI_ERRORS_RETURN);\n    // err = MPI_Comm_rank(MPI_COMM_NULL, &rank_check); // Tentar com um comunicador inv\u00e1lido\n    // if (err != MPI_SUCCESS) {\n    //     MPI_Error_string(err, error_message, &result_length);\n    //     // (A string de erro para MPI_ERR_COMM estaria dispon\u00edvel aqui)\n    // }\n    // MPI_Comm_set_errhandler(MPI_COMM_WORLD, old_errhandler_err_string);\n}\n"}, {"name": "MPI_Exscan", "short_desc": "Computa um scan exclusivo (redu\u00e7\u00f5es parciais) em uma cole\u00e7\u00e3o de processos.", "synopsis": "int MPI_Exscan(const void *sendbuf, void *recvbuf, int count, MPI_Datatype datatype, MPI_Op op, MPI_Comm comm)", "params": [{"name": "sendbuf", "desc": "Endere\u00e7o inicial do buffer de envio (escolha)."}, {"name": "recvbuf", "desc": "Endere\u00e7o inicial do buffer de recebimento (escolha)."}, {"name": "count", "desc": "N\u00famero de elementos no buffer de entrada (inteiro n\u00e3o negativo)."}, {"name": "datatype", "desc": "Tipo de dados dos elementos (handle)."}, {"name": "op", "desc": "Opera\u00e7\u00e3o de redu\u00e7\u00e3o (handle)."}, {"name": "comm", "desc": "Intra-comunicador (handle)."}], "description": "Semelhante ao `MPI_Scan`, mas o resultado no processo *i* cont\u00e9m a redu\u00e7\u00e3o parcial dos processos 0 at\u00e9 *i-1*. O valor no processo 0 \u00e9 indefinido (ou n\u00e3o alterado) no buffer de recebimento.", "application": "C\u00e1lculo de offsets globais onde cada processo precisa saber a soma de todos os anteriores, excluindo a si mesmo.", "example": "// Declara\u00e7\u00f5es\nint rank_exscan; // Rank do processo\nint size_exscan; // N\u00famero total de processos\nint send_value; // Valor que cada processo envia para a opera\u00e7\u00e3o Exscan\nint recv_value = 0; // Valor recebido por cada processo (resultado da Exscan), inicializado\nint count = 1; // N\u00famero de elementos\nMPI_Datatype datatype = MPI_INT; // Tipo de dados\nMPI_Op op = MPI_SUM; // Opera\u00e7\u00e3o de redu\u00e7\u00e3o (soma)\nMPI_Comm comm_exscan = MPI_COMM_WORLD; // Comunicador\nint err; // Vari\u00e1vel para armazenar o retorno das fun\u00e7\u00f5es MPI\n\n// Obt\u00e9m o rank e o tamanho do comunicador para usar no exemplo\nerr = MPI_Comm_rank(comm_exscan, &rank_exscan);\nif (err != MPI_SUCCESS) { /* tratamento de erro */ }\nerr = MPI_Comm_size(comm_exscan, &size_exscan);\nif (err != MPI_SUCCESS) { /* tratamento de erro */ }\n\n// Cada processo envia seu rank como valor.\nsend_value = rank_exscan;\n\n// Realiza a opera\u00e7\u00e3o MPI_Exscan.\n// O processo 'i' recebe a redu\u00e7\u00e3o de todos os processos de 0 at\u00e9 'i-1'.\n// O buffer de recebimento do processo 0 n\u00e3o \u00e9 alterado e mant\u00e9m o valor inicial.\nerr = MPI_Exscan(&send_value, &recv_value, count, datatype, op, comm_exscan);\n\nif (err == MPI_SUCCESS) {\n    // Exemplos de resultados com send_value = rank_exscan:\n    // Se rank = 0: recv_value permanece 0 (valor inicial, n\u00e3o \u00e9 modificado por Exscan)\n    // Se rank = 1: recv_value = 0 (soma do rank 0)\n    // Se rank = 2: recv_value = 0 + 1 = 1 (soma dos ranks 0 e 1)\n    // Se rank = 3: recv_value = 0 + 1 + 2 = 3 (soma dos ranks 0, 1 e 2)\n    // e assim por diante.\n}\n"}, {"name": "MPI_Fetch_and_op", "short_desc": "Executa uma opera\u00e7\u00e3o at\u00f4mica de leitura-modifica\u00e7\u00e3o-escrita unidirecional.", "synopsis": "int MPI_Fetch_and_op(const void *origin_addr, void *result_addr, MPI_Datatype datatype, int target_rank, MPI_Aint target_disp, MPI_Op op, MPI_Win win)", "params": [{"name": "origin_addr", "desc": "Endere\u00e7o inicial do buffer de origem (escolha)."}, {"name": "result_addr", "desc": "Endere\u00e7o inicial do buffer de resultado (escolha)."}, {"name": "datatype", "desc": "Tipo de dados no buffer (handle)."}, {"name": "target_rank", "desc": "Rank do alvo (inteiro n\u00e3o negativo)."}, {"name": "target_disp", "desc": "Deslocamento no alvo (inteiro n\u00e3o negativo)."}, {"name": "op", "desc": "Opera\u00e7\u00e3o de redu\u00e7\u00e3o (handle)."}, {"name": "win", "desc": "Objeto de janela (handle)."}], "description": "Combina as opera\u00e7\u00f5es de envio e recebimento em uma \u00fanica opera\u00e7\u00e3o at\u00f4mica. O valor original no alvo \u00e9 retornado em `result_addr`, e a opera\u00e7\u00e3o `op` \u00e9 aplicada entre `origin_addr` e o valor no alvo.", "application": "Implementa\u00e7\u00e3o de sem\u00e1foros, contadores compartilhados e algoritmos de sincroniza\u00e7\u00e3o fine-grained em RMA.", "example": "// Declara\u00e7\u00f5es\nint rank_fop, size_fop; // Rank e tamanho do processo\nint *shared_data_local_ptr = NULL; // Ponteiro para a mem\u00f3ria local que ser\u00e1 exposta na janela\nMPI_Win win_fop = MPI_WIN_NULL; // Objeto de janela MPI\nint origin_value = 5; // Valor a ser combinado com o alvo\nint fetched_old_value = 0; // Valor original no alvo antes da opera\u00e7\u00e3o (inicializado)\nMPI_Datatype datatype_fop = MPI_INT; // Tipo de dados\nint target_rank = 0; // Rank do processo alvo (o que possui a janela)\nMPI_Aint target_disp = 0; // Deslocamento no alvo (primeiro elemento do array)\nMPI_Op op_fop = MPI_SUM; // Opera\u00e7\u00e3o (soma at\u00f4mica)\nint err; // Vari\u00e1vel para armazenar o retorno das fun\u00e7\u00f5es MPI\n\n// Obt\u00e9m o rank e o tamanho do comunicador\nerr = MPI_Comm_rank(MPI_COMM_WORLD, &rank_fop);\nif (err != MPI_SUCCESS) { /* tratamento de erro */ }\nerr = MPI_Comm_size(MPI_COMM_WORLD, &size_fop);\nif (err != MPI_SUCCESS) { /* tratamento de erro */ }\n\n// Apenas o rank alvo (target_rank) aloca a mem\u00f3ria que ser\u00e1 acessada por RMA.\nMPI_Aint winsize = 0;\nint disp_unit = sizeof(int);\n\nif (rank_fop == target_rank) {\n    winsize = sizeof(int);\n    // Aloca a mem\u00f3ria que ser\u00e1 exposta pelo rank alvo (baseptr para MPI_Win_create)\n    shared_data_local_ptr = (int*) malloc(winsize);\n    if (shared_data_local_ptr == NULL) {\n        // Erro de aloca\u00e7\u00e3o de mem\u00f3ria. Em um cen\u00e1rio real, voc\u00ea abortaria ou trataria.\n        // MPI_Abort(MPI_COMM_WORLD, 1);\n    }\n    *shared_data_local_ptr = 100; // Valor inicial no alvo\n}\n\n// Cria um objeto de janela MPI para acesso RMA (One-Sided Communication)\nerr = MPI_Win_create(shared_data_local_ptr, winsize, disp_unit, MPI_INFO_NULL, MPI_COMM_WORLD, &win_fop);\n\nif (err == MPI_SUCCESS) {\n    // Sincroniza\u00e7\u00e3o de janela (MPI_Win_fence \u00e9 um modelo de sincroniza\u00e7\u00e3o)\n    // Garante que todos os processos estabeleceram a janela e a mem\u00f3ria est\u00e1 pronta para acesso.\n    err = MPI_Win_fence(0, win_fop);\n    if (err != MPI_SUCCESS) { /* tratamento de erro */ }\n\n    if (rank_fop != target_rank) { // Processos diferentes do alvo (originadores)\n        // Realiza uma opera\u00e7\u00e3o at\u00f4mica de fetch-and-op.\n        // O valor atual do alvo (em shared_data_local_ptr no target_rank) \u00e9 retornado em 'fetched_old_value'.\n        // Em seguida, 'origin_value' \u00e9 somado atomicamente ao valor no alvo.\n        err = MPI_Fetch_and_op(&origin_value, &fetched_old_value, datatype_fop, target_rank, target_disp, op_fop, win_fop);\n        if (err == MPI_SUCCESS) {\n            // fetched_old_value conteria 100 para a primeira opera\u00e7\u00e3o do originador.\n            // O valor no alvo seria 100 + origin_value.\n        }\n    }\n\n    // Sincroniza\u00e7\u00e3o novamente para garantir que todas as opera\u00e7\u00f5es RMA estejam completas\n    err = MPI_Win_fence(0, win_fop);\n    if (err != MPI_SUCCESS) { /* tratamento de erro */ }\n\n    if (rank_fop == target_rank) {\n        // O rank alvo pode verificar o valor final no shared_data_local_ptr.\n        // Se houver N-1 originadores, o valor final seria 100 + (N-1) * origin_value.\n    }\n\n    // Libera o objeto de janela MPI\n    err = MPI_Win_free(&win_fop);\n    if (err != MPI_SUCCESS) { /* tratamento de erro */ }\n}\n\n// Libera a mem\u00f3ria alocada localmente pelo rank alvo, se foi alocada.\nif (rank_fop == target_rank && shared_data_local_ptr != NULL) {\n    free(shared_data_local_ptr);\n}\n"}, {"name": "MPI_File_c2f", "short_desc": "Traduz um handle de arquivo C para um handle de arquivo Fortran.", "synopsis": "MPI_Fint MPI_File_c2f(MPI_File fh)", "params": [{"name": "fh", "desc": "Handle de arquivo MPI em C (handle)."}], "description": "Converte um objeto de arquivo do tipo `MPI_File` usado em C para um inteiro compat\u00edvel com Fortran.", "application": "Interoperabilidade entre c\u00f3digos C e Fortran que compartilham handles de arquivo.", "example": "// Declara\u00e7\u00f5es\nMPI_File fh_c = MPI_FILE_NULL; // Handle de arquivo MPI em C\nMPI_Fint fh_f = 0; // Handle de arquivo MPI em Fortran (inicializado para 0)\nconst char* filename_c2f = \"temp_data_c2f.bin\"; // Nome do arquivo\nint err; // Vari\u00e1vel para armazenar o retorno das fun\u00e7\u00f5es MPI\n\n// Abre um arquivo MPI (em modo de leitura e escrita, cria se n\u00e3o existir)\nerr = MPI_File_open(MPI_COMM_SELF, (char*)filename_c2f, MPI_MODE_RDWR | MPI_MODE_CREATE, MPI_INFO_NULL, &fh_c);\n\nif (err == MPI_SUCCESS) {\n    // Converte o handle do arquivo C (MPI_File) para o tipo Fortran (MPI_Fint).\n    // O valor retornado 'fh_f' pode ser usado em chamadas de biblioteca MPI Fortran.\n    fh_f = MPI_File_c2f(fh_c);\n\n    // O handle 'fh_f' agora representa o mesmo arquivo que 'fh_c' mas no formato Fortran.\n    // Para fins de demonstra\u00e7\u00e3o, podemos imaginar que 'fh_f' \u00e9 passado para uma rotina Fortran.\n\n    // Fecha o arquivo MPI para liberar os recursos associados a 'fh_c'.\n    err = MPI_File_close(&fh_c);\n    if (err != MPI_SUCCESS) { /* tratamento de erro */ }\n}\n"}, {"name": "MPI_File_call_errhandler", "short_desc": "Chama o manipulador de erros instalado em um arquivo.", "synopsis": "int MPI_File_call_errhandler(MPI_File fh, int errorcode)", "params": [{"name": "fh", "desc": "Arquivo com o manipulador de erro (handle)."}, {"name": "errorcode", "desc": "C\u00f3digo de erro (inteiro)."}], "description": "Invoca manualmente o manipulador de erros associado ao arquivo `fh` com o c\u00f3digo de erro fornecido.", "application": "Tratamento de condi\u00e7\u00f5es de erro detectadas pelo usu\u00e1rio de forma consistente com o framework MPI.", "example": "// Declara\u00e7\u00f5es\nMPI_File fh_err_call = MPI_FILE_NULL; // Handle de arquivo MPI\nconst char* filename_err_call = \"test_err_file_call.bin\"; // Nome do arquivo\nint custom_error_code_call = MPI_ERR_IO; // C\u00f3digo de erro a ser passado para o handler\nMPI_Errhandler old_file_errhandler_call = MPI_ERRHANDLER_NULL; // Para guardar o manipulador de erros antigo\nint err; // Vari\u00e1vel para armazenar o retorno das fun\u00e7\u00f5es MPI\n\n// Abre um arquivo MPI\nerr = MPI_File_open(MPI_COMM_SELF, (char*)filename_err_call, MPI_MODE_RDWR | MPI_MODE_CREATE, MPI_INFO_NULL, &fh_err_call);\n\nif (err == MPI_SUCCESS) {\n    // Opcional, mas boa pr\u00e1tica: obter o manipulador de erros atual do arquivo\n    // para restaurar depois.\n    err = MPI_File_get_errhandler(fh_err_call, &old_file_errhandler_call);\n    if (err != MPI_SUCCESS) { /* tratamento de erro */ }\n\n    // Define o manipulador de erros do arquivo para retornar erros\n    // em vez de abortar, para que MPI_File_call_errhandler n\u00e3o termine o programa.\n    err = MPI_File_set_errhandler(fh_err_call, MPI_ERRORS_RETURN);\n    if (err != MPI_SUCCESS) { /* tratamento de erro */ }\n\n    // Invoca manualmente o manipulador de erros associado ao arquivo 'fh_err_call'\n    // com o c\u00f3digo de erro fornecido.\n    // Se o handler for MPI_ERRORS_RETURN, esta chamada retornar\u00e1 o 'custom_error_code_call'.\n    err = MPI_File_call_errhandler(fh_err_call, custom_error_code_call);\n\n    if (err == custom_error_code_call) {\n        // O erro foi capturado e retornado pelo manipulador de erros definido.\n        // Isso demonstra que o manipulador de erros do arquivo foi invocado e retornou o erro.\n    } else if (err == MPI_SUCCESS) {\n        // Isso pode acontecer se o handler personalizado lidar com o erro e n\u00e3o o propagar.\n    }\n\n    // Restaura o manipulador de erros original do arquivo\n    if (old_file_errhandler_call != MPI_ERRHANDLER_NULL) {\n        err = MPI_File_set_errhandler(fh_err_call, old_file_errhandler_call);\n        if (err != MPI_SUCCESS) { /* tratamento de erro */ }\n    }\n\n    // Fecha o arquivo MPI\n    err = MPI_File_close(&fh_err_call);\n    if (err != MPI_SUCCESS) { /* tratamento de erro */ }\n}\n"}, {"name": "MPI_File_close", "short_desc": "Fecha um arquivo.", "synopsis": "int MPI_File_close(MPI_File *fh)", "params": [{"name": "fh", "desc": "Handle do arquivo a ser fechado (handle)."}], "description": "Fecha o arquivo associado a `fh` e libera os recursos correspondentes. Define o handle como `MPI_FILE_NULL` ap\u00f3s a conclus\u00e3o.", "application": "Finaliza\u00e7\u00e3o de opera\u00e7\u00f5es de I/O em arquivos.", "example": "// Declara\u00e7\u00f5es\nMPI_File fh;\nint err;\n\n// Abrindo um arquivo para demonstra\u00e7\u00e3o de MPI_File_close.\n// Em um cen\u00e1rio real, 'fh' seria um handle de arquivo j\u00e1 aberto.\nerr = MPI_File_open(MPI_COMM_SELF, \"exemplo_close.txt\", MPI_MODE_RDWR | MPI_MODE_CREATE, MPI_INFO_NULL, &fh);\n\nif (err == MPI_SUCCESS) {\n    // Fecha o arquivo associado a 'fh' e libera todos os recursos.\n    // Ap\u00f3s esta chamada, 'fh' se torna MPI_FILE_NULL.\n    err = MPI_File_close(&fh);\n\n    if (err == MPI_SUCCESS) {\n        // O arquivo foi fechado com sucesso.\n        // 'fh' agora \u00e9 MPI_FILE_NULL.\n    } else {\n        // Lidar com erro ao fechar o arquivo.\n    }\n} else {\n    // Lidar com erro na abertura do arquivo (ex: permiss\u00e3o, nome inv\u00e1lido).\n}\n"}, {"name": "MPI_File_create_errhandler", "short_desc": "Cria um manipulador de erros para arquivos.", "synopsis": "int MPI_File_create_errhandler(MPI_File_errhandler_function *file_errhandler_fn, MPI_Errhandler *errhandler)", "params": [{"name": "file_errhandler_fn", "desc": "Fun\u00e7\u00e3o de tratamento de erro definida pelo usu\u00e1rio (fun\u00e7\u00e3o)."}, {"name": "errhandler", "desc": "Manipulador de erros MPI criado (handle)."}], "description": "Cria um objeto manipulador de erros que pode ser especificamente associado a arquivos MPI via `MPI_File_set_errhandler`.", "application": "Personaliza\u00e7\u00e3o do comportamento de falha em opera\u00e7\u00f5es de I/O de arquivos.", "example": "// Declara\u00e7\u00f5es\nMPI_Errhandler file_errh;\nint err;\n\n// Defini\u00e7\u00e3o de uma fun\u00e7\u00e3o de tratamento de erro de arquivo personalizada.\n// Esta fun\u00e7\u00e3o seria chamada se um erro de arquivo ocorresse e este manipulador\n// estivesse associado ao arquivo.\nvoid my_file_err_handler_impl(MPI_File *file, int *error_code, ...) {\n    // Em uma aplica\u00e7\u00e3o real, aqui voc\u00ea implementaria a l\u00f3gica para lidar com o erro:\n    // por exemplo, imprimir uma mensagem, registrar o erro, ou tentar uma recupera\u00e7\u00e3o.\n    // Para este exemplo, apenas um corpo m\u00ednimo \u00e9 fornecido para validar a sintaxe C.\n    (void)file;       // Evita warning de vari\u00e1vel n\u00e3o utilizada\n    (void)error_code; // Evita warning de vari\u00e1vel n\u00e3o utilizada\n    // MPI_Abort(MPI_COMM_WORLD, *error_code); // Uma a\u00e7\u00e3o comum em caso de erro fatal.\n}\n\n// Cria um novo objeto manipulador de erros MPI, associando-o \u00e0 fun\u00e7\u00e3o definida pelo usu\u00e1rio.\nerr = MPI_File_create_errhandler(my_file_err_handler_impl, &file_errh);\n\nif (err == MPI_SUCCESS) {\n    // O manipulador de erros 'file_errh' foi criado com sucesso.\n    // Ele pode agora ser associado a um arquivo usando MPI_File_set_errhandler().\n    // Exemplo: MPI_File fh_example; MPI_File_set_errhandler(fh_example, file_errh);\n\n    // Libera o manipulador de erros quando ele n\u00e3o for mais necess\u00e1rio.\n    err = MPI_Errhandler_free(&file_errh);\n    if (err == MPI_SUCCESS) {\n        // Manipulador de erros liberado com sucesso.\n    } else {\n        // Lidar com erro ao liberar o manipulador de erros.\n    }\n} else {\n    // Lidar com erro ao criar o manipulador de erros.\n}\n"}, {"name": "MPI_File_delete", "short_desc": "Exclui um arquivo.", "synopsis": "int MPI_File_delete(const char *filename, MPI_Info info)", "params": [{"name": "filename", "desc": "Nome do arquivo a ser excluindo (string)."}, {"name": "info", "desc": "Objeto de informa\u00e7\u00f5es para o sistema de arquivos (handle)."}], "description": "Remove o arquivo especificado do sistema de arquivos. Se o arquivo estiver aberto por algum processo, o comportamento \u00e9 dependente da implementa\u00e7\u00e3o (geralmente falha ou remove ap\u00f3s o fechamento).", "application": "Limpeza de arquivos tempor\u00e1rios ou obsoletos.", "example": "// Declara\u00e7\u00f5es\nconst char *filename = \"arquivo_para_deletar.bin\";\nMPI_Info info = MPI_INFO_NULL; // Objeto info pode ser usado para dicas de exclus\u00e3o, mas NULL \u00e9 comum.\nint err;\n\n// Opcionalmente, pode-se criar um objeto MPI_Info para passar dicas ao sistema de arquivos.\n// Por exemplo, para influenciar como o arquivo \u00e9 deletado.\n// err = MPI_Info_create(&info);\n// if (err == MPI_SUCCESS) {\n//     err = MPI_Info_set(info, \"delete_on_close\", \"true\");\n// } else {\n//     info = MPI_INFO_NULL; // Fallback para NULL em caso de falha.\n// }\n\n// Para garantir que o arquivo exista para ser deletado, vamos cri\u00e1-lo primeiro.\nMPI_File fh_temp;\nerr = MPI_File_open(MPI_COMM_SELF, filename, MPI_MODE_CREATE | MPI_MODE_WRONLY, MPI_INFO_NULL, &fh_temp);\nif (err == MPI_SUCCESS) {\n    // Escrever algo para o arquivo para que n\u00e3o esteja vazio\n    char data[] = \"Dados tempor\u00e1rios.\";\n    MPI_Status status;\n    MPI_File_write(fh_temp, data, sizeof(data) - 1, MPI_CHAR, &status);\n    MPI_File_close(&fh_temp);\n} else {\n    // Lidar com erro na cria\u00e7\u00e3o tempor\u00e1ria do arquivo.\n}\n\n// Tenta deletar o arquivo especificado pelo 'filename'.\nerr = MPI_File_delete(filename, info);\n\nif (err == MPI_SUCCESS) {\n    // O arquivo foi deletado com sucesso do sistema de arquivos.\n} else {\n    // Lidar com erro ao deletar o arquivo (ex: arquivo n\u00e3o existe, permiss\u00e3o negada).\n}\n\n// Libera o objeto MPI_Info se ele foi criado (e n\u00e3o \u00e9 MPI_INFO_NULL).\n// if (info != MPI_INFO_NULL) {\n//     err = MPI_Info_free(&info);\n//     if (err != MPI_SUCCESS) {\n//         // Lidar com erro ao liberar o MPI_Info.\n//     }\n// }\n"}, {"name": "MPI_File_f2c", "short_desc": "Traduz um handle de arquivo Fortran para um handle de arquivo C.", "synopsis": "MPI_File MPI_File_f2c(MPI_Fint fh)", "params": [{"name": "fh", "desc": "Handle de arquivo MPI em Fortran (inteiro)."}], "description": "Converte um handle de arquivo do tipo inteiro (Fortran) para o tipo `MPI_File` usado em C.", "application": "Permite que fun\u00e7\u00f5es C chamadas por Fortran manipulem arquivos abertos no Fortran.", "example": "// Declara\u00e7\u00f5es\nMPI_Fint fortran_handle; // Vari\u00e1vel para simular um handle de arquivo MPI em Fortran.\nMPI_File c_file_handle;  // Vari\u00e1vel para armazenar o handle de arquivo MPI em C convertido.\nMPI_File opened_fh;      // Handle de arquivo C para abrir um arquivo e gerar um MPI_Fint v\u00e1lido.\nint err;\n\n// Para criar um cen\u00e1rio realista, vamos abrir um arquivo em C e obter seu handle Fortran\n// usando MPI_File_c2f. Em uma aplica\u00e7\u00e3o real, 'fortran_handle' seria um handle\n// recebido de um contexto Fortran.\nerr = MPI_File_open(MPI_COMM_SELF, \"exemplo_f2c.txt\", MPI_MODE_RDWR | MPI_MODE_CREATE, MPI_INFO_NULL, &opened_fh);\n\nif (err == MPI_SUCCESS) {\n    // Converte o handle MPI_File de C para um MPI_Fint de Fortran.\n    // Isso simula o handle que seria passado de um contexto Fortran para C.\n    fortran_handle = MPI_File_c2f(opened_fh);\n\n    // A fun\u00e7\u00e3o principal do exemplo: converte o handle Fortran de volta para C.\n    // MPI_File_f2c n\u00e3o retorna um c\u00f3digo de erro MPI, ele retorna diretamente o handle MPI_File.\n    c_file_handle = MPI_File_f2c(fortran_handle);\n\n    // Agora, 'c_file_handle' \u00e9 um handle MPI_File v\u00e1lido em C, correspondente ao arquivo original.\n    // Voc\u00ea pode usar 'c_file_handle' para opera\u00e7\u00f5es de E/S de arquivos MPI em C.\n    // Exemplo: char buffer[] = \"Ol\u00e1 do C!\"; MPI_Status status; MPI_File_write(c_file_handle, buffer, sizeof(buffer) - 1, MPI_CHAR, &status);\n\n    // Fecha o arquivo original que foi aberto em C.\n    err = MPI_File_close(&opened_fh);\n    if (err != MPI_SUCCESS) {\n        // Lidar com erro ao fechar o arquivo.\n    }\n} else {\n    // Lidar com erro ao abrir o arquivo (ex: nome inv\u00e1lido, permiss\u00e3o).\n}\n"}, {"name": "MPI_File_get_amode", "short_desc": "Retorna o modo de acesso ao arquivo.", "synopsis": "int MPI_File_get_amode(MPI_File fh, int *amode)", "params": [{"name": "fh", "desc": "Handle do arquivo (handle)."}, {"name": "amode", "desc": "Modo de acesso retornado (inteiro)."}], "description": "Retorna os bits de modo de acesso (como `MPI_MODE_RDONLY`, `MPI_MODE_CREATE`, etc.) que foram usados na abertura do arquivo `fh`.", "application": "Verifica\u00e7\u00e3o das permiss\u00f5es e estado de abertura de um arquivo recebido como par\u00e2metro.", "example": "// Declara\u00e7\u00f5es\nMPI_File fh;\nint amode; // Vari\u00e1vel para armazenar os modos de acesso retornados.\nint err;\n\n// Abre um arquivo com modos espec\u00edficos para demonstra\u00e7\u00e3o.\n// MPI_MODE_RDWR: Leitura e Escrita\n// MPI_MODE_CREATE: Cria o arquivo se n\u00e3o existir\n// MPI_MODE_EXCL: Erro se o arquivo j\u00e1 existir\nerr = MPI_File_open(MPI_COMM_SELF, \"exemplo_amode.txt\",\n                    MPI_MODE_RDWR | MPI_MODE_CREATE | MPI_MODE_EXCL,\n                    MPI_INFO_NULL, &fh);\n\nif (err == MPI_SUCCESS) {\n    // Obt\u00e9m os modos de acesso com os quais o arquivo 'fh' foi efetivamente aberto.\n    err = MPI_File_get_amode(fh, &amode);\n\n    if (err == MPI_SUCCESS) {\n        // 'amode' agora cont\u00e9m a combina\u00e7\u00e3o de bits dos modos de acesso.\n        // Voc\u00ea pode usar operadores bit a bit (&) para verificar modos espec\u00edficos.\n        // if (amode & MPI_MODE_RDONLY) { /* printf(\"Arquivo aberto em modo somente leitura.\\n\"); */ }\n        // if (amode & MPI_MODE_WRONLY) { /* printf(\"Arquivo aberto em modo somente escrita.\\n\"); */ }\n        // if (amode & MPI_MODE_RDWR)   { /* printf(\"Arquivo aberto em modo leitura e escrita.\\n\"); */ }\n        // if (amode & MPI_MODE_CREATE) { /* printf(\"Arquivo foi criado.\\n\"); */ }\n        // if (amode & MPI_MODE_EXCL)   { /* printf(\"Arquivo foi aberto em modo exclusivo.\\n\"); */ }\n    } else {\n        // Lidar com erro ao obter os modos de acesso do arquivo.\n    }\n\n    // Fecha o arquivo ap\u00f3s a demonstra\u00e7\u00e3o.\n    err = MPI_File_close(&fh);\n    if (err != MPI_SUCCESS) {\n        // Lidar com erro ao fechar o arquivo.\n    }\n} else {\n    // Lidar com erro ao abrir o arquivo (ex: arquivo j\u00e1 existia com MPI_MODE_EXCL).\n}\n"}, {"name": "MPI_File_get_atomicity", "short_desc": "Retorna o modo de atomicidade atual para um arquivo.", "synopsis": "int MPI_File_get_atomicity(MPI_File fh, int *flag)", "params": [{"name": "fh", "desc": "Handle do arquivo (handle)."}, {"name": "flag", "desc": "Verdadeiro se o modo at\u00f4mico estiver ativo, falso caso contr\u00e1rio (l\u00f3gico, sa\u00edda)."}], "description": "MPI_File_get_atomicity retorna o estado atual do modo de atomicidade para o arquivo aberto 'fh'. Se 'flag' for verdadeiro, as opera\u00e7\u00f5es de escrita s\u00e3o garantidas como at\u00f4micas para todos os processos que abriram o arquivo. Se falso, a implementa\u00e7\u00e3o pode usar otimiza\u00e7\u00f5es que n\u00e3o garantem a consist\u00eancia imediata entre diferentes processos sem sincroniza\u00e7\u00e3o expl\u00edcita.", "application": "Verifica\u00e7\u00e3o de garantias de consist\u00eancia em algoritmos de E/S paralela concorrente.", "example": "// Declara\u00e7\u00f5es\nMPI_File fh;\nint atomic_mode_flag; // Vari\u00e1vel para armazenar o estado de atomicidade (0 ou 1).\nMPI_Info file_info = MPI_INFO_NULL; // Objeto info opcional para configurar dicas de atomicidade.\nint err;\n\n// Opcionalmente, cria um objeto MPI_Info para tentar definir a atomicidade na abertura.\n// Note que a implementa\u00e7\u00e3o MPI pode ou n\u00e3o honrar esta dica.\nerr = MPI_Info_create(&file_info);\nif (err == MPI_SUCCESS) {\n    // Tenta definir a atomicidade como \"true\" (garantir opera\u00e7\u00f5es at\u00f4micas).\n    err = MPI_Info_set(file_info, \"atomicity\", \"true\");\n    if (err != MPI_SUCCESS) { /* Lidar com erro ao definir a dica */ }\n} else {\n    file_info = MPI_INFO_NULL; // Fallback para NULL se a cria\u00e7\u00e3o do info falhar.\n}\n\n// Abre um arquivo, passando o objeto info (ou MPI_INFO_NULL).\nerr = MPI_File_open(MPI_COMM_SELF, \"exemplo_atomicity.bin\",\n                    MPI_MODE_RDWR | MPI_MODE_CREATE,\n                    file_info, &fh);\n\nif (err == MPI_SUCCESS) {\n    // Obt\u00e9m o estado atual do modo de atomicidade para o arquivo 'fh'.\n    err = MPI_File_get_atomicity(fh, &atomic_mode_flag);\n\n    if (err == MPI_SUCCESS) {\n        // 'atomic_mode_flag' ser\u00e1 1 (verdadeiro) se o modo at\u00f4mico estiver ativo,\n        // ou 0 (falso) caso contr\u00e1rio.\n        // if (atomic_mode_flag) { /* printf(\"Modo de atomicidade: ATIVO.\\n\"); */ }\n        // else                  { /* printf(\"Modo de atomicidade: INATIVO.\\n\"); */ }\n    } else {\n        // Lidar com erro ao obter o estado de atomicidade.\n    }\n\n    // Fecha o arquivo.\n    err = MPI_File_close(&fh);\n    if (err != MPI_SUCCESS) {\n        // Lidar com erro ao fechar o arquivo.\n    }\n} else {\n    // Lidar com erro ao abrir o arquivo.\n}\n\n// Libera o objeto MPI_Info se ele foi criado e n\u00e3o \u00e9 MPI_INFO_NULL.\nif (file_info != MPI_INFO_NULL) {\n    err = MPI_Info_free(&file_info);\n    if (err != MPI_SUCCESS) {\n        // Lidar com erro ao liberar o MPI_Info.\n    }\n}\n"}, {"name": "MPI_File_get_byte_offset", "short_desc": "Retorna a posi\u00e7\u00e3o absoluta em bytes correspondente a um deslocamento relativo.", "synopsis": "int MPI_File_get_byte_offset(MPI_File fh, MPI_Offset offset, MPI_Offset *disp)", "params": [{"name": "fh", "desc": "Handle do arquivo (handle)."}, {"name": "offset", "desc": "Deslocamento relativo em unidades de etype (inteiro)."}, {"name": "disp", "desc": "Posi\u00e7\u00e3o absoluta em bytes a partir do in\u00edcio do arquivo (inteiro, sa\u00edda)."}], "description": "Esta fun\u00e7\u00e3o converte um deslocamento ('offset') expresso em unidades de 'etype' (relativo \u00e0 visualiza\u00e7\u00e3o atual do arquivo) em um deslocamento absoluto em bytes a partir do in\u00edcio f\u00edsico do arquivo. \u00c9 \u00fatil para traduzir \u00edndices l\u00f3gicos em posi\u00e7\u00f5es f\u00edsicas de disco.", "application": "C\u00e1lculo de posi\u00e7\u00f5es f\u00edsicas para ferramentas de depura\u00e7\u00e3o ou otimiza\u00e7\u00e3o de E/S de baixo n\u00edvel.", "example": "// Declara\u00e7\u00f5es\nMPI_File fh;\nMPI_Offset logical_offset = 5; // 5 unidades de 'etype' a partir do in\u00edcio da visualiza\u00e7\u00e3o.\nMPI_Offset absolute_byte_offset; // Vari\u00e1vel para armazenar o deslocamento absoluto em bytes.\nMPI_Datatype etype = MPI_DATATYPE_NULL; // Tipo de dado b\u00e1sico para a visualiza\u00e7\u00e3o do arquivo.\nint err;\n\n// Cria um tipo de dado simples para 'etype', por exemplo, 4 inteiros cont\u00edguos.\n// Cada 'unidade' da visualiza\u00e7\u00e3o ser\u00e1 um bloco de 4 inteiros (4 * sizeof(int) bytes).\nerr = MPI_Type_contiguous(4, MPI_INT, &etype);\nif (err == MPI_SUCCESS) {\n    err = MPI_Type_commit(&etype);\n    if (err != MPI_SUCCESS) { /* Lidar com erro no commit */ etype = MPI_DATATYPE_NULL; }\n} else {\n    // Lidar com erro na cria\u00e7\u00e3o do tipo de dado.\n    etype = MPI_DATATYPE_NULL; // Garante que etype seja NULL em caso de falha.\n}\n\n// Abre um arquivo para demonstra\u00e7\u00e3o.\nerr = MPI_File_open(MPI_COMM_SELF, \"exemplo_byte_offset.bin\",\n                    MPI_MODE_RDWR | MPI_MODE_CREATE,\n                    MPI_INFO_NULL, &fh);\n\nif (err == MPI_SUCCESS) {\n    // Define uma visualiza\u00e7\u00e3o para o arquivo.\n    // displacement: offset em bytes a partir do in\u00edcio f\u00edsico do arquivo.\n    // etype: tipo de dado b\u00e1sico da visualiza\u00e7\u00e3o (unidade para opera\u00e7\u00f5es de E/S).\n    // filetype: layout dos dados no arquivo.\n    // Para simplificar, usamos displacement 0 e filetype igual a etype.\n    MPI_Offset view_disp = 0; // Visualiza\u00e7\u00e3o come\u00e7a no byte 0 do arquivo.\n    err = MPI_File_set_view(fh, view_disp, etype, etype, \"native\", MPI_INFO_NULL);\n\n    if (err == MPI_SUCCESS) {\n        // Converte o deslocamento l\u00f3gico (em unidades de 'etype')\n        // para um deslocamento absoluto em bytes a partir do in\u00edcio do arquivo f\u00edsico.\n        // Se 'etype' for 4 inteiros (por exemplo, 16 bytes), e 'logical_offset' for 5,\n        // o 'absolute_byte_offset' esperado ser\u00e1 5 * 16 = 80 bytes.\n        err = MPI_File_get_byte_offset(fh, logical_offset, &absolute_byte_offset);\n\n        if (err == MPI_SUCCESS) {\n            // 'absolute_byte_offset' agora cont\u00e9m a posi\u00e7\u00e3o em bytes correspondente.\n            // (void)absolute_byte_offset; // Para evitar warnings de vari\u00e1vel n\u00e3o utilizada.\n            // printf(\"Deslocamento l\u00f3gico (%lld unidades de etype) corresponde a %lld bytes.\\n\",\n            //        (long long)logical_offset, (long long)absolute_byte_offset);\n        } else {\n            // Lidar com erro ao obter o deslocamento em bytes.\n        }\n    } else {\n        // Lidar com erro ao definir a visualiza\u00e7\u00e3o do arquivo.\n    }\n\n    // Fecha o arquivo.\n    err = MPI_File_close(&fh);\n    if (err != MPI_SUCCESS) {\n        // Lidar com erro ao fechar o arquivo.\n    }\n} else {\n    // Lidar com erro ao abrir o arquivo.\n}\n\n// Libera o tipo de dado MPI_Datatype criado.\nif (etype != MPI_DATATYPE_NULL) {\n    err = MPI_Type_free(&etype);\n    if (err != MPI_SUCCESS) {\n        // Lidar com erro ao liberar o tipo de dado.\n    }\n}\n"}, {"name": "MPI_File_get_errhandler", "short_desc": "Recupera o manipulador de erros associado a um arquivo.", "synopsis": "int MPI_File_get_errhandler(MPI_File file, MPI_Errhandler *errhandler)", "params": [{"name": "file", "desc": "Handle do arquivo (handle)."}, {"name": "errhandler", "desc": "Manipulador de erros atualmente associado (handle, sa\u00edda)."}], "description": "Retorna o manipulador de erros (error handler) que est\u00e1 instalado no arquivo especificado. Por padr\u00e3o, os arquivos herdam o manipulador do comunicador usado na abertura, mas podem ter manipuladores espec\u00edficos definidos via MPI_File_set_errhandler.", "application": "Gest\u00e3o robusta de erros em bibliotecas de middleware de E/S.", "example": "// Declara\u00e7\u00f5es\nMPI_File fh;\nMPI_Errhandler current_handler; // Vari\u00e1vel para armazenar o manipulador de erros retornado.\nMPI_Errhandler custom_file_errhandler = MPI_ERRHANDLER_NULL; // Manipulador de erros personalizado.\nint err;\n\n// Defini\u00e7\u00e3o de uma fun\u00e7\u00e3o de tratamento de erro de arquivo personalizada.\n// Esta fun\u00e7\u00e3o \u00e9 usada para criar o 'custom_file_errhandler'.\nvoid my_custom_file_err_handler_for_get(MPI_File *file, int *error_code, ...) {\n    (void)file;\n    (void)error_code;\n}\n\n// Cria um manipulador de erros personalizado para demonstra\u00e7\u00e3o.\nerr = MPI_File_create_errhandler(my_custom_file_err_handler_for_get, &custom_file_errhandler);\n\n// Abre um arquivo.\nerr = MPI_File_open(MPI_COMM_SELF, \"exemplo_get_errhandler.txt\",\n                    MPI_MODE_RDWR | MPI_MODE_CREATE,\n                    MPI_INFO_NULL, &fh);\n\nif (err == MPI_SUCCESS) {\n    // Opcionalmente, define o manipulador de erros personalizado para o arquivo.\n    // Se n\u00e3o for definido, MPI_File_get_errhandler retornar\u00e1 o manipulador padr\u00e3o\n    // (que \u00e9 herdado do comunicador usado na abertura, geralmente MPI_ERRORS_ARE_FATAL).\n    if (custom_file_errhandler != MPI_ERRHANDLER_NULL) {\n        err = MPI_File_set_errhandler(fh, custom_file_errhandler);\n        if (err != MPI_SUCCESS) {\n            // Lidar com erro ao definir o manipulador de erros.\n        }\n    }\n\n    // Obt\u00e9m o manipulador de erros que est\u00e1 atualmente associado ao arquivo 'fh'.\n    err = MPI_File_get_errhandler(fh, &current_handler);\n\n    if (err == MPI_SUCCESS) {\n        // 'current_handler' agora cont\u00e9m o handle do manipulador de erros ativo.\n        // Voc\u00ea pode compar\u00e1-lo com MPI_ERRORS_ARE_FATAL ou com seu 'custom_file_errhandler'.\n        // if (current_handler == custom_file_errhandler) {\n        //     printf(\"Manipulador de erros personalizado est\u00e1 ativo no arquivo.\\n\");\n        // } else if (current_handler == MPI_ERRORS_ARE_FATAL) {\n        //     printf(\"Manipulador de erros padr\u00e3o (fatal) est\u00e1 ativo no arquivo.\\n\");\n        // }\n    } else {\n        // Lidar com erro ao obter o manipulador de erros do arquivo.\n    }\n\n    // Fecha o arquivo.\n    err = MPI_File_close(&fh);\n    if (err != MPI_SUCCESS) {\n        // Lidar com erro ao fechar o arquivo.\n    }\n} else {\n    // Lidar com erro ao abrir o arquivo.\n}\n\n// Libera o manipulador de erros personalizado se ele foi criado (e n\u00e3o \u00e9 MPI_ERRHANDLER_NULL).\n// Manipuladores padr\u00e3o como MPI_ERRORS_ARE_FATAL n\u00e3o devem ser liberados.\nif (custom_file_errhandler != MPI_ERRHANDLER_NULL) {\n    err = MPI_Errhandler_free(&custom_file_errhandler);\n    if (err != MPI_SUCCESS) {\n        // Lidar com erro ao liberar o manipulador de erros personalizado.\n    }\n}\n"}, {"name": "MPI_File_get_group", "short_desc": "Retorna o grupo de processos que abriu o arquivo.", "synopsis": "int MPI_File_get_group(MPI_File fh, MPI_Group *group)", "params": [{"name": "fh", "desc": "Handle do arquivo (handle)."}, {"name": "group", "desc": "Grupo que abriu o arquivo (handle, sa\u00edda)."}], "description": "MPI_File_get_group retorna um novo objeto de grupo que cont\u00e9m todos os processos que participaram da abertura coletiva do arquivo 'fh'. O grupo retornado deve ser liberado com MPI_Group_free quando n\u00e3o for mais necess\u00e1rio.", "application": "Identifica\u00e7\u00e3o dos participantes em uma opera\u00e7\u00e3o de E/S paralela para fins de comunica\u00e7\u00e3o ou topologia.", "example": "// Declara\u00e7\u00f5es\nMPI_File fh;\nMPI_Group io_group = MPI_GROUP_NULL; // Vari\u00e1vel para armazenar o grupo de processos retornado.\nMPI_Comm file_comm = MPI_COMM_WORLD; // Comunicador usado para abrir o arquivo (pode ser qualquer comunicador).\nint err;\n\n// Abre um arquivo coletivamente usando 'file_comm'.\n// A abertura coletiva \u00e9 importante para que o grupo retornado seja significativo.\nerr = MPI_File_open(file_comm, \"exemplo_get_group.txt\",\n                    MPI_MODE_RDWR | MPI_MODE_CREATE,\n                    MPI_INFO_NULL, &fh);\n\nif (err == MPI_SUCCESS) {\n    // Obt\u00e9m um novo objeto MPI_Group que cont\u00e9m todos os processos\n    // que participaram da abertura coletiva do arquivo 'fh'.\n    err = MPI_File_get_group(fh, &io_group);\n\n    if (err == MPI_SUCCESS) {\n        // 'io_group' agora representa o grupo de processos.\n        // Voc\u00ea pode, por exemplo, obter o tamanho do grupo ou o rank de um processo dentro dele.\n        // int group_size;\n        // MPI_Group_size(io_group, &group_size);\n        // printf(\"N\u00famero de processos no grupo do arquivo: %d\\n\", group_size);\n\n        // Libera o objeto MPI_Group quando ele n\u00e3o for mais necess\u00e1rio.\n        err = MPI_Group_free(&io_group);\n        if (err != MPI_SUCCESS) {\n            // Lidar com erro ao liberar o grupo.\n        }\n    } else {\n        // Lidar com erro ao obter o grupo de processos do arquivo.\n    }\n\n    // Fecha o arquivo.\n    err = MPI_File_close(&fh);\n    if (err != MPI_SUCCESS) {\n        // Lidar com erro ao fechar o arquivo.\n    }\n} else {\n    // Lidar com erro ao abrir o arquivo.\n}\n"}, {"name": "MPI_File_get_info", "short_desc": "Retorna as dicas (hints) de E/S atualmente em uso para um arquivo.", "synopsis": "int MPI_File_get_info(MPI_File fh, MPI_Info *info_used)", "params": [{"name": "fh", "desc": "Handle do arquivo (handle)."}, {"name": "info_used", "desc": "Objeto info contendo as dicas ativas (handle, sa\u00edda)."}], "description": "Retorna um objeto MPI_Info contendo todas as dicas de performance e configura\u00e7\u00e3o que est\u00e3o sendo efetivamente aplicadas pela implementa\u00e7\u00e3o MPI ao arquivo 'fh'. Isso pode incluir dicas passadas pelo usu\u00e1rio em MPI_File_open ou hints padr\u00e3o do sistema.", "application": "Ajuste fino de performance e introspec\u00e7\u00e3o das capacidades do sistema de arquivos paralelo (ex: striping de Lustre).", "example": "// Declara\u00e7\u00f5es\nMPI_File fh;\nMPI_Info file_open_info = MPI_INFO_NULL; // Objeto info usado para abrir o arquivo.\nMPI_Info active_info = MPI_INFO_NULL;    // Objeto info retornado pela fun\u00e7\u00e3o, com as dicas ativas.\nint err;\n\n// Cria um objeto MPI_Info e adiciona algumas dicas para influenciar a abertura do arquivo.\n// As dicas 'striping_unit' e 'romio_cb_read' s\u00e3o exemplos comuns para I/O paralela.\nerr = MPI_Info_create(&file_open_info);\nif (err == MPI_SUCCESS) {\n    err = MPI_Info_set(file_open_info, \"striping_unit\", \"1048576\"); // Ex: 1MB de unidade de striping\n    if (err == MPI_SUCCESS) {\n        err = MPI_Info_set(file_open_info, \"romio_cb_read\", \"enable\"); // Ex: Habilitar leitura coletiva\n    }\n} else {\n    file_open_info = MPI_INFO_NULL; // Fallback para NULL se a cria\u00e7\u00e3o do info falhar.\n}\n\n// Abre um arquivo, passando o objeto info com as dicas (ou MPI_INFO_NULL).\nerr = MPI_File_open(MPI_COMM_SELF, \"exemplo_get_info.txt\",\n                    MPI_MODE_RDWR | MPI_MODE_CREATE,\n                    file_open_info, &fh);\n\nif (err == MPI_SUCCESS) {\n    // Obt\u00e9m um novo objeto MPI_Info contendo todas as dicas de desempenho e configura\u00e7\u00e3o\n    // que a implementa\u00e7\u00e3o MPI est\u00e1 aplicando efetivamente ao arquivo 'fh'.\n    err = MPI_File_get_info(fh, &active_info);\n\n    if (err == MPI_SUCCESS) {\n        // 'active_info' agora cont\u00e9m o conjunto de dicas ativas.\n        // Voc\u00ea pode iterar sobre estas chaves/valores para inspecion\u00e1-las.\n        // Exemplo de como imprimir todas as dicas:\n        // int nkeys;\n        // MPI_Info_get_nkeys(active_info, &nkeys);\n        // for (int i = 0; i < nkeys; ++i) {\n        //    char key[MPI_MAX_INFO_KEY];\n        //    char value[MPI_MAX_INFO_VAL];\n        //    int valuelen, flag;\n        //    MPI_Info_get_nthkey(active_info, i, key); // Obt\u00e9m a chave pelo \u00edndice\n        //    MPI_Info_get(active_info, key, MPI_MAX_INFO_VAL, value, &flag); // Obt\u00e9m o valor da chave\n        //    if (flag) { printf(\"  Chave: %s, Valor: %s\\n\", key, value); }\n        // }\n\n        // Libera o objeto MPI_Info retornado pela fun\u00e7\u00e3o.\n        err = MPI_Info_free(&active_info);\n        if (err != MPI_SUCCESS) {\n            // Lidar com erro ao liberar o 'active_info'.\n        }\n    } else {\n        // Lidar com erro ao obter as informa\u00e7\u00f5es do arquivo.\n    }\n\n    // Fecha o arquivo.\n    err = MPI_File_close(&fh);\n    if (err != MPI_SUCCESS) {\n        // Lidar com erro ao fechar o arquivo.\n    }\n} else {\n    // Lidar com erro ao abrir o arquivo.\n}\n\n// Libera o objeto MPI_Info que foi criado e usado para abrir o arquivo.\nif (file_open_info != MPI_INFO_NULL) {\n    err = MPI_Info_free(&file_open_info);\n    if (err != MPI_SUCCESS) {\n        // Lidar com erro ao liberar o 'file_open_info'.\n    }\n}\n"}, {"name": "MPI_File_get_position", "short_desc": "Retorna a posi\u00e7\u00e3o atual do ponteiro de arquivo individual em unidades etype em rela\u00e7\u00e3o \u00e0 vis\u00e3o (view) atual.", "synopsis": "int MPI_File_get_position(MPI_File fh, MPI_Offset * offset)", "params": [{"name": "fh", "desc": "handle do arquivo (handle)"}, {"name": "offset", "desc": "deslocamento do ponteiro de arquivo individual (inteiro n\u00e3o negativo)"}], "description": "Obt\u00e9m a posi\u00e7\u00e3o atual do ponteiro de arquivo privado do processo chamador. A posi\u00e7\u00e3o \u00e9 expressa em n\u00famero de unidades do tipo elementar (etype) a partir do in\u00edcio da vis\u00e3o atual do arquivo.", "application": "Controle de progresso em opera\u00e7\u00f5es de E/S independentes.", "example": "// Declara\u00e7\u00f5es\nMPI_File fh;\nMPI_Offset offset = 0;\n\nMPI_File_open(MPI_COMM_WORLD, \"arquivo.bin\", MPI_MODE_RDONLY, MPI_INFO_NULL, &fh);\n\n// Obt\u00e9m a posi\u00e7\u00e3o atual do ponteiro do processo\nint err = MPI_File_get_position(fh, &offset);\n\nif (err == MPI_SUCCESS) {\n    // Posi\u00e7\u00e3o obtida com sucesso\n}\n\nMPI_File_close(&fh);"}, {"name": "MPI_File_get_position_shared", "short_desc": "Retorna a posi\u00e7\u00e3o atual do ponteiro de arquivo compartilhado em unidades etype em rela\u00e7\u00e3o \u00e0 vis\u00e3o atual.", "synopsis": "int MPI_File_get_position_shared(MPI_File fh, MPI_Offset * offset)", "params": [{"name": "fh", "desc": "handle do arquivo (handle)"}, {"name": "offset", "desc": "deslocamento do ponteiro de arquivo compartilhado (inteiro n\u00e3o negativo)"}], "description": "Obt\u00e9m a posi\u00e7\u00e3o atual do ponteiro de arquivo compartilhado por todos os processos que abriram o arquivo coletivamente.", "application": "Coordena\u00e7\u00e3o de E/S coletiva baseada em ponteiros compartilhados.", "example": "// Declara\u00e7\u00f5es\nMPI_File fh;\nMPI_Offset offset = 0;\n\nMPI_File_open(MPI_COMM_WORLD, \"arquivo.bin\", MPI_MODE_RDONLY, MPI_INFO_NULL, &fh);\n\n// Obt\u00e9m a posi\u00e7\u00e3o compartilhada do ponteiro\nint err = MPI_File_get_position_shared(fh, &offset);\n\nif (err == MPI_SUCCESS) {\n    //
