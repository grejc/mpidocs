<script>
    const funcs = [{"name": "MPIX_Allgather_init", "short_desc": "Cria uma solicita\u00e7\u00e3o persistente para uma opera\u00e7\u00e3o allgather.", "synopsis": "int MPIX_Allgather_init(const void *sendbuf, int sendcount, MPI_Datatype sendtype, void *recvbuf, int recvcount, MPI_Datatype recvtype, MPI_Comm comm, MPI_Info info, MPI_Request *request)", "params": [{"name": "sendbuf", "desc": "Endere\u00e7o inicial do buffer de envio (ponteiro)."}, {"name": "sendcount", "desc": "N\u00famero de elementos no buffer de envio (inteiro)."}, {"name": "sendtype", "desc": "Tipo de dado dos elementos do buffer de envio (handle)."}, {"name": "recvbuf", "desc": "Endere\u00e7o inicial do buffer de recep\u00e7\u00e3o (ponteiro)."}, {"name": "recvcount", "desc": "N\u00famero de elementos recebidos de cada processo (inteiro)."}, {"name": "recvtype", "desc": "Tipo de dado dos elementos do buffer de recep\u00e7\u00e3o (handle)."}, {"name": "comm", "desc": "Comunicador (handle)."}, {"name": "info", "desc": "Objeto info que fornece diretivas de otimiza\u00e7\u00e3o (handle)."}, {"name": "request", "desc": "Solicita\u00e7\u00e3o de comunica\u00e7\u00e3o persistente (handle)."}], "description": "Cria uma solicita\u00e7\u00e3o (request) persistente para uma opera\u00e7\u00e3o coletiva Allgather, que coleta dados de todos os processos e distribui o resultado para todos. A comunica\u00e7\u00e3o n\u00e3o inicia at\u00e9 que a solicita\u00e7\u00e3o seja iniciada com MPI_Start.", "application": "Melhora o desempenho quando a mesma opera\u00e7\u00e3o Allgather precisa ser executada repetidamente com os mesmos par\u00e2metros de buffer e contagem.", "example": "// Declara\u00e7\u00f5es\nint rank, size;\nint send_data;\nint* recv_data = NULL;\nMPI_Request request;\nint err;\n\n// Obt\u00e9m o rank e o tamanho do comunicador global\nerr = MPI_Comm_rank(MPI_COMM_WORLD, &rank);\n// Em um programa real, seria bom lidar com erros aqui.\nerr = MPI_Comm_size(MPI_COMM_WORLD, &size);\n// Em um programa real, seria bom lidar com erros aqui.\n\n// Inicializa o buffer de envio com o rank do processo\nsend_data = rank * 10;\n\n// Aloca mem\u00f3ria para o buffer de recep\u00e7\u00e3o\n// Cada processo receber\u00e1 um inteiro de cada processo, ent\u00e3o size * sizeof(int)\nrecv_data = (int*)malloc(size * sizeof(int));\n\n// Inicializa a requisi\u00e7\u00e3o persistente para Allgather\n// Cada processo envia um inteiro e recebe 'size' inteiros (um de cada processo).\nerr = MPIX_Allgather_init(&send_data, 1, MPI_INT, recv_data, 1, MPI_INT, MPI_COMM_WORLD, MPI_INFO_NULL, &request);\n\nif (err == MPI_SUCCESS) {\n    // Inicia a opera\u00e7\u00e3o coletiva Allgather persistente\n    err = MPI_Start(&request);\n    if (err == MPI_SUCCESS) {\n        // Espera a conclus\u00e3o da opera\u00e7\u00e3o\n        MPI_Status status;\n        err = MPI_Wait(&request, &status);\n\n        if (err == MPI_SUCCESS) {\n            // Os dados coletados est\u00e3o agora em recv_data\n            // Por exemplo, processo 0 imprimiria: [0, 10, 20, ...]\n            // printf(\"Processo %d recebeu: \", rank);\n            // for (int i = 0; i < size; ++i) {\n            //     printf(\"%d \", recv_data[i]);\n            // }\n            // printf(\"\\n\");\n        }\n    }\n}\n\n// Libera a requisi\u00e7\u00e3o persistente\nerr = MPI_Request_free(&request);\n\n// Libera a mem\u00f3ria alocada para o buffer de recep\u00e7\u00e3o\nif (recv_data != NULL) {\n    free(recv_data);\n}"}, {"name": "MPIX_Allgatherv_init", "short_desc": "Cria uma solicita\u00e7\u00e3o persistente para uma opera\u00e7\u00e3o allgatherv.", "synopsis": "int MPIX_Allgatherv_init(const void *sendbuf, int sendcount, MPI_Datatype sendtype, void *recvbuf, const int recvcounts[], const int displs[], MPI_Datatype recvtype, MPI_Comm comm, MPI_Info info, MPI_Request *request)", "params": [{"name": "sendbuf", "desc": "Endere\u00e7o inicial do buffer de envio (ponteiro)."}, {"name": "sendcount", "desc": "N\u00famero de elementos no buffer de envio (inteiro)."}, {"name": "sendtype", "desc": "Tipo de dado dos elementos do buffer de envio (handle)."}, {"name": "recvbuf", "desc": "Endere\u00e7o inicial do buffer de recep\u00e7\u00e3o (ponteiro)."}, {"name": "recvcounts", "desc": "Vetor contendo o n\u00famero de elementos recebidos de cada processo (vetor de inteiros)."}, {"name": "displs", "desc": "Vetor de deslocamentos indicando onde colocar os dados de cada processo no buffer de recep\u00e7\u00e3o (vetor de inteiros)."}, {"name": "recvtype", "desc": "Tipo de dado dos elementos do buffer de recep\u00e7\u00e3o (handle)."}, {"name": "comm", "desc": "Comunicador (handle)."}, {"name": "info", "desc": "Objeto info de otimiza\u00e7\u00e3o (handle)."}, {"name": "request", "desc": "Solicita\u00e7\u00e3o de comunica\u00e7\u00e3o persistente (handle)."}], "description": "Cria uma solicita\u00e7\u00e3o persistente para uma opera\u00e7\u00e3o coletiva Allgatherv, que permite que diferentes processos contribuam com quantidades variadas de dados. Inicia a opera\u00e7\u00e3o com MPI_Start.", "application": "Recomendado para repeti\u00e7\u00f5es de opera\u00e7\u00f5es Allgatherv onde os tamanhos das mensagens enviadas permanecem constantes entre as itera\u00e7\u00f5es.", "example": "// Declara\u00e7\u00f5es\nint rank, size;\nint send_count;\nint* send_buffer = NULL;\nint* recv_buffer = NULL;\nint* recv_counts = NULL;\nint* displs = NULL;\nMPI_Request request;\nint err;\n\n// Obt\u00e9m o rank e o tamanho do comunicador global\nerr = MPI_Comm_rank(MPI_COMM_WORLD, &rank);\nerr = MPI_Comm_size(MPI_COMM_WORLD, &size);\n\n// Cada processo envia uma quantidade diferente de dados (ex: rank + 1 inteiros)\nsend_count = rank + 1;\nsend_buffer = (int*)malloc(send_count * sizeof(int));\nfor (int i = 0; i < send_count; ++i) {\n    send_buffer[i] = rank * 10 + i;\n}\n\n// Aloca arrays para recv_counts e displs\nrecv_counts = (int*)malloc(size * sizeof(int));\ndispls = (int*)malloc(size * sizeof(int));\n\nint total_recv_elements = 0;\nfor (int i = 0; i < size; ++i) {\n    recv_counts[i] = i + 1; // Processo i enviar\u00e1 i+1 elementos\n    displs[i] = total_recv_elements;\n    total_recv_elements += recv_counts[i];\n}\n\n// Aloca o buffer de recep\u00e7\u00e3o com o tamanho total necess\u00e1rio\nrecv_buffer = (int*)malloc(total_recv_elements * sizeof(int));\n\n// Inicializa a requisi\u00e7\u00e3o persistente para Allgatherv\nerr = MPIX_Allgatherv_init(send_buffer, send_count, MPI_INT,\n                           recv_buffer, recv_counts, displs, MPI_INT,\n                           MPI_COMM_WORLD, MPI_INFO_NULL, &request);\n\nif (err == MPI_SUCCESS) {\n    // Inicia a opera\u00e7\u00e3o coletiva Allgatherv persistente\n    err = MPI_Start(&request);\n    if (err == MPI_SUCCESS) {\n        // Espera a conclus\u00e3o da opera\u00e7\u00e3o\n        MPI_Status status;\n        err = MPI_Wait(&request, &status);\n\n        if (err == MPI_SUCCESS) {\n            // Os dados coletados est\u00e3o agora em recv_buffer\n            // printf(\"Processo %d recebeu (%d elementos): \", rank, total_recv_elements);\n            // for (int i = 0; i < total_recv_elements; ++i) {\n            //     printf(\"%d \", recv_buffer[i]);\n            // }\n            // printf(\"\\n\");\n        }\n    }\n}\n\n// Libera a requisi\u00e7\u00e3o persistente\nerr = MPI_Request_free(&request);\n\n// Libera as mem\u00f3rias alocadas\nif (send_buffer != NULL) free(send_buffer);\nif (recv_buffer != NULL) free(recv_buffer);\nif (recv_counts != NULL) free(recv_counts);\nif (displs != NULL) free(displs);"}, {"name": "MPIX_Allreduce_init", "short_desc": "Cria uma solicita\u00e7\u00e3o persistente para uma opera\u00e7\u00e3o allreduce.", "synopsis": "int MPIX_Allreduce_init(const void *sendbuf, void *recvbuf, int count, MPI_Datatype datatype, MPI_Op op, MPI_Comm comm, MPI_Info info, MPI_Request *request)", "params": [{"name": "sendbuf", "desc": "Endere\u00e7o inicial do buffer de envio (ponteiro)."}, {"name": "recvbuf", "desc": "Endere\u00e7o inicial do buffer de recep\u00e7\u00e3o (ponteiro)."}, {"name": "count", "desc": "N\u00famero de elementos a serem enviados e reduzidos (inteiro)."}, {"name": "datatype", "desc": "Tipo de dado dos elementos (handle)."}, {"name": "op", "desc": "Opera\u00e7\u00e3o global de redu\u00e7\u00e3o a ser aplicada (handle)."}, {"name": "comm", "desc": "Comunicador (handle)."}, {"name": "info", "desc": "Objeto info para dicas (handle)."}, {"name": "request", "desc": "Solicita\u00e7\u00e3o de comunica\u00e7\u00e3o persistente (handle)."}], "description": "Configura uma opera\u00e7\u00e3o persistente de redu\u00e7\u00e3o total (Allreduce). Todos os processos combinam os valores e recebem o resultado da redu\u00e7\u00e3o final. A execu\u00e7\u00e3o inicia com MPI_Start.", "application": "Muito utilizado em algoritmos iterativos num\u00e9ricos onde agrega\u00e7\u00f5es id\u00eanticas s\u00e3o realizadas com baixa lat\u00eancia em cada itera\u00e7\u00e3o.", "example": "// Declara\u00e7\u00f5es\nint rank, size;\ndouble send_value;\ndouble recv_value;\nMPI_Request request;\nint err;\n\n// Obt\u00e9m o rank e o tamanho do comunicador global\nerr = MPI_Comm_rank(MPI_COMM_WORLD, &rank);\nerr = MPI_Comm_size(MPI_COMM_WORLD, &size);\n\n// Cada processo envia seu rank como um valor double\nsend_value = (double)rank + 1.0;\n\n// Inicializa a requisi\u00e7\u00e3o persistente para Allreduce\n// Todos os processos somar\u00e3o seus 'send_value' e o resultado estar\u00e1 em 'recv_value'\nerr = MPIX_Allreduce_init(&send_value, &recv_value, 1, MPI_DOUBLE, MPI_SUM, MPI_COMM_WORLD, MPI_INFO_NULL, &request);\n\nif (err == MPI_SUCCESS) {\n    // Inicia a opera\u00e7\u00e3o coletiva Allreduce persistente\n    err = MPI_Start(&request);\n    if (err == MPI_SUCCESS) {\n        // Espera a conclus\u00e3o da opera\u00e7\u00e3o\n        MPI_Status status;\n        err = MPI_Wait(&request, &status);\n\n        if (err == MPI_SUCCESS) {\n            // recv_value agora cont\u00e9m a soma de todos os send_value de todos os processos\n            // (Ex: Se size=3, ranks 0,1,2, send_values 1.0,2.0,3.0, ent\u00e3o recv_value = 6.0)\n            // printf(\"Processo %d: send_value = %.1f, recv_value (soma total) = %.1f\\n\", rank, send_value, recv_value);\n        }\n    }\n}\n\n// Libera a requisi\u00e7\u00e3o persistente\nerr = MPI_Request_free(&request);"}, {"name": "MPIX_Alltoall_init", "short_desc": "Cria uma solicita\u00e7\u00e3o persistente para uma opera\u00e7\u00e3o alltoall.", "synopsis": "int MPIX_Alltoall_init(const void *sendbuf, int sendcount, MPI_Datatype sendtype, void *recvbuf, int recvcount, MPI_Datatype recvtype, MPI_Comm comm, MPI_Info info, MPI_Request *request)", "params": [{"name": "sendbuf", "desc": "Endere\u00e7o inicial do buffer de envio (ponteiro)."}, {"name": "sendcount", "desc": "N\u00famero de elementos enviados para cada processo (inteiro)."}, {"name": "sendtype", "desc": "Tipo de dado do buffer de envio (handle)."}, {"name": "recvbuf", "desc": "Endere\u00e7o inicial do buffer de recep\u00e7\u00e3o (ponteiro)."}, {"name": "recvcount", "desc": "N\u00famero de elementos recebidos de cada processo (inteiro)."}, {"name": "recvtype", "desc": "Tipo de dado do buffer de recep\u00e7\u00e3o (handle)."}, {"name": "comm", "desc": "Comunicador (handle)."}, {"name": "info", "desc": "Objeto de dicas (handle)."}, {"name": "request", "desc": "Solicita\u00e7\u00e3o de comunica\u00e7\u00e3o persistente (handle)."}], "description": "Inicializa uma opera\u00e7\u00e3o Alltoall persistente, distribuindo dados de cada processo para todos os outros do grupo comunicador. \u00c9 iniciada via MPI_Start.", "application": "Utilizada em transposi\u00e7\u00f5es de matrizes ou algoritmos de FFT, onde a mesma estrutura de comunica\u00e7\u00e3o \u00e9 repetida constantemente.", "example": "// Declara\u00e7\u00f5es\nint rank, size;\nint send_count_per_proc = 2; // N\u00famero de elementos a enviar para cada processo\nint recv_count_per_proc = 2; // N\u00famero de elementos a receber de cada processo\nint* send_buffer = NULL;\nint* recv_buffer = NULL;\nMPI_Request request;\nint err;\n\n// Obt\u00e9m o rank e o tamanho do comunicador global\nerr = MPI_Comm_rank(MPI_COMM_WORLD, &rank);\nerr = MPI_Comm_size(MPI_COMM_WORLD, &size);\n\n// Aloca e inicializa o buffer de envio\n// Total de elementos a enviar = size * send_count_per_proc\nsend_buffer = (int*)malloc(size * send_count_per_proc * sizeof(int));\nfor (int i = 0; i < size; ++i) {\n    for (int j = 0; j < send_count_per_proc; ++j) {\n        send_buffer[i * send_count_per_proc + j] = rank * 100 + i * 10 + j; // Dados para o proc 'i'\n    }\n}\n\n// Aloca o buffer de recep\u00e7\u00e3o\n// Total de elementos a receber = size * recv_count_per_proc\nrecv_buffer = (int*)malloc(size * recv_count_per_proc * sizeof(int));\n\n// Inicializa a requisi\u00e7\u00e3o persistente para Alltoall\nerr = MPIX_Alltoall_init(send_buffer, send_count_per_proc, MPI_INT,\n                           recv_buffer, recv_count_per_proc, MPI_INT,\n                           MPI_COMM_WORLD, MPI_INFO_NULL, &request);\n\nif (err == MPI_SUCCESS) {\n    // Inicia a opera\u00e7\u00e3o coletiva Alltoall persistente\n    err = MPI_Start(&request);\n    if (err == MPI_SUCCESS) {\n        // Espera a conclus\u00e3o da opera\u00e7\u00e3o\n        MPI_Status status;\n        err = MPI_Wait(&request, &status);\n\n        if (err == MPI_SUCCESS) {\n            // Os dados trocados est\u00e3o agora em recv_buffer\n            // recv_buffer[k * recv_count_per_proc + j] conter\u00e1 dados do processo k\n            // printf(\"Processo %d recebeu: \", rank);\n            // for (int i = 0; i < size * recv_count_per_proc; ++i) {\n            //     printf(\"%d \", recv_buffer[i]);\n            // }\n            // printf(\"\\n\");\n        }\n    }\n}\n\n// Libera a requisi\u00e7\u00e3o persistente\nerr = MPI_Request_free(&request);\n\n// Libera as mem\u00f3rias alocadas\nif (send_buffer != NULL) free(send_buffer);\nif (recv_buffer != NULL) free(recv_buffer);"}, {"name": "MPIX_Alltoallv_init", "short_desc": "Cria uma solicita\u00e7\u00e3o persistente para uma opera\u00e7\u00e3o alltoallv.", "synopsis": "int MPIX_Alltoallv_init(const void *sendbuf, const int sendcounts[], const int sdispls[], MPI_Datatype sendtype, void *recvbuf, const int recvcounts[], const int rdispls[], MPI_Datatype recvtype, MPI_Comm comm, MPI_Info info, MPI_Request *request)", "params": [{"name": "sendbuf", "desc": "Endere\u00e7o inicial do buffer de envio (ponteiro)."}, {"name": "sendcounts", "desc": "N\u00famero de elementos a enviar para cada processo (vetor de inteiros)."}, {"name": "sdispls", "desc": "Deslocamentos em rela\u00e7\u00e3o a sendbuf para cada envio (vetor de inteiros)."}, {"name": "sendtype", "desc": "Tipo de dado do buffer de envio (handle)."}, {"name": "recvbuf", "desc": "Endere\u00e7o inicial do buffer de recep\u00e7\u00e3o (ponteiro)."}, {"name": "recvcounts", "desc": "N\u00famero de elementos a receber de cada processo (vetor de inteiros)."}, {"name": "rdispls", "desc": "Deslocamentos em rela\u00e7\u00e3o a recvbuf indicando o destino dos dados (vetor de inteiros)."}, {"name": "recvtype", "desc": "Tipo de dado do buffer de recep\u00e7\u00e3o (handle)."}, {"name": "comm", "desc": "Comunicador (handle)."}, {"name": "info", "desc": "Objeto info de otimiza\u00e7\u00e3o (handle)."}, {"name": "request", "desc": "Solicita\u00e7\u00e3o de comunica\u00e7\u00e3o persistente (handle)."}], "description": "Configura uma opera\u00e7\u00e3o persistente Alltoallv. Diferente de Alltoall, permite definir de forma independente as quantidades de dados enviados/recebidos e os deslocamentos para cada processo par. Iniciada via MPI_Start.", "application": "Essencial para comunica\u00e7\u00e3o do tipo \"todos contra todos\" de forma n\u00e3o balanceada ou baseada em grafos, onde os tamanhos das mensagens variam mas repetem ao longo de itera\u00e7\u00f5es.", "example": "// Declara\u00e7\u00f5es\nint rank, size;\nint* send_buffer = NULL;\nint* recv_buffer = NULL;\nint* send_counts = NULL;\nint* sdispls = NULL;\nint* recv_counts = NULL;\nint* rdispls = NULL;\nMPI_Request request;\nint err;\n\n// Obt\u00e9m o rank e o tamanho do comunicador global\nerr = MPI_Comm_rank(MPI_COMM_WORLD, &rank);\nerr = MPI_Comm_size(MPI_COMM_WORLD, &size);\n\n// Aloca arrays de counts e displs\nsend_counts = (int*)malloc(size * sizeof(int));\nsdispls = (int*)malloc(size * sizeof(int));\nrecv_counts = (int*)malloc(size * sizeof(int));\nrdispls = (int*)malloc(size * sizeof(int));\n\nint total_send_elements = 0;\nint total_recv_elements = 0;\n\n// Define e calcula send_counts, sdispls, recv_counts, rdispls\nfor (int i = 0; i < size; ++i) {\n    // Exemplo: Processo 'rank' envia 'rank + i + 1' elementos para o processo 'i'\n    send_counts[i] = rank + i + 1;\n    sdispls[i] = total_send_elements;\n    total_send_elements += send_counts[i];\n\n    // Exemplo: Processo 'rank' recebe 'i + rank + 1' elementos do processo 'i'\n    recv_counts[i] = i + rank + 1; // Note que recv_counts[i] para P_rank \u00e9 o send_counts[rank] de P_i\n    rdispls[i] = total_recv_elements;\n    total_recv_elements += recv_counts[i];\n}\n\n// Aloca e inicializa o buffer de envio\nsend_buffer = (int*)malloc(total_send_elements * sizeof(int));\nfor (int i = 0; i < total_send_elements; ++i) {\n    send_buffer[i] = rank * 1000 + i;\n}\n\n// Aloca o buffer de recep\u00e7\u00e3o\nrecv_buffer = (int*)malloc(total_recv_elements * sizeof(int));\n\n// Inicializa a requisi\u00e7\u00e3o persistente para Alltoallv\nerr = MPIX_Alltoallv_init(send_buffer, send_counts, sdispls, MPI_INT,\n                            recv_buffer, recv_counts, rdispls, MPI_INT,\n                            MPI_COMM_WORLD, MPI_INFO_NULL, &request);\n\nif (err == MPI_SUCCESS) {\n    // Inicia a opera\u00e7\u00e3o coletiva Alltoallv persistente\n    err = MPI_Start(&request);\n    if (err == MPI_SUCCESS) {\n        // Espera a conclus\u00e3o da opera\u00e7\u00e3o\n        MPI_Status status;\n        err = MPI_Wait(&request, &status);\n\n        if (err == MPI_SUCCESS) {\n            // Os dados trocados est\u00e3o agora em recv_buffer\n            // printf(\"Processo %d recebeu (%d elementos): \", rank, total_recv_elements);\n            // for (int i = 0; i < total_recv_elements; ++i) {\n            //     printf(\"%d \", recv_buffer[i]);\n            // }\n            // printf(\"\\n\");\n        }\n    }\n}\n\n// Libera a requisi\u00e7\u00e3o persistente\nerr = MPI_Request_free(&request);\n\n// Libera as mem\u00f3rias alocadas\nif (send_buffer != NULL) free(send_buffer);\nif (recv_buffer != NULL) free(recv_buffer);\nif (send_counts != NULL) free(send_counts);\nif (sdispls != NULL) free(sdispls);\nif (recv_counts != NULL) free(recv_counts);\nif (rdispls != NULL) free(rdispls);"}, {"name": "MPIX_Alltoallw_init", "short_desc": "Cria uma solicita\u00e7\u00e3o persistente para uma opera\u00e7\u00e3o all-to-all generalizada com tipos e deslocamentos individuais.", "synopsis": "int MPIX_Alltoallw_init(const void *sendbuf, const int sendcounts[], const int sdispls[], const MPI_Datatype sendtypes[], void *recvbuf, const int recvcounts[], const int rdispls[], const MPI_Datatype recvtypes[], MPI_Comm comm, MPI_Info info, MPI_Request *request)", "params": [{"name": "sendbuf", "desc": "endere\u00e7o inicial do buffer de envio"}, {"name": "sendcounts", "desc": "array de inteiros especificando o n\u00famero de elementos para enviar a cada processo"}, {"name": "sdispls", "desc": "array de inteiros especificando o deslocamento em bytes para o envio a cada processo"}, {"name": "sendtypes", "desc": "array de tipos de dados especificando o tipo de dado para cada processo de envio"}, {"name": "recvbuf", "desc": "endere\u00e7o inicial do buffer de recep\u00e7\u00e3o"}, {"name": "recvcounts", "desc": "array de inteiros especificando o n\u00famero de elementos recebidos de cada processo"}, {"name": "rdispls", "desc": "array de inteiros especificando o deslocamento em bytes dos dados recebidos de cada processo"}, {"name": "recvtypes", "desc": "array de tipos de dados especificando o tipo de dado de cada processo de recep\u00e7\u00e3o"}, {"name": "comm", "desc": "comunicador"}, {"name": "info", "desc": "objeto info para otimiza\u00e7\u00e3o da opera\u00e7\u00e3o persistente"}, {"name": "request", "desc": "solicita\u00e7\u00e3o de comunica\u00e7\u00e3o (handle)"}], "description": "MPIX_Alltoallw_init \u00e9 a vers\u00e3o persistente da opera\u00e7\u00e3o MPI_Alltoallw (frequentemente adicionada como extens\u00e3o em implementa\u00e7\u00f5es MPI mais antigas ou dispon\u00edvel no padr\u00e3o MPI-4 como MPI_Alltoallw_init). Esta fun\u00e7\u00e3o vincula os argumentos de comunica\u00e7\u00e3o a uma solicita\u00e7\u00e3o persistente, mas n\u00e3o inicia a opera\u00e7\u00e3o. A comunica\u00e7\u00e3o real \u00e9 iniciada posteriormente usando MPI_Start ou MPI_Startall. O uso de coletivas persistentes permite que a implementa\u00e7\u00e3o do MPI otimize a transfer\u00eancia de dados e a organiza\u00e7\u00e3o de buffers em repeti\u00e7\u00f5es da mesma opera\u00e7\u00e3o.", "application": "\u00datil em aplica\u00e7\u00f5es onde o mesmo padr\u00e3o de comunica\u00e7\u00e3o all-to-all com tipos heterog\u00eaneos e contagens/deslocamentos variados \u00e9 repetido m\u00faltiplas vezes, como em certas permuta\u00e7\u00f5es matriciais ou trocas complexas em algoritmos iterativos. Reduz a sobrecarga de inicializa\u00e7\u00e3o das chamadas coletivas.", "example": "// Declara\u00e7\u00f5es\nint rank, size;\nchar* send_buffer = NULL;\nchar* recv_buffer = NULL;\nint* send_counts = NULL;\nMPI_Aint* sdispls = NULL; // MPI_Aint para deslocamentos em bytes\nMPI_Datatype* send_types = NULL;\nint* recv_counts = NULL;\nMPI_Aint* rdispls = NULL;\nMPI_Datatype* recv_types = NULL;\nMPI_Request request;\nint err;\n\n// Obt\u00e9m o rank e o tamanho do comunicador global\nerr = MPI_Comm_rank(MPI_COMM_WORLD, &rank);\nerr = MPI_Comm_size(MPI_COMM_WORLD, &size);\n\n// Aloca arrays para counts, displs e types\nsend_counts = (int*)malloc(size * sizeof(int));\nsdispls = (MPI_Aint*)malloc(size * sizeof(MPI_Aint));\nsend_types = (MPI_Datatype*)malloc(size * sizeof(MPI_Datatype));\nrecv_counts = (int*)malloc(size * sizeof(int));\nrdispls = (MPI_Aint*)malloc(size * sizeof(MPI_Aint));\nrecv_types = (MPI_Datatype*)malloc(size * sizeof(MPI_Datatype));\n\nint total_send_bytes = 0;\nint total_recv_bytes = 0;\n\n// Define e calcula para Alltoallw\nfor (int i = 0; i < size; ++i) {\n    // Exemplo: Processo 'rank' envia 1 int para 'i' e 1 char para 'i+1 (mod size)'\n    // Para simplificar, faremos cada processo enviar e receber um INT para todos.\n    // Mas demonstraremos o uso de diferentes datatypes nos arrays.\n    send_counts[i] = 1; // Envia 1 elemento para cada processo\n    recv_counts[i] = 1; // Recebe 1 elemento de cada processo\n\n    send_types[i] = (i % 2 == 0) ? MPI_INT : MPI_CHAR;\n    recv_types[i] = (i % 2 == 0) ? MPI_INT : MPI_CHAR;\n\n    int send_type_size;\n    MPI_Type_size(send_types[i], &send_type_size);\n    sdispls[i] = total_send_bytes;\n    total_send_bytes += send_counts[i] * send_type_size;\n\n    int recv_type_size;\n    MPI_Type_size(recv_types[i], &recv_type_size);\n    rdispls[i] = total_recv_bytes;\n    total_recv_bytes += recv_counts[i] * recv_type_size;\n}\n\n// Aloca e inicializa o buffer de envio (gen\u00e9rico para char para flexibilidade de tipos)\nsend_buffer = (char*)malloc(total_send_bytes);\n// Preenche com dados de exemplo\nchar* current_send_ptr = send_buffer;\nfor (int i = 0; i < size; ++i) {\n    if (send_types[i] == MPI_INT) {\n        *((int*)current_send_ptr) = rank * 10 + i; // Valor int\n        current_send_ptr += sizeof(int);\n    } else if (send_types[i] == MPI_CHAR) {\n        *((char*)current_send_ptr) = 'A' + rank + i;\n        current_send_ptr += sizeof(char);\n    }\n}\n\n// Aloca o buffer de recep\u00e7\u00e3o\nrecv_buffer = (char*)malloc(total_recv_bytes);\n\n// Inicializa a requisi\u00e7\u00e3o persistente para Alltoallw\nerr = MPIX_Alltoallw_init(send_buffer, send_counts, sdispls, send_types,\n                            recv_buffer, recv_counts, rdispls, recv_types,\n                            MPI_COMM_WORLD, MPI_INFO_NULL, &request);\n\nif (err == MPI_SUCCESS) {\n    // Inicia a opera\u00e7\u00e3o coletiva Alltoallw persistente\n    err = MPI_Start(&request);\n    if (err == MPI_SUCCESS) {\n        // Espera a conclus\u00e3o da opera\u00e7\u00e3o\n        MPI_Status status;\n        err = MPI_Wait(&request, &status);\n\n        if (err == MPI_SUCCESS) {\n            // Os dados trocados est\u00e3o agora em recv_buffer\n            // printf(\"Processo %d recebeu: \", rank);\n            // char* current_recv_ptr = recv_buffer;\n            // for (int i = 0; i < size; ++i) {\n            //     if (recv_types[i] == MPI_INT) {\n            //         printf(\"%d (int) \", *((int*)current_recv_ptr));\n            //         current_recv_ptr += sizeof(int);\n            //     } else if (recv_types[i] == MPI_CHAR) {\n            //         printf(\"%c (char) \", *((char*)current_recv_ptr));\n            //         current_recv_ptr += sizeof(char);\n            //     }\n            // }\n            // printf(\"\\n\");\n        }\n    }\n}\n\n// Libera a requisi\u00e7\u00e3o persistente\nerr = MPI_Request_free(&request);\n\n// Libera as mem\u00f3rias alocadas\nif (send_buffer != NULL) free(send_buffer);\nif (recv_buffer != NULL) free(recv_buffer);\nif (send_counts != NULL) free(send_counts);\nif (sdispls != NULL) free(sdispls);\nif (send_types != NULL) free(send_types);\nif (recv_counts != NULL) free(recv_counts);\nif (rdispls != NULL) free(rdispls);\nif (recv_types != NULL) free(recv_types);"}, {"name": "MPIX_Barrier_init", "short_desc": "Cria uma solicita\u00e7\u00e3o persistente para uma opera\u00e7\u00e3o de barreira (barrier).", "synopsis": "int MPIX_Barrier_init(MPI_Comm comm, MPI_Info info, MPI_Request *request)", "params": [{"name": "comm", "desc": "comunicador sobre o qual a barreira operar\u00e1"}, {"name": "info", "desc": "objeto info ou MPI_INFO_NULL"}, {"name": "request", "desc": "solicita\u00e7\u00e3o de comunica\u00e7\u00e3o persistente gerada"}], "description": "MPIX_Barrier_init inicializa uma barreira persistente. Quando iniciada com MPI_Start, nenhum processo no comunicador pode retornar de sua opera\u00e7\u00e3o de espera respectiva at\u00e9 que todos os processos envolvidos tenham chamado MPI_Start. Essa separa\u00e7\u00e3o de inicializa\u00e7\u00e3o e execu\u00e7\u00e3o ajuda a reduzir o overhead em la\u00e7os estritos e facilita a sincroniza\u00e7\u00e3o otimizada a n\u00edvel de hardware.", "application": "Aplicado quando uma barreira exata \u00e9 necess\u00e1ria iterativamente durante o ciclo de vida do programa (por exemplo, sincroniza\u00e7\u00f5es no final de cada passo em simula\u00e7\u00f5es do tipo step-by-step ou simula\u00e7\u00f5es temporais).", "example": "// Declara\u00e7\u00f5es\nint rank, size;\nMPI_Request request;\nint err;\n\n// Obt\u00e9m o rank e o tamanho do comunicador global\nerr = MPI_Comm_rank(MPI_COMM_WORLD, &rank);\nerr = MPI_Comm_size(MPI_COMM_WORLD, &size);\n\n// Inicializa a requisi\u00e7\u00e3o persistente para Barrier\nerr = MPIX_Barrier_init(MPI_COMM_WORLD, MPI_INFO_NULL, &request);\n\nif (err == MPI_SUCCESS) {\n    // Simula algumas itera\u00e7\u00f5es com a barreira persistente\n    int num_iterations = 3;\n    for (int i = 0; i < num_iterations; ++i) {\n        //printf(\"Processo %d: Chegando na barreira na itera\u00e7\u00e3o %d\\n\", rank, i);\n\n        // Inicia a opera\u00e7\u00e3o coletiva Barrier persistente\n        err = MPI_Start(&request);\n        if (err == MPI_SUCCESS) {\n            // Espera a conclus\u00e3o da opera\u00e7\u00e3o (todos os processos devem chegar aqui)\n            MPI_Status status;\n            err = MPI_Wait(&request, &status);\n\n            if (err == MPI_SUCCESS) {\n                //printf(\"Processo %d: Passou pela barreira na itera\u00e7\u00e3o %d\\n\", rank, i);\n            }\n        }\n    }\n}\n\n// Libera a requisi\u00e7\u00e3o persistente\nerr = MPI_Request_free(&request);"}, {"name": "MPIX_Bcast_init", "short_desc": "Cria uma solicita\u00e7\u00e3o persistente para uma opera\u00e7\u00e3o de broadcast.", "synopsis": "int MPIX_Bcast_init(void *buffer, int count, MPI_Datatype datatype, int root, MPI_Comm comm, MPI_Info info, MPI_Request *request)", "params": [{"name": "buffer", "desc": "endere\u00e7o inicial do buffer de dados"}, {"name": "count", "desc": "n\u00famero de entradas no buffer"}, {"name": "datatype", "desc": "tipo de dado do buffer"}, {"name": "root", "desc": "rank do processo raiz que envia os dados"}, {"name": "comm", "desc": "comunicador envolvido"}, {"name": "info", "desc": "objeto info para otimiza\u00e7\u00e3o da execu\u00e7\u00e3o coletiva persistente"}, {"name": "request", "desc": "handle da solicita\u00e7\u00e3o para a opera\u00e7\u00e3o persistente"}], "description": "A fun\u00e7\u00e3o MPIX_Bcast_init configura uma opera\u00e7\u00e3o de broadcast persistente. Em vez de transmitir os dados imediatamente, cria uma requisi\u00e7\u00e3o para ser executada m\u00faltiplas vezes com MPI_Start. O processo root compartilha o conte\u00fado de seu buffer com todos os outros processos do comunicador durante a fase de execu\u00e7\u00e3o, possivelmente usufruindo de aloca\u00e7\u00f5es e roteamentos de rede pr\u00e9-computados.", "application": "Pode ser utilizado em arquiteturas de treinamento de IA distribu\u00eddas ou simula\u00e7\u00f5es onde pesos, limiares globais ou gradientes id\u00eanticos s\u00e3o transmitidos iterativamente a partir do n\u00f3 mestre para todos os n\u00f3s trabalhadores.", "example": "// Declara\u00e7\u00f5es\nint rank, size;\nint buffer_data[10]; // Buffer para dados a serem broadcasted\nint count = 10; // N\u00famero de elementos no buffer\nint root = 0; // Processo raiz para o broadcast\nMPI_Request request;\nint err;\n\n// Obt\u00e9m o rank e o tamanho do comunicador global\nerr = MPI_Comm_rank(MPI_COMM_WORLD, &rank);\nerr = MPI_Comm_size(MPI_COMM_WORLD, &size);\n\n// O processo raiz inicializa os dados\nif (rank == root) {\n    for (int i = 0; i < count; ++i) {\n        buffer_data[i] = i * 2;\n    }\n}\n\n// Inicializa a requisi\u00e7\u00e3o persistente para Broadcast\nerr = MPIX_Bcast_init(buffer_data, count, MPI_INT, root, MPI_COMM_WORLD, MPI_INFO_NULL, &request);\n\nif (err == MPI_SUCCESS) {\n    // Inicia a opera\u00e7\u00e3o coletiva Broadcast persistente\n    err = MPI_Start(&request);\n    if (err == MPI_SUCCESS) {\n        // Espera a conclus\u00e3o da opera\u00e7\u00e3o\n        MPI_Status status;\n        err = MPI_Wait(&request, &status);\n\n        if (err == MPI_SUCCESS) {\n            // Todos os processos agora t\u00eam os dados do processo raiz em buffer_data\n            // printf(\"Processo %d recebeu: \", rank);\n            // for (int i = 0; i < count; ++i) {\n            //     printf(\"%d \", buffer_data[i]);\n            // }\n            // printf(\"\\n\");\n        }\n    }\n}\n\n// Libera a requisi\u00e7\u00e3o persistente\nerr = MPI_Request_free(&request);"}, {"name": "MPIX_Exscan_init", "short_desc": "Cria uma solicita\u00e7\u00e3o persistente para uma redu\u00e7\u00e3o de scan exclusivo.", "synopsis": "int MPIX_Exscan_init(const void *sendbuf, void *recvbuf, int count, MPI_Datatype datatype, MPI_Op op, MPI_Comm comm, MPI_Info info, MPI_Request *request)", "params": [{"name": "sendbuf", "desc": "endere\u00e7o inicial do buffer de envio"}, {"name": "recvbuf", "desc": "endere\u00e7o inicial do buffer de recep\u00e7\u00e3o"}, {"name": "count", "desc": "n\u00famero de elementos no buffer"}, {"name": "datatype", "desc": "tipo de dado dos elementos"}, {"name": "op", "desc": "opera\u00e7\u00e3o de redu\u00e7\u00e3o a ser aplicada (ex: MPI_SUM, MPI_MAX)"}, {"name": "comm", "desc": "comunicador"}, {"name": "info", "desc": "objeto info"}, {"name": "request", "desc": "handle da requisi\u00e7\u00e3o que representar\u00e1 a opera\u00e7\u00e3o exscan persistente"}], "description": "Inicializa um scan exclusivo (exscan) de forma persistente. A opera\u00e7\u00e3o de Exscan acumula valores de processos de 0 at\u00e9 i-1 e os deposita no recvbuf do processo i. O processo 0 n\u00e3o recebe nenhum dado (o conte\u00fado de recvbuf \u00e9 indefinido em i=0). O uso na forma persistente ajuda a evitar os custos associados ao setup da topologia em opera\u00e7\u00f5es cont\u00ednuas que exigem prefix-sums parciais.", "application": "Aplicado quando uma aloca\u00e7\u00e3o de prefixos repetitiva \u00e9 necess\u00e1ria ao longo de um la\u00e7o iterativo, por exemplo, para distribuir balanceamento de carga ou particionar novos arrays de dados em tempo de execu\u00e7\u00e3o sem os atrasos de inicializa\u00e7\u00e3o por chamada.", "example": "// Declara\u00e7\u00f5es\nint rank, size;\nint my_value;\nint exclusive_prefix_sum; // Buffer de recep\u00e7\u00e3o para o resultado do exscan\nint count = 1; // N\u00famero de elementos a serem escaneados\nMPI_Request request;\nint err;\n\n// Obt\u00e9m o rank e o tamanho do comunicador global\nerr = MPI_Comm_rank(MPI_COMM_WORLD, &rank);\nerr = MPI_Comm_size(MPI_COMM_WORLD, &size);\n\n// Cada processo tem um valor a contribuir para o exscan\nmy_value = rank + 1; // Ex: P0=1, P1=2, P2=3, ...\n\n// Inicializa a requisi\u00e7\u00e3o persistente para Exscan\n// Usaremos a opera\u00e7\u00e3o MPI_SUM para acumular os valores\nerr = MPIX_Exscan_init(&my_value, &exclusive_prefix_sum, count, MPI_INT, MPI_SUM, MPI_COMM_WORLD, MPI_INFO_NULL, &request);\n\nif (err == MPI_SUCCESS) {\n    // Inicia a opera\u00e7\u00e3o coletiva Exscan persistente\n    err = MPI_Start(&request);\n    if (err == MPI_SUCCESS) {\n        // Espera a conclus\u00e3o da opera\u00e7\u00e3o\n        MPI_Status status;\n        err = MPI_Wait(&request, &status);\n\n        if (err == MPI_SUCCESS) {\n            // exclusive_prefix_sum agora cont\u00e9m a soma dos valores dos processos com rank < meu_rank\n            // Processo 0 ter\u00e1 um valor indefinido (geralmente 0 ou o valor inicial de 'exclusive_prefix_sum')\n            // (Ex: se P0=1,P1=2,P2=3; P0->?, P1->1, P2->(1+2)=3)\n            // if (rank == 0) {\n            //     printf(\"Processo %d: meu_valor = %d, prefixo exclusivo (indefinido ou 0) = %d\\n\", rank, my_value, exclusive_prefix_sum);\n            // } else {\n            //     printf(\"Processo %d: meu_valor = %d, prefixo exclusivo = %d\\n\", rank, my_value, exclusive_prefix_sum);\n            // }\n        }\n    }\n}\n\n// Libera a requisi\u00e7\u00e3o persistente\nerr = MPI_Request_free(&request);"}, {"name": "MPIX_Gather_init", "short_desc": "Cria uma solicita\u00e7\u00e3o persistente para uma opera\u00e7\u00e3o de gather.", "synopsis": "int MPIX_Gather_init(const void *sendbuf, int sendcount, MPI_Datatype sendtype, void *recvbuf, int recvcount, MPI_Datatype recvtype, int root, MPI_Comm comm, MPI_Info info, MPI_Request *request)", "params": [{"name": "sendbuf", "desc": "endere\u00e7o inicial do buffer de envio em cada processo"}, {"name": "sendcount", "desc": "n\u00famero de elementos sendo enviados"}, {"name": "sendtype", "desc": "tipo de dados dos elementos enviados"}, {"name": "recvbuf", "desc": "endere\u00e7o inicial do buffer de recep\u00e7\u00e3o (apenas significativo na raiz)"}, {"name": "recvcount", "desc": "n\u00famero de elementos sendo recebidos de *cada processo individual* (apenas na raiz)"}, {"name": "recvtype", "desc": "tipo de dado do buffer de recep\u00e7\u00e3o (apenas na raiz)"}, {"name": "root", "desc": "rank do processo de destino"}, {"name": "comm", "desc": "comunicador correspondente"}, {"name": "info", "desc": "objeto info ou MPI_INFO_NULL"}, {"name": "request", "desc": "handle da solicita\u00e7\u00e3o retornada"}], "description": "Essa fun\u00e7\u00e3o configura um gather coletivo persistente. A cada inicializa\u00e7\u00e3o por MPI_Start, cada processo enviar\u00e1 seu `sendbuf` ao processo `root`, que por sua vez receber\u00e1 e empilhar\u00e1 todos no `recvbuf` de forma ordenada de acordo com o rank. O pre-setup persistente evita a aloca\u00e7\u00e3o e verifica\u00e7\u00e3o cont\u00ednua dos recursos da opera\u00e7\u00e3o gather.", "application": "Apropriado para o monitoramento e agrupamento constante de dados menores gerados periodicamente em n\u00f3s de computa\u00e7\u00e3o para um n\u00f3 gerente (root) que pode gravar os resultados no disco ao fim de cada rodada.", "example": "// Declara\u00e7\u00f5es\nint rank, size;\nint local_data[5]; // Dados locais de cada processo\nint send_count = 5;\nint recv_count = 5; // N\u00famero de elementos a receber de cada processo na raiz\nint root = 0; // Processo raiz que coletar\u00e1 os dados\nint* global_data = NULL; // Buffer de recep\u00e7\u00e3o, significativo apenas na raiz\nMPI_Request request;\nint err;\n\n// Obt\u00e9m o rank e o tamanho do comunicador global\nerr = MPI_Comm_rank(MPI_COMM_WORLD, &rank);\nerr = MPI_Comm_size(MPI_COMM_WORLD, &size);\n\n// Cada processo inicializa seus dados locais\nfor (int i = 0; i < send_count; ++i) {\n    local_data[i] = rank * 100 + i;\n}\n\n// O processo raiz aloca o buffer global para receber os dados de todos\nif (rank == root) {\n    global_data = (int*)malloc(size * recv_count * sizeof(int));\n}\n\n// Inicializa a requisi\u00e7\u00e3o persistente para Gather\nerr = MPIX_Gather_init(local_data, send_count, MPI_INT,\n                        global_data, recv_count, MPI_INT,\n                        root, MPI_COMM_WORLD, MPI_INFO_NULL, &request);\n\nif (err == MPI_SUCCESS) {\n    // Inicia a opera\u00e7\u00e3o coletiva Gather persistente\n    err = MPI_Start(&request);\n    if (err == MPI_SUCCESS) {\n        // Espera a conclus\u00e3o da opera\u00e7\u00e3o\n        MPI_Status status;\n        err = MPI_Wait(&request, &status);\n\n        if (err == MPI_SUCCESS) {\n            // Somente o processo raiz ter\u00e1 os dados v\u00e1lidos em global_data\n            // if (rank == root) {\n            //     printf(\"Processo %d (ROOT) coletou: \", rank);\n            //     for (int i = 0; i < size * recv_count; ++i) {\n            //         printf(\"%d \", global_data[i]);\n            //     }\n            //     printf(\"\\n\");\n            // }\n        }\n    }\n}\n\n// Libera a requisi\u00e7\u00e3o persistente\nerr = MPI_Request_free(&request);\n\n// Libera a mem\u00f3ria alocada pelo processo raiz\nif (rank == root && global_data != NULL) {\n    free(global_data);\n}"}, {"name": "MPIX_Gatherv_init", "short_desc": "Cria uma solicita\u00e7\u00e3o persistente para uma opera\u00e7\u00e3o de gather com contagens vari\u00e1veis (Gatherv).", "synopsis": "int MPIX_Gatherv_init(const void *sendbuf, int sendcount, MPI_Datatype sendtype, void *recvbuf, const int recvcounts[], const int displs[], MPI_Datatype recvtype, int root, MPI_Comm comm, MPI_Info info, MPI_Request *request)", "params": [{"name": "sendbuf", "desc": "buffer local com os dados de envio"}, {"name": "sendcount", "desc": "n\u00famero exato de elementos que o processo atual enviar\u00e1"}, {"name": "sendtype", "desc": "tipo de dado a enviar"}, {"name": "recvbuf", "desc": "buffer global para receber os dados combinados (na raiz)"}, {"name": "recvcounts", "desc": "array de contagens contendo quantos elementos s\u00e3o recebidos de cada processo (na raiz)"}, {"name": "displs", "desc": "array especificando o deslocamento (por bloco de sendtype) em que os dados de cada rank come\u00e7ar\u00e3o no recvbuf (na raiz)"}, {"name": "recvtype", "desc": "tipo de dado dos elementos recebidos (na raiz)"}, {"name": "root", "desc": "rank do processo de destino"}, {"name": "comm", "desc": "comunicador"}, {"name": "info", "desc": "objeto de info com dicas de implementa\u00e7\u00e3o"}, {"name": "request", "desc": "solicita\u00e7\u00e3o persistente associada"}], "description": "Prepara um gather com blocos irregulares. Semelhante a MPI_Gatherv, mas na forma persistente. A vantagem de especificar essa opera\u00e7\u00e3o de forma persistente \u00e9 a maior estabilidade e oportunidade da rede de programar um agendamento melhor de fluxos irregulares. Todos os deslocamentos e matrizes de contagens devem sobreviver durante toda a inicializa\u00e7\u00e3o e inicializa\u00e7\u00f5es da execu\u00e7\u00e3o.", "application": "Ideal em solu\u00e7\u00f5es de elementos finitos onde fatias em diferentes n\u00f3s variam de tamanho e precisam ser reunidas em um espa\u00e7o mestre para mesclagem vetorial peri\u00f3dica sem gerar lat\u00eancia de roteamento na chamada.", "example": "// Declara\u00e7\u00f5es\nint rank, size;\nint count = 5;\nint sendbuf[5] = {1, 2, 3, 4, 5};\nint recvbuf[20];\nint recvcounts[4] = {5, 5, 5, 5};\nint displs[4] = {0, 5, 10, 15};\nMPI_Request request;\nMPI_Comm comm = MPI_COMM_WORLD;\n\nMPI_Comm_rank(comm, &rank);\nMPI_Comm_size(comm, &size);\n\n// Inicializa a opera\u00e7\u00e3o persistente\nint err = MPIX_Gatherv_init(sendbuf, count, MPI_INT, recvbuf, recvcounts, displs, MPI_INT, 0, comm, MPI_INFO_NULL, &request);\n\nif (err == MPI_SUCCESS) {\n    // Executa a opera\u00e7\u00e3o 10 vezes de forma persistente\n    for (int i = 0; i < 10; i++) {\n        MPI_Start(&request);\n        MPI_Wait(&request, MPI_STATUS_IGNORE);\n    }\n}\n\n// Libera o recurso de requisi\u00e7\u00e3o\nMPI_Request_free(&request);"}, {"name": "MPIX_Neighbor_allgather_init", "short_desc": "Cria uma solicita\u00e7\u00e3o persistente para um allgather entre vizinhos (comunicador topol\u00f3gico).", "synopsis": "int MPIX_Neighbor_allgather_init(const void *sendbuf, int sendcount, MPI_Datatype sendtype, void *recvbuf, int recvcount, MPI_Datatype recvtype, MPI_Comm comm, MPI_Info info, MPI_Request *request)", "params": [{"name": "sendbuf", "desc": "endere\u00e7o do buffer local com os dados enviados aos vizinhos"}, {"name": "sendcount", "desc": "n\u00famero de elementos que s\u00e3o enviados para CADA vizinho"}, {"name": "sendtype", "desc": "tipo de dados do envio"}, {"name": "recvbuf", "desc": "endere\u00e7o inicial para receber dados de todos os vizinhos"}, {"name": "recvcount", "desc": "n\u00famero de elementos recebidos de cada vizinho individual"}, {"name": "recvtype", "desc": "tipo de dados do buffer de recep\u00e7\u00e3o"}, {"name": "comm", "desc": "comunicador com uma topologia de vizinhan\u00e7a (como grade ou grafo) anexada"}, {"name": "info", "desc": "objeto info com flags para opera\u00e7\u00e3o persistente"}, {"name": "request", "desc": "retorna a requisi\u00e7\u00e3o iniciada"}], "description": "Vincula os canais vizinhos a uma chamada allgather topol\u00f3gica em uma requisi\u00e7\u00e3o. Como as coletivas de vizinhos comunicam apenas por adjac\u00eancia expl\u00edcita definida num comunicador estruturado (e n\u00e3o a todo o comunicador inteiro), elas t\u00eam uma chance extremamente alta de se beneficiarem de requisi\u00e7\u00f5es persistentes alinhando melhor com o DMA entre n\u00f3s vizinhos.", "application": "Atualiza\u00e7\u00e3o do halo constante e trocas de fronteiras (ghost cells) num reticulado cartesiano 2D/3D (estilo est\u00eancil), em que o mesmo bloco de dados cont\u00edguo necessita ser alinhado e trocado repetidamente.", "example": "// Declara\u00e7\u00f5es\nint halo_data[1] = {10};\nint ghost_cells[4]; // Supondo 4 vizinhos\nMPI_Request request;\nMPI_Comm cart_comm;\nint dims[1] = {4}, periods[1] = {1};\n\n// Cria topologia cartesiana\nMPI_Cart_create(MPI_COMM_WORLD, 1, dims, periods, 0, &cart_comm);\n\n// Inicializa a opera\u00e7\u00e3o persistente de vizinhan\u00e7a\nint err = MPIX_Neighbor_allgather_init(halo_data, 1, MPI_INT, ghost_cells, 1, MPI_INT, cart_comm, MPI_INFO_NULL, &request);\n\nif (err == MPI_SUCCESS) {\n    // Ciclo de atualiza\u00e7\u00e3o halo\n    for (int i = 0; i < 5; i++) {\n        MPI_Start(&request);\n        MPI_Wait(&request, MPI_STATUS_IGNORE);\n    }\n}\n\nMPI_Request_free(&request);\nMPI_Comm_free(&cart_comm);"}, {"name": "MPIX_Neighbor_allgatherv_init", "short_desc": "Cria uma solicita\u00e7\u00e3o persistente para um neighbor allgather com tamanho de buffer vari\u00e1vel.", "synopsis": "int MPIX_Neighbor_allgatherv_init(const void *sendbuf, int sendcount, MPI_Datatype sendtype, void *recvbuf, const int recvcounts[], const int displs[], MPI_Datatype recvtype, MPI_Comm comm, MPI_Info info, MPI_Request *request)", "params": [{"name": "sendbuf", "desc": "buffer de envio contendo itens para cada vizinho"}, {"name": "sendcount", "desc": "n\u00famero constante de elementos de envio aos vizinhos"}, {"name": "sendtype", "desc": "tipo de dados do envio"}, {"name": "recvbuf", "desc": "buffer onde as respostas de todos os vizinhos s\u00e3o depositadas"}, {"name": "recvcounts", "desc": "array de quantos elementos devem ser recebidos de cada vizinho individualmente"}, {"name": "displs", "desc": "array onde a resposta de cada adjac\u00eancia ser\u00e1 depositada (em offsets da extens\u00e3o do tipo)"}, {"name": "recvtype", "desc": "tipo de dado do buf de recep\u00e7\u00e3o"}, {"name": "comm", "desc": "comunicador topol\u00f3gico"}, {"name": "info", "desc": "dicas info extras"}, {"name": "request", "desc": "requisi\u00e7\u00e3o handle que ser\u00e1 devolvida"}], "description": "Semelhante ao Neighbor_allgather, mas as respostas dos diferentes vizinhos na topologia podem variar em comprimento (gatherv do escopo local da vizinhan\u00e7a). Como MPI_Neighbor_allgatherv_init em padr\u00e3o MPI-4, gera uma coletiva iterativa e irregular baseada em grafos que economiza configura\u00e7\u00e3o de handshakes de vizinhos.", "application": "\u00datil na transfer\u00eancia de halos esparsos (listas de v\u00e9rtices n\u00e3o uniformes numa fronteira de malha em problemas de elementos finitos est\u00e1ticos) executados em m\u00faltiplos loop-steps sem reconstru\u00e7\u00e3o constante.", "example": "// Declara\u00e7\u00f5es\nint sendbuf[2] = {1, 2};\nint recvbuf[8];\nint recvcounts[4] = {2, 2, 2, 2};\nint displs[4] = {0, 2, 4, 6};\nMPI_Request request;\nMPI_Comm comm = MPI_COMM_WORLD;\n\n// Inicializa a opera\u00e7\u00e3o persistente irregular\nint err = MPIX_Neighbor_allgatherv_init(sendbuf, 2, MPI_INT, recvbuf, recvcounts, displs, MPI_INT, comm, MPI_INFO_NULL, &request);\n\nif (err == MPI_SUCCESS) {\n    for (int i = 0; i < 5; i++) {\n        MPI_Start(&request);\n        MPI_Wait(&request, MPI_STATUS_IGNORE);\n    }\n}\n\nMPI_Request_free(&request);"}, {"name": "MPIX_Neighbor_alltoall_init", "short_desc": "Cria uma solicita\u00e7\u00e3o persistente para uma comunica\u00e7\u00e3o all-to-all exclusiva entre vizinhos de um subgrafo.", "synopsis": "int MPIX_Neighbor_alltoall_init(const void *sendbuf, int sendcount, MPI_Datatype sendtype, void *recvbuf, int recvcount, MPI_Datatype recvtype, MPI_Comm comm, MPI_Info info, MPI_Request *request)", "params": [{"name": "sendbuf", "desc": "buffer de envio, subdividido em blocos a serem enviados a cada vizinho em ordem"}, {"name": "sendcount", "desc": "n\u00famero exato de elementos no sub-bloco direcionado a *cada* vizinho"}, {"name": "sendtype", "desc": "tipo do sub-bloco"}, {"name": "recvbuf", "desc": "buffer para receber e armazenar contiguamente a mensagem de cada vizinho"}, {"name": "recvcount", "desc": "n\u00famero de elementos que se espera receber de *cada* vizinho"}, {"name": "recvtype", "desc": "tipo base dos itens de recep\u00e7\u00e3o"}, {"name": "comm", "desc": "comunicador de estrutura topol\u00f3gica com adjac\u00eancias pr\u00e9-estabelecidas"}, {"name": "info", "desc": "vari\u00e1veis ou par\u00e2metros extra (dicas)"}, {"name": "request", "desc": "refer\u00eancia persistente que \u00e9 criada"}], "description": "Ao contr\u00e1rio de neighbor_allgather, onde a mesma mensagem \u00e9 copiada para todos, no neighbor_alltoall cada vizinho receber\u00e1 um bloco diferente (fragmentado sequencialmente a partir de sendbuf). Inicializar isso numa vers\u00e3o persistente providencia a rede paralela do MPI canais l\u00f3gicos fortes que otimizam saltos por hop na rede de interconex\u00e3o e evita repeti\u00e7\u00f5es onerosas em loops curtos.", "application": "Adequado para rotinas repetitivas de redistribui\u00e7\u00e3o densa, como as etapas de transposi\u00e7\u00f5es topol\u00f3gicas estruturadas e trocas de subdom\u00ednio de blocos independentes.", "example": "// Declara\u00e7\u00f5es\nint sendbuf[4] = {1, 2, 3, 4};\nint recvbuf[4] = {0, 0, 0, 0};\nMPI_Request request;\nMPI_Comm comm = MPI_COMM_WORLD;\n\n// Inicializa troca persistente com vizinhos\nint err = MPIX_Neighbor_alltoall_init(sendbuf, 1, MPI_INT, recvbuf, 1, MPI_INT, comm, MPI_INFO_NULL, &request);\n\nif (err == MPI_SUCCESS) {\n    for (int i = 0; i < 5; i++) {\n        MPI_Start(&request);\n        MPI_Wait(&request, MPI_STATUS_IGNORE);\n    }\n}\n\nMPI_Request_free(&request);"}, {"name": "MPIX_Neighbor_alltoallv_init", "short_desc": "Cria uma solicita\u00e7\u00e3o persistente para um neighbor all-to-all com blocos assim\u00e9tricos vetoriais.", "synopsis": "int MPIX_Neighbor_alltoallv_init(const void *sendbuf, const int sendcounts[], const int sdispls[], MPI_Datatype sendtype, void *recvbuf, const int recvcounts[], const int rdispls[], MPI_Datatype recvtype, MPI_Comm comm, MPI_Info info, MPI_Request *request)", "params": [{"name": "sendbuf", "desc": "endere\u00e7o base de envio"}, {"name": "sendcounts", "desc": "array descrevendo o tamanho dos blocos separados por destino vizinho"}, {"name": "sdispls", "desc": "array com deslocamento dos blocos locais de origem"}, {"name": "sendtype", "desc": "tipo unit\u00e1rio em sendbuf"}, {"name": "recvbuf", "desc": "endere\u00e7o base de recebimento de mensagens"}, {"name": "recvcounts", "desc": "array que prev\u00ea o tamanho de cada bloco respectivo chegando dos vizinhos adjacentes"}, {"name": "rdispls", "desc": "array que demarca os deslocamentos a preencher no recvbuf da resposta"}, {"name": "recvtype", "desc": "tipo unit\u00e1rio em recvbuf"}, {"name": "comm", "desc": "comunicador topol\u00f3gico contendo vizinhos de n\u00f3 definidos"}, {"name": "info", "desc": "objeto MPI_Info para tuning"}, {"name": "request", "desc": "handler do MPI para a requisi\u00e7\u00e3o constru\u00edda"}], "description": "Gera a opera\u00e7\u00e3o all-to-allv topologicamente sens\u00edvel e persistente. Cada vizinho tem seu pr\u00f3prio tamanho e deslocamento expl\u00edcito listado na origem e no receptor, modelando trocas de vizinhan\u00e7a totalmente irregulares. As matrizes e offsets usados na inicializa\u00e7\u00e3o persistem nos bastidores como contratos l\u00f3gicos durante a vig\u00eancia do programa, melhorando muito o desempenho para malhas ou grafos complexos invariantes.", "application": "Fundamental para solvers de grafos hiper-irregulares e malhas el\u00e1sticas onde diferentes bordas e pesos est\u00e1ticos de vizinhan\u00e7a exigem fluxos de informa\u00e7\u00f5es desequilibrados por la\u00e7os temporais, contanto que o tamanho do volume n\u00e3o se altere ao longo das passagens.", "example": "// Declara\u00e7\u00f5es\nint sendbuf[4] = {1, 2, 3, 4};\nint recvbuf[4];\nint scnts[2] = {2, 2}, sdispls[2] = {0, 2};\nint rcnts[2] = {2, 2}, rdispls[2] = {0, 2};\nMPI_Request request;\nMPI_Comm comm = MPI_COMM_WORLD;\n\n// Inicializa alltoallv persistente\nint err = MPIX_Neighbor_alltoallv_init(sendbuf, scnts, sdispls, MPI_INT, recvbuf, rcnts, rdispls, MPI_INT, comm, MPI_INFO_NULL, &request);\n\nif (err == MPI_SUCCESS) {\n    for (int i = 0; i < 5; i++) {\n        MPI_Start(&request);\n        MPI_Wait(&request, MPI_STATUS_IGNORE);\n    }\n}\n\nMPI_Request_free(&request);"}, {"name": "MPIX_Neighbor_alltoallw_init", "short_desc": "Cria uma requisi\u00e7\u00e3o persistente para uma opera\u00e7\u00e3o alltoallw em uma topologia de vizinhan\u00e7a.", "synopsis": "int MPIX_Neighbor_alltoallw_init(const void *sendbuf, const int sendcounts[], const MPI_Aint sdispls[], const MPI_Datatype sendtypes[], void *recvbuf, const int recvcounts[], const MPI_Aint rdispls[], const MPI_Datatype recvtypes[], MPI_Comm comm, MPI_Info info, MPI_Request *request)", "params": [{"name": "sendbuf", "desc": "Endere\u00e7o inicial do buffer de envio (escolha)."}, {"name": "sendcounts", "desc": "Matriz de inteiros especificando o n\u00famero de elementos para enviar a cada vizinho."}, {"name": "sdispls", "desc": "Matriz de deslocamentos inteiros (em bytes) relativos a sendbuf para especificar onde os dados de envio de cada vizinho come\u00e7am."}, {"name": "sendtypes", "desc": "Matriz de tipos de dados especificando o tipo de cada envio."}, {"name": "recvbuf", "desc": "Endere\u00e7o inicial do buffer de recep\u00e7\u00e3o (escolha)."}, {"name": "recvcounts", "desc": "Matriz de inteiros especificando o n\u00famero de elementos a receber de cada vizinho."}, {"name": "rdispls", "desc": "Matriz de deslocamentos inteiros (em bytes) relativos a recvbuf para especificar onde os dados recebidos de cada vizinho ser\u00e3o colocados."}, {"name": "recvtypes", "desc": "Matriz de tipos de dados especificando o tipo de cada recep\u00e7\u00e3o."}, {"name": "comm", "desc": "Comunicador com estrutura de topologia (handle)."}, {"name": "info", "desc": "Objeto de informa\u00e7\u00e3o (handle)."}, {"name": "request", "desc": "Requisi\u00e7\u00e3o de comunica\u00e7\u00e3o persistente gerada (handle)."}], "description": "MPIX_Neighbor_alltoallw_init inicializa uma opera\u00e7\u00e3o coletiva persistente para envio e recebimento de dados com pesos (deslocamentos e tipos de dados customizados) para todos os vizinhos em uma topologia de comunicador. Ela n\u00e3o executa a comunica\u00e7\u00e3o imediatamente. A comunica\u00e7\u00e3o deve ser iniciada com MPI_Start ou MPI_Startall. \u00c9 a vers\u00e3o persistente e experimental do MPI_Neighbor_alltoallw, posteriormente padronizada no MPI 4.0.", "application": "Muito \u00fatil em aplica\u00e7\u00f5es que possuem um padr\u00e3o de comunica\u00e7\u00e3o de vizinhan\u00e7a fixo e irregular (como m\u00e9todos de diferen\u00e7as finitas ou m\u00e9todos baseados em grafos) executado iterativamente, minimizando o overhead de configura\u00e7\u00e3o coletiva a cada passo computacional.", "example": "// Declara\u00e7\u00f5es\nint sendbuf[4] = {1, 2, 3, 4};\nint recvbuf[4];\nint sendcounts[2] = {2, 2}, recvcounts[2] = {2, 2};\nMPI_Aint sdispls[2] = {0, 8}, rdispls[2] = {0, 8};\nMPI_Datatype sendtypes[2] = {MPI_INT, MPI_INT}, recvtypes[2] = {MPI_INT, MPI_INT};\nMPI_Request request;\nMPI_Comm comm = MPI_COMM_WORLD;\n\n// Inicializa alltoallw persistente\nint err = MPIX_Neighbor_alltoallw_init(sendbuf, sendcounts, sdispls, sendtypes, recvbuf, recvcounts, rdispls, recvtypes, comm, MPI_INFO_NULL, &request);\n\nif (err == MPI_SUCCESS) {\n    for (int i = 0; i < 5; i++) {\n        MPI_Start(&request);\n        MPI_Wait(&request, MPI_STATUS_IGNORE);\n    }\n}\n\nMPI_Request_free(&request);"}, {"name": "MPIX_Query_cuda_support", "short_desc": "Retorna se h\u00e1 suporte para CUDA.", "synopsis": "int MPIX_Query_cuda_support(void)", "params": [], "description": "MPIX_Query_cuda_support \u00e9 uma fun\u00e7\u00e3o de extens\u00e3o (geralmente encontrada no Open MPI ou implementa\u00e7\u00f5es semelhantes) que verifica se a biblioteca MPI foi compilada e est\u00e1 operando com suporte a buffers de mem\u00f3ria CUDA (GPU-aware MPI).", "application": "Verifica\u00e7\u00e3o de capacidades GPU-aware em tempo de execu\u00e7\u00e3o.", "example": "// Declara\u00e7\u00f5es\nint err;\n\n// Consulta suporte a CUDA no ambiente MPI\nerr = MPIX_Query_cuda_support();\n\nif (err == 1) {\n    // Suporte encontrado (retorno costuma ser booleano 1 ou 0)\n}"}, {"name": "MPIX_Reduce_init", "short_desc": "Cria uma requisi\u00e7\u00e3o persistente para uma opera\u00e7\u00e3o de redu\u00e7\u00e3o.", "synopsis": "int MPIX_Reduce_init(const void *sendbuf, void *recvbuf, int count, MPI_Datatype datatype, MPI_Op op, int root, MPI_Comm comm, MPI_Info info, MPI_Request *request)", "params": [{"name": "sendbuf", "desc": "Endere\u00e7o inicial do buffer de envio (escolha)."}, {"name": "recvbuf", "desc": "Endere\u00e7o inicial do buffer de recep\u00e7\u00e3o (escolha, significativo apenas na raiz)."}, {"name": "count", "desc": "N\u00famero de elementos no buffer de envio (inteiro)."}, {"name": "datatype", "desc": "Tipo de dado dos elementos (handle)."}, {"name": "op", "desc": "Opera\u00e7\u00e3o de redu\u00e7\u00e3o a ser aplicada (handle)."}, {"name": "root", "desc": "Rank do processo raiz (inteiro)."}, {"name": "comm", "desc": "Comunicador (handle)."}, {"name": "info", "desc": "Objeto de informa\u00e7\u00e3o (handle)."}, {"name": "request", "desc": "Requisi\u00e7\u00e3o de comunica\u00e7\u00e3o persistente gerada (handle)."}], "description": "MPIX_Reduce_init cria uma requisi\u00e7\u00e3o para realizar uma redu\u00e7\u00e3o global (como soma, m\u00e1ximo, m\u00ednimo, etc.) sobre todos os membros do comunicador, retornando o resultado no processo raiz. A requisi\u00e7\u00e3o persistente resultante n\u00e3o efetua a comunica\u00e7\u00e3o no momento da cria\u00e7\u00e3o. Ela pode ser iniciada m\u00faltiplas vezes usando MPI_Start ou MPI_Startall.", "application": "Utilizado para opera\u00e7\u00f5es de redu\u00e7\u00e3o repetitivas que usam a mesma estrutura de buffer e tipo de opera\u00e7\u00e3o em loops iterativos de c\u00e1lculo cient\u00edfico, como verifica\u00e7\u00f5es de converg\u00eancia globais, reduzindo a lat\u00eancia de inicializa\u00e7\u00e3o.", "example": "// Declara\u00e7\u00f5es\nint local_val = 1, global_sum = 0;\nMPI_Request request;\nMPI_Comm comm = MPI_COMM_WORLD;\n\n// Inicializa redu\u00e7\u00e3o persistente\nint err = MPIX_Reduce_init(&local_val, &global_sum, 1, MPI_INT, MPI_SUM, 0, comm, MPI_INFO_NULL, &request);\n\nif (err == MPI_SUCCESS) {\n    for (int i = 0; i < 10; i++) {\n        MPI_Start(&request);\n        MPI_Wait(&request, MPI_STATUS_IGNORE);\n    }\n}\n\nMPI_Request_free(&request);"}, {"name": "MPIX_Reduce_scatter_block_init", "short_desc": "Cria uma requisi\u00e7\u00e3o persistente para uma opera\u00e7\u00e3o reduce-scatter com blocos de tamanho igual.", "synopsis": "int MPIX_Reduce_scatter_block_init(const void *sendbuf, void *recvbuf, int recvcount, MPI_Datatype datatype, MPI_Op op, MPI_Comm comm, MPI_Info info, MPI_Request *request)", "params": [{"name": "sendbuf", "desc": "Endere\u00e7o inicial do buffer de envio (escolha)."}, {"name": "recvbuf", "desc": "Endere\u00e7o inicial do buffer de recep\u00e7\u00e3o (escolha)."}, {"name": "recvcount", "desc": "N\u00famero de elementos do resultado distribu\u00eddo para cada processo (inteiro)."}, {"name": "datatype", "desc": "Tipo de dado dos elementos (handle)."}, {"name": "op", "desc": "Opera\u00e7\u00e3o de redu\u00e7\u00e3o a ser aplicada (handle)."}, {"name": "comm", "desc": "Comunicador (handle)."}, {"name": "info", "desc": "Objeto de informa\u00e7\u00e3o (handle)."}, {"name": "request", "desc": "Requisi\u00e7\u00e3o de comunica\u00e7\u00e3o persistente gerada (handle)."}], "description": "MPIX_Reduce_scatter_block_init \u00e9 a variante persistente de MPI_Reduce_scatter_block. Realiza a redu\u00e7\u00e3o em vetores e distribui o resultado em blocos de tamanhos iguais para todos os processos no comunicador. O objeto de requisi\u00e7\u00e3o gerado n\u00e3o inicia a opera\u00e7\u00e3o de imediato, devendo ser executado com MPI_Start.", "application": "Indicado para algoritmos e simula\u00e7\u00f5es que necessitam de redu\u00e7\u00f5es iterativas seguidas de espalhamento onde todos os processos devem receber um bloco uniforme de dados (como em certos est\u00e1gios da transformada r\u00e1pida de Fourier paralela).", "example": "// Declara\u00e7\u00f5es\nint sendbuf[4] = {1, 1, 1, 1};\nint recvbuf = 0;\nMPI_Request request;\nMPI_Comm comm = MPI_COMM_WORLD;\n\n// Inicializa Reduce_scatter_block persistente\nint err = MPIX_Reduce_scatter_block_init(sendbuf, &recvbuf, 1, MPI_INT, MPI_SUM, comm, MPI_INFO_NULL, &request);\n\nif (err == MPI_SUCCESS) {\n    MPI_Start(&request);\n    MPI_Wait(&request, MPI_STATUS_IGNORE);\n}\n\nMPI_Request_free(&request);"}, {"name": "MPIX_Reduce_scatter_init", "short_desc": "Cria uma requisi\u00e7\u00e3o persistente para uma opera\u00e7\u00e3o reduce-scatter com blocos de tamanhos vari\u00e1veis.", "synopsis": "int MPIX_Reduce_scatter_init(const void *sendbuf, void *recvbuf, const int recvcounts[], MPI_Datatype datatype, MPI_Op op, MPI_Comm comm, MPI_Info info, MPI_Request *request)", "params": [{"name": "sendbuf", "desc": "Endere\u00e7o inicial do buffer de envio (escolha)."}, {"name": "recvbuf", "desc": "Endere\u00e7o inicial do buffer de recep\u00e7\u00e3o (escolha)."}, {"name": "recvcounts", "desc": "Matriz de inteiros especificando o n\u00famero de elementos do resultado distribu\u00eddo para cada processo."}, {"name": "datatype", "desc": "Tipo de dado dos elementos (handle)."}, {"name": "op", "desc": "Opera\u00e7\u00e3o de redu\u00e7\u00e3o (handle)."}, {"name": "comm", "desc": "Comunicador (handle)."}, {"name": "info", "desc": "Objeto de informa\u00e7\u00e3o (handle)."}, {"name": "request", "desc": "Requisi\u00e7\u00e3o de comunica\u00e7\u00e3o persistente gerada (handle)."}], "description": "Esta rotina constr\u00f3i uma requisi\u00e7\u00e3o persistente para a opera\u00e7\u00e3o MPI_Reduce_scatter, que combina os valores contidos no buffer de entrada atrav\u00e9s de uma opera\u00e7\u00e3o e em seguida divide (espalha) os resultados de acordo com tamanhos definidos na matriz recvcounts para cada processo. Requer chamada subsequente a MPI_Start.", "application": "Ideal para processamento iterativo onde os resultados de uma redu\u00e7\u00e3o global devem ser distribu\u00eddos de forma vari\u00e1vel e cont\u00ednua aos processos, especialmente se o particionamento (recvcounts) for invari\u00e1vel durante os ciclos computacionais.", "example": "// Declara\u00e7\u00f5es\nint sendbuf[2] = {1, 2};\nint recvbuf[1];\nint recvcounts[2] = {1, 1};\nMPI_Request request;\nMPI_Comm comm = MPI_COMM_WORLD;\n\n// Inicializa Reduce_scatter persistente\nint err = MPIX_Reduce_scatter_init(sendbuf, recvbuf, recvcounts, MPI_INT, MPI_SUM, comm, MPI_INFO_NULL, &request);\n\nif (err == MPI_SUCCESS) {\n    for (int i = 0; i < 5; i++) {\n        MPI_Start(&request);\n        MPI_Wait(&request, MPI_STATUS_IGNORE);\n    }\n}\n\nMPI_Request_free(&request);"}, {"name": "MPIX_Scan_init", "short_desc": "Cria uma requisi\u00e7\u00e3o persistente para uma opera\u00e7\u00e3o de redu\u00e7\u00e3o de prefixo inclusiva (scan).", "synopsis": "int MPIX_Scan_init(const void *sendbuf, void *recvbuf, int count, MPI_Datatype datatype, MPI_Op op, MPI_Comm comm, MPI_Info info, MPI_Request *request)", "params": [{"name": "sendbuf", "desc": "Endere\u00e7o inicial do buffer de envio (escolha)."}, {"name": "recvbuf", "desc": "Endere\u00e7o inicial do buffer de recep\u00e7\u00e3o (escolha)."}, {"name": "count", "desc": "N\u00famero de elementos no buffer de entrada (inteiro)."}, {"name": "datatype", "desc": "Tipo de dado dos elementos (handle)."}, {"name": "op", "desc": "Opera\u00e7\u00e3o de redu\u00e7\u00e3o (handle)."}, {"name": "comm", "desc": "Comunicador (handle)."}, {"name": "info", "desc": "Objeto de informa\u00e7\u00e3o (handle)."}, {"name": "request", "desc": "Requisi\u00e7\u00e3o de comunica\u00e7\u00e3o persistente gerada (handle)."}], "description": "MPIX_Scan_init realiza a cria\u00e7\u00e3o de uma requisi\u00e7\u00e3o coletiva para a opera\u00e7\u00e3o de redu\u00e7\u00e3o de prefixo (scan) de forma persistente. A opera\u00e7\u00e3o atuar\u00e1 nos dados em sendbuf, gerando de forma iterativa resultados cumulativos em recvbuf. O in\u00edcio efetivo ocorre quando MPI_Start \u00e9 chamada para a request correspondente.", "application": "Bastante explorada em processamentos num\u00e9ricos iterativos e aloca\u00e7\u00e3o din\u00e2mica de recursos (ex: distribui\u00e7\u00e3o de offsets) baseados no hist\u00f3rico ou ranking dos processos em etapas repetidas e na mesma estrutura de dados.", "example": "// Declara\u00e7\u00f5es\nint rank = 0; // Simula\u00e7\u00e3o de rank para o exemplo isolado. Em um programa real, MPI_Comm_rank seria usado.\nint size = 4; // Simula\u00e7\u00e3o de size para o exemplo isolado. Em um programa real, MPI_Comm_size seria usado.\nint val;\nint result;\nint count = 1;\nMPI_Datatype datatype = MPI_INT;\nMPI_Op op = MPI_SUM;\nMPI_Comm comm = MPI_COMM_WORLD;\nMPI_Info info = MPI_INFO_NULL;\nMPI_Request req;\nint err;\nint i;\nMPI_Status status; // Necess\u00e1rio para MPI_Wait\n\n// Inicializa o valor local do processo\nval = rank + 1;\nresult = 0; // Inicializa o buffer de recep\u00e7\u00e3o\n\n// Cria uma requisi\u00e7\u00e3o persistente para a opera\u00e7\u00e3o de scan (prefix sum)\nerr = MPIX_Scan_init(&val, &result, count, datatype, op, comm, info, &req);\n\nif (err == MPI_SUCCESS) {\n    // Itera algumas vezes para demonstrar o uso repetido da requisi\u00e7\u00e3o\n    for(i = 0; i < 3; i++) {\n        // Atualiza o valor local antes de cada scan (exemplo do original)\n        val = val * (i + 1) + rank; // Modifica\u00e7\u00e3o para variar os dados a cada itera\u00e7\u00e3o\n\n        // Inicia a opera\u00e7\u00e3o de scan persistente\n        err = MPI_Start(&req);\n        if (err == MPI_SUCCESS) {\n            // Espera a conclus\u00e3o da opera\u00e7\u00e3o de scan\n            err = MPI_Wait(&req, &status);\n            if (err == MPI_SUCCESS) {\n                // Neste ponto, 'result' cont\u00e9m o prefix sum at\u00e9 o processo atual\n                // L\u00f3gica de aplica\u00e7\u00e3o com 'result' aqui\n            } else {\n                // Tratamento de erro para MPI_Wait\n            }\n        } else {\n            // Tratamento de erro para MPI_Start\n        }\n    }\n} else {\n    // Tratamento de erro para MPIX_Scan_init\n}\n\n// Libera a requisi\u00e7\u00e3o persistente\nif (req != MPI_REQUEST_NULL) { // Verifica se a requisi\u00e7\u00e3o foi criada antes de tentar liberar\n    int free_err = MPI_Request_free(&req);\n    if (free_err != MPI_SUCCESS) {\n        // Tratamento de erro para MPI_Request_free\n    }\n}\n"}, {"name": "MPIX_Scatter_init", "short_desc": "Cria uma requisi\u00e7\u00e3o persistente para a opera\u00e7\u00e3o de distribui\u00e7\u00e3o de blocos iguais (scatter).", "synopsis": "int MPIX_Scatter_init(const void *sendbuf, int sendcount, MPI_Datatype sendtype, void *recvbuf, int recvcount, MPI_Datatype recvtype, int root, MPI_Comm comm, MPI_Info info, MPI_Request *request)", "params": [{"name": "sendbuf", "desc": "Endere\u00e7o inicial do buffer de envio (escolha, significativo apenas na raiz)."}, {"name": "sendcount", "desc": "N\u00famero de elementos a enviar para cada processo (inteiro, significativo apenas na raiz)."}, {"name": "sendtype", "desc": "Tipo de dado dos elementos do buffer de envio (handle, significativo apenas na raiz)."}, {"name": "recvbuf", "desc": "Endere\u00e7o inicial do buffer de recep\u00e7\u00e3o (escolha)."}, {"name": "recvcount", "desc": "N\u00famero de elementos esperados no buffer de recep\u00e7\u00e3o (inteiro)."}, {"name": "recvtype", "desc": "Tipo de dado dos elementos do buffer de recep\u00e7\u00e3o (handle)."}, {"name": "root", "desc": "Rank do processo raiz (inteiro)."}, {"name": "comm", "desc": "Comunicador (handle)."}, {"name": "info", "desc": "Objeto de informa\u00e7\u00e3o (handle)."}, {"name": "request", "desc": "Requisi\u00e7\u00e3o de comunica\u00e7\u00e3o persistente gerada (handle)."}], "description": "Configura uma opera\u00e7\u00e3o MPI_Scatter de forma persistente, na qual blocos de dados de tamanho id\u00eantico s\u00e3o distribu\u00eddos do processo raiz para todos os processos no comunicador de destino. O handle da requisi\u00e7\u00e3o que \u00e9 retornado deve ser ativado atrav\u00e9s de MPI_Start em instantes posteriores.", "application": "Indicado para abordagens mestres-escravos em la\u00e7os temporais, onde o processo mestre distribui parti\u00e7\u00f5es fixas e sim\u00e9tricas de um vetor global atualizado periodicamente para os workers.", "example": "// Declara\u00e7\u00f5es\nint rank = 0; // Simula\u00e7\u00e3o de rank para o exemplo isolado.\nint size = 4; // Simula\u00e7\u00e3o de size para o exemplo isolado.\nint sendcount = 1;\nint recvcount = 1;\nMPI_Datatype sendtype = MPI_INT;\nMPI_Datatype recvtype = MPI_INT;\nint root = 0;\nMPI_Comm comm = MPI_COMM_WORLD;\nMPI_Info info = MPI_INFO_NULL;\nMPI_Request req;\nint err;\nint iter;\nMPI_Status status; // Necess\u00e1rio para MPI_Wait\n\n// Buffer de envio (apenas na raiz)\nint senddata[4]; // Assumindo size=4 para este exemplo.\n// Buffer de recep\u00e7\u00e3o (todos os processos)\nint recvdata;\n\n// Inicializa senddata na raiz (simulado)\nif (rank == root) {\n    senddata[0] = 10;\n    senddata[1] = 20;\n    senddata[2] = 30;\n    senddata[3] = 40;\n}\n\n// Cria uma requisi\u00e7\u00e3o persistente para a opera\u00e7\u00e3o de scatter\nerr = MPIX_Scatter_init(senddata, sendcount, sendtype, &recvdata, recvcount, recvtype, root, comm, info, &req);\n\nif (err == MPI_SUCCESS) {\n    // Itera algumas vezes para demonstrar o uso repetido da requisi\u00e7\u00e3o\n    for (iter = 0; iter < 2; iter++) { \n        // Na raiz, os dados de envio podem ser atualizados antes de cada scatter\n        if (rank == root) {\n            senddata[0] += 1;\n            senddata[1] += 1;\n            senddata[2] += 1;\n            senddata[3] += 1;\n        }\n\n        // Inicia a opera\u00e7\u00e3o de scatter persistente\n        err = MPI_Start(&req);\n        if (err == MPI_SUCCESS) {\n            // Espera a conclus\u00e3o da opera\u00e7\u00e3o\n            err = MPI_Wait(&req, &status);\n            if (err == MPI_SUCCESS) {\n                // Neste ponto, 'recvdata' cont\u00e9m o dado disperso para este processo\n                // L\u00f3gica de aplica\u00e7\u00e3o com 'recvdata' aqui\n            } else {\n                // Tratamento de erro para MPI_Wait\n            }\n        } else {\n            // Tratamento de erro para MPI_Start\n        }\n    }\n} else {\n    // Tratamento de erro para MPIX_Scatter_init\n}\n\n// Libera a requisi\u00e7\u00e3o persistente\nif (req != MPI_REQUEST_NULL) { // Verifica se a requisi\u00e7\u00e3o foi criada antes de tentar liberar\n    int free_err = MPI_Request_free(&req);\n    if (free_err != MPI_SUCCESS) {\n        // Tratamento de erro para MPI_Request_free\n    }\n}\n"}, {"name": "MPIX_Scatterv_init", "short_desc": "Cria uma requisi\u00e7\u00e3o persistente para uma opera\u00e7\u00e3o de distribui\u00e7\u00e3o de blocos irregulares (scatterv).", "synopsis": "int MPIX_Scatterv_init(const void *sendbuf, const int sendcounts[], const int displs[], MPI_Datatype sendtype, void *recvbuf, int recvcount, MPI_Datatype recvtype, int root, MPI_Comm comm, MPI_Info info, MPI_Request *request)", "params": [{"name": "sendbuf", "desc": "Endere\u00e7o inicial do buffer de envio (escolha, significativo apenas na raiz)."}, {"name": "sendcounts", "desc": "Matriz de inteiros especificando o n\u00famero de elementos a enviar para cada processo (significativo apenas na raiz)."}, {"name": "displs", "desc": "Matriz de deslocamentos inteiros especificando onde cada envio come\u00e7a em rela\u00e7\u00e3o ao sendbuf (significativo apenas na raiz)."}, {"name": "sendtype", "desc": "Tipo de dado dos elementos do buffer de envio (handle, significativo apenas na raiz)."}, {"name": "recvbuf", "desc": "Endere\u00e7o inicial do buffer de recep\u00e7\u00e3o (escolha)."}, {"name": "recvcount", "desc": "N\u00famero de elementos esperados no buffer de recep\u00e7\u00e3o (inteiro)."}, {"name": "recvtype", "desc": "Tipo de dado dos elementos do buffer de recep\u00e7\u00e3o (handle)."}, {"name": "root", "desc": "Rank do processo raiz (inteiro)."}, {"name": "comm", "desc": "Comunicador (handle)."}, {"name": "info", "desc": "Objeto de informa\u00e7\u00e3o (handle)."}, {"name": "request", "desc": "Requisi\u00e7\u00e3o de comunica\u00e7\u00e3o persistente gerada (handle)."}], "description": "Cria uma requisi\u00e7\u00e3o de comunica\u00e7\u00e3o persistente para MPI_Scatterv. Semelhante a MPI_Scatter_init, por\u00e9m permite que o processo raiz envie blocos de tamanhos vari\u00e1veis, especificados pela matriz sendcounts e iniciados conforme os deslocamentos em displs.", "application": "Fundamental para algoritmos em malhas desbalanceadas ou balanceamento de carga irregular, onde as fra\u00e7\u00f5es de dados enviadas para os processos s\u00e3o de tamanhos desiguais, mas esse particionamento permanece est\u00e1vel ao longo de m\u00faltiplos ciclos de itera\u00e7\u00e3o.", "example": "// Declara\u00e7\u00f5es\nint rank = 0; // Simula\u00e7\u00e3o de rank para o exemplo isolado.\nint size = 2; // Simula\u00e7\u00e3o de size para o exemplo isolado.\nint root = 0;\nMPI_Comm comm = MPI_COMM_WORLD;\nMPI_Info info = MPI_INFO_NULL;\nMPI_Request req = MPI_REQUEST_NULL;\nint err = MPI_SUCCESS;\nint iter;\nMPI_Status status; // Necess\u00e1rio para MPI_Wait\n\n// Par\u00e2metros de envio (significativos apenas na raiz)\nint sendcounts[2] = {1, 3}; // Exemplo: P0 recebe 1 int, P1 recebe 3 ints\nint displs[2] = {0, 1};     // Exemplo: P0 come\u00e7a em 0, P1 come\u00e7a em 1 do sendbuf\nMPI_Datatype sendtype = MPI_INT;\n\n// Buffer de envio e recep\u00e7\u00e3o\nint *sendbuf = NULL;\nint recvcount;\nMPI_Datatype recvtype = MPI_INT;\nint *recvbuf = NULL;\n\n// Determina recvcount para o processo atual usando sendcounts[rank]\nrecvcount = sendcounts[rank];\n\n// Aloca\u00e7\u00e3o de mem\u00f3ria para sendbuf (apenas na raiz)\nif (rank == root) {\n    int total_send_elements = 0;\n    for (int p = 0; p < size; p++) {\n        total_send_elements += sendcounts[p];\n    }\n    sendbuf = (int *)malloc(total_send_elements * sizeof(int));\n    if (sendbuf == NULL) {\n        // Erro na aloca\u00e7\u00e3o da raiz. Simula falha e define err para evitar prosseguir.\n        err = MPI_ERR_OTHER;\n    } else {\n        // Inicializa sendbuf com dados para o exemplo\n        sendbuf[0] = 100; // Para P0\n        sendbuf[1] = 201; // Para P1 (come\u00e7ando no displs[1])\n        sendbuf[2] = 202; // Para P1\n        sendbuf[3] = 203; // Para P1\n    }\n}\n\n// Aloca\u00e7\u00e3o de mem\u00f3ria para recvbuf em todos os processos\nrecvbuf = (int *)malloc(recvcount * sizeof(int));\nif (recvbuf == NULL) {\n    // Erro na aloca\u00e7\u00e3o do recvbuf em qualquer processo. Simula falha.\n    err = MPI_ERR_OTHER;\n    if (rank == root && sendbuf != NULL) free(sendbuf); // Libera o que foi alocado se houve erro\n} else if (rank == root && sendbuf == NULL) {\n    // Se a aloca\u00e7\u00e3o do sendbuf na raiz falhou, o 'err' j\u00e1 foi definido. N\u00e3o faz nada.\n} else {\n    // Se tudo ok com as aloca\u00e7\u00f5es, tenta criar a requisi\u00e7\u00e3o persistente\n    err = MPIX_Scatterv_init(sendbuf, sendcounts, displs, sendtype, recvbuf, recvcount, recvtype, root, comm, info, &req);\n}\n\n\nif (err == MPI_SUCCESS) {\n    // Itera algumas vezes para demonstrar o uso repetido da requisi\u00e7\u00e3o\n    for (iter = 0; iter < 2; iter++) { \n        // Na raiz, os dados de envio podem ser atualizados antes de cada scatterv\n        if (rank == root && sendbuf != NULL) {\n            sendbuf[0] += 1;\n            // Atualiza outros elementos do sendbuf conforme necess\u00e1rio\n            for (int k = 1; k < sendcounts[1] + displs[1]; k++) { // Atualiza dados para P1\n                 sendbuf[k] += 1;\n            }\n        }\n\n        // Inicia a opera\u00e7\u00e3o de scatterv persistente\n        err = MPI_Start(&req);\n        if (err == MPI_SUCCESS) {\n            // Espera a conclus\u00e3o da opera\u00e7\u00e3o\n            err = MPI_Wait(&req, &status);\n            if (err == MPI_SUCCESS) {\n                // Neste ponto, 'recvbuf' cont\u00e9m os dados dispersos para este processo.\n                // L\u00f3gica de aplica\u00e7\u00e3o com 'recvbuf' aqui\n            } else {\n                // Tratamento de erro para MPI_Wait\n            }\n        }\n    } else {\n        // Tratamento de erro para MPI_Start\n    }\n} else {\n    // Tratamento de erro para MPIX_Scatterv_init ou aloca\u00e7\u00e3o de mem\u00f3ria\n}\n\n// Libera a requisi\u00e7\u00e3o persistente\nif (req != MPI_REQUEST_NULL) { // Verifica se a requisi\u00e7\u00e3o foi criada antes de tentar liberar\n    int free_err = MPI_Request_free(&req);\n    if (free_err != MPI_SUCCESS) {\n        // Tratamento de erro para MPI_Request_free\n    }\n}\n\n// Libera\u00e7\u00e3o de mem\u00f3ria alocada\nif (rank == root && sendbuf != NULL) {\n    free(sendbuf);\n}\nif (recvbuf != NULL) {\n    free(recvbuf);\n}\n"}, {"name": "MPI_Abort", "short_desc": "Termina o ambiente de execu\u00e7\u00e3o MPI.", "synopsis": "int MPI_Abort(MPI_Comm comm, int errorcode)", "params": [{"name": "comm", "desc": "comunicador das tarefas a serem abortadas (handle)"}, {"name": "errorcode", "desc": "c\u00f3digo de erro a ser retornado ao ambiente chamador (inteiro)"}], "description": "Tenta terminar todos os processos MPI associados ao comunicador especificado. Na maioria das implementa\u00e7\u00f5es, termina todos os processos do job.", "application": "Encerramento for\u00e7ado do programa em caso de erro fatal.", "example": "// Declara\u00e7\u00f5es\nMPI_Comm comm = MPI_COMM_WORLD;\nint errorcode = 99; // Um c\u00f3digo de erro arbitr\u00e1rio para identifica\u00e7\u00e3o\nint err; // Vari\u00e1vel para armazenar o retorno da fun\u00e7\u00e3o\nint rank = 1; // Simula\u00e7\u00e3o de rank para o exemplo isolado. Em um programa real, MPI_Comm_rank seria usado.\n\n// Simula uma condi\u00e7\u00e3o de erro que levaria ao aborto\nif (rank == 1) { // Apenas um processo tenta abortar neste exemplo\n    // Tenta terminar todos os processos MPI associados ao comunicador\n    err = MPI_Abort(comm, errorcode);\n\n    // Nota: Na maioria das implementa\u00e7\u00f5es, MPI_Abort n\u00e3o retorna.\n    // Se, por alguma raz\u00e
