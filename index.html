at\u00f3rio garantir a durabilidade dos dados gravados em disco, como na grava\u00e7\u00e3o de rein\u00edcios ou checkpoints estruturais contra falhas em execu\u00e7\u00f5es longas.", "example": "// Declara\u00e7\u00f5es\nMPI_File fh;\nint data[100] = {0};\nint err;\n\nMPI_File_open(MPI_COMM_WORLD, \"checkpoint.dat\", MPI_MODE_WRONLY | MPI_MODE_CREATE, MPI_INFO_NULL, &fh);\nMPI_File_write(fh, data, 100, MPI_INT, MPI_STATUS_IGNORE);\n\n// Garante que todos os dados foram persistidos no disco\nerr = MPI_File_sync(fh);\n\nif (err == MPI_SUCCESS) {\n    // Sincroniza\u00e7\u00e3o conclu\u00edda com sucesso\n}\n\nMPI_File_close(&fh);", "raw_man": "MPI_File_sync(3)                                      MPI                                      MPI_File_sync(3)\n\nNAME\n       MPI_File_sync -  Causes all previous writes to be transferred to the storage device\n\nSYNOPSIS\n       int MPI_File_sync(MPI_File fh)\n\nINPUT PARAMETERS\n       fh     - file handle (handle)\n\nNOTES FOR FORTRAN\n       All  MPI  routines  in Fortran (except for MPI_WTIME and MPI_WTICK ) have an additional argument ierr at\n       the end of the argument list.  ierr is an integer and has the same meaning as the return  value  of  the\n       routine in C.  In Fortran, MPI routines are subroutines, and are invoked with the call statement.\n\n       All MPI objects (e.g., MPI_Datatype , MPI_Comm ) are of type INTEGER in Fortran.\n\n                                                   10/6/2025                                   MPI_File_sync(3)\n"}, {"name": "MPI_File_write", "short_desc": "Realiza uma escrita n\u00e3o coletiva em arquivo utilizando o ponteiro de arquivo individual.", "synopsis": "int MPI_File_write(MPI_File fh, ROMIO_CONST void *buf, int count,\n       MPI_Datatype datatype, MPI_Status * status)", "params": [{"name": "fh", "desc": "Handle do arquivo (handle)."}, {"name": "buf", "desc": "Endere\u00e7o inicial do buffer de mem\u00f3ria contendo os dados a serem escritos (escolha)."}, {"name": "count", "desc": "N\u00famero de elementos do buffer a escrever (inteiro n\u00e3o negativo)."}, {"name": "datatype", "desc": "Tipo de dado de cada elemento do buffer (handle)."}, {"name": "status", "desc": "Objeto de status que retorna informa\u00e7\u00f5es sobre a opera\u00e7\u00e3o, como o n\u00famero de itens escritos (Status)."}], "description": "A fun\u00e7\u00e3o `MPI_File_write` executa uma escrita de dados partindo da posi\u00e7\u00e3o atual referenciada pelo ponteiro de arquivo individual do processo. Tenta-se gravar `count` itens do tipo `datatype` dispon\u00edveis no buffer `buf` e grav\u00e1-los de acordo com o `filetype` previamente especificado pela visualiza\u00e7\u00e3o. Ap\u00f3s a escrita, o ponteiro individual de arquivo do processo \u00e9 atualizado em n\u00famero de unidades igual ao volume consumido. A rotina \u00e9 bloqueante (retorna apenas quando o buffer na mem\u00f3ria puder ser reutilizado com seguran\u00e7a) mas a grava\u00e7\u00e3o f\u00edsica no armazenamento subjacente n\u00e3o \u00e9 assegurada at\u00e9 a execu\u00e7\u00e3o do `MPI_File_sync` ou o fechamento do arquivo.", "application": "Ideal para padr\u00f5es de I/O independentes, onde cada processo MPI grava blocos de dados exclusivos de maneira cont\u00edgua, geralmente sem interfer\u00eancia nos dados dos vizinhos.", "example": "// Declara\u00e7\u00f5es\nMPI_File fh;\nMPI_Status status;\nint data[5] = {1, 2, 3, 4, 5};\nint err;\n\nMPI_File_open(MPI_COMM_SELF, \"output.bin\", MPI_MODE_CREATE | MPI_MODE_WRONLY, MPI_INFO_NULL, &fh);\n\n// Executa escrita local na posi\u00e7\u00e3o atual do ponteiro\nerr = MPI_File_write(fh, data, 5, MPI_INT, &status);\n\nif (err == MPI_SUCCESS) {\n    // Escrita processada corretamente\n}\n\nMPI_File_close(&fh);", "raw_man": "MPI_File_write(3)                                     MPI                                     MPI_File_write(3)\n\nNAME\n       MPI_File_write -  Write using individual file pointer\n\nSYNOPSIS\n       int MPI_File_write(MPI_File fh, ROMIO_CONST void *buf, int count,\n       MPI_Datatype datatype, MPI_Status * status)\n\nINPUT PARAMETERS\n       fh     - file handle (handle)\n       buf    - initial address of buffer (choice)\n       count  - number of elements in buffer (nonnegative integer)\n       datatype\n              - datatype of each buffer element (handle)\n\nOUTPUT PARAMETERS\n       status - status object (Status)\n\nNOTES FOR FORTRAN\n       All  MPI  routines  in Fortran (except for MPI_WTIME and MPI_WTICK ) have an additional argument ierr at\n       the end of the argument list.  ierr is an integer and has the same meaning as the return  value  of  the\n       routine in C.  In Fortran, MPI routines are subroutines, and are invoked with the call statement.\n\n       All MPI objects (e.g., MPI_Datatype , MPI_Comm ) are of type INTEGER in Fortran.\n\n                                                   10/6/2025                                  MPI_File_write(3)\n"}, {"name": "MPI_File_write_all", "short_desc": "Realiza uma escrita coletiva bloqueante usando o ponteiro de arquivo individual.", "synopsis": "int MPI_File_write_all(MPI_File fh, ROMIO_CONST void *buf, int count,\n       MPI_Datatype datatype, MPI_Status * status)", "params": [{"name": "fh", "desc": "Handle do arquivo (handle)."}, {"name": "buf", "desc": "Endere\u00e7o inicial do buffer de mem\u00f3ria com os dados a enviar (escolha)."}, {"name": "count", "desc": "N\u00famero de elementos (inteiro n\u00e3o negativo)."}, {"name": "datatype", "desc": "Tipo de dado de cada elemento (handle)."}, {"name": "status", "desc": "Objeto de status que prov\u00ea os metadados do resultado (Status)."}], "description": "A fun\u00e7\u00e3o `MPI_File_write_all` \u00e9 a contraparte coletiva e global de `MPI_File_write`. Ela deve ser chamada por todos os processos atuantes no subgrupo do comunicador correspondente ao arquivo aberto. Ao notificar antecipadamente a requisi\u00e7\u00e3o de escrita para todos os participantes de forma coletiva, a camada MPI-IO (como ROMIO) executa poderosas otimiza\u00e7\u00f5es de grava\u00e7\u00e3o (ex: coletando blocos n\u00e3o cont\u00edguos dos processos em grandes requisi\u00e7\u00f5es conjuntas, processo chamado Two-Phase I/O), resultando em throughput significativamente maior no sistema de armazenamento. O ponteiro \u00e9 local a cada processo.", "application": "Pilar do paralelismo de arquivos I/O; usado quando todos os processos geram sua pr\u00f3pria fra\u00e7\u00e3o de um array e precisam gravar este dado sincronizadamente de forma a criar um \u00fanico modelo num\u00e9rico final coeso no disco.", "example": "// Declara\u00e7\u00f5es\nMPI_File fh;\nint local_data[100] = {1};\nMPI_Status status;\nint err;\n\nMPI_File_open(MPI_COMM_WORLD, \"collective_out.bin\", MPI_MODE_CREATE | MPI_MODE_WRONLY, MPI_INFO_NULL, &fh);\n\n// Executa escrita coletiva otimizada entre todos os processos do comunicador\nerr = MPI_File_write_all(fh, local_data, 100, MPI_INT, &status);\n\nif (err == MPI_SUCCESS) {\n    // Todos os processos conclu\u00edram a escrita coletiva\n}\n\nMPI_File_close(&fh);", "raw_man": "MPI_File_write_all(3)                                 MPI                                 MPI_File_write_all(3)\n\nNAME\n       MPI_File_write_all -  Collective write using individual file pointer\n\nSYNOPSIS\n       int MPI_File_write_all(MPI_File fh, ROMIO_CONST void *buf, int count,\n       MPI_Datatype datatype, MPI_Status * status)\n\nINPUT PARAMETERS\n       fh     - file handle (handle)\n       buf    - initial address of buffer (choice)\n       count  - number of elements in buffer (nonnegative integer)\n       datatype\n              - datatype of each buffer element (handle)\n\nOUTPUT PARAMETERS\n       status - status object (Status)\n\nNOTES FOR FORTRAN\n       All  MPI  routines  in Fortran (except for MPI_WTIME and MPI_WTICK ) have an additional argument ierr at\n       the end of the argument list.  ierr is an integer and has the same meaning as the return  value  of  the\n       routine in C.  In Fortran, MPI routines are subroutines, and are invoked with the call statement.\n\n       All MPI objects (e.g., MPI_Datatype , MPI_Comm ) are of type INTEGER in Fortran.\n\n                                                   10/6/2025                              MPI_File_write_all(3)\n"}, {"name": "MPI_File_write_all_begin", "short_desc": "Inicia a primeira fase de uma escrita coletiva em duas etapas (split collective) usando o ponteiro de arquivo.", "synopsis": "int MPI_File_write_all_begin(MPI_File fh, ROMIO_CONST void *buf, int count, MPI_Datatype datatype)", "params": [{"name": "fh", "desc": "Handle do arquivo (handle)."}, {"name": "buf", "desc": "Endere\u00e7o inicial do buffer alocado em mem\u00f3ria (escolha)."}, {"name": "count", "desc": "N\u00famero total de elementos contidos no buffer (inteiro n\u00e3o negativo)."}, {"name": "datatype", "desc": "Tipo de dado dos elementos a escrever (handle)."}], "description": "A fun\u00e7\u00e3o `MPI_File_write_all_begin` assinala o come\u00e7o de uma opera\u00e7\u00e3o de escrita coletiva de dados que foi estruturada em fase dupla (tamb\u00e9m conhecida como split collective). Diferentemente do `MPI_File_write_all` comum, esse procedimento \u00e9 retornado sem bloqueio integral na transfer\u00eancia do disco. Isso significa que o processo continuar\u00e1 a execu\u00e7\u00e3o concorrente. Entretanto, os buffers fornecidos `buf` est\u00e3o bloqueados e as manipula\u00e7\u00f5es a eles durante a I/O levam a concorr\u00eancias maliciosas. Essa opera\u00e7\u00e3o precisa impreterivelmente de uma chamada ao fechamento de ciclo `MPI_File_write_all_end`.", "application": "Adotada exaustivamente na oculta\u00e7\u00e3o de I/O em c\u00f3digos com paralelismo denso, permitindo 'overlap' de computa\u00e7\u00e3o (como c\u00e1lculos extras do time-step) simultaneamente \u00e0s descargas de disco no fundo da m\u00e1quina HPC.", "example": "// Declara\u00e7\u00f5es\nMPI_File fh;\nint local_data[100] = {0};\nMPI_Status status;\nint err_begin, err_end;\n\nMPI_File_open(MPI_COMM_WORLD, \"overlap.bin\", MPI_MODE_CREATE | MPI_MODE_WRONLY, MPI_INFO_NULL, &fh);\n\n// Inicia a escrita coletiva dividida (split collective)\nerr_begin = MPI_File_write_all_begin(fh, local_data, 100, MPI_INT);\n\nif (err_begin == MPI_SUCCESS) {\n    // Conclui a opera\u00e7\u00e3o de escrita coletiva\n    err_end = MPI_File_write_all_end(fh, local_data, &status);\n}\n\nMPI_File_close(&fh);", "raw_man": "MPI_File_write_all_begin(3)                           MPI                           MPI_File_write_all_begin(3)\n\nNAME\n       MPI_File_write_all_begin -  Begin a split collective write using individual file pointer\n\nSYNOPSIS\n       int MPI_File_write_all_begin(MPI_File fh, ROMIO_CONST void *buf, int count, MPI_Datatype datatype)\n\nINPUT PARAMETERS\n       fh     - file handle (handle)\n       buf    - initial address of buffer (choice)\n       count  - number of elements in buffer (nonnegative integer)\n       datatype\n              - datatype of each buffer element (handle)\n\nNOTES FOR FORTRAN\n       All  MPI  routines  in Fortran (except for MPI_WTIME and MPI_WTICK ) have an additional argument ierr at\n       the end of the argument list.  ierr is an integer and has the same meaning as the return  value  of  the\n       routine in C.  In Fortran, MPI routines are subroutines, and are invoked with the call statement.\n\n       All MPI objects (e.g., MPI_Datatype , MPI_Comm ) are of type INTEGER in Fortran.\n\n                                                   10/6/2025                        MPI_File_write_all_begin(3)\n"}, {"name": "MPI_File_write_all_end", "short_desc": "Finaliza uma escrita coletiva dividida usando o ponteiro de arquivo individual.", "synopsis": "int MPI_File_write_all_end(MPI_File fh, const void *buf, MPI_Status *status)", "params": [{"name": "fh", "desc": "Handle do arquivo (handle)."}, {"name": "buf", "desc": "Endere\u00e7o inicial do buffer (escolha)."}, {"name": "status", "desc": "Objeto de status (Status, sa\u00edda)."}], "description": "Conclui uma opera\u00e7\u00e3o de escrita coletiva que foi iniciada de forma dividida com MPI_File_write_all_begin. A fun\u00e7\u00e3o bloqueia at\u00e9 que os dados tenham sido transferidos com sucesso do buffer para o sistema de arquivos.", "application": "E/S coletiva ass\u00edncrona/dividida para sobreposi\u00e7\u00e3o de computa\u00e7\u00e3o e comunica\u00e7\u00e3o.", "example": "// Declara\u00e7\u00f5es\nMPI_File fh;\nint local_data[100] = {0};\nMPI_Status status;\nint err;\n\nMPI_File_open(MPI_COMM_WORLD, \"split.bin\", MPI_MODE_CREATE | MPI_MODE_WRONLY, MPI_INFO_NULL, &fh);\n\nMPI_File_write_all_begin(fh, local_data, 100, MPI_INT);\n\n// Finaliza a escrita iniciada anteriormente, aguardando a conclus\u00e3o f\u00edsica\nerr = MPI_File_write_all_end(fh, local_data, &status);\n\nif (err == MPI_SUCCESS) {\n    // Opera\u00e7\u00e3o conclu\u00edda ap\u00f3s o sincronismo\n}\n\nMPI_File_close(&fh);"}, {"name": "MPI_File_write_at", "short_desc": "Escreve em um deslocamento (offset) expl\u00edcito (n\u00e3o coletivo).", "synopsis": "int MPI_File_write_at(MPI_File fh, MPI_Offset offset, const void *buf, int count, MPI_Datatype datatype, MPI_Status *status)", "params": [{"name": "fh", "desc": "Handle do arquivo (handle)."}, {"name": "offset", "desc": "Deslocamento no arquivo em bytes a partir do in\u00edcio (inteiro)."}, {"name": "buf", "desc": "Endere\u00e7o inicial do buffer de envio (escolha)."}, {"name": "count", "desc": "N\u00famero de elementos a serem escritos (inteiro)."}, {"name": "datatype", "desc": "Tipo de dado de cada elemento (handle)."}, {"name": "status", "desc": "Objeto de status (Status, sa\u00edda)."}], "description": "Realiza uma escrita de dados em uma posi\u00e7\u00e3o espec\u00edfica do arquivo, definida pelo 'offset', sem alterar o ponteiro de arquivo individual. \u00c9 uma opera\u00e7\u00e3o local e bloqueante.", "application": "Escrita aleat\u00f3ria em arquivos onde cada processo tem uma regi\u00e3o pr\u00e9-alocada.", "example": "// Declara\u00e7\u00f5es\nMPI_File fh;\nMPI_Offset offset = 1024;\nint buffer[256] = {0}; // Preenchido com zeros\nMPI_Status status;\n\n// Abre o arquivo para escrita\nMPI_File_open(MPI_COMM_WORLD, \"arquivo.bin\", MPI_MODE_CREATE | MPI_MODE_WRONLY, MPI_INFO_NULL, &fh);\n\n// Escrita local e bloqueante no deslocamento 1024\nint err = MPI_File_write_at(fh, offset, buffer, 256, MPI_INT, &status);\n\nif (err == MPI_SUCCESS) {\n    // Sucesso na escrita\n}\n\nMPI_File_close(&fh);"}, {"name": "MPI_File_write_at_all", "short_desc": "Escrita coletiva em um deslocamento (offset) expl\u00edcito.", "synopsis": "int MPI_File_write_at_all(MPI_File fh, MPI_Offset offset, const void *buf, int count, MPI_Datatype datatype, MPI_Status *status)", "params": [{"name": "fh", "desc": "Handle do arquivo (handle)."}, {"name": "offset", "desc": "Deslocamento inicial no arquivo (inteiro)."}, {"name": "buf", "desc": "Buffer de dados (escolha)."}, {"name": "count", "desc": "N\u00famero de elementos (inteiro)."}, {"name": "datatype", "desc": "Tipo de dado (handle)."}, {"name": "status", "desc": "Status da opera\u00e7\u00e3o (Status, sa\u00edda)."}], "description": "Vers\u00e3o coletiva da escrita em deslocamento expl\u00edcito. Todos os processos que abriram o arquivo devem chamar esta fun\u00e7\u00e3o simultaneamente, permitindo que a biblioteca MPI otimize o fluxo de dados para o disco.", "application": "Checkpointing e dump de grandes matrizes distribu\u00eddas.", "example": "// Declara\u00e7\u00f5es\nMPI_File fh;\nint rank;\nMPI_Offset my_offset;\ndouble buffer[100] = {1.0};\nMPI_Status status;\n\nMPI_Comm_rank(MPI_COMM_WORLD, &rank);\nmy_offset = (MPI_Offset)rank * 800; // Deslocamento baseado no rank\n\nMPI_File_open(MPI_COMM_WORLD, \"coletivo.bin\", MPI_MODE_CREATE | MPI_MODE_WRONLY, MPI_INFO_NULL, &fh);\n\n// Escrita coletiva otimizada pelo sistema\nint err = MPI_File_write_at_all(fh, my_offset, buffer, 100, MPI_DOUBLE, &status);\n\nif (err == MPI_SUCCESS) {\n    // Escrita conclu\u00edda por todos os processos\n}\n\nMPI_File_close(&fh);"}, {"name": "MPI_File_write_at_all_begin", "short_desc": "Inicia uma escrita coletiva dividida em um deslocamento expl\u00edcito.", "synopsis": "int MPI_File_write_at_all_begin(MPI_File fh, MPI_Offset offset, const void *buf, int count, MPI_Datatype datatype)", "params": [{"name": "fh", "desc": "Handle do arquivo (handle)."}, {"name": "offset", "desc": "Deslocamento inicial (inteiro)."}, {"name": "buf", "desc": "Buffer de dados (escolha)."}, {"name": "count", "desc": "N\u00famero de elementos (inteiro)."}, {"name": "datatype", "desc": "Tipo de dado (handle)."}], "description": "Dispara a fase inicial de uma escrita coletiva em uma posi\u00e7\u00e3o fixa do arquivo. Permite que o processamento continue enquanto o sistema prepara a transfer\u00eancia de dados.", "application": "Escrita massiva de dados com sobreposi\u00e7\u00e3o de computa\u00e7\u00e3o.", "example": "// Declara\u00e7\u00f5es\nMPI_File fh;\nMPI_Offset off = 0;\nchar buf[512] = \"dados_de_teste\";\n\nMPI_File_open(MPI_COMM_WORLD, \"split.bin\", MPI_MODE_CREATE | MPI_MODE_WRONLY, MPI_INFO_NULL, &fh);\n\n// Inicia a escrita coletiva de forma ass\u00edncrona\nint err = MPI_File_write_at_all_begin(fh, off, buf, 512, MPI_CHAR);\n\nif (err == MPI_SUCCESS) {\n    // Pode realizar outros c\u00e1lculos aqui antes da conclus\u00e3o\n}\n\nMPI_File_close(&fh);"}, {"name": "MPI_File_write_at_all_end", "short_desc": "Finaliza uma escrita coletiva dividida em um deslocamento expl\u00edcito.", "synopsis": "int MPI_File_write_at_all_end(MPI_File fh, const void *buf, MPI_Status *status)", "params": [{"name": "fh", "desc": "Handle do arquivo (handle)."}, {"name": "buf", "desc": "Buffer de dados (escolha)."}, {"name": "status", "desc": "Status da opera\u00e7\u00e3o (Status, sa\u00edda)."}], "description": "Conclui a opera\u00e7\u00e3o coletiva iniciada por MPI_File_write_at_all_begin. Ap\u00f3s esta chamada, o buffer pode ser reutilizado com seguran\u00e7a.", "application": "Sincroniza\u00e7\u00e3o de E/S coletiva dividida.", "example": "// Declara\u00e7\u00f5es\nMPI_File fh;\nchar buf[512] = {0};\nMPI_Status status;\n\n// Assumindo que o arquivo foi aberto e a opera\u00e7\u00e3o iniciada anteriormente\nMPI_File_open(MPI_COMM_WORLD, \"split.bin\", MPI_MODE_WRONLY, MPI_INFO_NULL, &fh);\n\n// Finaliza a opera\u00e7\u00e3o coletiva iniciada\nint err = MPI_File_write_at_all_end(fh, buf, &status);\n\nif (err == MPI_SUCCESS) {\n    // Buffer agora seguro para reutiliza\u00e7\u00e3o\n}\n\nMPI_File_close(&fh);"}, {"name": "MPI_File_write_ordered", "short_desc": "Escrita coletiva usando o ponteiro de arquivo compartilhado com ordem respeitada.", "synopsis": "int MPI_File_write_ordered(MPI_File fh, const void *buf, int count, MPI_Datatype datatype, MPI_Status *status)", "params": [{"name": "fh", "desc": "Handle do arquivo (handle)."}, {"name": "buf", "desc": "Buffer de dados (escolha)."}, {"name": "count", "desc": "N\u00famero de elementos (inteiro)."}, {"name": "datatype", "desc": "Tipo de dado (handle)."}, {"name": "status", "desc": "Status da opera\u00e7\u00e3o (Status, sa\u00edda)."}], "description": "Escreve dados de forma coletiva usando um ponteiro de arquivo compartilhado, garantindo que a ordem dos dados no arquivo corresponda \u00e0 ordem dos ranks dos processos no grupo (rank 0 escreve primeiro, depois rank 1, etc.).", "application": "Gera\u00e7\u00e3o de arquivos de log ou arquivos de sa\u00edda sequenciais a partir de processos paralelos.", "example": "// Declara\u00e7\u00f5es\nMPI_File fh;\nint buffer = 42;\nMPI_Status status;\n\nMPI_File_open(MPI_COMM_WORLD, \"ordenado.bin\", MPI_MODE_CREATE | MPI_MODE_WRONLY, MPI_INFO_NULL, &fh);\n\n// Escrita coletiva garantindo ordem baseada no rank dos processos\nint err = MPI_File_write_ordered(fh, &buffer, 1, MPI_INT, &status);\n\nif (err == MPI_SUCCESS) {\n    // Dados escritos na ordem dos ranks\n}\n\nMPI_File_close(&fh);"}, {"name": "MPI_File_write_ordered_begin", "short_desc": "Inicia uma escrita coletiva dividida e ordenada via ponteiro compartilhado.", "synopsis": "int MPI_File_write_ordered_begin(MPI_File fh, const void *buf, int count, MPI_Datatype datatype)", "params": [{"name": "fh", "desc": "Handle do arquivo (handle)."}, {"name": "buf", "desc": "Buffer de dados (escolha)."}, {"name": "count", "desc": "N\u00famero de elementos (inteiro)."}, {"name": "datatype", "desc": "Tipo de dado (handle)."}], "description": "Inicia a primeira fase de uma escrita coletiva ordenada que utiliza o ponteiro de arquivo compartilhado.", "application": "Escrita ordenada ass\u00edncrona.", "example": "// Declara\u00e7\u00f5es\nMPI_File fh;\nint buf = 123;\nint count = 1;\n\nMPI_File_open(MPI_COMM_WORLD, \"ordered_split.bin\", MPI_MODE_CREATE | MPI_MODE_WRONLY, MPI_INFO_NULL, &fh);\n\n// Inicia escrita ordenada coletiva\nint err = MPI_File_write_ordered_begin(fh, &buf, count, MPI_INT);\n\nif (err == MPI_SUCCESS) {\n    // Opera\u00e7\u00e3o n\u00e3o bloqueante iniciada\n}\n\nMPI_File_close(&fh);"}, {"name": "MPI_File_write_ordered_end", "short_desc": "Finaliza uma escrita coletiva dividida e ordenada via ponteiro compartilhado.", "synopsis": "int MPI_File_write_ordered_end(MPI_File fh, const void *buf, MPI_Status *status)", "params": [{"name": "fh", "desc": "Handle do arquivo (handle)."}, {"name": "buf", "desc": "Buffer de dados (escolha)."}, {"name": "status", "desc": "Status da opera\u00e7\u00e3o (Status, sa\u00edda)."}], "description": "Conclui a escrita ordenada iniciada em MPI_File_write_ordered_begin.", "application": "Finaliza\u00e7\u00e3o de escrita ordenada ass\u00edncrona.", "example": "// Declara\u00e7\u00f5es\nMPI_File fh;\nint buf = 123;\nMPI_Status status;\n\nMPI_File_open(MPI_COMM_WORLD, \"ordered_split.bin\", MPI_MODE_WRONLY, MPI_INFO_NULL, &fh);\n\n// Conclui escrita ordenada iniciada\nint err = MPI_File_write_ordered_end(fh, &buf, &status);\n\nif (err == MPI_SUCCESS) {\n    // Escrita ordenada finalizada\n}\n\nMPI_File_close(&fh);"}, {"name": "MPI_File_write_shared", "short_desc": "Escreve no arquivo usando o ponteiro de arquivo compartilhado.", "synopsis": "int MPI_File_write_shared(MPI_File fh, const void *buf, int count, MPI_Datatype datatype, MPI_Status *status)", "params": [{"name": "fh", "desc": "Handle do arquivo (handle)."}, {"name": "buf", "desc": "Buffer de dados (escolha)."}, {"name": "count", "desc": "N\u00famero de elementos (inteiro)."}, {"name": "datatype", "desc": "Tipo de dado (handle)."}, {"name": "status", "desc": "Status da opera\u00e7\u00e3o (Status, sa\u00edda)."}], "description": "Realiza uma escrita bloqueante e n\u00e3o coletiva no arquivo usando o ponteiro de arquivo compartilhado por todos os processos. O ponteiro \u00e9 atualizado automaticamente ap\u00f3s a escrita.", "application": "Implementa\u00e7\u00e3o de filas de sa\u00edda compartilhadas entre processos.", "example": "// Declara\u00e7\u00f5es\nMPI_File fh;\nchar buffer[10] = \"exemplo\";\nMPI_Status status;\n\nMPI_File_open(MPI_COMM_WORLD, \"shared.bin\", MPI_MODE_CREATE | MPI_MODE_WRONLY, MPI_INFO_NULL, &fh);\n\n// Escrita usando ponteiro compartilhado (atualiza automaticamente o offset do arquivo)\nint err = MPI_File_write_shared(fh, buffer, 10, MPI_CHAR, &status);\n\nif (err == MPI_SUCCESS) {\n    // Escrita conclu\u00edda e ponteiro compartilhado avan\u00e7ado\n}\n\nMPI_File_close(&fh);"}, {"name": "MPI_Finalize", "short_desc": "Finaliza o ambiente de execu\u00e7\u00e3o MPI.", "synopsis": "int MPI_Finalize(void)", "params": [], "description": "MPI_Finalize limpa todos os estados do MPI. Cada processo deve chamar esta rotina antes de terminar para garantir que todas as comunica\u00e7\u00f5es pendentes sejam conclu\u00eddas e os recursos liberados. Nenhuma outra fun\u00e7\u00e3o MPI (exceto MPI_Initialized, MPI_Finalized, etc.) pode ser chamada ap\u00f3s MPI_Finalize.", "application": "Obrigat\u00f3rio no final de qualquer programa MPI para garantir o encerramento limpo.", "example": "// Declara\u00e7\u00f5es\nint err;\n\n// ... opera\u00e7\u00f5es MPI ...\n\n// Encerra a biblioteca MPI e libera recursos\nerr = MPI_Finalize();\n\nif (err == MPI_SUCCESS) {\n    // MPI finalizado com sucesso\n}\nreturn 0;"}, {"name": "MPI_Finalized", "short_desc": "Indica se MPI_Finalize foi chamado.", "synopsis": "int MPI_Finalized(int *flag)", "params": [{"name": "flag", "desc": "Verdadeiro se o MPI foi finalizado (l\u00f3gico)."}], "description": "Indica se MPI_Finalize foi chamado. Esta rotina \u00e9 segura para threads e pode ser chamada antes de MPI_Init ou ap\u00f3s MPI_Finalize.", "application": "Verifica\u00e7\u00e3o do estado do ambiente MPI.", "example": "// Declara\u00e7\u00f5es\nint finalized = 0;\nint err;\n\n// Verifica o estado de finaliza\u00e7\u00e3o do ambiente MPI\nerr = MPI_Finalized(&finalized);\n\nif (err == MPI_SUCCESS && finalized) {\n    // MPI j\u00e1 foi finalizado\n}"}, {"name": "MPI_Free_mem", "short_desc": "Libera mem\u00f3ria alocada com MPI_Alloc_mem.", "synopsis": "int MPI_Free_mem(void *base)", "params": [{"name": "base", "desc": "Endere\u00e7o inicial do segmento de mem\u00f3ria alocado por MPI_ALLOC_MEM."}], "description": "Libera o segmento de mem\u00f3ria apontado por base, que deve ter sido alocado anteriormente via MPI_Alloc_mem.", "application": "Gerenciamento de mem\u00f3ria em ambientes MPI.", "example": "// Declara\u00e7\u00f5es\nvoid *base_ptr;\nint size = 1024;\n\n// Aloca o bloco de mem\u00f3ria utilizando as primitivas de aloca\u00e7\u00e3o do MPI\nint err = MPI_Alloc_mem(size, MPI_INFO_NULL, &base_ptr);\n\nif (err == MPI_SUCCESS) {\n    // Libera a mem\u00f3ria alocada anteriormente pelo sistema MPI\n    MPI_Free_mem(base_ptr);\n}"}, {"name": "MPI_Gather", "short_desc": "Re\u00fane valores de um grupo de processos.", "synopsis": "int MPI_Gather(const void *sendbuf, int sendcount, MPI_Datatype sendtype,\n       void *recvbuf, int recvcount, MPI_Datatype recvtype, int root,\n       MPI_Comm comm)\n\n       int MPI_Gather_c(const void *sendbuf, MPI_Count sendcount,\n       MPI_Datatype sendtype, void *recvbuf, MPI_Count recvcount,\n       MPI_Datatype recvtype, int root, MPI_Comm comm)", "params": [{"name": "sendbuf", "desc": "Endere\u00e7o inicial do buffer de envio."}, {"name": "sendcount", "desc": "N\u00famero de elementos no buffer de envio."}, {"name": "sendtype", "desc": "Tipo de dados dos elementos do buffer de envio."}, {"name": "recvbuf", "desc": "Endere\u00e7o do buffer de recebimento (apenas no raiz)."}, {"name": "recvcount", "desc": "N\u00famero de elementos recebidos de cada processo (apenas no raiz)."}, {"name": "recvtype", "desc": "Tipo de dados dos elementos do buffer de recebimento."}, {"name": "root", "desc": "Rank do processo receptor."}, {"name": "comm", "desc": "Comunicador."}], "description": "Cada processo envia o conte\u00fado de seu buffer de envio para o processo raiz. O processo raiz recebe as mensagens e as armazena em ordem de rank no buffer de recebimento.", "application": "Coleta de dados distribu\u00eddos para um \u00fanico processo.", "example": "// Declara\u00e7\u00f5es\nint rank, size;\nint send_data = 100;\nint *recv_data = NULL;\n\nMPI_Comm_rank(MPI_COMM_WORLD, &rank);\nMPI_Comm_size(MPI_COMM_WORLD, &size);\n\n// O processo raiz aloca espa\u00e7o para receber dados de todos os processos\nif (rank == 0) {\n    recv_data = (int*)malloc(size * sizeof(int));\n}\n\n// Coleta os valores de todos os ranks para o buffer do processo 0\nint err = MPI_Gather(&send_data, 1, MPI_INT, recv_data, 1, MPI_INT, 0, MPI_COMM_WORLD);\n\nif (err == MPI_SUCCESS && rank == 0) {\n    free(recv_data);\n}"}, {"name": "MPI_Gatherv", "short_desc": "Re\u00fane dados com tamanhos vari\u00e1veis de processos em um grupo.", "synopsis": "int MPI_Gatherv(const void *sendbuf, int sendcount, MPI_Datatype sendtype,\n       void *recvbuf, const int recvcounts[], const int displs[],\n       MPI_Datatype recvtype, int root, MPI_Comm comm)\n\n       int MPI_Gatherv_c(const void *sendbuf, MPI_Count sendcount,\n       MPI_Datatype sendtype, void *recvbuf,\n       const MPI_Count recvcounts[], const MPI_Aint displs[],\n       MPI_Datatype recvtype, int root, MPI_Comm comm)", "params": [{"name": "sendbuf", "desc": "Endere\u00e7o inicial do buffer de envio."}, {"name": "sendcount", "desc": "N\u00famero de elementos no buffer de envio."}, {"name": "sendtype", "desc": "Tipo de dados dos elementos de envio."}, {"name": "recvbuf", "desc": "Endere\u00e7o do buffer de recebimento."}, {"name": "recvcounts", "desc": "Array com o n\u00famero de elementos recebidos de cada processo."}, {"name": "displs", "desc": "Deslocamentos relativos ao recvbuf para os dados de cada processo."}, {"name": "recvtype", "desc": "Tipo de dados dos elementos de recebimento."}, {"name": "root", "desc": "Rank do processo receptor."}, {"name": "comm", "desc": "Comunicador."}], "description": "Vers\u00e3o flex\u00edvel do MPI_Gather que permite que cada processo envie um n\u00famero diferente de elementos para o raiz.", "application": "Coleta de dados de tamanhos desiguais.", "example": "// Declara\u00e7\u00f5es\nint rank, size;\nint send_val = 1;\nint recv_buf[10];\nint recv_counts[] = {1, 2, 3};\nint displs[] = {0, 1, 3};\n\nMPI_Comm_rank(MPI_COMM_WORLD, &rank);\n\n// Coleta volumes vari\u00e1veis de dados de cada rank\nint err = MPI_Gatherv(&send_val, 1, MPI_INT, recv_buf, recv_counts, displs, MPI_INT, 0, MPI_COMM_WORLD);\n\nif (err == MPI_SUCCESS) {\n    // Opera\u00e7\u00e3o conclu\u00edda com sucesso\n}"}, {"name": "MPI_Get", "short_desc": "Obt\u00e9m dados de uma janela de mem\u00f3ria remota.", "synopsis": "int MPI_Get(void *origin_addr, int origin_count, MPI_Datatype origin_datatype,\n       int target_rank, MPI_Aint target_disp, int target_count,\n       MPI_Datatype target_datatype, MPI_Win win)\n\n       int MPI_Get_c(void *origin_addr, MPI_Count origin_count,\n       MPI_Datatype origin_datatype, int target_rank,\n       MPI_Aint target_disp, MPI_Count target_count,\n       MPI_Datatype target_datatype, MPI_Win win)", "params": [{"name": "origin_addr", "desc": "Endere\u00e7o inicial do buffer de origem."}, {"name": "origin_count", "desc": "N\u00famero de entradas no buffer de origem."}, {"name": "origin_datatype", "desc": "Tipo de dados das entradas no buffer de origem."}, {"name": "target_rank", "desc": "Rank do destino."}, {"name": "target_disp", "desc": "Deslocamento do in\u00edcio da janela at\u00e9 o buffer de destino."}, {"name": "target_count", "desc": "N\u00famero de entradas no buffer de destino."}, {"name": "target_datatype", "desc": "Tipo de dados das entradas no buffer de destino."}, {"name": "win", "desc": "Objeto de janela usado para comunica\u00e7\u00e3o."}], "description": "Opera\u00e7\u00e3o unilateral que l\u00ea dados de uma janela de mem\u00f3ria em um processo remoto e os armazena no buffer de origem.", "application": "Acesso Direto \u00e0 Mem\u00f3ria Remota (RDMA).", "example": "// Declara\u00e7\u00f5es\nint local_buf[5] = {0};\nint target_rank = 1;\nMPI_Win win;\nint *win_buf;\n\nMPI_Alloc_mem(10 * sizeof(int), MPI_INFO_NULL, &win_buf);\nMPI_Win_create(win_buf, 10 * sizeof(int), sizeof(int), MPI_INFO_NULL, MPI_COMM_WORLD, &win);\n\nMPI_Win_fence(0, win);\n// Realiza leitura remota de 5 inteiros da janela do processo alvo\nint err = MPI_Get(local_buf, 5, MPI_INT, target_rank, 0, 5, MPI_INT, win);\nMPI_Win_fence(0, win);\n\nif (err == MPI_SUCCESS) {\n    MPI_Win_free(&win);\n    MPI_Free_mem(win_buf);\n}"}, {"name": "MPI_Get_accumulate", "short_desc": "Opera\u00e7\u00e3o at\u00f4mica de leitura e acumula\u00e7\u00e3o unilateral.", "synopsis": "int MPI_Get_accumulate(const void *origin_addr, int origin_count,\n       MPI_Datatype origin_datatype, void *result_addr,\n       int result_count, MPI_Datatype result_datatype,\n       int target_rank, MPI_Aint target_disp, int target_count,\n       MPI_Datatype target_datatype, MPI_Op op, MPI_Win win)\n\n       int MPI_Get_accumulate_c(const void *origin_addr, MPI_Count origin_count,\n       MPI_Datatype origin_datatype, void *result_addr,\n       MPI_Count result_count, MPI_Datatype result_datatype,\n       int target_rank, MPI_Aint target_disp,\n       MPI_Count target_count, MPI_Datatype target_datatype,\n       MPI_Op op, MPI_Win win)", "params": [{"name": "origin_addr", "desc": "Endere\u00e7o inicial do buffer de origem."}, {"name": "origin_count", "desc": "N\u00famero de entradas no buffer de origem."}, {"name": "origin_datatype", "desc": "Tipo de dados no buffer de origem."}, {"name": "result_addr", "desc": "Endere\u00e7o inicial do buffer de resultado."}, {"name": "result_count", "desc": "N\u00famero de entradas no buffer de resultado."}, {"name": "result_datatype", "desc": "Tipo de dados no buffer de resultado."}, {"name": "target_rank", "desc": "Rank do destino."}, {"name": "target_disp", "desc": "Deslocamento na janela remota."}, {"name": "target_count", "desc": "N\u00famero de entradas no destino."}, {"name": "target_datatype", "desc": "Tipo de dados no destino."}, {"name": "op", "desc": "Opera\u00e7\u00e3o de redu\u00e7\u00e3o."}, {"name": "win", "desc": "Objeto de janela."}], "description": "L\u00ea atomicamente os dados da janela remota para o buffer de resultado e ent\u00e3o acumula os dados do buffer de origem na janela remota.", "application": "Sincroniza\u00e7\u00e3o at\u00f4mica e computa\u00e7\u00e3o unilateral.", "example": "// Declara\u00e7\u00f5es\nint origin_buf = 5;\nint result_buf;\nint target_rank = 1;\nMPI_Win win;\n\n// Assumindo janela j\u00e1 criada e ativa\nint err = MPI_Get_accumulate(&origin_buf, 1, MPI_INT, &result_buf, 1, MPI_INT, target_rank, 0, 1, MPI_INT, MPI_SUM, win);\n\nif (err == MPI_SUCCESS) {\n    // A mem\u00f3ria remota foi atualizada e o valor antigo est\u00e1 em result_buf\n}"}, {"name": "MPI_Get_address", "short_desc": "Obt\u00e9m o endere\u00e7o de um local na mem\u00f3ria.", "synopsis": "int MPI_Get_address(const void *location, MPI_Aint *address)", "params": [{"name": "location", "desc": "Local na mem\u00f3ria do chamador."}, {"name": "address", "desc": "Endere\u00e7o retornado."}], "description": "Retorna o endere\u00e7o de um local na mem\u00f3ria em um formato compat\u00edvel com MPI (MPI_Aint).", "application": "Cria\u00e7\u00e3o de tipos de dados derivados e buffers estruturados.", "example": "// Declara\u00e7\u00f5es\nint buffer = 42;\nMPI_Aint addr;\n\n// Obt\u00e9m o endere\u00e7o de mem\u00f3ria absoluto para ser usado em Datatypes\nint err = MPI_Get_address(&buffer, &addr);\n\nif (err == MPI_SUCCESS) {\n    // Endere\u00e7o salvo em addr\n}"}, {"name": "MPI_Get_count", "short_desc": "Obt\u00e9m o n\u00famero de elementos de 'n\u00edvel superior'.", "synopsis": "int MPI_Get_count(const MPI_Status *status, MPI_Datatype datatype, int *count)\n\n       int MPI_Get_count_c(const MPI_Status *status, MPI_Datatype datatype,\n       MPI_Count *count)", "params": [{"name": "status", "desc": "Status da opera\u00e7\u00e3o de recebimento."}, {"name": "datatype", "desc": "Tipo de dados dos elementos recebidos."}, {"name": "count", "desc": "N\u00famero de elementos recebidos."}], "description": "Retorna o n\u00famero de elementos do tipo de dados especificado que foram recebidos em uma opera\u00e7\u00e3o de recebimento.", "application": "Verifica\u00e7\u00e3o do tamanho das mensagens recebidas.", "example": "// Declara\u00e7\u00f5es\nint buf[100];\nint count;\nMPI_Status status;\n\nMPI_Recv(buf, 100, MPI_INT, 0, 0, MPI_COMM_WORLD, &status);\n\n// Determina quantos elementos do tipo MPI_INT foram recebidos\nint err = MPI_Get_count(&status, MPI_INT, &count);\n\nif (err == MPI_SUCCESS) {\n    // count cont\u00e9m o n\u00famero real de inteiros recebidos\n}"}, {"name": "MPI_Get_elements", "short_desc": "Retorna o n\u00famero de elementos b\u00e1sicos recebidos.", "synopsis": "int MPI_Get_elements(const MPI_Status *status, MPI_Datatype datatype,\n       int *count)\n\n       int MPI_Get_elements_c(const MPI_Status *status, MPI_Datatype datatype,\n       MPI_Count *count)", "params": [{"name": "status", "desc": "Status da opera\u00e7\u00e3o de recebimento."}, {"name": "datatype", "desc": "Tipo de dados usado na opera\u00e7\u00e3o."}, {"name": "count", "desc": "N\u00famero de elementos b\u00e1sicos recebidos."}], "description": "Retorna o n\u00famero de elementos b\u00e1sicos (tipos primitivos) contidos em uma mensagem recebida, mesmo que tipos derivados tenham sido usados.", "application": "An\u00e1lise detalhada de mensagens com tipos derivados complexos.", "example": "// Declara\u00e7\u00f5es\nint count;\nMPI_Status status;\nMPI_Datatype custom_type;\n\n// Recebe mensagem usando um tipo derivado\n// ... (sup\u00f5e MPI_Recv e defini\u00e7\u00e3o de tipo)\n\nint err = MPI_Get_elements(&status, custom_type, &count);\n\nif (err == MPI_SUCCESS) {\n    // count cont\u00e9m o n\u00famero de tipos b\u00e1sicos recebidos\n}"}, {"name": "MPI_Get_elements_x", "short_desc": "Retorna o n\u00famero de elementos b\u00e1sicos (vers\u00e3o estendida).", "synopsis": "int MPI_Get_elements_x(const MPI_Status *status, MPI_Datatype datatype,\n       MPI_Count *count)", "params": [{"name": "status", "desc": "Status da opera\u00e7\u00e3o de recebimento."}, {"name": "datatype", "desc": "Tipo de dados usado."}, {"name": "count", "desc": "N\u00famero de elementos b\u00e1sicos recebidos (MPI_Count)."}], "description": "Vers\u00e3o de MPI_Get_elements que utiliza MPI_Count para suportar grandes volumes de dados.", "application": "Processamento de grandes conjuntos de dados (Big Data) com MPI.", "example": "// Declara\u00e7\u00f5es\nMPI_Count count;\nMPI_Status status;\nMPI_Datatype datatype = MPI_INT;\n\n// Vers\u00e3o com suporte a contagens maiores que a capacidade de um int\nint err = MPI_Get_elements_x(&status, datatype, &count);\n\nif (err == MPI_SUCCESS) {\n    // count cont\u00e9m o valor total de elementos recebidos\n}"}, {"name": "MPI_Get_library_version", "short_desc": "Retorna a vers\u00e3o da biblioteca MPI.", "synopsis": "int MPI_Get_library_version(char *version, int *resultlen)", "params": [{"name": "version", "desc": "Buffer para armazenar a string da vers\u00e3o."}, {"name": "resultlen", "desc": "Comprimento da string retornada."}], "description": "Retorna uma string contendo a vers\u00e3o da biblioteca MPI e o comprimento dessa string.", "application": "Depura\u00e7\u00e3o e verifica\u00e7\u00e3o de compatibilidade de bibliotecas.", "example": "// Declara\u00e7\u00f5es\nchar version[MPI_MAX_LIBRARY_VERSION_STRING];\nint len;\n\n// Obt\u00e9m a vers\u00e3o da implementa\u00e7\u00e3o MPI instalada\nint err = MPI_Get_library_version(version, &len);\n\nif (err == MPI_SUCCESS) {\n    // String de vers\u00e3o acess\u00edvel em version\n}"}, {"name": "MPI_Get_processor_name", "short_desc": "Obt\u00e9m o nome do processador", "synopsis": "int MPI_Get_processor_name(char *name, int *resultlen)", "params": [{"name": "name", "desc": "Um identificador exclusivo para o n\u00f3 real (em oposi\u00e7\u00e3o ao virtual). (string)"}, {"name": "resultlen", "desc": "Comprimento (em caracteres imprim\u00edveis) do resultado retornado em name (inteiro)"}], "description": "NOTAS\n       O nome retornado deve identificar uma pe\u00e7a espec\u00edfica de hardware; o formato exato \u00e9 definido pela implementa\u00e7\u00e3o. Este nome pode ou n\u00e3o ser o mesmo que pode ser retornado por gethostname, uname ou sysinfo.", "application": "", "example": "// Declara\u00e7\u00f5es\nchar name[MPI_MAX_PROCESSOR_NAME];\nint resultlen;\n\n// Obt\u00e9m o nome do processador onde o processo est\u00e1 rodando\nint err = MPI_Get_processor_name(name, &resultlen);\n\nif (err == MPI_SUCCESS) {\n    // Nome obtido com sucesso\n}"}, {"name": "MPI_Get_version", "short_desc": "Retorna a vers\u00e3o principal e a subvers\u00e3o do padr\u00e3o MPI suportado.", "synopsis": "int MPI_Get_version(int *version, int *subversion)", "params": [{"name": "version", "desc": "n\u00famero da vers\u00e3o principal (inteiro)"}, {"name": "subversion", "desc": "n\u00famero da subvers\u00e3o (inteiro)"}], "description": "A fun\u00e7\u00e3o `MPI_Get_version` \u00e9 usada para determinar a vers\u00e3o do padr\u00e3o MPI que a biblioteca atual suporta e implementa. Ela retorna dois inteiros: `version` para a vers\u00e3o principal (por exemplo, 3 para MPI-3) e `subversion` para a vers\u00e3o secund\u00e1ria (por exemplo, 1 para MPI-3.1). Isso \u00e9 \u00fatil para escrever c\u00f3digos port\u00e1teis que dependem de funcionalidades introduzidas em vers\u00f5es espec\u00edficas do padr\u00e3o MPI.", "application": "\u00c9 empregada em bibliotecas e aplicativos paralelos que precisam se adaptar dinamicamente aos recursos dispon\u00edveis na implementa\u00e7\u00e3o MPI em uso, garantindo retrocompatibilidade ou habilitando otimiza\u00e7\u00f5es espec\u00edficas da vers\u00e3o.", "example": "// Declara\u00e7\u00f5es\nint version, subversion;\n\n// Consulta a vers\u00e3o da implementa\u00e7\u00e3o MPI\nint err = MPI_Get_version(&version, &subversion);\n\nif (err == MPI_SUCCESS) {\n    // O padr\u00e3o MPI suportado pode ser verificado aqui\n}"}, {"name": "MPI_Graph_create", "short_desc": "Cria um novo comunicador ao qual informa\u00e7\u00f5es de topologia de grafo foram anexadas", "synopsis": "int MPI_Graph_create(MPI_Comm comm_old, int nnodes, const int indx[],\n       const int edges[], int reorder, MPI_Comm *comm_graph)", "params": [{"name": "comm_old", "desc": ""}, {"name": "nnodes", "desc": "n\u00famero de n\u00f3s no grafo (inteiro)"}, {"name": "indx", "desc": "array de inteiros descrevendo os graus dos n\u00f3s (veja abaixo)"}, {"name": "edges", "desc": "array de inteiros descrevendo as arestas do grafo (veja abaixo)"}, {"name": "reorder", "desc": "o ranqueamento pode ser reordenado (true) ou n\u00e3o (false)"}, {"name": "comm_graph", "desc": "comunicador com a topologia de grafo adicionada (handle)"}], "description": "NOTAS\n       Cada processo deve fornecer uma descri\u00e7\u00e3o de todo o grafo, n\u00e3o apenas dos vizinhos do processo que faz a chamada.", "application": "", "example": "// Declara\u00e7\u00f5es\nMPI_Comm comm_old = MPI_COMM_WORLD;\nint nnodes = 3;\nint indx[] = {1, 2, 3};\nint edges[] = {1, 2, 0};\nint reorder = 0;\nMPI_Comm comm_graph;\n\n// Cria um comunicador com topologia de grafo\nint err = MPI_Graph_create(comm_old, nnodes, indx, edges, reorder, 0, &comm_graph);\n\nif (err == MPI_SUCCESS) {\n    MPI_Comm_free(&comm_graph);\n}"}, {"name": "MPI_Graph_get", "short_desc": "Recupera as informa\u00e7\u00f5es da topologia de grafo associada a um comunicador.", "synopsis": "int MPI_Graph_get(MPI_Comm comm, int maxindex, int maxedges, int indx[], int edges[])", "params": [{"name": "comm", "desc": "comunicador com estrutura de grafo (handle)"}, {"name": "maxindex", "desc": "comprimento do vetor `indx` no programa chamador (inteiro)"}, {"name": "maxedges", "desc": "comprimento do vetor `edges` no programa chamador (inteiro)"}, {"name": "indx", "desc": "array de inteiros contendo a estrutura de \u00edndices do grafo (array de inteiros)"}, {"name": "edges", "desc": "array de inteiros contendo as arestas do grafo (array de inteiros)"}], "description": "A fun\u00e7\u00e3o `MPI_Graph_get` retorna a estrutura de topologia de grafo previamente associada ao comunicador especificado. O usu\u00e1rio deve fornecer o tamanho m\u00e1ximo dos vetores `indx` e `edges` (atrav\u00e9s de `maxindex` e `maxedges`) para garantir que a implementa\u00e7\u00e3o MPI n\u00e3o escreva fora dos limites da mem\u00f3ria alocada. Esses tamanhos podem ser obtidos utilizando a fun\u00e7\u00e3o `MPI_Graphdims_get`. Os vetores `indx` e `edges` s\u00e3o preenchidos com os dados que definem os n\u00f3s e as arestas do grafo.", "application": "Utilizada quando componentes ou bibliotecas secund\u00e1rias recebem um comunicador com uma topologia de grafo j\u00e1 associada e precisam descobrir a estrutura de conex\u00f5es entre os processos para otimizar suas pr\u00f3prias rotinas de comunica\u00e7\u00e3o ou redistribui\u00e7\u00e3o de dados.", "example": "// Declara\u00e7\u00f5es\nMPI_Comm comm_graph;\nint nnodes, nedges;\nint *indx, *edges;\n\n// Recupera dimens\u00f5es para aloca\u00e7\u00e3o\nMPI_Graphdims_get(comm_graph, &nnodes, &nedges);\nindx = (int *)malloc(nnodes * sizeof(int));\nedges = (int *)malloc(nedges * sizeof(int));\n\n// Recupera a estrutura do grafo\nint err = MPI_Graph_get(comm_graph, nnodes, nedges, indx, edges);\n\nif (err == MPI_SUCCESS) {\n    // Estrutura processada\n}\nfree(indx);\nfree(edges);"}, {"name": "MPI_Graph_map", "short_desc": "Sugere um mapeamento otimizado de processos para uma estrutura de topologia de grafo.", "synopsis": "int MPI_Graph_map(MPI_Comm comm, int nnodes, const int indx[], const int edges[], int *newrank)", "params": [{"name": "comm", "desc": "comunicador de entrada (handle)"}, {"name": "nnodes", "desc": "n\u00famero de n\u00f3s no grafo (inteiro)"}, {"name": "indx", "desc": "array de inteiros que especifica os \u00edndices de arestas para os n\u00f3s do grafo (array de inteiros)"}, {"name": "edges", "desc": "array de inteiros que especifica as arestas conectando os n\u00f3s do grafo (array de inteiros)"}, {"name": "newrank", "desc": "novo rank sugerido para o processo chamador, ou `MPI_UNDEFINED` se o processo n\u00e3o fizer parte do grafo (inteiro)"}], "description": "A fun\u00e7\u00e3o `MPI_Graph_map` fornece \u00e0 implementa\u00e7\u00e3o MPI as informa\u00e7\u00f5es sobre um padr\u00e3o de comunica\u00e7\u00e3o em forma de grafo (definido por `nnodes`, `indx` e `edges`) e solicita uma sugest\u00e3o de mapeamento otimizado (reordena\u00e7\u00e3o) dos processos para a arquitetura de hardware subjacente. Ao contr\u00e1rio de `MPI_Graph_create`, esta fun\u00e7\u00e3o n\u00e3o cria o novo comunicador com a topologia; ela apenas retorna o `newrank` sugerido. Se o processo chamador n\u00e3o fizer parte dos `nnodes` especificados, `newrank` retorna `MPI_UNDEFINED`. A sugest\u00e3o pode ser usada para reorganizar as tarefas entre os processos para minimizar custos de comunica\u00e7\u00e3o.", "application": "Utilizada para otimizar aplica\u00e7\u00f5es complexas (como m\u00e9todos de elementos finitos estruturados em malhas n\u00e3o regulares) descobrindo se a plataforma de execu\u00e7\u00e3o se beneficiaria de um rearranjo dos ranks do comunicador original, sem necessariamente criar um novo comunicador imediatamente.", "example": "// Declara\u00e7\u00f5es\nint nnodes = 3, newrank;\nint indx[] = {1, 2, 3};\nint edges[] = {1, 2, 0};\n\n// Solicita mapeamento otimizado para o grafo\nint err = MPI_Graph_map(MPI_COMM_WORLD, nnodes, indx, edges, &newrank);\n\nif (err == MPI_SUCCESS && newrank != MPI_UNDEFINED) {\n    // Rank mapeado com sucesso\n}"}, {"name": "MPI_Graph_neighbors", "short_desc": "Retorna uma lista dos processos vizinhos a um n\u00f3 espec\u00edfico em um comunicador de grafo.", "synopsis": "int MPI_Graph_neighbors(MPI_Comm comm, int rank, int maxneighbors, int neighbors[])", "params": [{"name": "comm", "desc": "comunicador com topologia de grafo associada (handle)"}, {"name": "rank", "desc": "rank do processo cujos vizinhos ser\u00e3o determinados (inteiro)"}, {"name": "maxneighbors", "desc": "tamanho m\u00e1ximo do array `neighbors` (inteiro)"}, {"name": "neighbors", "desc": "array onde ser\u00e3o armazenados os ranks dos processos vizinhos (array de inteiros)"}], "description": "A fun\u00e7\u00e3o `MPI_Graph_neighbors` preenche o array `neighbors` com os ranks dos processos que est\u00e3o diretamente conectados por uma aresta ao n\u00f3 especificado (identificado pelo seu `rank`). O par\u00e2metro `maxneighbors` restringe o n\u00famero de vizinhos que o MPI pode copiar para o array para prevenir estouro de buffer; esse valor idealmente deve ser obtido utilizando `MPI_Graph_neighbors_count`.", "application": "Fundamental em algoritmos paralelos baseados em grafos, como colora\u00e7\u00e3o de grafos, PageRank, algoritmos baseados em malhas ou resolu\u00e7\u00e3o de EDPs n\u00e3o estruturadas, onde os n\u00f3s precisam se comunicar periodicamente apenas com seus pares imediatamente adjacentes para trocar dados de fronteira.", "example": "// Declara\u00e7\u00f5es\nMPI_Comm comm_graph;\nint rank = 0, nneighbors;\nint *neighbors;\n\n// Descobre quantos vizinhos existem\nMPI_Graph_neighbors_count(comm_graph, rank, &nneighbors);\nneighbors = (int *)malloc(nneighbors * sizeof(int));\n\n// Obt\u00e9m os vizinhos\nint err = MPI_Graph_neighbors(comm_graph, rank, nneighbors, neighbors);\n\nif (err == MPI_SUCCESS) {\n    // Lista de vizinhos utilizada\n}\nfree(neighbors);"}, {"name": "MPI_Graph_neighbors_count", "short_desc": "Retorna a quantidade de n\u00f3s vizinhos a um processo espec\u00edfico em uma topologia de grafo.", "synopsis": "int MPI_Graph_neighbors_count(MPI_Comm comm, int rank, int *nneighbors)", "params": [{"name": "comm", "desc": "comunicador com topologia de grafo associada (handle)"}, {"name": "rank", "desc": "rank do processo cuja quantidade de vizinhos se deseja saber (inteiro)"}, {"name": "nneighbors", "desc": "n\u00famero de vizinhos do processo especificado (inteiro)"}], "description": "A fun\u00e7\u00e3o `MPI_Graph_neighbors_count` consulta a topologia de grafo de um comunicador para descobrir quantas arestas conectam o processo com o `rank` fornecido a outros n\u00f3s. O resultado, devolvido na vari\u00e1vel `nneighbors`, \u00e9 o grau do v\u00e9rtice correspondente no grafo. Essa fun\u00e7\u00e3o geralmente \u00e9 chamada antes de `MPI_Graph_neighbors` para permitir a aloca\u00e7\u00e3o din\u00e2mica precisa do buffer de armazenamento de vizinhos.", "application": "\u00c9 o primeiro passo para a comunica\u00e7\u00e3o em algoritmos dependentes de conectividade de rede arbitr\u00e1ria ou grafos n-dimensionais din\u00e2micos, para descobrir com quantos pares o processo atual deve trocar mensagens sem causar excesso ou falta de aloca\u00e7\u00e3o de mem\u00f3ria.", "example": "// Declara\u00e7\u00f5es\nMPI_Comm comm_graph;\nint rank = 0, nneighbors;\n\n// Consulta o grau do v\u00e9rtice no grafo\nint err = MPI_Graph_neighbors_count(comm_graph, rank, &nneighbors);\n\nif (err == MPI_SUCCESS) {\n    // nneighbors cont\u00e9m o n\u00famero de vizinhos\n}"}, {"name": "MPI_Graphdims_get", "short_desc": "Recupera os tamanhos das dimens\u00f5es (n\u00f3s e arestas) da topologia de grafo associada ao comunicador.", "synopsis": "int MPI_Graphdims_get(MPI_Comm comm, int *nnodes, int *nedges)", "params": [{"name": "comm", "desc": "comunicador para grupo com estrutura de grafo (handle)"}, {"name": "nnodes", "desc": "n\u00famero de n\u00f3s no grafo (inteiro)"}, {"name": "nedges", "desc": "n\u00famero total de arestas no grafo (inteiro)"}], "description": "A fun\u00e7\u00e3o `MPI_Graphdims_get` devolve o n\u00famero de v\u00e9rtices (n\u00f3s, representados por `nnodes`) e o n\u00famero de liga\u00e7\u00f5es orientadas (arestas, representadas por `nedges`) que caracterizam o grafo da topologia do comunicador `comm`. O valor de `nnodes` \u00e9 id\u00eantico ao tamanho do grupo de processos associado ao comunicador. Essa consulta \u00e9 essencial para saber os tamanhos corretos dos arrays que devem ser passados para a fun\u00e7\u00e3o `MPI_Graph_get`.", "application": "Usada sempre que um subsistema desconhece os limites da topologia de grafo atrelada ao comunicador e precisa inicializar buffers adequadamente antes de invocar extra\u00e7\u00f5es completas da estrutura do grafo ou realizar balanceamentos de carga iterativos.", "example": "// Declara\u00e7\u00f5es\nMPI_Comm comm_graph;\nint nnodes, nedges;\n\n// Extrai dimens\u00f5es da topologia para prepara\u00e7\u00e3o de buffers\nint err = MPI_Graphdims_get(comm_graph, &nnodes, &nedges);\n\nif (err == MPI_SUCCESS) {\n    // Dimens\u00f5es prontas para uso\n}"}, {"name": "MPI_Grequest_complete", "short_desc": "Notifica o subsistema MPI de que uma requisi\u00e7\u00e3o n\u00e3o-bloqueante generalizada foi conclu\u00edda.", "synopsis": "int MPI_Grequest_complete(MPI_Request request)", "params": [{"name": "request", "desc": "handle da requisi\u00e7\u00e3o generalizada a ser marcada como conclu\u00edda (handle)"}], "description": "A fun\u00e7\u00e3o `MPI_Grequest_complete` informa explicitamente ao MPI que o trabalho em background atrelado a uma requisi\u00e7\u00e3o generalizada (criada via `MPI_Grequest_start`) foi finalizado. Essa notifica\u00e7\u00e3o permite que fun\u00e7\u00f5es bloqueantes da fam\u00edlia de teste ou espera (como `MPI_Wait` ou `MPI_Test`) que monitoram essa `request` espec\u00edfica retornem positivamente para a aplica\u00e7\u00e3o de forma que a opera\u00e7\u00e3o ass\u00edncrona customizada do usu\u00e1rio chegue ao fim formalmente.", "application": "Ferramenta vital na integra\u00e7\u00e3o de I/O complexos ass\u00edncronos, bibliotecas que misturam threads (como Pthreads ou OpenMP) ou sistemas de tarefas que encapsulam progress\u00f5es definidas pelo usu\u00e1rio e precisam interagir transparentemente com o restante das requisi\u00e7\u00f5es ass\u00edncronas do MPI do c\u00f3digo chamador.", "example": "// Declara\u00e7\u00f5es\nMPI_Request request;\n\n// O processamento ass\u00edncrono finaliza a requisi\u00e7\u00e3o\nint err = MPI_Grequest_complete(request);\n\nif (err == MPI_SUCCESS) {\n    // Requisi\u00e7\u00e3o marcada como finalizada\n}"}, {"name": "MPI_Grequest_start", "short_desc": "Cria e inicia uma requisi\u00e7\u00e3o MPI generalizada definida pelo usu\u00e1rio.", "synopsis": "int MPI_Grequest_start(MPI_Grequest_query_function *query_fn, MPI_Grequest_free_function *free_fn, MPI_Grequest_cancel_function *cancel_fn, void *extra_state, MPI_Request *request)", "params": [{"name": "query_fn", "desc": "fun\u00e7\u00e3o de callback invocada quando o status da requisi\u00e7\u00e3o \u00e9 consultado (fun\u00e7\u00e3o)"}, {"name": "free_fn", "desc": "fun\u00e7\u00e3o de callback invocada quando a requisi\u00e7\u00e3o \u00e9 liberada ou finalizada (fun\u00e7\u00e3o)"}, {"name": "cancel_fn", "desc": "fun\u00e7\u00e3o de callback invocada quando um cancelamento da requisi\u00e7\u00e3o \u00e9 solicitado via `MPI_Cancel` (fun\u00e7\u00e3o)"}, {"name": "extra_state", "desc": "ponteiro para o estado extra que deve ser repassado a todos os callbacks definidos (ponteiro)"}, {"name": "request", "desc": "objeto de requisi\u00e7\u00e3o generalizada gerado (handle)"}], "description": "A fun\u00e7\u00e3o `MPI_Grequest_start` inicializa uma requisi\u00e7\u00e3o do MPI (generalized request) que n\u00e3o se refere internamente a uma comunica\u00e7\u00e3o padr\u00e3o nativa, mas a uma opera\u00e7\u00e3o arbitr\u00e1ria (por exemplo, E/S de disco n\u00e3o bloqueante ass\u00edncrono ou c\u00e1lculo de thread customizado). As opera\u00e7\u00f5es de consulta de estado, de destrui\u00e7\u00e3o da requisi\u00e7\u00e3o e de cancelamento invocadas nas rotinas do MPI (`Wait`, `Test`, `Free`, `Cancel`) ser\u00e3o delegadas e executadas pelas tr\u00eas fun\u00e7\u00f5es de callback fornecidas pelo usu\u00e1rio: `query_fn`, `free_fn` e `cancel_fn`.", "application": "Essencial no desenvolvimento de sistemas complexos e extens\u00f5es ao MPI (como subsistemas I/O personalizados ou motores heterog\u00eaneos CUDA/OpenCL ass\u00edncronos) nos quais a aplica\u00e7\u00e3o deseja devolver `MPI_Request`s que podem ser unificados na mesma matriz de espera `MPI_Waitall` ao lado de chamadas regulares como `MPI_Irecv`.", "example": "// Declara\u00e7\u00f5es\nMPI_Request request;\nvoid *estado_usuario = NULL;\n\n// Inicia requisi\u00e7\u00e3o personalizada com callbacks definidos\nint err = MPI_Grequest_start(query_fn, free_fn, cancel_fn, estado_usuario, &request);\n\nif (err == MPI_SUCCESS) {\n    // Monitora a conclus\u00e3o\n    MPI_Wait(&request, MPI_STATUS_IGNORE);\n}"}, {"name": "MPI_Group_c2f", "short_desc": "Converte um handle de grupo do padr\u00e3o C para um handle equivalente do tipo INTEGER em Fortran.", "synopsis": "MPI_Fint MPI_Group_c2f(MPI_Group group)", "params": [{"name": "group", "desc": "handle do grupo C a ser convertido (handle)"}], "description": "A fun\u00e7\u00e3o `MPI_Group_c2f` (C to Fortran) recebe um identificador opaco de grupo do tipo `MPI_Group` gerado ou gerenciado na API em C e o traduz para o inteiro do tipo `MPI_Fint` correspondente usado pela biblioteca MPI no Fortran. Isso garante que o mesmo grupo abstrato de processos possa ser validamente passado de bibliotecas escritas em C para as rotinas Fortran na mesma execu\u00e7\u00e3o e interpretado de forma cont\u00ednua.", "application": "\u00c9 empregada na elabora\u00e7\u00e3o de c\u00f3digos mistos C/Fortran em projetos legados extensos, onde o n\u00facleo do aplicativo pode operar em Fortran utilizando identificadores inteiros, enquanto wrappers para chamadas de sistema, comunica\u00e7\u00e3o paralela especializada ou m\u00f3dulos computacionais s\u00e3o codificados em C.", "example": "// Declara\u00e7\u00f5es\nMPI_Group c_group;\nMPI_Fint f_group;\n\n// Obt\u00e9m o grupo do comunicador mundial\nMPI_Comm_group(MPI_COMM_WORLD, &c_group);\n\n// Converte o identificador C para o formato Fortran\nf_group = MPI_Group_c2f(c_group);\n\n// Exemplo hipot\u00e9tico de uso em interface externa\n// fortran_subroutine(&f_group);\n\n// Limpeza dos recursos\nMPI_Group_free(&c_group);"}, {"name": "MPI_Group_compare", "short_desc": "Compara o conte\u00fado e a composi\u00e7\u00e3o estrutural de dois grupos de processos.", "synopsis": "int MPI_Group_compare(MPI_Group group1, MPI_Group group2, int *result)", "params": [{"name": "group1", "desc": "o primeiro grupo a ser comparado (handle)"}, {"name": "group2", "desc": "o segundo grupo a ser comparado (handle)"}, {"name": "result", "desc": "ponteiro para um inteiro que reter\u00e1 o resultado (inteiro)"}], "description": "A fun\u00e7\u00e3o `MPI_Group_compare` examina os membros e a ordena\u00e7\u00e3o de `group1` e `group2` e grava em `result` uma de tr\u00eas constantes pr\u00e9-definidas. Retorna `MPI_IDENT` se ambos os grupos contiverem os mesmos processos na exata mesma ordem (identidade). Retorna `MPI_SIMILAR` se ambos os grupos contiverem exatamente os mesmos processos, mas arranjados em uma ordem (ranks) diferente. Por \u00faltimo, retorna `MPI_UNEQUAL` caso n\u00e3o obede\u00e7am a nenhum desses crit\u00e9rios (tamanhos diferentes ou um processo est\u00e1 em um grupo e n\u00e3o no outro).", "application": "Essencial em manuten\u00e7\u00f5es din\u00e2micas de comunicadores, permitindo checar se uma modifica\u00e7\u00e3o na topologia gerou um grupo redundante para economizar a aloca\u00e7\u00e3o de comunicadores ou para detectar a sobreposi\u00e7\u00e3o de processos durante cria\u00e7\u00e3o de topologias locais ou comunicadores compartilhados inter-aplica\u00e7\u00e3o.", "example": "// Declara\u00e7\u00f5es\nMPI_Group group1, group2;\nint result;\n\n// Obt\u00e9m grupos para compara\u00e7\u00e3o\nMPI_Comm_group(MPI_COMM_WORLD, &group1);\nMPI_Comm_group(MPI_COMM_WORLD, &group2);\n\n// Compara a estrutura dos dois grupos\nint err = MPI_Group_compare(group1, group2, &result);\n\nif (err == MPI_SUCCESS) {\n    if (result == MPI_IDENT) {\n        // Os grupos cont\u00eam os mesmos processos na mesma ordem\n    }\n}\n\n// Libera\u00e7\u00e3o dos grupos\nMPI_Group_free(&group1);\nMPI_Group_free(&group2);"}, {"name": "MPI_Group_difference", "short_desc": "Cria um grupo a partir da diferen\u00e7a entre dois grupos", "synopsis": "int MPI_Group_difference(MPI_Group group1, MPI_Group group2,\n       MPI_Group *newgroup)", "params": [{"name": "group1", "desc": "primeiro grupo (handle)"}, {"name": "group2", "desc": "segundo grupo (handle)"}, {"name": "newgroup", "desc": "grupo resultante da diferen\u00e7a (handle)"}], "description": "NOTAS\n       O grupo gerado cont\u00e9m os membros de group1 que n\u00e3o est\u00e3o em group2.", "application": "", "example": "// Declara\u00e7\u00f5es\nMPI_Group world_group, sub_group, newgroup;\nint ranks_to_incl[2] = {0, 1};\n\n// Cria grupos para opera\u00e7\u00e3o\nMPI_Comm_group(MPI_COMM_WORLD, &world_group);\nMPI_Group_incl(world_group, 2, ranks_to_incl, &sub_group);\n\n// Subtrai o subgrupo do original\nint err = MPI_Group_difference(world_group, sub_group, &newgroup);\n\nif (err == MPI_SUCCESS) {\n    // Novo grupo criado com sucesso\n    MPI_Group_free(&newgroup);\n}\n\n// Limpeza\nMPI_Group_free(&world_group);\nMPI_Group_free(&sub_group);"}, {"name": "MPI_Group_excl", "short_desc": "Cria um novo grupo removendo ranks espec\u00edficos de um grupo existente.", "synopsis": "int MPI_Group_excl(MPI_Group group, int n, const int ranks[], MPI_Group *newgroup)", "params": [{"name": "group", "desc": "Grupo original do qual os processos ser\u00e3o exclu\u00eddos (handle)."}, {"name": "n", "desc": "N\u00famero de elementos no array ranks (inteiro)."}, {"name": "ranks", "desc": "Array de ranks dos processos a serem removidos (inteiro)."}, {"name": "newgroup", "desc": "Novo grupo contendo os processos remanescentes (handle, sa\u00edda)."}], "description": "MPI_Group_excl cria um novo grupo de processos que consiste em todos os membros do grupo original, exceto aqueles cujos ranks est\u00e3o listados no array 'ranks'. A ordem relativa dos processos no novo grupo \u00e9 a mesma que no grupo original. Todos os ranks em 'ranks' devem ser v\u00e1lidos no grupo de entrada e devem ser distintos.", "application": "Utilizado para criar subconjuntos de processos de forma negativa, facilitando a remo\u00e7\u00e3o de n\u00f3s espec\u00edficos (ex: n\u00f3s com falha ou n\u00f3s de ger\u00eancia) de um dom\u00ednio de computa\u00e7\u00e3o.", "example": "// Declara\u00e7\u00f5es\nMPI_Group world_group, newgroup;\nint ranks_to_exclude[1] = {0};\n\n// Obt\u00e9m o grupo base\nMPI_Comm_group(MPI_COMM_WORLD, &world_group);\n\n// Exclui o rank 0 do grupo\nint err = MPI_Group_excl(world_group, 1, ranks_to_exclude, &newgroup);\n\nif (err == MPI_SUCCESS) {\n    // Grupo excluindo o rank 0 pronto para uso\n    MPI_Group_free(&newgroup);\n}\n\nMPI_Group_free(&world_group);"}, {"name": "MPI_Group_f2c", "short_desc": "Converte um identificador de grupo do Fortran para C.", "synopsis": "MPI_Group MPI_Group_f2c(MPI_Fint group)", "params": [{"name": "group", "desc": "Identificador de grupo no formato INTEGER do Fortran."}], "description": "Esta fun\u00e7\u00e3o converte um handle de grupo MPI usado no Fortran para o tipo MPI_Group correspondente em C. \u00c9 essencial para a interoperabilidade entre as duas linguagens quando objetos MPI s\u00e3o passados entre m\u00f3dulos.", "application": "Interoperabilidade C-Fortran em aplica\u00e7\u00f5es legadas ou h\u00edbridas.", "example": "// Declara\u00e7\u00f5es\nMPI_Fint f_group_handle = 1;\nMPI_Group c_group;\n\n// Converte handle Fortran para C\nc_group = MPI_Group_f2c(f_group_handle);\n\n// O grupo agora pode ser manipulado pela API C\nif (c_group != MPI_GROUP_NULL) {\n    // Processamento com grupo convertido\n    MPI_Group_free(&c_group);\n}"}, {"name": "MPI_Group_free", "short_desc": "Marca um objeto de grupo para desaloca\u00e7\u00e3o.", "synopsis": "int MPI_Group_free(MPI_Group *group)", "params": [{"name": "group", "desc": "Grupo a ser liberado (handle, entrada/sa\u00edda)."}], "description": "MPI_Group_free libera o recurso associado ao objeto de grupo especificado. O handle \u00e9 definido como MPI_GROUP_NULL ap\u00f3s a chamada. Note que a desaloca\u00e7\u00e3o real s\u00f3 ocorre quando n\u00e3o h\u00e1 mais comunicadores ou outros objetos referenciando este grupo.", "application": "Gerenciamento de mem\u00f3ria e limpeza de recursos ap\u00f3s a cria\u00e7\u00e3o de novos comunicadores.", "example": "// Declara\u00e7\u00f5es\nMPI_Group my_group;\n\n// Obt\u00e9m grupo\nMPI_Comm_group(MPI_COMM_WORLD, &my_group);\n\n// Libera o objeto grupo quando n\u00e3o for mais necess\u00e1rio\nint err = MPI_Group_free(&my_group);\n\nif (err == MPI_SUCCESS) {\n    // O handle agora \u00e9 MPI_GROUP_NULL\n}"}, {"name": "MPI_Group_incl", "short_desc": "Cria um novo grupo a partir de uma lista de ranks de um grupo existente.", "synopsis": "int MPI_Group_incl(MPI_Group group, int n, const int ranks[], MPI_Group *newgroup)", "params": [{"name": "group", "desc": "Grupo original do qual os processos ser\u00e3o selecionados (handle)."}, {"name": "n", "desc": "N\u00famero de elementos no array ranks e tamanho do novo grupo (inteiro)."}, {"name": "ranks", "desc": "Array de ranks dos processos a serem inclu\u00eddos, na ordem desejada (inteiro)."}, {"name": "newgroup", "desc": "Novo grupo criado com os processos selecionados (handle, sa\u00edda)."}], "description": "MPI_Group_incl cria um novo grupo de processos contendo exatamente 'n' membros selecionados do grupo original. Os processos s\u00e3o ordenados no novo grupo conforme aparecem no array 'ranks'. Isso permite n\u00e3o apenas a sele\u00e7\u00e3o de subconjuntos, mas tamb\u00e9m a reordena\u00e7\u00e3o de processos.", "application": "Fundamental para criar grupos de trabalho espec\u00edficos (ex: grupo de vizinhos em uma malha) e definir a topologia l\u00f3gica de sub-comunicadores.", "example": "// Declara\u00e7\u00f5es\nMPI_Group world_group, newgroup;\nint ranks[2] = {0, 1};\n\n// Obt\u00e9m o grupo inicial\nMPI_Comm_group(MPI_COMM_WORLD, &world_group);\n\n// Cria um novo grupo apenas com os ranks especificados\nint err = MPI_Group_incl(world_group, 2, ranks, &newgroup);\n\nif (err == MPI_SUCCESS) {\n    // Opera\u00e7\u00e3o bem sucedida\n    MPI_Group_free(&newgroup);\n}\n\nMPI_Group_free(&world_group);"}, {"name": "MPI_Group_intersection", "short_desc": "Produz um grupo como a interse\u00e7\u00e3o de dois grupos existentes", "synopsis": "int MPI_Group_intersection(MPI_Group group1, MPI_Group group2,\n       MPI_Group *newgroup)", "params": [{"name": "group1", "desc": "primeiro grupo (handle)"}, {"name": "group2", "desc": "segundo grupo (handle)"}, {"name": "newgroup", "desc": "grupo resultante da interse\u00e7\u00e3o (handle)"}], "description": "NOTAS\n       O grupo de sa\u00edda cont\u00e9m os processos que est\u00e3o em ambos group1 e group2.", "application": "", "example": "// Declara\u00e7\u00f5es\nMPI_Group g1, g2, intersect_group;\nint ranks1[2] = {0, 1}, ranks2[2] = {1, 2};\n\n// Configura\u00e7\u00e3o dos grupos\nMPI_Comm_group(MPI_COMM_WORLD, &g1);\nMPI_Group_incl(g1, 2, ranks1, &g1);\nMPI_Group_incl(g1, 2, ranks2, &g2);\n\n// Calcula a interse\u00e7\u00e3o\nint err = MPI_Group_intersection(g1, g2, &intersect_group);\n\nif (err == MPI_SUCCESS) {\n    // Grupo resultante contendo apenas o rank 1\n    MPI_Group_free(&intersect_group);\n}\n\nMPI_Group_free(&g1);\nMPI_Group_free(&g2);"}, {"name": "MPI_Group_range_excl", "short_desc": "Cria um grupo excluindo intervalos de ranks de um grupo existente.", "synopsis": "int MPI_Group_range_excl(MPI_Group group, int n, int ranges[][3], MPI_Group *newgroup)", "params": [{"name": "group", "desc": "Grupo original (handle)."}, {"name": "n", "desc": "N\u00famero de triplas no array ranges (inteiro)."}, {"name": "ranges", "desc": "Array de triplas (primeiro rank, \u00faltimo rank, salto) indicando os processos a excluir (inteiro)."}, {"name": "newgroup", "desc": "Novo grupo resultante (handle, sa\u00edda)."}], "description": "MPI_Group_range_excl produz um novo grupo a partir do grupo original removendo os processos cujos ranks caem dentro dos intervalos especificados por 'ranges'. Cada intervalo \u00e9 definido por (rank inicial, rank final, passo). A ordem relativa dos membros restantes no grupo original \u00e9 preservada.", "application": "Eficiente para excluir blocos cont\u00edguos ou regulares de processos (ex: excluir todos os processos em um determinado n\u00f3 da rede).", "example": "// Declara\u00e7\u00f5es\nMPI_Group world_group, newgroup;\nint ranges[1][3] = {{0, 10, 1}};\n\nMPI_Comm_group(MPI_COMM_WORLD, &world_group);\n\n// Exclui um intervalo de ranks (0 a 10)\nint err = MPI_Group_range_excl(world_group, 1, ranges, &newgroup);\n\nif (err == MPI_SUCCESS) {\n    // Grupo filtrado criado\n    MPI_Group_free(&newgroup);\n}\n\nMPI_Group_free(&world_group);"}, {"name": "MPI_Group_range_incl", "short_desc": "Cria um novo grupo a partir de intervalos de ranks em um grupo existente.", "synopsis": "int MPI_Group_range_incl(MPI_Group group, int n, int ranges[][3], MPI_Group *newgroup)", "params": [{"name": "group", "desc": "grupo original (handle)"}, {"name": "n", "desc": "n\u00famero de tripletos no array ranges (inteiro)"}, {"name": "ranges", "desc": "array de tripletos (primeiro rank, \u00faltimo rank, salto) (inteiro)"}, {"name": "newgroup", "desc": "novo grupo criado (handle)"}], "description": "Cria um subgrupo definindo intervalos de processos do grupo original com passo (stride).", "application": "\u00datil para selecionar subconjuntos complexos de processos, como ranks pares.", "example": "// Declara\u00e7\u00f5es\nMPI_Group world_group, newgroup;\nint ranges[1][3] = {{0, 5, 2}}; // Inclui 0, 2, 4\n\nMPI_Comm_group(MPI_COMM_WORLD, &world_group);\n\n// Cria grupo baseado em intervalos\nint err = MPI_Group_range_incl(world_group, 1, ranges, &newgroup);\n\nif (err == MPI_SUCCESS) {\n    // Grupo criado com sucesso\n    MPI_Group_free(&newgroup);\n}\n\nMPI_Group_free(&world_group);"}, {"name": "MPI_Group_rank", "short_desc": "Retorna o rank do processo atual no grupo fornecido.", "synopsis": "int MPI_Group_rank(MPI_Group group, int *rank)", "params": [{"name": "group", "desc": "grupo (handle)"}, {"name": "rank", "desc": "rank do processo chamador (inteiro)"}], "description": "Permite que um processo descubra qual \u00e9 o seu rank dentro de um objeto de grupo espec\u00edfico.", "application": "Essencial para identificar o processo em subgrupos criados.", "example": "// Declara\u00e7\u00f5es\nMPI_Group group;\nint rank;\n\n// Obt\u00e9m o grupo do comunicador mundial\nMPI_Comm_group(MPI_COMM_WORLD, &group);\n\n// Descobre o rank do processo dentro deste grupo\nint err = MPI_Group_rank(group, &rank);\n\nif (err == MPI_SUCCESS) {\n    // Rank obtido com sucesso\n}\n\nMPI_Group_free(&group);"}, {"name": "MPI_Group_size", "short_desc": "Retorna o tamanho de um grupo.", "synopsis": "int MPI_Group_size(MPI_Group group, int *size)", "params": [{"name": "group", "desc": "grupo (handle)"}, {"name": "size", "desc": "n\u00famero de processos no grupo (inteiro)"}], "description": "Retorna a contagem total de processos que comp\u00f5em o grupo especificado.", "application": "Usado para obter informa\u00e7\u00f5es sobre a extens\u00e3o de um grupo.", "example": "// Declara\u00e7\u00f5es\nMPI_Group group;\nint size;\n\n// Obt\u00e9m o grupo associado ao comunicador\nMPI_Comm_group(MPI_COMM_WORLD, &group);\n\n// Retorna o n\u00famero total de processos no grupo\nint err = MPI_Group_size(group, &size);\n\nif (err == MPI_SUCCESS) {\n    // Tamanho do grupo processado\n}\n\nMPI_Group_free(&group);"}, {"name": "MPI_Group_translate_ranks", "short_desc": "Traduz os ranks de processos de um grupo para outro grupo.", "synopsis": "int MPI_Group_translate_ranks(MPI_Group group1, int n, const int ranks1[], MPI_Group group2, int ranks2[])", "params": [{"name": "group1", "desc": "primeiro grupo (handle)"}, {"name": "n", "desc": "n\u00famero de ranks nos arrays (inteiro)"}, {"name": "ranks1", "desc": "array de ranks v\u00e1lidos no group1 (inteiro)"}, {"name": "group2", "desc": "segundo grupo (handle)"}, {"name": "ranks2", "desc": "array de ranks correspondentes no group2 (inteiro)"}], "description": "Mapeia os ranks de um conjunto de processos de um grupo para seus ranks em outro grupo.", "application": "Vital para correlacionar identidades de processos em grupos diferentes.", "example": "// Declara\u00e7\u00f5es\nMPI_Group world_group, empty_group;\nint n = 1;\nint ranks1[] = {0};\nint ranks2[1];\n\nMPI_Comm_group(MPI_COMM_WORLD, &world_group);\n// Cria um grupo vazio para exemplo\nMPI_Group_empty(&empty_group);\n\n// Mapeia o rank 0 do world_group para o novo grupo\nint err = MPI_Group_translate_ranks(world_group, n, ranks1, empty_group, ranks2);\n\nif (err == MPI_SUCCESS) {\n    // Tradu\u00e7\u00e3o realizada\n}\n\nMPI_Group_free(&world_group);\nMPI_Group_free(&empty_group);"}, {"name": "MPI_Group_union", "short_desc": "Produz um grupo pela uni\u00e3o de dois grupos.", "synopsis": "int MPI_Group_union(MPI_Group group1, MPI_Group group2, MPI_Group *newgroup)", "params": [{"name": "group1", "desc": "primeiro grupo (handle)"}, {"name": "group2", "desc": "segundo grupo (handle)"}, {"name": "newgroup", "desc": "grupo resultante da uni\u00e3o (handle)"}], "description": "Cria um novo grupo que cont\u00e9m todos os processos presentes em pelo menos um dos dois grupos originais.", "application": "Usado para combinar conjuntos de processos.", "example": "// Declara\u00e7\u00f5es\nMPI_Group g1, g2, newgroup;\n\nMPI_Comm_group(MPI_COMM_WORLD, &g1);\nMPI_Comm_group(MPI_COMM_WORLD, &g2);\n\n// Cria a uni\u00e3o dos dois grupos\nint err = MPI_Group_union(g1, g2, &newgroup);\n\nif (err == MPI_SUCCESS) {\n    // Uni\u00e3o criada\n}\n\nMPI_Group_free(&g1);\nMPI_Group_free(&g2);\nMPI_Group_free(&newgroup);"}, {"name": "MPI_Iallgather", "short_desc": "Coleta dados de todas as tarefas e distribui os dados combinados para todas de forma n\u00e3o bloqueante.", "synopsis": "int MPI_Iallgather(const void *sendbuf, int sendcount, MPI_Datatype sendtype, void *recvbuf, int recvcount, MPI_Datatype recvtype, MPI_Comm comm, MPI_Request *request)", "params": [{"name": "sendbuf", "desc": "endere\u00e7o inicial do buffer de envio (escolha)"}, {"name": "sendcount", "desc": "n\u00famero de elementos no buffer de envio (inteiro)"}, {"name": "sendtype", "desc": "tipo de dado dos elementos (handle)"}, {"name": "recvcount", "desc": "n\u00famero de elementos recebidos de cada processo (inteiro)"}, {"name": "recvtype", "desc": "tipo de dado dos elementos recebidos (handle)"}, {"name": "comm", "desc": "comunicador (handle)"}, {"name": "request", "desc": "requisi\u00e7\u00e3o de comunica\u00e7\u00e3o (handle)"}], "description": "Vers\u00e3o n\u00e3o bloqueante da opera\u00e7\u00e3o Allgather.", "application": "Permite sobrepor a coleta global de dados com computa\u00e7\u00e3o local.", "example": "// Declara\u00e7\u00f5es\nint sendbuf = 42;\nint recvbuf[4];\nint sendcount = 1;\nint recvcount = 1;\nMPI_Request request;\n\n// Inicia a opera\u00e7\u00e3o n\u00e3o bloqueante\nint err = MPI_Iallgather(&sendbuf, sendcount, MPI_INT, recvbuf, recvcount, MPI_INT, MPI_COMM_WORLD, &request);\n\nif (err == MPI_SUCCESS) {\n    // Espera a finaliza\u00e7\u00e3o da opera\u00e7\u00e3o\n    MPI_Wait(&request, MPI_STATUS_IGNORE);\n}"}, {"name": "MPI_Iallgatherv", "short_desc": "Coleta dados de todas as tarefas de forma n\u00e3o bloqueante com tamanhos variados.", "synopsis": "int MPI_Iallgatherv(const void *sendbuf, int sendcount, MPI_Datatype sendtype, void *recvbuf, const int recvcounts[], const int displs[], MPI_Datatype recvtype, MPI_Comm comm, MPI_Request *request)", "params": [{"name": "sendbuf", "desc": "endere\u00e7o inicial do buffer de envio (escolha)"}, {"name": "sendcount", "desc": "n\u00famero de elementos no envio (inteiro)"}, {"name": "sendtype", "desc": "tipo de dado de envio (handle)"}, {"name": "recvcounts", "desc": "array de contagens de recebimento (inteiro)"}, {"name": "displs", "desc": "array de deslocamentos (inteiro)"}, {"name": "recvtype", "desc": "tipo de dado de recebimento (handle)"}, {"name": "comm", "desc": "comunicador (handle)"}, {"name": "request", "desc": "requisi\u00e7\u00e3o de comunica\u00e7\u00e3o (handle)"}], "description": "Vers\u00e3o n\u00e3o bloqueante do Allgatherv.", "application": "\u00datil quando a carga de dados por processo n\u00e3o \u00e9 uniforme.", "example": "// Declara\u00e7\u00f5es\nint sendbuf = 1;\nint recvbuf[10];\nint sendcount = 1;\nint recvcounts[] = {1, 1};\nint displs[] = {0, 1};\nMPI_Request request;\n\n// Opera\u00e7\u00e3o n\u00e3o bloqueante com tamanhos vari\u00e1ve edncrona da opera\u00e7\u00e3o Alltoall.", "application": "Crucial para redistribui\u00e7\u00e3o de dados irregulares.", "example": "// Declara\u00e7\u00f5es\nint sendbuf[2] = {1, 2};\nint recvbuf[2];\nint sendcounts[] = {1, 1}, sdispls[] = {0, 1};\nint recvcounts[] = {1, 1}, rdispls[] = {0, 1};\nMPI_Request request;\n\nint err = MPI_Ialltoallv(sendbuf, sendcounts, sdispls, MPI_INT, recvbuf, recvcounts, rdispls, MPI_INT, MPI_COMM_WORLD, &request);\n\nif (err == MPI_SUCCESS) {\n    MPI_Wait(&request, MPI_STATUS_IGNORE);\n}"}, {"name": "MPI_Ialltoallw", "short_desc": "Comunica\u00e7\u00e3o all-to-all generalizada n\u00e3o bloqueante heterog\u00eanea.", "synopsis": "int MPI_Ialltoallw(const void *sendbuf, const int sendcounts[], const int sdispls[], const MPI_Datatype sendtypes[], void *recvbuf, const int recvcounts[], const int rdispls[], const MPI_Datatype recvtypes[], MPI_Comm comm, MPI_Request *request)", "params": [{"name": "sendbuf", "desc": "endere\u00e7o inicial do buffer de envio (escolha)"}, {"name": "sendcounts", "desc": "contagens de envio (inteiro)"}, {"name": "sdispls", "desc": "deslocamentos em bytes (inteiro)"}, {"name": "sendtypes", "desc": "tipos de dados de envio (handle)"}, {"name": "recvcounts", "desc": "contagens de recebimento (inteiro)"}, {"name": "rdispls", "desc": "deslocamentos em bytes (inteiro)"}, {"name": "recvtypes", "desc": "tipos de dados de recebimento (handle)"}, {"name": "comm", "desc": "comunicador (handle)"}, {"name": "request", "desc": "requisi\u00e7\u00e3o de comunica\u00e7\u00e3o (handle)"}], "description": "Vers\u00e3o ass\u00edncrona mais flex\u00edvel do all-to-all com tipos e tamanhos distintos por par.", "application": "Especializado para redistribui\u00e7\u00f5es de dados extremamente irregulares.", "example": "// Declara\u00e7\u00f5es\nint sendbuf[2] = {1, 2};\nint recvbuf[2];\nint sendcounts[] = {1, 1}, sdispls[] = {0, 4};\nMPI_Datatype sendtypes[] = {MPI_INT, MPI_INT};\nint recvcounts[] = {1, 1}, rdispls[] = {0, 4};\nMPI_Datatype recvtypes[] = {MPI_INT, MPI_INT};\nMPI_Request request;\n\nint err = MPI_Ialltoallw(sendbuf, sendcounts, sdispls, sendtypes, recvbuf, recvcounts, rdispls, recvtypes, MPI_COMM_WORLD, &request);\n\nif (err == MPI_SUCCESS) {\n    MPI_Wait(&request, MPI_STATUS_IGNORE);\n}"}, {"name": "MPI_Ibarrier", "short_desc": "Notifica o processo que ele alcan\u00e7ou a barreira e retorna imediatamente.", "synopsis": "int MPI_Ibarrier(MPI_Comm comm, MPI_Request *request)", "params": [{"name": "comm", "desc": "comunicador (handle)"}, {"name": "request", "desc": "requisi\u00e7\u00e3o de comunica\u00e7\u00e3o (handle)"}], "description": "Vers\u00e3o n\u00e3o bloqueante da barreira de sincroniza\u00e7\u00e3o.", "application": "Permite sobrepor a sincroniza\u00e7\u00e3o global com trabalho local.", "example": "// Declara\u00e7\u00f5es\nMPI_Comm comm = MPI_COMM_WORLD;\nMPI_Request request;\n\n// Inicia a barreira n\u00e3o bloqueante\nint err = MPI_Ibarrier(comm, &request);\n\nif (err == MPI_SUCCESS) {\n    // Aguarda a conclus\u00e3o da sincroniza\u00e7\u00e3o\n    MPI_Wait(&request, MPI_STATUS_IGNORE);\n}"}, {"name": "MPI_Ibcast", "short_desc": "Transmite uma mensagem do processo raiz para todos de forma n\u00e3o bloqueante.", "synopsis": "int MPI_Ibcast(void *buffer, int count, MPI_Datatype datatype, int root, MPI_Comm comm, MPI_Request *request)", "params": [{"name": "buffer", "desc": "endere\u00e7o inicial do buffer (escolha)"}, {"name": "count", "desc": "n\u00famero de elementos (inteiro)"}, {"name": "datatype", "desc": "tipo de dado (handle)"}, {"name": "root", "desc": "rank do processo raiz (inteiro)"}, {"name": "comm", "desc": "comunicador (handle)"}, {"name": "request", "desc": "requisi\u00e7\u00e3o de comunica\u00e7\u00e3o (handle)"}], "description": "Inicia uma opera\u00e7\u00e3o de broadcast ass\u00edncrona.", "application": "\u00datil para distribuir configura\u00e7\u00f5es sem bloquear receptores.", "example": "// Declara\u00e7\u00f5es\nint buffer = 42;\nint count
